body:
  text: 靖康要録卷四四月一日詔皇太子大寧郡王諶嫡長而賢年甫就傅可依大臣所請擇日降制立為皇太子二日臣僚上言近日朝廷元惡大憝悉行竄殛而殘孽未殄士論不厭李彥括田京東西賊民之大者監司守令助彥為虐者猶未放逐監司如王子獻郡守如韓宗胄縣令如劉願王滸此數人罪惡尤著王子獻在京東與彥為姻好倚勢裒刻百姓嗟怨欲食其肉宗胄守唐日斂數百千以供西城剝膚椎髓民不堪命比因軍興調發恣橫滋甚民至有自經蹈河赴井而死者不可勝計道路流聞情所不忍劉願王滸挾西城之威殘虐百姓與宗胄相埒伏望亟正典刑使為惡者知戒近見除向子韶為京東漕其人操守堅正有徇國愛民之心凡李彥黨與在京東為民蠧者宜悉使之究治鋤其根穴京師亦乞遴選漕臣如京東施行庶幾兩路編氓積年寃憤一旦消釋奉聖旨王子獻已施行外韓宗胄等並罷京西路委井度餘依皇弟相國公梴為檢校少傳保寧軍節度建安郡王楧為檢校少傅安逺軍節度溫國公棟為檢校少傅靖難軍節度嘉國公椅為檢校少傅彰信軍節度儀國公桐為檢校少傅肇慶軍節度瀛國公樾為檢校少傅雄武軍節度昌國公柄為檢校少傅平海軍節度潤國公樅為檢校少傅興德軍節度皇伯晉康郡王孝騫以下並加恩有差以上即位故也三日車駕幸宜春苑奉迎太上皇帝少宰吳敏奏臣聞子路人告之以有過則喜此風不見於世久矣臣有私懇上恃聖眷敢冒陳之乃者侍御史孫覿言太學諸生又將伏闕為變而太學生吳若為之唱上誤聖聽吳若罷逐今孫覿既責吳若未還臣近稍聞外議謂若常言臣之過而臣勸陛下逐之故至今不復臣初不以為信昨太學生上書亦有道此者則若之有是言審矣臣愚竊謂如臣方蒙拔擢任使而若乃能上書言臣之過此人之所難且以臣之故而逐若此臣之所不安也伏望聖旨召還吳若以慰衆論以明臣區區願聞其過之心以廣陛下求言之意不勝僣越奉聖旨依奏是日太上皇帝入國門五日聖旨依熙豐法監司守二並替成資闕六日駕詣龍德宫朝見太上皇帝髙陽關路安撫使陳遘中山路安撫使詹度並奏殺獲敵兵其金人已過保州出塞前去保護僖祖順祖陵寢並無踈虞詔曰朕承祖宗之休烈嗣守厯服夙興夜寐弭躬節事日再御朝深訪元元之疾苦務便安之而聞四方郡縣姦吏故習叨懫弗革朕甚悼焉頃緣扞冦俾招戰士聞荆湖間至居民等第雇募財匱力屈軍食調發固已騷動而京西漕臣驅民陸運牛車擔負老壯道斃今若此類則云少間然而貪吏盜攘苛吏掊克種種如故租稅折科至增數倍供億和市或弗與直吏治之悖謬抵此而欲望王澤究宣邦本安阜其道甚艱朕方詔輔臣擇精明吏出按此屬使重置于法故先播告監司守令庶幾承風遵畏簡書自求新益以稱朕意毋忽七日制尚書右丞耿南仲除門下侍郎知樞密院事李綱四上劄子以昨與大臣議論不協之故橫遭誣衊有玷國體欲乞罷免奉御批令封還卿奏豈可如此朕委付之意至矣更勿少疑不得再請雖纍百章亦當封還又詔卿屢貢封章懇求去位自陳危懇甚駭豫聞乃者敵在近郊士庶伏闕一朝倉卒衆數十萬忠憤所激不謀同辭此豈人力也哉不恱者造言何所不可故卿不自安殊不知朕深諒卿之不豫知也前日宰執臺諫沮師敗謀格塞公議已悉罷逐方今四海所願以為輔佐多聚廟堂朕於任賢勿二去邪勿疑自以為庶幾焉卿其深體朕心亟安厥位以濟國事制曰朕以菲德獲承丕基圖政罔協于中施澤未究于下攬有司之抗議援故實以力陳謂慎主器所以嚴七廟之承謂早建儲所以系四海之望欲邁周家千嵗之盛治宜稽漢帝初元之舊文朕恧焉以慙瞿然而改惟縉紳之言甚大念宗社之計莫先勉徇衆懷遂正國本誕揚顯册敷告外朝皇子檢校少傅寧國軍節度使大寧郡王諶生有竒姿性得異稟弱靡好弄屹爾成人之儀長則嗜書粹然盛德之器比肇封於西土猶虛位於東宫是用憲祖宗之彛章信龜筮而協吉實天心之是祐非朕志之敢私嗚呼朕方逺慕成康之隆近圖文景之懿庶阜民俗克靖我家惟爾益懋於令猷惟爾益勤於典學忠以勵庶邦之享孝以興天下之仁時其榮懷爾益譽處可立為皇太子仍令所司擇日備禮册命八日臣僚上言知陜州王復闒茸貪叨臨民無狀蓋王黼童貫梁師成之僕𨽻也交結近習賂遺權貴進非其道處非其據今雖落職猶以通議大夫玷守名藩不加汰斥未厭輿論奉聖旨王復放罷臣僚上言國朝因唐舊制刋定三品五品之服每郊祀慶成疏恩四海有司以告然必限以歷仕之年拘以通籍之例除日罪故去官之日如是乃得五品服焉又如是而官至大夫乃得三品服焉一坐汙墨終身不豫也其法可謂嚴矣唯中外更踐望實兼著則燕朝對􅤬間有特賜之寵以昭異數然率三數嵗不一有也近嵗服章之濫未見前比兒童稚齒垂金曳紫袂相屬肩相摩也外則部刺史州縣之吏託以辦職亦獲此賜夤緣干請薦紳指笑而特賜者十常三四矣又復聽以婦人冠帔改换于是執政大臣王侯妃戚之家子孫弟姪內外姻黨人人得之朱紫紛亂不勝其濫矣習以為常恬不知愧方陛下修明紀綱裁抑僥幸服章之弊安可不革昔唐宣宗重惜服章有司常具緋紫數襲從行以備賞賜或半嵗不用其一故當時以緋紫為榮伏望眀降詔旨自今不許因事特賜與援例改换其日前非緣陛對元係臣僚賞賜與冠帔改换者在京委禮部在外委郡守移牒告諭俾之自陳悉從釐正若官品相當及曽任從官以上者自合如令其賞賜金𢃄者亦乞準此施行奉聖旨依奏御史臺言根究到保和殿大學士蔡行自敵人迫近畿甸之前擅去朝廷逃歸東南奉旨責授昭化軍節度副使襄陽府安置又根究到工部侍郎馮溫舒非因差出擅離職守奉聖旨馮溫舒落職徽猷閣直學士河北都運吕頥浩差提舉西京崇福宫詔吏部隨龍人令取索推恩數內門下侍郎耿南仲遷正奉大夫資政殿學士王易簡遷中大夫應隨龍官吏并諸色祇應人等有官資人各與轉四官無名目人並補承節郎談世績李熙靖並除顯謨閣待制提舉醴泉觀依舊管勾龍德宫詔龍德宫日具道君皇帝起居平安以聞九日少宰吳敏奏皇天眷佑有宋以開中興之業詩曰周雖舊邦其命維新今日之謂也方今民未見德敵未畏威謂宜大更革以承天休而玩嵗愒日何以有成臣不勝大懼伏望明詔宰執置司辟屬遵上皇詔旨取祖宗舊法悉加討論復其宜於今者以幸天下成王酌先祖之道宣光復古庶幾在此奉聖旨依奏置司討論既而詔少宰吳敏太宰徐處仁各薦屬官十員仍差宰臣充詳議提舉官徐處仁踏逐到吕本中范宗尹為吏房趙柟李亘為户房劉寧止張元幹為兵房安元方若為禮房莫儔為刑房劉彥適為工房吳敏踏逐到梅執禮朝説之為吏房張慤向子諲為户房折彥質為兵房孫傅為禮房胡安國李朴為刑房李彌大江端友為工房于尚書省令􅈦置司以侍從官為參議餘官為檢討分六房使各討論限半年結局奉聖旨依奏提舉官差李綱吳敏徐處仁太學生陳東補迪功郎除太學録既而東辭不受命少宰吳敏劄子奏道君皇帝方舉堯舜之盛德以授聖神而陛下方建宣光之大功以安宗廟茲者行宫還闕法駕郊迎慈孝藹然契濶悲喜天地為之開霽神人莫不感動中外大慶古今所無此誠宗社之休臣民之福也臣聞嚴君平為人臣言依於忠為人子言依於孝臣竊謂今日羣臣之任正在於此願下臣章曉諭羣臣使凡進見於上皇之側者皆能發眀聖孝晨夕思慕之心以助慈愛凡進見於陛下之側者皆能傳道上皇聖慈起居悅豫之意以安孝心雖二聖交歡天性至情無待於此然先事而言臣之職也臣不勝大願奉聖旨依奏少宰吳敏劄子六經垂訓蓋天所以奠世法也猶之江河淮濟經流中國終入大海自三代以後凡生民有一飯之安皆六經之功世蓋由之而不知獨恨更秦之禍禮缺樂亡而近者王安石以經術自任又廢其一其意以謂魯史既亡而三傳不足取信則春秋永無復可考殊不知聖人作經豈不料後世綿逺羣言次第湮沒而此經獨存當是之時聖人豈不欲眀其説於天下且人之立言詞不達意而必待補足其説則其文亦繆矣曰聖人之經豈乃是此是蓋弗思之甚也昔韓宣子適魯見易象與魯春秋曰周禮盡在魯矣易明天道而春秋著世法譬如覆載之間象緯昭於上而形質列於下是皆一氣所成然則文王之作易孔子之作春秋是皆周禮之所在也臣愚願下明詔復立春秋學官今嵗貢舉遂以取士庶幾同講聖人之遺經以輔世教臣不勝大願奉聖旨依奏臣僚上言河陽鄭州當兵馬往來之衝京西路漕臣陸宰未嘗過而問也但自為逃竄計不復以國家為意奉聖旨陸宰落職送吏部少宰吳敏劄子臣伏聞布衣江端友隱居京城東郊素有髙行士大夫多稱道之臣頃見吳升詳言其迎養所生母之孝又嘗聞搢紳誦其詩而端友躬耕蔬食守節自重頃聞講議司欲招之端友訖不肯就自陛下即位求直言端友當圍城時上書論事甚衆而終不肯一至公卿之門近者陛下招延草茅鄒柄任申先尹焞鄧肅之流偶未及端友臣愚伏望特加官使以風四方奉聖旨賜同進士出身與補承務郎十一日詔王永從吳滸楊邦直皆係騷擾東南之人臣僚纍有章疏永從降授秉義郎致仕吳滸楊邦直並除名勒停送諸州編管日下押出門十三日乾龍節百官上夀賜宴于紫宸殿太上皇帝賜功德疏一軸香山子一座真龍卯瓶真鳯嘴杯各一种師道种師中等奏昨奉聖訓保守三鎮驅逐金人出界其中山河間府兩鎮并沿邉州軍並已平安獲到敵俘并歸業人口不計數目奏聞事十五日太宰徐處仁劄子唐馬周上疏太宗言陛下誠欲厲精求政不煩逺采上古但及貞觀初則天下幸甚臣愚以馬周之言可謂切於治道乃者金人乘虛深入蹂踐陵侮無所不至國朝以來未有此辱陛下初即大位日御便座近見羣臣視閲四方奏報與士民所上章往往夜分不寐而又恭儉約素無所嗜好専以天下國家安危存亡之幾拳拳於心勤勞可謂至矣故不二月而金人出境社稷再安此豈股肱翊贊之勳爪牙宣力之效哉蓋聖德勤儉得天心之助也書曰終始惟一時乃日新詩曰靡不有初鮮克有終臣願陛下日慎一日雖休勿休凡修身治國之要必稽之於祖宗考之於今日如嬪御之多寡宴遊之疏數土木之營造道佛之齋醮近習之權寵戚里之祿秩賜豫之厚薄費用之豐約凡欲有所為必仰而念曰祖宗之法何如靖康之初何如三復審諦然後行之則國勢安強民情悅豫紀綱立而外國畏足以刷金人深入之恥矣伏望陛下留神於斯八者朝夕思之如盤盂几杖之銘不忘於起居飲食之間業業兢兢常如今日則陛下可以比隆堯舜之盛治而臣愚亦庶幾馬周之忠君臣俱榮不其偉與奉御札覽卿所奏甚喜朕心素定無有少易太宰徐處仁劄子學之為王者事誠先務也陛下育德春宫十有二年寢門問安而退以經史自娛臣聞靡不有初終之實難願陛下數御邇英延見講讀之臣仍依故事時召宰執並赴講筵研究經義詢求治道探之以驗物稽之以決事興起治功並隆於唐虞三代之時實天下幸甚奉聖旨依奏臣僚上言否泰以類相反而君子小人各以其類相為往來方今天下姦惡如織蕪穢郡縣戕賊黎元凡才無爛羊之能濫寵有續貂之歎吏部充塞無闕以擬注版曹空匱不給祿廪若不一大鏟革恐終不可有為今以軍興多故郡縣餉運鞭笞良民無直而糴上下皆弊公私共勞而姦宄無用之人坐糜食廩之蓄此所謂繁其華去其實而披其枝傷其心者也願詔吏部稽考庶官凡由楊戩李彥之公田王黼朱勔諸道之應奉童貫談稹等西北之師孟昌齡父子河防之役與夫夔蜀湖南之開疆關陜河東之改幣吳越山東陂田宫觀池苑營繕之功後苑書藝文字庫等之賞淫朋比德各從其類又若近習所引獻頌可采效用宣力應奉有勞特赴殿試之流此皆殃民蠧國敗俗妨賢姦凶取位賕賄買官所叨恩數不限髙卑一切追奪還其本秩若非此族而橫取名器如節度橫行之貴仕祕殿延閣之華資或以童稚奴僕而濫膺或以商賈胥徒而貨取人人論列簡牘徒煩願令吏部略具閥閲關諸臺諌分使看詳上之朝廷次第裁抑其坐公田等事如鮮于可等非理譴逐宜自元斷月日復其資秩恩數量才推擢以勸忠良然後位著可清賢能可進民生可安國用可節昔唐去斜封墨敕之官一日停數千員不以為疑則今亦何難之有夫糞土為墻則匠石不施塗塈鄭衛調瑟則伶夔難致簫韶願陛下順天休命而一新之奉聖旨依奏顯謨閣直學士知平江府李倫落職提舉華州雲臺觀以任大理卿日與朱汝賢為傳信平江府事皆取決朱勔之家也聖旨王黼家屬特令任便居住其咸平縣墳地約三頃蘇州田産嵗課約二千石並特與給還户部尚書聶山罷領開封尹詔賜聶山改名昌監察御史胡舜陟奏竊聞河北金人已遁今日備禦之計尤不可不講蓋金人往來中國如踐無人之境其鋒未嘗少挫而又載金帛以往轂擊而肩摩驅略産畜與夫編民子女襁屬不絶一舉而獲利如此輕我之心必甚復來之期今秋決矣古人所謂來而不能困而得氣去後未易服者此也然則邉患之事今為急務正使愛日而圗之孜孜汲汲以至折膠之時猶恐勿及若曰寇退未必復來偷頃刻之安務茍簡之集臣恐禍至甚於前日傳曰日中必熭操刀必割貴及時也時者易失而難得從時者若救火追亡蹶而趨之若夫邉城以北深溝髙壘據其要害阻其走集使騎不得越明斥堠謹守備選將以任之練兵以使之積粟以實之誠為今日先務經營措畫今其時也舍今日而不為恐無及矣蓋自童貫開燕以燕為邉然如雄州中山河間疆埸備禦一切廢罷凡百邉事久習誕謾兵以少為多粟以無為有將以不才為才臣願陛下詔三省樞密院使各加意務為實事更惜寸隂而為之先條邊防之事其大者有幾雞鳴而起曰今日為某事用某人明日亦然而日復一日所為不輟庶幾能為先患之防向蔡靖到燕山日以危急告朝廷而白時中李邦彥怙為無慮失其機會遂使敵騎長驅莫之能禦臣所以乞朝廷孜孜汲汲措畫邊事恐蹈覆車之轍復貽陛下宵旰之憂也伏望睿斷督責大臣使之愛日措畫邊備天下幸甚奉聖旨三省措置十六日臣僚上言臣聞唐德宗巡狩奉天自發洋州百姓進獻瓜果欲各與散官陸贄不可曰爵祿者天下之公器而國之大柄也惟勳功才德所宜處之夫散官虛名也贄猶力爭至數千百言而不已誠以所係者重也臣伏聞上皇東巡州縣供饋無缺此乃臣子之常分何足為功兼供匱之物自一毫以上皆出行人及坊郭鄉村有物力之人非出於供饋者之家也供饋愈辦則剝民愈深臣訪聞其間巧於謀身者多是交結近習縱其請求須索無藝往往緣此得其歡心揄揚贊美達之上皇遂至增秩賜金行宫如市有再任者有進三官者有賜黃金至百兩者有召赴都堂審察者濫賞橫賜非散官之比也陛下修眀百度抑絶奔競如此而士大夫冒犯亷隅僥幸茍得如彼况上皇鑾輿還闕將士冒行陳突鋒鏑以衛護社稷者或橫尸原野暴露邊鄙未聞少加恩典而首及州縣猾邪之徒非所以示天下之公也所有遷官進職指揮伏望寢罷以安人情契勘上皇經由道路宣力人寧陵知縣趙子遊喻光祖葉景述各轉三官等聖旨轉三官人轉兩官除轉兩官人轉一官御史中丞陳過廷言國家承祖宗積纍之盛比年以來國用匱之海內空虛細民愁苦盜賊縱橫金人乘中國無備敢以數萬直抵京闕者蓋將相大臣同惡相濟二十餘年所以至此蔡京竊弄威福於前王黼竊弄威福於後蔡京王黼敗壞法度於內童貫蔡攸敗壞法度於外爭權兢利其初雖相為矛盾至於包藏禍心害民蠧國則若合符節然竄殛之刑獨加於王黼而蔡京童貫止於善地安置而已罪同罰異其誰不疑雖天心隆恕務欲保全奈天下憤嫉何奈四裔侮笑何若京及貫不肆諸市朝不投之荒裔誠不足以厭天下之意奉聖旨蔡京移衡州安置童貫責授昭化軍節度副使郴州安置臣僚上言伏見朱勔父子皆衡州一處安置典刑未正臣竊謂人臣之罪莫大於僣越義在不赦謹按朱勔於私家建神霄殿乃安奉上皇御容於其中恃此脅持上下凡節朔郡縣吏與監司經由皆朝拜於其家人臣之家有朝拜之稱此何理也借應奉挽舟之名私募人兵數千實以自衛不𨽻州郡結為死黨大逆不道迹狀眀甚竊弄威柄江淮以東均被其毒魚奪民産無有紀極如平江司理院意欲得之州郡即時遷徙無敢不從者凶焰若此若不早為之所竊恐别致生事伏望肆諸市朝與衆棄之散遣其子孫投之四裔以絶姦幸天下幸甚奉聖旨朱勔移韶州羈管制以檢校少保平涼軍節度使范訥為右金吾衛上將軍依前中太乙宫使訥以疾辭節故有是命制加鎮洮軍節度种師道為太尉依前河北宣撫使聖旨朱勔子姪分散諸州居住朱沖朱勤官爵並行追奪監察御史胡舜陟奏伏見臣僚論宇文虛中罪狀宜正刑典陛下俯循公義特罷樞密然猶以資政殿大學士知青州士論藉藉豈所當得謹按虛中天資姦佞善儷權貴始由梁師成以進其後童貫平燕遂為參謀凡貫欺妄君父文飾已功而見於章奏者皆虛中為之自貫始開燕薊謀取雲中蠧國喪師妄竊㓛賞招納叛亡構成邊患皆虛中主謀及貫聞寇至棄兵遁歸而虛中亦與之偕來遂使邊城不守敵騎長驅在律當與貫相次受誅也朝廷猶責以後效進大學士用為軍前宣撫使虛中輒遁逃淮甸至煩聖旨遣內侍追尋始趨闕下自知罪惡昭著不可逃責乃巧詞詭説求使金國是時和議已定虛中何與焉掠為已功遂參樞廷其懷姦誤國方命營私罪不在王殏之下自朝廷議割三鎮凡士大夫以至閭閻僮夫匹婦莫不皆以為非獨虛中與李梲李鄴鄭望之輩以為當然其意實欲賣國結仇自為身謀於是為敵張大其勢恐脅朝廷李鄴謂敵如龍如虎虛中謂體生鱗甲不可與敵是反於敵為説客使我畏縮甘心割地古人罪六國之臣曰外挾強秦之威內劫其主以求割地大逆不忠無過此者虛中之謂也今以袐殿峻職出殿巨藩欲望早賜流竄以為誤國方命者之戒所有錢蓋嘗任邊帥無過失乞且留青州以免數易之弊奉聖旨曽李序差知青州宇文虛中候替人到發來赴闕聖旨宰執請受可權支三分之二支賜減半支一次從少宰吳敏之請也聖旨梅執禮吳幵楊時並兼侍講王宇莫儔孫傅並兼侍讀餘並罷斡喇布遣計議使賈霆副使冉企弓來議三鎮未下就差王殏引伴到闕時殏至中山府望都縣趕及肅王斡喇布以三鎮未下未令肅王回故遣賈霆等隨殏先來制太師鎮南軍節度鄭紳進封樂平郡王駙馬都尉康國公致仕錢景臻加食邑應道軍節度朱孝孫加檢校少傅鎮安軍節度劉宗元加食邑嶽陽軍節度王舜臣加檢校少師鎮海軍節度劉延慶加檢校少保保靜軍節度姚古加檢校太師奉國軍節度髙俅加檢校太保保信軍節度劉敷加檢校太保武成軍節度劉敏加檢校少師瀘川軍節度錢忱加檢校少保嚮德軍節度張楙加檢校少師陸海軍節度鄭翼之安德軍節度鄭成之並加檢校少保少傅鎮西軍節度衛國公余深加食邑十八日臣僚上言寶文閣學士前知京兆府盛章昨自罪廢復蒙收用宜率德改行上副朝廷之意而章虎狼之性不悛豺虺之毒滋甚肆行凶虐毒流一方近者召兵關陜以赴國難章坐觀事勢遲留不行進無勤王之心退有營私之志而又乘勢作威一日殺僇無辜者數十人軍兵洶洶幾至變亂賴朝廷已賜廢罷使之赴闕蓋是從官罷帥之故事非召還也例皆止於近地陳乞外任或宫觀未有乘此徑赴闕廷者章志在茍得無復亷恥聲言召還遽至城外臣恐隂懷結構復圖進用若萬一使之立朝則民庶忿怒之情士大夫公議不與必至喧沸伏望與一外任宫觀不得復入宫門以為姦邪小人茍得毋恥之戒奉聖旨依奏差提舉江州太平觀太宰徐處仁劄子乞將河北河東京東京西路應係官田召募強勇使為永業並依陜西弓箭手法以為民兵又乞漸修馬政以為禦戎之備奉聖旨並送詳議司聖旨陽武知縣蔣興祖長垣知縣上官敏功能死於職守各贈五官與一子恩澤太康知縣康國材扶溝知縣惠厚下東眀知縣宋晟能率衆守禦與改合入官尉氏主簿曹嗣宗巡轄李充美因賊至皆死於職守各贈三官與一子恩澤雍丘縣丞趙不矜攝縣事措置有方敵不能犯城鄢陵縣監酒稅趙子璆能率衆扞禦各轉兩官鄢陵知縣張膺因敵犯闕乃稱母喪輒去官守退復就職可除名勒停鄢陵縣尉闕金兵未至而遁可勒停宣教郎吳安國武翼郎王觀奉使絶域十九日門下侍郎耿南仲言臣竊見陛下即位之初夏國賀正人使襲用前例持珠玉而來欲邀厚利三省同奉聖旨夏人賫到珠玉更不收買賜錢一萬貫又開封府籍沒到王公之家有雕鏤靡麗之物甚衆奉聖旨華侈什物並行毁棄於是開封裒集華侈什物焚於通衢都人聚觀無不嘉歎以此見陛下不寶逺物不貴異物以敦朴為天下先也臣竊記陛下初立為皇太子曽具劄子奏上皇乞裁減東宫庶事其言曰慎乃儉德惟懷永圖立身之始敢不念茲今兩降聖旨如是信克踐其初矣臣聞古聖帝明王所以風化天下事不在大亦不在多發於至誠而天下化矣史稱漢文之德化亦不過一二事而已陛下日新斯德久而不渝則民風厚邦本固漢文之治不足道也伏望收臣所陳宣付史館奉聖旨依奏監鳯州酒稅務徐秉哲行殿中侍御史二十二日御史中丞陳過庭奏近年建節之臣雖胥吏厮役輩亦有濫除者功臣貴戚羞與為伍比者平涼節度范訥抗章有請願歸環衛聖恩隆厚特授以右金吾衛上將軍制命一頒衆皆歡忭臣計相繼亦有請者今欲乞除宗室及實有軍功人别作措置外其餘節度並依范訥换授施行奉聖旨令吏部開具除授因依聞奏契勘鄭紳係太師鎮南軍節度余深係少傅鎮西軍節度奉聖旨鄭紳為上皇皇后父特免换外余深特進觀文殿大學士王易簡除資政殿大學士制皇弟南康郡王栻進封和王平陽郡王榛進封信王皆以將出閣也二十三日臣僚上言竊以國家治亂在用人用人在責實熙寧間王安石執政改更祖宗之法附會經典號為新政以爵祿招誘輕進冒利之人使為奧援挾持新政期於必行自比商鞅天下始被其害矣以至為士者非性命之説不談非莊老之書不讀上慕軒黃下比堯舜三代以漢唐為不足法流弊至今為害日久晉以王衍溺於莊老遂至南渡今天下之士撡筆弄墨朝誨夕諭升孔子之堂宗虛無之教而欲風教不壞朝廷乂安其可得乎朝廷以科舉取卓偉之才以詩賦待才能之士以策論試操守之節或質以吏學或究以時政今之策士盡成虛無不根之言欲士詳於古今治亂不可得矣國家以詩賦為名臣者不可勝記變更舊章之後至今五紀特立不羣為大臣幾何人哉國富民康果及祖宗之時乎不待辨説可知矣今國威不彰由用人不責其實救之之術莫若遵祖宗成憲王安石解經有不負聖人之旨者亦許收用至於老莊字説並行禁止奉聖旨送禮部詳議聖旨陳瓘子正彚昨緣言蔡京坐罪可召赴闕取旨與差遣二十四日手詔朕初嗣厯服遭時艱難強鄰陵侮侵擾邊境達於都畿賴祖宗社稷之靈賢士大夫勤王將士之力以克捍禦而倉卒之間輔臣失計割三鎮以賂之天啓朕心屏去邪回決策堅守今者重兵尾襲敵騎遁逃朔部無虞與天下同慶然而敵情狡獪未有所懲秋髙馬肥慮復侵軼非以虎符起天下兵控扼郊陲蕩攘邊塞則何以震懼外邦奮張天威以定中興之業詔到仰諸路安撫總管鈐轄司名下所管州軍遴選將佐訓練正兵招填闕額繕治器甲儲蓄芻糧豫備軍需以聽朕命夫一嵗之間再勤師旅良非獲已共攄大憤以圖休息茲惟其時條件付樞密院施行司諫陳公輔言臣蒙陛下不以臣狂愚擢在諫省此古者拾遺補闕之官自宰相執政以下臣能論之皆不為難唯於陛下聖躬倘有遺闕臣拾而補之茲為稱職臣所以不避鼎鑊之罪上干雷霆之威伏惟睿慈時賜矜察臣下情不勝惶恐懇切之至臣竊覩陛下以孟夏享景靈東西二宮遂幸陽德佑神觀臣淺陋不熟本朝典故不知享親之後退而遊幸祖宗有是例耶抑近世為之若近世為之自不可為法若祖宗之例亦有可議焉夫誠心齋戒以薦神眀瞻其威靈如在其上退而思之不忘於心豈容於此日擁嬪御具聲樂以肆遊幸之樂耶臣恐此舉不足以示孝也臣又觀陛下自初即位恭謝之時輿服朴素儀衛簡約以至供帳什物伶倫官侍皆少如今日故百姓觀之莫不歡呼感戴以手加額皆言恭儉之德過乎仁祖矣陛下前日之出輿服鮮明儀衛衆多以至供帳什物伶倫官侍皆盛於向時故百姓觀之已有相顧駭歎竊訝之者安知其不聚談族議謂恭儉之德不如仁祖乎仰惟陛下天性恭儉自養德東宫以至即位之初未嘗少變今日之事必左右近習之臣以諛言媚惑謂陛下有崇髙富貴之勢必務為光華盛麗以歆艷觀聽夫貴為天子富有四海而區區於此是特示天下以不廣也况今冦難未平民力未裕財用未饒兵計未辦臣下之奢僣未革風俗之淫靡未消全在陛下恭儉節用如大禹文王以救今日之弊豈可漸為奢靡異乎初即位之時使百姓議之乎臣竊為陛下惜之也太上皇帝奉養素厚陛下不可薄於親必須損己所有以供奉之若陛下不自過為儉約而供奉上皇又欲隆厚則天下財物何以給之哉臣愚伏望聖慈今後孟享既罷即時還宫其餘行幸除詣龍德寧德二宫外皆乞暫罷蓋上皇既居外宫非時不出陛下亦自不當遊幸矣仍願車駕之出務令簡儉但如初即位時可也此臣得於百姓之言蓋彼見陛下自初即位恭謝之時簡儉如此今未三月儀物稍多若是自此天下無事之後豈不復肆侈靡之欲耶非獨百姓憂之臣固以為深憂也傳曰有始有卒者惟聖人乎惟陛下念之臣愚昧不識忌諱觸冒宸聰無所逃死在陛下處之而已奉聖旨孟饗今後更不帶過宫觀儀衛輿服但係故事伶倫聲樂朕素所不好並未嘗用左右嬪御盡數皆已放出不曽設置供帳飲食已曽減省可更令簡儉披覽忠言倍深欣歎二十五日聖旨宇文虛中落職與宫祠鄭望之李鄴昨除户部侍郎給事中指揮更不施行知懷州霍安國知密州郭奉世近降再仕指揮更不施行王孝迪落職提舉南京鴻慶宫臣僚上言上皇聖詔有曰縉紳賢能陷於黨籍此上皇晚悟之意陛下所宜奉承不可緩者也近日黨人中惟司馬光獨蒙褒崇如吕公著韓維范純仁吕大防安燾輩皆猶未及公著逮事仁祖稱其有顔氏之節英宗神宗尤加禮遇神宗嘗賜手札曰託中外腹心之寄均皇家休戚之重無逾卿者其眷遇可謂至矣備載國史不可誣也凡在元祐黨籍皆一時名流願一洗之悉追還舊職與合得恩澤如陳瓘鄒浩在建中初並命言路天下稱為鄒陳今瓘已褒贈而浩未見其敘復願早賜施行以允公議奉聖旨令吏刑部開具職位姓名元犯因依及未曽牽復不管漏落具狀申尚書省聖旨臺諌天子耳目之官宰執不當薦舉當出親擢立為定制急速報行臣僚上言仰惟太上皇帝崇奉道教奬借羽流嘗降旨立視官之法寵以虛名他事不容其比擬聖意斷可識矣名品既定僥幸漸萌陳乞百端遂同文階入雜壓封贈其父母奏補其親屬身死有遺表恩澤坐立與從官爭席其家得為官户其親得以用蔭且市井小人僕夫賤𨽻皆可披戴所費不過百千緡因結請託一為道官恩數遂與士大夫無異又有挾隂陽卜祝及詭怪誕妄之術得先生處士之名官視正郎恩數越於道流其在外者則緋袍象簡冠帶魚袋出入州縣軒然自得士人為之切齒上皇察其有害無利去年冬嘗詔罷道官又詔道籙院道官品等一切指揮並依元豐法頗快天下之憤且視官之法既罷其人與編户等耳其封贈父母而弟姪尚可蔭用其奏薦恩澤而親戚尚在仕途根本既伐枝葉何得獨茂乎欲乞諸路委監司一員差官根究拘收毁抹入官盡削官户之籍若先生處士其人元不以伎術進身果有德行道藝為士流推服者許報奏别給如違並科違制之罪奉聖旨應道官處士先生封贈奏補告敕委諸路提刑司拘收類聚繳申禮部二十七日監察御史胡舜陟奏伏見今日構成邉患幾傾社稷實自歸朝官趙良嗣便佞狡獪敵中姦雄始得罪於其國而逃童貫得之延為上客遂與金人有海上之盟因以叨竊寵祿日與貫謀開燕敗契丹百年之好召金人侵陵之禍以良嗣肆諸市朝未足以償吾赤子肝腦塗地之苦今猶居郴安處善地典刑未正公議不容近童貫亦移郴豈可使二賊共處伏望特賜睿斷戮之於市其指使楊思順妻濟陽郡夫人侯氏與其家屬並徙嶺表以快天下憤悶之情奉聖旨趙良嗣取首級二十九日聶山除開封尹恩數並依尚書例梅執禮除户部尚書王時雍工部尚書臣僚上言近請置詳議司討論祖宗舊法雖已許置司辟屬而言者屢論以為不當置見今未曽開局欲乞更不置司如聖意尚欲討論即乞令尚書省六曹各具其事上之都省送中書省取旨施行奉聖旨依奏臣僚上言馭將之方屢以為言如何灌子若孫當行削奪羈置庶使將帥知逃遁者禍及子孫有以纍其心至於姚平仲恐當差人根捕行遣倘或又如往嵗藏竄半年以幸復用無所懲艾奉聖旨何灌子孫並勒停送唐州羈管姚平仲立賞錢三千貫召募告捉白身與承信郎有官人轉三資聖旨資政殿大學士髙伸除延康殿學士宫祠髙堯明追五官勒停馮溫舒蔡修並已降指揮以御史臺根究到擅離職守故也御史中丞陳過廷言罪惡之著莫甚蔡攸當京擅權専政彼則以隂謀詭計出入宫禁外示異同中實附會及童貫興師召亂彼又副之出構邊隙歸冒重賞以襦袴之資而當大位以斗筲之器而握重兵蠧國害民亞於京貫竄殛之罰不可以免今雖降指揮令侍京於貶所又官為大夫列於侍從如是而曰竄斥可乎又奏京以姦惡竄之逺方諸子及孫自當隨侍今翛居杭州絛居宿州諸孫居拱州各攜妻妾自圗安便其不孝又甚矣宜令所屬發遣赴京貶所庶稍知人倫之義奉聖旨蔡京移韶州朱勔移循州蔡攸可節度副使永州安置蔡京子孫分送湖南朱勔子孫分送湖北京攸貫勔並差使臣管押前去又奏臣竊惟太上皇帝聰眀仁恕圖任宰輔推以誠心委之不疑而左右大臣勿克奉承託正論以為姦飾浮詞而肆誕倘可取恱一時雖詒後世之憂勿顧也倘可持祿固位雖詒四海之患勿恤也自蔡京作相二十年假紹述之名而無紹述之實作威作福紛更妄舉致使熙豐法度蕩然掃地王黼繼之七八年間托享上為名而無享上之實懷姦營私招權納貨致使姦贓之吏布滿天下凡於古無所稽考於經無所依據則必曰自我作古臺諌敢有論列有司敢有申眀則必曰規搖時政竭民力耗國用以事虛名則必曰此三代甚盛之舉也崇儉約抑浮冗以圖實效則必曰此五代鐫削之計也每建一議立一法未見是非利害必立嚴禁不得干與又立重賞許人告訐大臣坐視而不敢言黎庶懷憤而無所訴監司守令觀望風指惟恐奉行之緩天下化之悉為文具於今而後不可不戒臣愚伏望聖慈特降明詔戒飭中外臣僚各究乃心以揚職業雖朝廷已降指揮施行事件或於民間不便於政事有妨者並許開析利害申陳勿以前日憚於權臣不問可否到郡施行爭報就緒而已庶有實利及於天下豈勝幸甚取進止靖康要録卷四
