body:
  text: 靖康要録卷二二月一日皇帝御明堂頒朔詔聶山充發運使措置軍興糧草應江淮荆浙福建諸路軍政兵器並令措置以聞或有差撥並聼聶山節制敢有稽違盡行軍法二日宣撫司都統制姚平仲率步騎萬人劫金寨不克而奔三日李綱罷尚書右丞親征行營司种師道罷宣撫使牛發罷親征行營使司發運使聶山添差領開封尹依舊户部尚書四日金人求上母弟為質乃以駙馬都尉曺晟使其軍晟尚榮德帝姬與上同生故遣之避金主名改晟曰實兵部員外即臧瑀職方員外郎秦檜充割地使五日手詔士庶伏闕上書願見李綱种師道朕深諒爾等忠義已令綱師道傳㫖撫諭若更有乘時恃衆亂行毆打內侍令綱師道以軍法從事便令退散如後去之人當行軍法御批李綱依舊右丞提舉京城四壁應舊行營兵馬孟鉞上言臣近乞召用朱夢說范宗尹事已蒙俞允天下幸甚臣更懷迫切之誠望賜采納臣聞太常少卿李綱推孤忠自許之誠首决天下之大事蒙陛下處以股肱之任雖愚懵無知之人亦皆鼓舞欣忭况忠直有識之士哉今日忽聞李綱緣用兵少挫已蒙加罪以常情論之固當如此以大事論之則臣别有愚見夫李綱起自孤寒奮不顧身施骨鯁藥石之論當披堅執鋭之敵可謂忠孝之極人所難能也然一人之才安能盡千萬人所長諸葛蕭管之亞匹也猶有治戎為長竒謀為短之說然先主不以其竒謀為短而不用也惟在人君因所長而任之耳陛下若謂李綱短於用兵令罷行營使則已若更奪右丞之職民心定不安也非特民心不安又恐天下知李綱緣忠正大用以微罪重責使賢良之士畏懼而不敢言壅遏之弊自此始矣臣竊為陛下痛惜之伏乞始終保全令依舊裁决大事專一進退人才庶少禆陛下重光之明仍候朱夢說范宗尹到闕亦行大用奉聖㫖依奏太學生陳東等伏闕上書臣聞任賢勿二去讒勿疑者社稷之主也奮不顧身死生以之者社稷之臣也妬賢嫉善妨功害能者社稷之賊也恭惟陛下聰明英睿獨智旁燭賢邪之分宸𠂻判然天下戴以為社稷之主而在廷之臣奮勇不顧以身任天下之重者李綱是也所謂社稷之臣也其庸􅍝不才妬嫉賢能動為身謀不恤國計者李邦彥白時中張邦昌趙野王孝迪蔡懋李梲之徒是也所謂社稷之賊也陛下斷然不疑拔綱於卿監之中不一二日任為執政中外相慶知陛下能任賢矣斥時中而不用知陛下能去邪矣然綱任而未專時中斥而未去復相邦彥又相邦昌其餘又皆擢用何陛下之任賢猶未能勿二去邪猶未能勿疑乎又復罷李綱職事臣等驚惑莫知所以此必邦彥擠陷蓋綱起自庶官獨任大事邦彥等嫉若仇讐恐其成功臣等聞綱比决大策用兵偶有些小不利邦彥等遂得乘間投隙歸罪於綱然一勝一敗兵家常勢小勝固未足以為善小挫亦豈足以為辱况示怯示強竒謀祕計豈可遽以此傾任事之臣臣等竊聞邦彥時中日夜勸陛下他幸兹豈為陛下計蓋時中邦彥等初見事有警急已差除親黨旋領外任遣家屬隨之逺去豈有身為大臣不能以一家死社稷之難其意只欲倉卒之際各自逃遁以保妻孥自諸大臣一鼓而唱之百官有司羣起而和之遂令京師一城閧然騷動弗安其居至聞羣臣勸陛下他幸則中外洶洶不能自保當時若非綱為陛下建言則乘輿播越在外宗廟社稷已為丘墟百姓生靈已遭荼毒但聞陛下將有棄宗廟之名何從復有天下賴陛下聰明不惑羣議斷自聖志特從綱請中外聞之雖愚夫愚婦莫不以手加額仰嘆聖德之盛綱之力豈曰小補之哉是宜邦彥等譛謗忌嫉無所不至臣等竊見邦彥等事太上皇帝享髙爵厚祿為日最久坐視天下之弊未嘗發一言以圗補報至如王黼童貫蔡攸共興北師天下皆知其不可上皇决之羣臣維鄭居中力爭此事不可輕舉而王安中力贊王黼以遂其事邦彥非不與聞此議而略不加可否於其間其實亦皆隂助王黼以貽今日之禍使上皇痛自罪抑避位而去陛下新即寶位遽有變亂之虞栗栗危懼不遑宵旰邦彥並當引已歸咎自求貶放以謝君父而乃當此國家危急之際尚敢偃蹇自若持祿固位坐妨賢路而復忌嫉賢能害國家大計蓋邦彥首唱請和之議又請割地挫辱國勢今欲必遂前非以逋罪咎幸綱小失因緣阻毁陛下若聼其言斥綱不用社稷存亡事未可知若謂金人真願請和則既和之後何故尚敢攻我京城縱兵四掠屠我畿內乍臣乍叛變詐百出竊知今日困弊不可支吾聞陛下信任李綱自知計窮力竭請和之意必更激切而邦彥等乃得藉口以沮成謀遂致李綱罷廢罷命一傳士大夫失色兵民駭動至於流涕相弔咸謂不日為敵擒矣則是陛下罷廢李綱非特墮邦彥計中又墮敵計中矣聞朝廷又欲增與驢馬等物無乃借寇兵而資盜糧乎又聞邦彥尚執前議必欲割地與之曽不念祖宗土地得之甚艱又况河北實朝廷之根本而三關四鎮實河朔之根本若棄三關四鎮是棄河北若棄河北則朝廷能復都大梁乎能更都洛陽乎且如太原一郡凡經藝祖太宗兩朝親征僅乃得之祖宗所以必取之者蓋以此地控扼西北下瞰長安才數百里今若棄太原則長安重城千里日在其睥睨中朝廷又安能往都乎此祖宗所以特重兩河之地自真宗仁宗以來北敵蓋嘗有割地之請當時朝廷寧屈已增幣以塞其欲至於土地一寸不肯與之聖聖相守咸念祖宗艱難之功惜國家要害之地不忍棄也今陛下即政之始邦彥等便欲棄祖宗境土不知待陛下作何等主耶不知割太原中山河間十有餘郡之後邦彥等能使金人不復敗盟否竊恐口血未乾已引兵南向矣自太原至長安既不可都必將遷而之金陵則是江以北非朝廷有况金陵正慮童貫蔡攸朱勔等往生變亂雖欲遷而都焉又未可得陛下將於何地而奠宗廟耶又况保州乃祖宗陵寢所在一旦陷於北敵必遭暴露國祚長短所係非輕邦彥等忍棄之耶其意不過欲紓目前之急不為國家長久之計又不過欲沮李綱成謀以快私憤亦恐李綱成功之後自知前議之失罪有所歸故併力沮之期於必勝想邦彥日在陛下左右每一言及李綱用兵之事必故作驚怖之狀爭為危迫之言以恐陛下欲陛下必聼其計以害李綱自綱遭遇不次拔擢邦彥自知必不能安身朝廷之上乃薦引私黨以塞陛下進用李綱之路而王孝迪者又是邦彥姻家必與羣奸力排以助邦彥而在臺諌者亦多邦彥等黨前日邦彥請召國子監長二相見纍日乃聞祭酒謝克家除諌臣司業孫覿除侍御史臣等在學備見此事衆心不平豈有天子欲用耳目之官而宰相大臣前期召見以收私恩其意安在想今臺諌之中鮮為陛下發一言以明李綱之無辜者綱可謂孤立無助臣等竊謂朝廷之上非特綱為孤立而邦彥等自為身謀不以腹心事上恐陛下亦成孤立矣可勝寒心天下共知綱於國家可以大用臣等請為陛下言其一二頃嵗京師大水自宰相大臣及百官爭占舟船或結木筏為避水計是時邦彥等皆在朝廷曽不聞一人為君父備者又不聞有一人言及灾異者獨綱慷慨為上言之至為奸臣譛逐數年不用前日邊報初至宰相骨肉盡皆出獨綱妻孥未嘗遷徙陛下方此當深北顧之憂而左右大臣無一人為陛下請行者獨綱奮然以身任之綱之赤心可見矣陛下何忍信朋黨之計而斥正人端士乎若以綱用兵小挫遂當廢罷則童貫創開邊隙以貽今日之禍近又引兵數十萬以事雲中之役幾於匹馬隻輪無還者朝廷曽不議貫之罪何李綱小挫而加罪乎若以金人申請和議遂欲罪綱以謝之毋乃中其反間之術乎若因邦彥等譛謗之故廢斥之毋乃遭其愚㺯乎一進一退在綱為甚輕在朝廷為甚重今日宗廟安危在此一舉幸陛下急反前命復綱舊職以安中外之心毋終為異議所沮昔魏文侯令樂羊將兵攻中山當時異議沮之至有謗書一篋及羊功成而歸文侯出其書示之羊乃載拜稽首曰此非臣之功主君任臣之功也唐憲宗時討蔡數不利羣臣爭請罷兵憲宗曰一勝一敗兵家常勢若兵常勝則古今何憚用兵耶但論帥臣勇怯兵力強弱措置何如耳渠一敗便沮成計乎於是左右不能用其間而裴度請身督戰卒破蔡賊史臣有曰非度破賊之難任度之難也韓愈誦憲宗之功曰凡此蔡功惟斷乃成憲宗號中興之主正在於此惜其弗克有終也臣等願陛下逺鑑前代已然之事坐照今日異議之臣奮發英斷復用李綱以成大功宗社幸甚臣等為陛下今日計莫若斥邦彥等拔綱而相之想吳敏耿南仲必肯與李綱共事更願速降詔㫖召徐處仁唐恪等置諸左右而閫外之事盡付种師道使專之內外將相之臣必肯悉心協力助陛下大有為於天下者矣臣等學校諸生素與綱無半面之雅而邦彥亦昧平生所以勸陛下進綱而退邦彥者豈有他哉蓋生靈之命與社稷存亡在陛下用綱與不用去邦彥與不去耳天下公論如此臣等豈敢默然陛下若以臣等之言為未足信試御樓呼召耆老一問之呼軍兵一問之呼道路商旅一問之試咨有官君子使言之必皆曰綱可用而邦彥等可去也陛下用舍之際不可不慎臣等布衣之賤論及宰相罪當萬死干冒天威不勝俯伏待罪之至資政殿學士宇文虛中知東上閣門事王球奉使斡里雅布軍先是正月七日何灌奏金人已到城北朝廷且遣使人出來勞軍恐有商量於是鄭望之借工部侍郎充奉使大金軍前計議使髙世則充副使令縋城而下見金使吳孝民云皇子郎君到趙州路上截得今上皇帝即位赦書以手加額云既是上皇禪位無可得爭却與他講和休皇子郎君謂斡里雅布也又云如今南朝來只似買賣也鄭望之問買賣之說如何孝民云要割大河為界更要犒軍金帛望之云如此即非買賣却是強取也遂引孝民入城八日孝民朝見升殿跪奏今來議和皇子郎君要一大臣過去李綱前曰臣請行時朝廷已委綱御營守禦勢難輟行遂差同知樞密院事李梲與望之往使上謂曰若金人及割地即勿許嵗幣增及三五百萬不妨論及犒軍金銀可許銀三五百萬兩又命梲押賜金一萬兩及酒果賜斡里雅布出城時日已昏黑有金人騎兵兩三人不知是使人射箭相及從者一人死之餘四人亦傷夜至孳生監見斡里雅布斡里雅布但訝國家違盟如受歸朝官及賜平州張穀殺金人之詔事見謀夏録如此三五事都不及和議棁云有皇帝賜到金一萬兩及酒果來令吳孝民交割是夜宿孳生監蕭三保努耶律忠張願恭三人來云皇子郎君至中路意便回只訝南朝不遣使人來求和望之云朝廷已遣給事中李鄴去不知甚處逢大金人馬更不得消息三保努云李給事知是上皇遣來皇子郎君道不知他今上意㫖如何望之云主上即位十餘日上皇南幸朝廷倉卒未及遣使而人馬已及城下三保努云皇子郎君自入界不見遣使來制腳不定到此間今來和議無慮不了但南朝多失信須要一親王往大金為質北朝以人馬到處為界今已到汴京皇子郎君只要以河為界望之云南朝得北朝地把守不得北朝得南朝地亦恐難守不若多增嵗幣却可商量三保努云說得極是但許多人馬到來不成教空歸去大金人馬不是南朝健兒逐月有請受望之云若是講和朝廷須犒勞不知有多少軍三保努云河東國相二十萬皇子郎君三十萬如今講和便遣人去止河東軍此事朝廷不要遲疑早了便益望之云昨日面得處若說及犒軍可許銀三五百萬兩此數亦不易出也三保努云金人去家有六七千里動經一二年須是逐人得兩挺銀一挺金方得望之云太師開得許大口又似以河為界好難商量九日敵使韓宣徽云皇子郎君遣人去打城也望之云既是講和何言打城韓笑云且要耀兵遂見斡里雅布笑云打城人適已勾回矣又云講和事此自遣人去朝廷理㑹於是三保努耶律忠王汭受斡里雅布書一封又一幅不封與望之同入城不封一幅乃是所須金銀表段數目金五百萬兩銀五千萬兩牛馬萬匹表段一百萬匹一更後到殿門又見所進書方知要割三鎮及親王一員候回日送到河要宰臣一員同往交割地界十日與使人㑹殿門幕次奉聖㫖令少宰張邦昌往軍前議事俄頃又令中貴引皇弟康王傳宣云康王請行棁云大金恐南朝失信故要親王送到河别無他康王正色云國家有急死亦何避聞者悚然李鄴自磁州路上遇金人同至城下斡里雅布令隨使人還城中及吕頥浩等數人皆還十四日邦昌從康王出城赴軍前李鄴髙世則賫和議書送伴蕭三保努等同去二十七日宣召棁與望之對福寧殿上曰國家無許多金銀禁中却煞有珠玊等卿等可過去商量以此准折遂往詳議斡里雅布許之二月一日望之同李棁賫珠玉犀角象牙出城須臾耶律忠來相見云皇子郎君今來交割訖棁上馬入城是夜姚平仲劫寨斡里雅布請康王及張邦昌相見帳前劄本朝旗幟數百面及俘虜到將校數十人再三詰責邦昌邦昌云必不是朝廷如此恐是四方勤王之師各奮忠義自相結集故來劫寨斡里雅布云待道是賊來怎生有許多相公瞞心只可道朝廷不知也是日朝廷遣宇文虛中到軍前虛中鄭望之相見具道皇子郎君有再和之意劫寨事只做朝廷不知次日王汭隨虛中入城報聘汭云皇子郎君道劫寨不干鄭侍郎事教他入城初种師道以三鎮不可棄城下不可戰在朝廷則堅守和議之約候姚古來兵勢益盛同共商量軍中自遣使人往謂三鎮國家邊面所係决不可割若割三鎮則我等將帥用兵無已時據三鎮賦入所得增作嵗幣庶幾和好久逺如此遣使三兩轉勢須逗留半月重兵密邇彼不敢逺去計孶生監糧草漸竭勢須北還俟過河以騎兵尾襲至真定中山二鎮必不肯下彼腹背受敵可以得志大臣急於邀功以為迂闊遂用姚平仲平仲古之養子也嘗從童貫平方臘回京師誇大殺獲魔賊之多大臣信其說意謂以殺金人如殺魔賊故敗繼而虛中往來和議遂定六日手詔朕以不德獲奉宗廟即位纍日大金擁兵遂扺京城于四方賢才未暇逺有號召也永惟國家大政事已詔三省樞密院盡遵復祖宗法而近世名臣未有褒録何以示朕意司馬光范仲淹可贈太師張商英可贈太保應元祐黨籍元祐學術指揮並不施行布告天下咸使聞知聖㫖比年以來京城拘收拆毁民居甚衆至民無所安居應苑囿宫觀有可廢以豫民者三省樞密院速條具以聞聖㫖宇文虛中除資政殿大學士簽書樞密院聖㫖士庶伏闕上書本出忠義已行撫定訪聞奸人乘時尚敢聚衆作閙或劫掠財物毆打平人令開封府三衙只今前去巡警彈壓如遇有此等人斬訖聞奏如彈壓無功當議黜責德安府進士張炳太學生雷觀上書論事可嘉並與同進士出身除祕書正字既而無闕除太學博士范致虛召赴闕許翰除翰林學士七日手詔童貫等妄興邉事懷奸蠧國悉皆東下前往江浙在京如梁師成談稹李彥已行逺竄所存百餘員皆小官踈逺之人並不係從來被重任享厚祿者今又自陳乞依舊制寄資恩數等一遵祖宗之典百姓無知鼓倡率衆擅行誅戮劫奪財物震驚京闕皆不奠居已指揮李綱并三衙分頭彈壓捕為首之人悉行軍法爾等各歸常業毋蹈極刑倘敢結集仰徒中反告支賞錢一千貫咨爾黎庶仰體朕意蔡懋除資政殿學士知北京日下前去徐處仁除中書侍郎候替人到赴闕中書舍人席益除徽猷閣待制知河中府吳开除翰林學士日下供職聖㫖近緣奸人糾唱百姓妄稱內臣謀叛今仔細推究並無實迹顯是潜行誣執意在攘奪作過雖已節次捕獲斬戮慮尚結集人衆恐京城遼逺未暇遍知今廣行告諭皇弟肅王樞少宰張邦昌除太宰著作佐郎沈晦借給事中使斡里雅布初金人請以越王代康王為質上以越王叔父不可遣乃遣肅王及駙馬都尉曺晟以行八日訪聞輔郡兵馬副統制王蕃置司本在畿內今却領兵南去襄陽府又移文州郡稱金人圍閉京城要江東西湖南北福建廣南陕西等路兵三十萬唐州置司處交割即今用兵見在北方及京師戒嚴之時不委王蕃因何南渡漢江去京城八百餘里不知蕃意所在又蕃止絶州縣不得將錢物入京並令于置司處交割領管衛護官屬日馳百五十里故敢狂悖妄作阻兵自營實無勤王之意奉聖㫖王蕃責授海州團練副使黃州安置所有見領兵馬令所在州軍拘收責命令吏部差使臣前去尋覔何㮚除翰林學士許翰除御史中丞唐重試中書舍人楊時除諌議大夫梅執禮除徽猷閣待制知鎮江府毛友知杭州並疾速之任翁彥國依舊發運使髙衛副使方孟卿判官盧宗元陸置並罷聶山除發運司指揮不行九日差宇文虛中王球再往大金軍前奉使仍就差迎康王又差王時雍髙世則館伴大金朝辭人使十日康王歸上喜甚賜豫良渥寵以太傅之命王居金人軍中幾日姚平仲劫寨之夕恬然無所驚及歸都人大喜爭出觀之金人既得三鎮之詔及肅王為質即不俟金帛數足遣使告辭上賜宴於軍中制曰凡賞無常雖小臣而必録因心則友矧介弟之敢忘疇其顯庸錫以蕃祉涓辰之吉揚命於廷皇弟太保遂安慶源軍節度使康王構德宇靖深風度凝逺出神明之胄閲義理以居多依日月之光安譽處而無斁比戎騎之侵軼致郊圻之驛騷毅然請行奮不圗已有此竒節顧烈士而或難壓以至誠雖強敵而猶感逮退師而底績遂擁斾以言歸是用躋帝傅之榮班分州牧之重寄申威雙鉞進律兩藩以勵羣倫以惇至愛嗚呼原隰裒矣既見急難之情福祿嫓之宜共安平之樂往膺光寵益介壽康可特進太傅靜江奉寧軍節度使桂州牧鄭州牧依舊詔罷明堂頒朔布政官簽書樞密院事路允迪與告和使借右文殿修撰宋彥通參議官借工部侍郎滕茂實館伴金人王介儒劉思等使尼瑪哈軍是日金人退師十一日馮澥除徽猷閣待制兼侍講赴闕十二日遣王球使河南大金軍前迎接肅王手詔朕以眇躬託士民之上夙夜祗懼靡敢遑寧比者金人犯順都城閉關踰月軍民展力捍禦實勞朕知之矣而不逞之徒輒乘時造端相扇為變內作不靖震驚朕師謗詈大臣毆擊內侍白晝摽掠乃敢公肆凶殘朕念嗣位之初首遭艱難德意未孚致汝等抵冒如此朕甚悼焉播告汝等朕自今庶事並遵用祖宗舊制裁抑內侍不崇飾恩幸不聽任奸人不輕爵祿不濫賜豫不奪爾居以營宴逰之地不竭爾力以廣無用之費凡蠧國害民之事一切寢罷務與汝等體息其有奸宄不悛敢復犯法紊亂我綱紀當重置刑戮必罰無赦咨爾有衆明聽朕言罷殿中監符寶郎聖㫖樞密院在祖宗時參用勳舊武臣朝廷修整兵備宜擇得軍心武人為簽書同知庶幾緩急可以荷仗三衙軍政之本祖宗規模宏逺今悉廢弛宜擇有威望邊將用之以揚厲軍旅种師道同知樞密院事制曰朕嗣承聖謨獲紹大統適邊堠之懈弛致郊畿之繹騷荷天之靈俾敵悔禍既遣使而講好遂以時而退師載惟千里幅員羅屠掠之苦四方遐逺多調發之勤兵屯嬰守扞之勞編户傷括輸之急朕每念此惻然痛心不能保民乃使重困永思厥咎在豫一人是用疏曠蕩之恩沛汪濊之澤嘉與海內底於丕平可大赦天下於戲三事大夫羣后庶尹國勢委靡而不振宜思所以救治之方黎元愁嘆而無聊宜思所以撫綏之術保盟固圍節用廣儲庶幾協心共圗康乂太宰李邦彥奏乞致仕手詔李邦彥任政府纍年屢形憂國愛民之誼以至慎惜名器抑裁冗濫獻納非一朕在東宫時熟聞嘉譽䇿立之際備罄忠誠金人犯闕其所建明惟知利社稷撫軍民為急朕一一施行衆志未能遍喻乃作弗靖鼓倡流言又與前日異意元惡之人忽生怨憤實駭豫聽已依所乞宫祠播告中外咸信勿疑十三日尚書右丞李綱知樞密院事聖㫖宰執兼神霄玉清萬壽宫使副並罷陕西漕臣吳興祖京西劉民瞻淮南龔端兩浙李弼孺江東曽注並罷十四日賜簽書樞密院事耿南仲第一區尋詔取祖宗舊法所降指揮更不施行當自政府始制曰大臣事道必嚴去就之規明主佑賢務全體貌之志眷時元輔久執化鈞方引疾以辭榮用疏恩而渙號起復特進太宰兼門下侍郎李邦彥育德偉大秉心曠夷以髙文掞藻於禁林以偉望奮庸於政路遂參夢卜進任台衡丕叙羣才以大明於國是力裁衆弊曽不顧於身謀逮豫纘紹之初載嘉翊戴之職登之冡宰倚以逺猷方四郊多壘之虞惟一日萬幾之曠雖稍間於綏定念正賴於敉寧忽覽奏封力祈謝事諭言屢遣章却復來惟陳義之甚髙遂貪賢而莫獲加班崇於祕殿行使組於殊庭併衍户租是昭眷禮於戲進而許國既朕心朕德之咸知退不忘君尚嘉謀嘉猷之入告往安素履用體至懷可特授觀文殿大學士太一宫使依前起復特進制曰朕祗膺聖訓獲紹丕基遵制揚功仰憲祖宗之舊圗事揆策旁咨弼亮之賢爰得異才俾登宰路告爾朝列咸聽朕言中大夫知樞密院事吳敏氣和而志剛才通而識邃潜心自得學造古人之微秉義不回德全仁者之勇蚤儀禁槖遂贊武機非堯舜不陳安社稷為悅定禁中之策實靖我家運堂上之竒遂固吾圉逮鈞衡之虛次訂公議以咸歸是用升次輔之聫兼以列西臺之侍陪敦多邑躐進文階併錫寵光用昭眷禮嗚呼慨觀今日浩若涉川考政刑則本末失倫語財用則上下交困易於出令而宣布者多還輕於用人而欺誕者得肆靡仗節以徇義咸僥利以成風國勢頽靡而不張軍律汰玩而無紀非至公無以懷黨與非持重無以鎮奸萌卿其畢議而力行朕且虛已而傾竚往欽成命以究永圗可特授銀青光祿大夫少宰兼中書侍郎簽書樞密院事耿南仲除尚書右丞同知樞密院事李梲除尚書右丞李綱言伏奉聖恩除知樞密院事聞命不知所措竊以鴻樞之長專統兵機宜得魁竒英偉之人以居其任臣本書生進由庠序雖常以忠義自許妄意事功而性剛才拙動輒多忤初荷上皇識拔執筆螭拗日侍清光屬大水暴至士庶奔走爭具舟筏無敢言其所以然者臣謂此非小變上疏指陳兾得直前論奏當路排擠流落七載上皇憐而收之使二奉常永惟大度之私方圗國士之報去冬因邊吏弛備金人入據全燕肆其烈焰來犯王略太上皇帝厭萬幾之煩欲授聖子意未有發臣與少宰吳敏協建大策贊成內禪嵗首上皇南幸淮浙廷臣亦有勸陛下為避兵之計者臣躬述利害回鑾輿之行為固守之䇿陛下不以臣卑鄙驟加擢用自庶僚不五日而預大政仍委以親征行營使事臣感陛下不世殊遇願殫犬馬之力受任以來夙夜憂勤深恐勳績不效以負陛下知人之明故簡閲將校率勵士卒躬冒矢石登城以禦敵晝夜巡警戢奸以安衆間道移檄河北諸鎮豫為隄防忘食不寢修戰具嚴守備以俟援師既集欲因利乘便連營逼敵使之進不敢攻退無所掠勢窮食盡渡河而遁擊其半濟勝可萬全計慮已定而姚平仲引衆遽出幾敗大事然平仲受莭制於宣撫不關白於行營二月一日夜半平仲之出种師道猶不知之在微臣實無所預是夜四鼓陛下聞其交鋒詔臣應接頃刻之間使者三至臣適感寒伏枕力疾承命出景陽門至班荆館親督將士列布要衝分遣軍馬解范瓊王師古等圍親以中軍捍拒敵馬射殺金人甚衆是夜臣陳兵扞禦宿城下明晨復列陳與敵相望臣所統兵馬士氣百倍欲戰然臣其晚來對不可已而賜罷恐懼自省莫測其原仰賴陛下至仁至聖灼見愚欵實無他腸特賜宸翰許之保全慮其空乏加錫兼金未逾三宿亟垂召見俾還舊物益付京城四壁守禦之事諭以怨仇讒謗欲持平仲之罪中傷微臣伏惟陛下天地父母覆載生成之恩不可為量瞻謝之際感淚交集德隆命輕捐軀曷避惟是都城細民因間殺掠內侍理資彈壓臣躬稟睿㫖即取其最不逞者斬數十人梟首通衢以靖羣衆重沐聖恩令臣知樞密院竊惟和議既成金人擁重資邀名鎮不戰而得所欲臣誠私心痛之既乖臣本志兼總兵政豈其所宜且祖宗舊法兵符出於密院而不得統其衆兵衆𨽻于三衙而不得專其制今臣既統行營之兵又制樞廷之令考於舊法未見其可臣竊謂金人初退四方勤王之師未有所屬中都畿邑團結保甲之兵未有所處須于旬日之間犒賞條具以勤王之師盡付制置使姚平仲种師道以團結保甲還州縣使各安其業內外人心既已敉寧臣當抗章自陳請避賢路以逺讒謗全陛下始終之恩此心素定有如皎日今雖未敢亟去而巍冠樞廷非所宜據固當懇辭得請而後已所有告命未敢祗受奉御寶批降詔不允日下供職知樞密院事李綱奏諸路勤王之師民兵等官並與轉一官其民兵到本處合優與犒設從之十五日監察御史胡舜陟奏臣竊以御史耳目之官以言事為職故監察御史自唐以至本朝皆論政事擊官邪與殿中侍御史同元豐紹聖悉著甲令至崇寧間大臣營私欲其便已遂變祖宗成憲使人君無兼聽之明而南臺御史始有不言事者名存實亡害治尤甚今多事之時以開言路為急方陛下隆寬廣問猶下采於芻蕘况臣等輩忝備臺屬使望清光效愚忠仰禆聖政萬一不勝幸甚伏望睿㫖本臺令增入監察御史言事之文以復祖宗之制奉聖㫖依祖宗法新除少宰吳敏奏臣伏見二月五日士庶伏闕乞復用李綱仍且留种師道宣撫聚衆既多遂聲言欲毆擊宰執至撾碎登聞鼓擅殺內侍十數人賴陛下聖明即刻撫定臣待罪樞府不能彈壓以靖國又致使軍民因忠義之心成變亂之禍臣罪甚大不敢逃刑重念艱難乏使之時未敢自拘司敗臣即時宣奉睿㫖令李綱种師道三衙開封以軍法彈壓今首尾數日元惡就誅從黨黥配罔有佚罰朝廷刑威稍伸於國人矣李邦彥纍乞致仕陛下已降㫖從所請抑臣有區區之見願為陛下陳之昔髙歡在魏見衛士聚黨焚領軍張彛宅朝廷畏其亂不敢治退遂散家財結死士卒成伯業由此觀之國家不能修政刑者奸雄窺伺之資也古語有之曰投鼠忌器况天子之相乎李邦彥輔佐上皇自前嵗以來罷易宰相更革政事以定山東河北之寇皆邦彥之力頃受命上皇援立聖明倉卒之際上皇付託以腹心勤勞實多又建遣李鄴輩使金人軍中終賴其力但邦彥為人畏慎太過緩於事機而國人不堪圍閉之苦取金帛質親王之辱至罷李綱示不復用兵則國人不勝其憤遂有此變邦彥之始末如此異時奸惡如王黼未嘗得此於國人而邦彥遭此豈非不幸乎臣願陛下下臣章曉諭國人因使四方知前日為亂之黨已就誅責而邦彥之為人稍自白於天下然後加恩禮起邦彥惟陛下聖斷奉聖㫖布告中外咸使聞之國子司業黃哲等奏以太學諸生伏闕上書致令兵民作閙見今待罪奉聖㫖朝廷方開言路通逹下情士人伏闕上書乃是忠義所激學官何為自疑乃爾待罪可速安職仍曉諭諸生十六日聖㫖內侍特㫖令轉出或致仕者並與換官已轉出者改正仍今後內侍並轉至武功大夫止餘令條具聞奏十七日探報金人渡河北去臣僚上言審取舍以辨是非行賞罰以明好惡明主之先務也竊見蔡京于元符建中之際包藏既深罪惡未顯有識之士雖知其必亂天下而嗜進躁妄之徒方且倚以為宗主故右司員外郎陳瓘嘗為諫官獨能推測其用心而披抉其奸狀於未著之前詳言極論明若蓍龜至於今日無一不效故京尤忌畏之此一時言事官得禍最酷諸人既得自便而瓘獨再貶指定居住州郡流離羈窮終以廢死忠義之士至今悲之語及瓘者未嘗不為之流涕伏望聖明優加追贈及官其子孫以為忠義之勸奉聖㫖故承議郎陳瓘贈右諫議大夫仍與一子恩澤制以同知樞密院事京畿宣撫使种師道為檢校少傅鎮洮軍節度充中太一宫使少宰吳敏等表以四月十三日為乾龍節詔所請宜允澤州奏大金國相尼瑪哈兵次髙平縣初尼瑪哈既破欣代觀察使折可求以麟府兵承宣使劉光世以鄜延兵援河東皆為所敗遂圍太原攻之月餘不能下而平陽府義軍叛義軍皆童貫張孝純所招雲中人也分布河上諸郡平日養贍蓄積為之一空及金人入犯孝純以義軍五萬人守石嶺關先叛從金人至是諸郡往往殺戮或逐出之而在平陽者破城叛去攻陷威勝軍遂引金人入南北關陷隆德府遂攻髙平朝廷震懼恐其復渡河而南命統制官郝懷將兵二萬屯河陽扼太行琅車之險以种師道為河東河北宣撫使駐滑州以姚古為制置使總兵援太原以种師中為制置副使總兵援中山河間諸郡十八日聖㫖李邦彥受命上皇輔翊朕躬應恩數等並依白時中例施行少宰吳敏辭所遷官奉聖㫖可通議大夫就職十九日聖㫖催督王球過河前去大金軍前迎請肅王以初約至河即回故也聖㫖可選用老成忠厚之人為太學官訓教諸生使自知恥自好學庶不倡導紊亂朝政詔以右諌議大夫楊時兼國子祭酒初种師道為宣撫使李綱為親征行營使姚平仲謀劫寨數日行路皆知之敵先為備二月一日出師以為功在頃刻矣御營使司屬官方㑹封丘門草露布忽馳報失利上震驚於是罷綱解其職俾待命浴室院師道亦罷宣撫以右丞蔡懋代之復議講和命守城卒戢弓弛炮無得輒傷金人初五日太學生陳東率數百人伏宣德門下上書乞留師道與綱已而集軍民數萬人相謂曰非見李右丞种宣撫復用毋得歸㑹百官退朝自東華門出至闕前衆指宰相李邦彥數其罪嫚罵直前欲毆之邦彥疾驅以免領開封府事聶山舉鞭揖東等曰諸公為此可謂忠義矣邏者以聞上命閣門索所上書頃之中人傳㫖諸生所上書朕已親覽備悉忠義當便施行其中有欲散者衆鬨然曰安知非僞耶須見李右丞种宣撫復用而還於是知樞密院吳敏傳宣曰李綱用兵失利不得已罷之使金人稍退即令復職猶不退時日已旰矣百姓乃輿登聞鼓置東華門外撾而壞之山呼動地樞密耿南仲至諸生曰先生前日為天子傳宣言無不行今軍民之意堅欲復用李右丞种宣撫幸先生言之南仲曰當便求對以諸生之意奏上衆慮南仲詐擁其馬不得歸南仲亦徑入朝繼而開封尹王時雍來謂諸生曰脅天子可乎胡不退諸生應之曰以忠義脅天子不愈於以奸侫脅之乎復欲前毆之時雍逸去殿帥王宗濋謂上曰事已爾亡可奈何當黽勉從之不然且生變遂遣南仲呼於衆曰已得㫖宣李綱矣百姓數千人詣浴室院迎之帝益恐於是相繼而宣者絡繹不絶內侍朱拱之先得㫖宣綱未到而後發之使先至衆取拱之臠而磔之即矯制曰殺內臣者無罪又取十餘輩殺之皆裂其體碎其骨取其肝腸揭之竿首號於衆曰此逆賊也綱既對即詣行營司而師道亦歸其宅士庶知其復用也遂散是晚天子下詔曰士庶伏闕上書願見李綱种師道朕已親覽深諒爾等忠義已令綱師道傳宣撫諭若更乘時恃衆亂行毆打令綱師道以軍法從事是夜復聚衆殺內侍而毁其家者數十人明日詔再下猶不止初七日李棁蔡懋言於上曰太學生率衆伏闕意在生變不可不治上不之罪也司業黃哲黃唐傳以不能約束諸生待罪詔答以速安爾職先是諸生聞朝廷欲治其罪不告而去者大半學官以不告而出用學規屏之諸生復閧然乞同屏乃亟命楊時兼祭酒召諸生慰勞之越兩日復令聶山傳㫖撫諭焉先是聶山奏上曰臣前日聞蔡懋李棁諭與太學長二令屏出伏闕上書陳東等諸學生聞之莫不憤然一學盡欲拂袖出學今日又聞棁呼王時雍令根治諸生并伏闕百姓欲置於法臣聞不勝惶駭仰惟陛下以睿知之資撫臨萬邦士民以積年不舒之怨憤乘隙相聚殺傷內侍指罵奸黨蓋恃陛下仁聖又能與百姓雪其怨氣而蔡懋李棁王時雍之徒恨其罵已而李綱驟欲鋤其根株又棁宣言為前日伏闕之士其間有李綱親舊欲盡行誅戮臣恐大失士心歸怨陛下也此士民思亂恐無已時兼士民上書不約而從者千萬人其言皆平時公論乃陛下所欲急聞而奸臣之所甚惡也豈可不稟上㫖敢令開封府快其私忿臣願陛下作訪聞行下速賜止絶庶幾忠義之士不死於奸臣之手而忠言讜論日聞於九重實宗廟社稷之幸胡安國除太常少卿馮澥除左諌議大夫臣僚上言伏見近差承議郎劉棐起復知鄧州宣教郎劉㮤起復陕西運判者臣竊惟國朝以來凡在職以憂去位之人自非事勢去就係天下重輕邊臣用舍係生靈休戚者未嘗奪情釋服俾越禮制號稱從權者也比年以來風俗偷薄仕流奔競交權要以幸取進為人子者無復鞠育劬勞之念至有母死在草未暇治喪治飭竿牘急遣走卒以圗起復如福建提刑俞向者在任丁憂夤緣得請候葬畢日許令起復乃更不復挈喪歸鄉即就任所便營葬地掩其所親如濟州通判毛孝立者孝行凋零以至於此聞者鄙之今陛下新即位德教所加將躋天下於純孝之域如起復之例詎可因而不革况劉棐劉案鄧州陕右並不係邊廷急切特令寢罷聽其終喪特與除擢庶幾自今以往卧苫枕塊之人無復彈冠結綬之典不勝幸甚奉聖㫖依奏應州縣官如有似此之人令吏部條具申尚書省二十日聖㫖應文武臣僚曽係朱勔等舉辟及曽受財物妄相求托展轉舉辟者並仰所屬告首限一季如不肯說根究罥罣者並追官勒停仍許人告賞錢二千貫二十三日臣僚上言金人侵犯河北梁方平何灌各統精兵控扼河津方平敗衄棄河不守灌望風而遁遂致敵國馮陵畿甸當行軍法其罪維均今灌以重傷死於牖下而方平未正典刑無所畏憚國威不振士論惜之陛下方欲法藝祖以武功定禍亂統御將帥使有罪者必誅當自方平始奉聖㫖依軍法戮於都市聖㫖金人侵擾京畿致良民橫被殺傷士卒殞身行陳除內中已開建道場追薦朕食素膳親詣行香并令在京宫觀僧道各設齊醮懴㑹仍遣使分就四郊嚴潔致祭二十五日范致虛差知京兆府任諒差知延安府盧法原除徽猷閣直學士差知成都府陳邦光差知潭州葉夢得差知潁昌府陸藻差知應天府范致虛赴闕陳邦光引對指揮更不施行張叔夜差知東平府觀文殿大學士白時中差知壽春府資政殿學士王孝迪差知廬州給事中王雲侍衛親軍馬軍都指揮使曹曚使斡喇布軍太一宫使种師道除河南河東路宣撫使保靖軍莭度使姚古為制置使某軍承宣使种師中為制置副使領兵赴趙州二十六日侍御史孫覿等言伏見金人深入三輔震擾陛下總攬之初坐席未暖分遣使臣捐棄金幣以為和戎之計中外之憤痛心疾首以為構怨連禍之人未即誅殛無以謝天下臣等謹按太師蔡京四任宰相前後二十年挾繼志述事之名建蠧國害民之政而祖宗法度變移幾盡托豐亨豫大之說倡為窮奢極侈之風而公私積蓄掃蕩無餘立御筆之限以隂壞封駁之法置曲學之科以杜塞諫諍之路汲引羣小充滿要途禁錮忠良悉為朋黨交通􅉏御竊㺯威柄鬻賣官爵貨賂公行盜用庫金奸贓狼藉閨門混濁父子詬爭厮役官為橫行媵妾封至大國欺君罔上挾數任情書傳所記老奸巨惡未有如京比者太上皇屢因人言灼見奸狀凡四罷免而近幸小人相與唇齒恐失所慿依營護擁蔽既去復用而京偃然自如羽翼已成根株盤互不可動搖凶熖益肆覆出為惡倡導邊隙挑發兵端連起大獄報復睚眦怨氣充塞上干隂陽水旱連年赤地千里盜賊滿野白骨如山人心擕離上下解體於是敵人乘間鼓行而南如入無人之境矣陛下赫然奮朝綱貶斥用事者王黼等大正典刑如京之惡豈可獨貸况京在政和中首建平燕之議招納燕人李良嗣以為謀主又欲以妖人王仔息服錦袍鐡幘為大將計議已定㑹仔息抵罪伏誅而大臣固爭請待他日之釁王黼當國循襲初議與京子攸决意成之京之悮國固不容誅而構造邊患父子相為終始與黼均為罪首公議藉藉不平未可以但已矣且京被遇三朝父子祖孫為三公者二人親執政者三人登禁從者亡慮十數名園甲第僣擬宫省袍帶之寵下逮童稚犬吠非主尚懷糟糠之恩顧京所蒙何以論報不圗邊遽上聞而京盡室數百輩治舟楫挾輕賫一夕遁去君父惸然坐圍城中無一人有同患難之意掉尾不顧曽犬豕之不如原其用心如此使京尚在相位安知其不開關賣國如馮道輩乎宰相非其人果為天下害遂使中國空虛敵人侵侮無所不至而京又善為奸害嫁怨飾非獨使上皇負謗於天下衆論不容尤在於此伏望陛下睿斷敕使追還早賜竄殛稍正京父子誤國滔天之罪以慰宗廟社稷之靈一洗上皇暗昧之謗少舒四海生民忿悶戚戚不平之氣不勝幸甚取進止孫覿等又言竊惟幽薊之役用事大臣敗纍朝不渝之盟構三邊無窮之禍以成朝廷今日之大患故中外之論咸謂蔡京子攸王黼童貫均犯大惡當正典刑以謝天下而投荒之罰獨加於黼此羣心所以未厭而臣亦不得而已也臣近者嘗聞言事之臣具疏渠魁蔡京之罪乞賜竄殛今不復重陳仰瀆睿聽敢以貫攸之罪試舉其略為陛下言之貫出自閹尹喜為禍亂攸慿藉世祿濟以奸回平日懷諼迷國壞法亂常竊㺯權柄擅作威福固已不勝誅矣方王師之北伐也貫為宣撫使攸實副之提數十萬之師挫於殘破之敵淹留彌年卒買空城乃以恢定故疆冒受非常之寵貫以太師封兩國公攸遂入總樞廷矣此貫攸之罪同也蕭后納欵北使韓昉見貫攸於軍中卑詞祈哀願捐嵗幣以復舊好此安危之機也乃叱昉使去昉大呼於廷告以必敗今數州之地悉非我有而國計民力從而匱竭矣此又貫攸之罪同也當蔡京專政貫則興結邊隙首引趙良嗣用之本朝逮乎金人結好攸則招納叛亡反覆賣國構怨結禍使敵人因以藉口此又貫攸之罪同也前年秋貫以重兵屯太原欲收雲中之地卒無尺寸之功反以剪除寇攘枉道河朔而歸又慮衆人之議已也公肆誕謾凡第賞者千百人貫遂封廣陽郡王而攸亦進太保封燕國公此又貫攸之罪同也去年冬貫復出太原金人犯塞貫實縱之攸見邊報警急貫則遁逃以還謾不經意玩兵縱敵一至於此此又貫攸之罪同也逮陛下踐阼之初敵人長驅震驚都邑貫攸一旦擕持金帛舳臚相銜盡室逺去使聖主獨處圍城中曽無同國休戚之意此又貫攸之罪同也臣願陛下奮揚威斷察其誤國罔上之罪天下之所共棄早正典刑以為萬世賊臣之戒孫覿等又言臣等伏見比嵗以來閹人用事竊㺯國柄典掌機密挑發兵端構成邊患於是金人以數萬騎直抵京闕宗社之危殆若綴旒陛下赫然竄斥大臣王黼等以謝天下而衆議不厭以為首難之人實始童貫臣等按貫之罪雖擢髮不足以贖之而誤國之大者尚可數也貫自陕西用兵前後二十年專以欺君罔上為術虛立城寨妄奏邊捷以為已功汲引羣小易置將吏以植私黨交通問遺鬻賣官爵超躐除授紊亂常制有自選調不由薦舉而輒改京官有自行伍不用資格而遽升防團者有放廢田里不應甄叙而擢登侍從者奸贓小人爭相慕悅侵漁百姓盜取官錢苞苴公行門户如市金帛寶玉充積如山私家所藏多於府庫此貫之罪一也戰士之徒冒犯矢石傷者有金帛之賜死者有褒贈之恩自貫用事一切廢革戰傷之士秋毫無所得而歿者又誣以逃亡之罪乾沒軍賞悉充私藏比至師還庖人廄卒守舍掃除之𨽻冒功奏賞有馴致節鉞者貫之罪二也貫又擇取陕西徑卒刺為親兵號曰勝捷方征伐之際他兵躬行陳之勞班師之後親兵冒無功之賞貫之罪三也自貫為將帥每出內帑金帛以濟軍須奄為已有而嚴立軍期取償於州縣頭㑹箕斂民不堪命貪贓不法凶焰勃然臺諌之臣一言議已中以危法使天下之人不敢言而敢怒貫之罪四也方臘作亂攻陷城邑東南大震貫將兵討之御衆無法縱為貪暴悉斬良民以效首級于是民死於天兵者十有五六貫之罪五也貫在政和中納燕人趙良嗣以為謀主始建平燕之議經營十年中國空虛招納叛亡充斥州縣卒致生靈塗炭貫之罪六也且貫以刑餘之人身為三公職在樞省攘貪不已遂至王爵在昔勳德所不敢居本朝故事亦未嘗有而凶愎桀驁長惡不悛怙權擅命拜免大臣氣焰煽赫威震天下産怨召亂浸成國難陛下親政之始大明誅賞以勸四方如貫具此六罪何所逃於覆載之間伏望正滔天之罪以為亂臣賊子之戒天下幸甚奉聖㫖太師魯國公致仕蔡京責授中奉大夫守祕書監分司南京致仕河南府居住太師廣陽郡王童貫責授左衛上將軍追廣陽郡王徐豫國公致仕池州居住太保領樞密院蔡攸降授大中大夫提舉亳州明道宫任便居住制曰九變而賞罰可言必待是非之審四罪而天下咸服蓋繇黜陟之公邦有常刑朕何敢已蔡京親逢聖世被遇三朝四任宰衡始終二紀迹其行事殊咈師瞻假繼志述事之名為蠧國害民之政託豐亨豫大之說肆窮奢極侈之風祖宗典章變更幾盡公私儲積掃蕩無餘引邪佞于要途陷忠良於黨籍園第僣踰於宫省子孫皆列於禁嚴交通􅉏御而奸弊縱橫漁奪下民而忿氣充塞毒既流於中國禍終嫁於上皇况在政和實倡平燕之議既聞邊遽卒先聚族以逃雖汝計之甚安顧國家而何賴士庶伏闕臺諌交章公論既喧顧法不可朕尚念弼諧之舊特優終始之恩俾長蘭臺往分留務曲全體貌仍許退休勉服寬恩毋忘循省可責授前件制曰任隆將相功必在于去邪位極公王義莫先於體國倘辜大用宜置嚴科童貫夙侍宫闈亟膺重任付以兵柄時為信臣護諸將垂二十年論戰功無尺寸效惟事誕謾之術實乖撫御之宜紀律不嚴賞罰失當盡壞軍戎之政令肆紊朝廷之紀綱家室奄有其金繒軍須取償于州縣將士為之解體吏民無不興嗟頃敗纍朝不渝之盟首構三邊無窮之禍號復故地實守空城再為太原之行又唱雲中之議師徒暴露讟怨並興馴致敵人輕視中國遂震驚于都邑軫危懼于夙宵生此厲階誰執其咎議者皆不汝置朕心安得而私猶念股肱曲全體貌姑奪廣陽之封爵尚豫環尹之崇階俾即退休保其終始體於寬典毋怠欽承可特授前件制曰位居台輔必資補衮之功職領樞廷尤賴折衝之略儻乖成績宜解政機蔡攸擢自貴遊初無學術早被聖神之眷亟登廊廟之隆不思直道以事君乃復邀功而誤國頃將虎旅同撫燕彊殊乏逺謀大開邊釁既不能保盟於舊好又不能制勝於萬全遂以重兵挫於殘敵至傾國幣僅得空城納叛亡以啓戎心肆欺誕而忘國事逮金人之深入問邊備則茫然勿為守禦之圗惟事遁逃之計構怨連禍逞其一已之私疾首痛心生此厲階之梗議者皆不汝置朕恩安得而私尚屈典刑曲全體貌其解本兵之柄仍鐫論道之官畀四品之文階領真祠於善地體豫寬典毋怠欽承可責授前件御史中丞許翰言伏見保和殿大學士孟昌齡延康殿學士孟揚龍圗直學士孟揆父子相繼領水衡職二十年過惡山積妄談隄防之功多張梢椿之數窮竭民力聚斂金錢藉以為資結交權要內侍王仍為心腹奧主超取名位不知紀極察其才識僅齒奴𨽻而父視政府子冠從班殃民辱國孰不憤惋夫河橋嵗一造舟京西之民猶憚其役而昌齡首建三山之策回大河之勢頓取百年浮橋之費僅為數嵗行路之觀漂沒生靈無慮萬計近輔郡縣蕭然殘破所辟官吏計金叙績遷官進秩自為朝廷富商大賈爭注名牒身不在公遙分爵賞每一興役無數濫賞省部御史莫得鈎考陛下方將澄清朝著不先誅竄昌齡父子無以昭示天下伏望籍其奸贓以正典刑奉聖㫖孟昌齡孟揚孟揆並落職昌齡與在外宫觀放謝辭孟揚依舊權領都水監孟揆候措置橋船了日取㫖既而許翰復言昌齡等父子世濟其奸根據朝廷事連宫禁盜大河之調度以副私藏浚民生之脂膏以易官爵為國結怨俾天降殃今幸暴其惡釋勿深誅尚使領職則是既得盜跖辱以蒲鞭而還之東陵也何足以懲之昌齡為銀青光祿大夫揚與揆亦皆光祿大夫秩在翰林承㫖學士之上雖云禠職猶不褫也陛下亦何愛於羣醜而不施行之奉聖㫖孟昌齡與中奉大夫孟揚孟揆與中奉大夫餘官並追奪御史中丞許翰奏言伏見王師既行廟算未定此疑事也古今蓋未有以疑事成功者故朝廷之意惑則將帥之心不一將帥之志分則士卒之氣不鋭斷而必行鬼神避之此精誠之力也陛下欲斷今日之議當究為和為戰卒當如何而已矣其中小小利鈍非大計之所係也昔漢髙帝蜀先主皆號聰明神武為一代之英雄考其用兵敗北無數然其志氣挫而愈勵抑而更揚者大計已定於中斯其所以為英雄者也陛下决和議則臣欲陛下取太史公史記虞卿傳覽其反覆此往古之鑑也方今若失三鎮二十州之地則天下之勢已斷西北無河東則陕不可守無河朔則汴不可都計不過謀渡江南臣考永嘉渡江能為東晉者乃王導謝安英賢相繼扶危救傾僅能立國而中原丘墟遂陷外國使世無王導謝安之才或有而不見施用則東晉割據猶恐未易為也借使能為東晉宗廟可復立也社稷可復建也若盜陵寢取一抔土則將若之何言而至此可為流涕陛下永念方來之艱則今日雖復騷動天下猶不得已何者擇禍莫若輕也或者以為太祖即位未有江南晉蜀而卒能混一區宇臣以為不侔矣太祖生長兵間非若陛下繼體守文建隆將士百戰精鋭非若方今將不素飬兵不素練也敵在掌握縱而不取使益張大若之何以太祖為言故凡守和議者以國與人者也陛下欲决戰則臣之所陳可戰者五已具前奏矣今使敵不釋憾則渡河之師當戰戰則必有漕運之役有應援之兵有拒據之要皆當素治不計小節但責成功而後將帥志一士卒氣奮三鎮之守有死無二若我將以疑遣師以茍行則精鋭已亡何以取勝凡今為和議者茍取目前之無事則又未可必也臣聞西北之民人人相語曰吾屬若陷異域則必南向作賊死且為中原鬼使三鎮之衆發憤怨懟人為冦攘非小變也故姑息目前亦未易得况又方來之患亦未知稅駕歟自古用兵必有異議成王之時周公東征民獻有十夫豫翼而已其他罔不反曰艱大晉武與杜預議取江南大臣賈充等皆力爭之獨一張華贊定大計唐憲宗用武元衡裴度謀討淮西盜殺宰相朝廷震恐請罷裴度以安諸鎮憲宗大怒討蔡益急唐之威令自是復振周世宗初即位北漢引契丹入寇河東世宗自將禦之宰相馮道固爭不得周之功烈自是遂興書曰惟克果斷乃罔後艱陛下所以疑者度衆人必以姚平仲前日之敗自持其說臣近問种師道平仲所以不利者師道為臣言劫寨之法不用大兵當少擾之使自蹂籍而後可乘又地勢橫入河中渡兵橋隘此利誘使出戰不利以兵入冦也臣以是知師道有謀故前日之敗失在不用老將而用驍勇不恃謀將而恃詞說非兵不可用也昔石晉開運之變契丹始入敗不窮追近冬復大來遂陷都城國朝景德契丹入冦澶淵之役亦不窮追而與和親夫開運景德驅逐之策同而成敗之效異者何也開運之時中國方弱而示之以畏故復來景德之間中國正強而受之以和故遂定今議者不鑒開運縱敵之患而欲為景德之寬大則可謂不知時矣陛下何不試使議割地者身任數年敵不復入則臣知議者必將難之夫為國不保數年而欲定萬世之策必不然矣乞下臣章使有定議取進止三省密院同奉御筆安危之事甚大三省密院議定取長策付諸將二十七日鄭望之罷户部侍郎依前提舉亳州明道宫二十九日監察御史胡舜陟言伏見朝廷於此擾攘之際不吝恩寵以勸有功用十餘大臣悉擢以不次如路允迪已為八座矣緩急備用豈敢辭難而猶以樞密寵其行李鄴鄭望之輩皆由下位躐躋法從沈晦奉使官其白身爵賞可謂至厚矣然今日威令未振舊習猶存士多自謀莫肯為用人皆玩法莫知可畏蓋由刑罰廢也如兵興以王蕃為京畿輔郡兵馬制置使而蕃乃逃唐鄧間矯令竊權以召四方之兵使金榖不得至京師人臣之罪莫大於此今止於安置黃州而已宇文虛中王雲為童貫參謀實啓邊患及聞冦至輒先遁歸既不即加罪且以虛中為資政殿大學士京畿宣諭使而虛中不肯就職逃宿亳間此於律當誅也今乃處樞府蒙重任雲募兵京城已逃香山今猶列從班略不知恥以至擅離職任者自侍從至寺監數十人無奉公守職之義而有幸災捐君之惡至今未聞竄黜且如蕃等不誅離任者不竄萬一復有緩急而人習知其然又豈有一士之可用一官之守節者哉欲望檢㑹前後臣僚所論宇文虛中王雲王蕃罪狀及御史臺奏勘擅離職任姓名即賜施行天下幸甚聖㫖工部郎官趙考功葉宏中主客杜從古刑部柯𤾉比部胡邃並與外任差遣唐仲除祕閣修撰與郡李棁舉南京鴻慶宫鄭望之李鄴李邦獻白彥暉蔡修蔡術蔡行蔡鞗蔡䘘蔡仍蔡同蔡衎等並與外任宫觀聖㫖祖宗政事內太宗時三司上言通事舍人焦守節監𣙜場院課利增羡當推賞典太宗曰一通事舍人遷官當為閣門副使若以財利羡餘而進此職則守邊宣力之臣曷以為勸遂薄其賞祖宗慎惜武爵管庫有功之吏尚不肯以閣門副使與之所以為邊臣之勸者甚厚朝廷近來輕用爵賞自蔡京童貫敗壞祖宗舊制故干求之人援以為例其源泛濫遂不可塞今臣僚之家給使之人及諸官司人吏有為正使橫行遙郡者不可勝計童僕皂𨽻享髙爵厚祿有邊鄙用命之人終身不能得者武夫聞之莫不動心解體應臣僚及后妃戚里之家使臣及官司局務人吏其官並不得過秉義郎令三省樞密院下吏部取索限五日供具以見今官職髙下分為四等換授從義秉義為一等忠訓忠翊為一等成忠保義為一等承節承信為一等雖别因功賞轉授而元係給使人吏者並依此施行臣僚上言契勘遙郡正任恩數班著相去甚逺凡自遙郡遷正任者自合從刺史次第轉行今有自遙郡與落階官而授正任者便直超轉本等正官雖承宣使亦便轉行是皆奸巧希進務欲躐取欲乞今後遙郡承宣使若有功勞應除正任者並只除正任刺史庶幾員選不至猥多奉聖㫖依奏三十日觀文殿大學士中太一宫使李邦彥言臣以包羞衆怨之危跡而復蹈人臣不知去就之機以朴學鮮謀之微生而取纍朝廷進退大臣之體故終以罷相留京師為未安豈獨人言之可畏乞檢㑹前奏俾臣持餘服以歸候從吉日在外宫祠臣之死生實係鴻造隕涕投誠甘俟斧鉞奉聖㫖依奏聖㫖今後侍從官雖非職事特許言事詔曰朕惟秦晉之邦襟帶華夏習俗忠義物産阜繁昔我祖宗守以德澤愛養兵力蓄藏兵威漢蕃之人咸獲休息後以邊臣生事屢構干戈俘馘無辜之民焚刈安居之族仇怨交復恩威並傷轉輸支移空竭根本士卒衣廩給與不時逮夏國恭命以講和上皇厭兵而偃武咸望少愒以永太平而諛佞之徒蒙蔽成俗宣撫司勞弊將士嵗月相尋應奉官裒斂竒珍錙銖必盡材木蔽河渭而下珠玉漏權幸之家此皆暗奪軍儲侵損漕計極邊缺糴買之本則科配遂及於蕃部道路多攙先之綱則衣絹腐積於郵亭泉貨屢更號令失信田疇廢業商旅不通計臣循默而取容將帥熟視而不問養成大患重困吾民致使戰守之兵不免凍餒之苦重以拓地燕壤失信遼人多納叛亡遂構釁隙痛百年之盟誓翻為怨仇誘兩界之生靈習成反覆况復朘削軍士之廩養濟歸附之民蠧耗公私布滿郡縣朕初嗣大厯恭聞訓言開諭再三俾從改革但以親政數日之近正當都邑戒嚴之時不免召兵以為應援中外勞擾滋甚於前夙夜靡遑言發隕涕朕今側身以答天戒屈已以講鄰歡傾府庫自貶損以退城下之兵减膳服躬菲薄以訓羣臣之儉裁省祿秩攘剔弊端倘有利於軍民誠不愛於膚髮考縉紳士庶之論黜生事貪功之臣罷掊克之吏以安人情增糴賣之本以寬民力惟汝邊帥更思逺圗或戍守有嵗月之勞理當優恤及法度非人情所願事可更張悉聽條陳無有回隱念爾忠義奮身之士當朕艱難纘服之時或乘障以扞邊陲或應詔而赴國難奔走道路冒犯兵鋒否德難堪痛在朕體若上天悔禍敵人降心尚須協濟之功庶有康寧之日咨爾有衆體豫至懷可令陕西河東路帥司監司逐州軍出榜曉諭少宰吳敏等表請御正殿復常膳三表從之靖康要録卷二
