body:
  text: 靖康要録卷十閏十一月一日制曰朕紹承基圖綏御黎庶贊元經體是資大德之臣保定豐功尤賴非常之佐我有雋傑若時登庸出命于庭用亶爾衆大中大夫守門下侍郎何㮚識邃以逺氣大而剛蜚騰英聲冠冒多士挺挺不撓隱若棟梁之隆蹇蹇匪躬屹然社稷之衛比由詞苑進翊政機務陳義而納忠每推賢而揚善底乃嘉績簡于朕心屬天步之多艱當兵戎之方戒相豫以濟非汝而誰是用憲祖朝之典章正台衡之秩序躐升右揆兼侍西臺陟以班資敦其邑采於戲姚崇應變遂致開元之隆林甫伐謀已還貞觀之盛惟登明選公以熙衆志惟揆事圖策以取萬全緝治功于茍簡之餘起國勢于衰靡之後海隅靖謐疆陲億寧朕以䝉成爾亦多譽可特授通奉大夫守尚書右僕射兼中書侍郎制曰朕置相之方每加慎其選擇惟遇臣之體必務全于始終眷時次輔之宣勞方以引辭而均逸肆朌明命孚告治朝光祿大夫少宰兼中書侍郎唐恪才博而通智精以敏早由釋擢多出踐揚外分師閫之權蔚有嘉績入長地官之劇綽著顯庸逮朕贊圖召置樞院進參政本超二宰衡惟托付之甚專亦夙夜之匪懈屬以敵騎薦擾郊畿驛騷預備多失于事機建節或成于稽滯以疾來諗申諭莫回是用升祕殿以班榮即殊廷而置使密陪經幄敦衍邑組嗚呼寵數之加頌豈忘于留眷忠誠之報宜勿怠于告猷尚其欽承以永譽處可特授觀文殿大學士中太乙宫使兼侍讀制加鎮海軍節度劉延慶為樞校少傅依前上清實籙宫使初畫河之議一出衆口籍籍喧騰于上御批付唐恪曰畫河之議萬口一詞罪不在朕卿其詳之恪因乞出乃有是命吕好問除兵部尚書張叔夜首先勤王除延康殿學士劉韐棄軍長冦禍國搖民落職與宫祠侍御史胡舜陟奏臣昨奏狀條具備禦得失事其一云今大臣皆非其人唐恪聶昌尤務為奸臣所指言非虛語也皆有實狀恪天資貪猥素無行義知滁州日貪汙之迹尤著在任委屬邑買木不價其直載至和州蓋宅凡瓦竹之類悉自滁往匠人役夫皆滁兵也以充私用當時為臣僚所論遂罷州事其後蔡京復相引為户部尚書京罷出知潭州今春已召參預政事邊方大計自宜與宰相協力有為若宰相强愎自用當以措畫之方告于陛下安可坐視伺其敗而奪之位為自謀則善矣豈不誤國乎及恪為相至今邉事亦何所措畫不過如徐處仁吳敏充位而已然亦不若處仁之不為奸也恪之智慮但長于交納內侍百端王若沖與為密友凡諸􅉏御皆以諂諛結之比召李彀至中書議事聞彀之言徐以手握彀之帶曰至道處置安有錯者諂奉百端吏皆鄙笑凡內侍送御封文字至其家無不促席深結臣頃侍班上殿親見恪與內侍眤眤耳語久之不已自昔宰相為奸必先結宦官刺密㫖以中人君之欲又使之言譽稱美以固寵位唐李林甫近世蔡京王黼皆用此術正人端士肯若是乎詹度燕瑛胡直孺皆天下之至小人恪黨比之臺諌交攻不肯施行聞嘗受度瑛直孺貨賂故曲庇之恪本州縣俗吏素未嘗識賢士大夫而賢士大夫亦恥與之接故今日所引用皆庸陋貪冒之人省部郎官尤為冗雜獨任私意遂廢資格言僞而辨反是為非譽邪為正昔在蔡京門見京與其子翛論時事而各為語言士大夫皆能道之以為口實此少正卯之徒聖人所必誅者往往在陛下前言語反復後不如一近日棄地與不棄地皆自其口出大率言行皆效蔡京如近議三鎮不欲出于已今集百官廷議上即揚言不棄地以議棄地者分為三等此京分上書三等無異京以上書分三等置之中典以杜天下之口而肆其奸今恪又欲以三等罪士大夫見事勢迫切不可不與地而奸計不得行使敵稍緩士大夫得罪者多矣朝廷復有大議誰肯言此亦杜天下之口而肆其奸也若廷議之後急遣使行敵兵不至河豈有求河為界之事敵未嘗求輅冕尊號即急與之其不知幾如此可任天下之重乎自夏以來所用以為宣撫者提兵而出係國家安危李綱李彌大折彥質士大夫皆知其不可恪豈不知之知之而不言聽其敗事豈為國之心哉國家天下之大固不可盡貴其擇賢太守如河東數郡及懷衛河陽鄭不能擇忠義有謀守之如敵長驅而入無人之境守河以議都城亦不擇人而用之使兵望風而遁泛水關之險密邇都邑亦不預為之備令京師守禦疏略兵將無所統一人情不能安堵則宰相何用哉其無所能概可見矣何知為奸以誤國事豈不負陛下寵任乎聶昌則奸人之雄小人尤凶暴者因陳邦光引為蔡京之客次擢為户部侍郎未幾尹京欲為蔡京中傷王黼反為黼所中而罷居鄉郡以州縣之勢豪奪人之田宅州縣請託招權納賂無所不至為臣僚所論責居湖外蔡京方圖為宰相以昌凶悖可用遂召至闕今春士人伏闕昌為尹詣太學為諸生曰王時雍欲盡殺公等而昌勸之遂已豈不見時雍親戚皆請假去乎以虛言悅士人因上書薦昌樞密院者甚多昌之詭詐不情大率類此撫州范世英訟昌奪其物業昌曲法編管世英行遇殺而卒使管押之人害之也復追世英之父與祖丞府禁獄雖有指揮送大理而昌不法遣使大理官就府推勘自有刑獄以來豈有是事理直何必留府欲世英三世被害慘酷如此豈人心哉閣門祗候陳申怒其教世英作狀追捕繫獄毒楚備嘗鞭兩股皆爛百姓左二人為世英送食昌以事誣之庸決至死刑之寃濫一至于是夫怨氣傷天下之和不致上帝之怒乎江鋒昔為撫州教官與昌有隙鋒北至都城輒差人押出門開封捉事使臣范振受贓三百千大理勘編管昌乃留密院生殺豫奪之柄皆在昌乎殆不復有朝廷矣蔡京童貫愛婢皆畜于其家貫有名馬有指揮令昌取納乃送太僕寺因賜馬取為已有方軍用度不加之時開封有錢宜助國用昌乃請萬緡為私費嘗為臣僚所論守禦司寄姓者甚多如術人栁彥輔及號知足道人者皆與官寄姓名緩急之際何賴焉今日募兵尤為急務諸路差人召募皆昌故舊輕薄小子姓謝丁者是也布衣與官不問能否各與官告數十道使之妄用京城望兵如渴思飲昌乃以為私恩豈忠君體國者乎宰李平西庸陋不才家有美婢而昌悅之引為少尹復使權樞密都承㫖方用兵之際承㫖豈容不才者居之唐恪與昌奸雄可畏牢籠使為已助昌恪有力亦深結之士大夫目恪昌為死黨朝廷有此二奸所以政事不修威令不振人才無一可造者將士莫肯用命不足怪也昔季梁在隨楚人憚之宫奇在虞晉不窺兵國有人焉故也今文武二柄乃付二奸是宜敵人侵侮土地貶削而國勢危蹙矣伏望陛下睿斷赫然竄之天下幸甚奉聖㫖唐恪除觀文殿大學士中太乙宫使是日敵攻善利門告急殿前司姚友中選武庫神臂弓硬弩一千五百人救援是日奇兵作亂毆王健殺使臣數十人內前大擾殿前太尉王宗濋戮渠魁方定先是王健余創奇兵有識者鄙之曰凡兵用之則有奇果以盡奇乎一時招集皆叛亡無賴富强之徒故有是亂百姓殺東壁統制卒康以指揮城上兵不見敵火不得放箭炮百姓疑為奸細故殺之以張慤為北道都總管手詔朕以宗廟社稷之重與軍民共守命駕登城拊勞將士咨爾衆庶毋致疑惑二日駕幸東門勞軍賞賜孫覿為支軍糧賞賜不平降三官罷以王時雍代之是日尼瑪哈軍至城下先是王及之告和軍前二將有割城地金帛之要及之乃曰及之奉使朝廷不易信莫若元帥親至城下遂與俱來以及之下獄宋伯友棄鄭州歸京師以為提舉守禦命以下有言者落職宫觀江州居住西道總管王襄棄郡去澤守髙世與以城降即僞除京西河陽守燕瑛棄城欲去為亂兵所殺司録事等率郡官以城降河東諸郡或降或殺殆盡為河北頗有堅守不下者始朝廷以敵去嵗駐軍孚生監命都水使者陳求道等先決汴渠水灌西北郊牟駝岡窰務卒因從大劫船燔數十里敵帥固倫尼伊拉齊貝勒左副元帥曰國相尼瑪哈者屯青城尼瑪哈自河東入者也太子副元帥曰二太子阿里布者劉家寺阿里布自河北入者也其餘敵寨多在東南初窰官李㝅典治兵械秋末上命㝅閲兵劉家寺㝅因取兵器炮坐炮石置寺中不知數目至是盡為敵用京城震恐盡土諸門乃命官守四壁東王時雍南李擢西邵溥北安扶孫傅為都大提舉四壁守禦使何㮚兼之四壁各清野有事相關敵人甚危之又以東南受敵增立守禦東劉延慶南郭仲茍四面各一宗室兼提舉十步一將十步一步長十長一統制又每壁各置彈壓官及其官率移易不常又諸門悉以宗司啓閉初金人未渡河京城苦寒日者王俊民上言可借春以召和氣詔從之是日迎土牛于開封府前且令新城益張青旗以應木德仍自東壁始卒康宗于翰輩號持衆務整已律士卒厭苦之或諷百姓康宗反矣不然何以易旗幟衆不知其情乃趨宣德門聚數千輿登聞鼓置東華門撾擊號呌京尹及彈壓官皆不能制衛士自樓上射之衆驚走遂趨東城擒康宗殺而磔之并部將十數輩皆死至晚稍定彈壓官推其尤者一二人斬之是日敵攻東水門矢石飛注如雨或以磨盤及碌碡絆之旋為風炮王師以纜結網承之殺其勢又門裏跨河築月壘以拒之駕幸東壁撫勞將士范瓊遣班直五十人下域已殆賴劉光國援之而免敵攻通津門甚急姚文仲領千人下城接戰殺傷甚衆三日駕上封丘門聖㫖李綱復元官除資政殿大學士領開封府事限指揮到日下星夜發來赴闕仍曉示軍民駕幸北壁劫寨兵來效級者賞賜甚衆敵晚攻東水門甚急遣數人縋城禦燒毁其炮駕五鵝車二然炮架所存者尚七座其未立者不可勝計四日駕上鄭門幸西壁南道總管張叔夜以兵四萬㑹城下詔以叔夜為延康殿學士駕登鄭門即以馮澥與蕃使自軍前來也澥云尼瑪哈初在瓊林苑已而入青門夜攻宋門鼓聲甚急范瓊劫寨者回獲殺數百東水門又築夾城五日駕上南薰門幸南壁詔用太祖儀衛務從簡便以障泥乘馬不除道馬行泥淖中或穿巷循堤而行躬擐甲胄登城民皆感泣及食時却御膳再取士卒食以進支賜有差下至准備差使猶二十千每壁文武官幾七千員所用不可計其衛士對御血戰者有功賞之尤厚駕幸戴樓門召見張叔夜升為資政殿大學士就解何㮚毬路帶賜之先是諸道兵未至叔夜率先勤王以其二子領前後軍屯陳州門屢戰有功敵少却又詔叔夜為簽書樞密院事以南道兵入城數日不窺諸壁獨攻東水門尤急孫傅夜宿城上初何㮚孫傅議敵之再來止緣去嵗結和厚賂今不可復唱和議又苦無兵以戰乃閣門堅守以待四方勤王之師京師之兵不滿十萬秦元所教保甲雖衆然怯懦無足用嘗有五千餘人聚食朝陽門外敵騎六七疾驅其前衆棄兵潰走敵亦知我之虛實無所憚既而勤王之師迄無至者未幾東道胡直孺為敵生得執以示城上都人益恐蕃帥魏三大陷州解于可除右司郎官六日馮澥尚書左丞耿南仲依舊門下侍郎其請給等接續支破金人連東水門陳州門朱門帶下寨自後日攻東水門尼瑪哈兵薄南壁與配泉觀相直敵能以利誘諸諜者反劾以情敵初到即力攻東壁通津門子城時劉延慶頗練兵事措置獨有法遇夜即城下積草數百爇之以驚時有獻議置九牛炮者雖磑磨皆放東壁用之法嘗碎其雲梯詔封護國大將軍者敵知東壁可攻於是過南壁以洞子自蔽軍薪土實護龍河初決便水益深至是皆氷合敵又為梁安機石矢石不能及或說我軍宜出兵擊之且焚其梁令腹脅受敵將吏笑曰慎憂乘城一夫當萬使敵傅堞獲之尤以為利然至二十五日城正自此陷蔡京賜第及都尉宅火城中驚擾大名府進士司文政上書力陳不可戰恐城破稱臣不可及何㮚大怒取聖㫖處斬號令都尉尚子扆向子房不合擅便上城各降一官御筆范宗尹首議割地今戎馬再至朕失天下人心先次落職續除集英殿修撰差提舉西京崇福宫七日金人遣使來講和是晚王宗濋領牙兵千餘人下城與敵接戰髙師旦知是夜姚友仲正築南拐子城敵交鋒在北拐子城下躬率將校施放弓弩監督炮石凡所陳為炮箭所臨雖不少負亦不大勝敵勢稍沮八日攻陳橋門尤急東水門大戰九日金人遣使借糧議和李㝅先次除名勒停次早宣化門告急姚友仲領守南北拐子城所以不扞禦水門者以水門不可遽犯故急攻二拐子矢石如雨樓櫓皆壞朝廷為防秋之計上親幸封丘門城外接炮錫賚不資炮架炮石盡在城外劉家寺敵守攻善利通津二門不三數日間城下立炮架僅百餘座盡是劉家寺者但添得生牛皮包褁並濕榆木緣攢定裝軸腳而已張叔夜除簽書樞密院事十日龍德寧德兩宫出錢助國戚里豪民亦如之或以酒食犒師金人許和以都水丞李處權右司郎宫司馬朴為報謝使徐俯與郡一冲不職降一官張叔夜與孫傅同措置四壁依舊南道都總管餘道並聽節制十一日裝七星炮六部人吏及富民各就車運炮石上城詔賜河北朕即位以來無罪無辜而金人入冦不已至兩路引兵一嵗之間再犯京城朕每與講和以求息兵言及割地如剔眼肉非是棄河北之民也欲與金帛取贖以復舊疆今事勢危急四方宜同患難京城失守則我赤子盡陷異方矣永在塗炭詔河北一路盡起軍民之兵守臣自將陪道並行星夜前來殄滅巨敵以安王室天下平定與汝共之除賞賜外軍事復補官資百姓免五年租賦制加鎮海節度劉延慶為檢校太傅十二日開戴樓門許百姓搬門外柴炭木植等賣仍發卒二百人下城打護龍河兵劉韐以守禦無狀落職留以自效除劉延慶為使敵築望臺度髙百尺下覘城中又飛火炮燔樓櫓旋即修繕又造雲梯施大輪以革冒之乘罅推以逼壘將士以鈎竿柱之使不得進近則以鈎子取之發火焚梯敵數引却軍士擊九牛弩一發而貫三人十三日金人掩殺運柴百姓入河范瓊以兵救之雪晴李處權使西軍回不見尼瑪哈亦不受書云自遣蕭翼計議是日金人陷亳州十四日駕再上城擐軍勞軍殿班撮城下戰勝賜賞之金帛駕幸東水等門撫諭軍民守禦提舉李擢降兩官落職罷以田浩代之初護龍河自敵迫近即汴水以增其深其後雪寒氷合敵于氷上布板置草覆之以土將以攻城而擢不介意是日稍晴上登城見城壕填壘殆盡乃有是命駕御朝陽門敵兵十數逼城出不遜語衛士三百餘乞下詔從之遂與合戰中有執盾者二人獨奮身躍入至手殺五六十輩而餘兵不進詔促使援之卒無肯前者二人競死上不懌因下城初有制城樓禁火士卒噤戰不能執兵至有僵仆者然上在禁中徒跣祈晴又撫問存恤絡繹不絶多給衣襖務令溫暖衆皆感泣不敢憚勞以勤王不至時令挑戰以示敵然可用者獨有衛士三萬爾每出數百人雖多獲級以歸然亦失十五六至是死亡以數千人敵又遣使議和須上或上皇出郊詔不從復請以近上親王詔遣王行將出敵具兵以迎因不復出獨遣馮澥代行敵聲言失信攻城益急南壁惟字乃家號二樓最危時壕池已為髙陵敵既逼城旁近七八樓爭發矢石動以千百計既非受敵往往虛棄或止之則衆指為奸細而殺之敵伺城上稍息拾矢石反射城上交下馬如雨弓弩多不能立炮亦良久乃能一發傷者甚衆給賞官皆應給不辦又樓櫓之屬為矢石所壞換易不及每一柱一板率厚賞寨人既而有中炮碎其首者有為流矢貫之于柱者人皆莫肯施工不得已逼使之或請以磚石壘壁可免換易從之頗亦以為便既而灰棚多為炮石所損因以布囊貯糖為籍其下即用火牛車以備雲梯之來其制髙於城以繩貫竹木似梯而彎其下施平板板上下龕䝉以牛皮可數人以据城又其下即輪軸乃鵝車也箭所不能入獻撞竿者其制用長衣數丈上施橫木數尺下以鐵作軸雲梯之來迎擲之應手急索則梯可倒急攻之際嘗用之壞其二梯殺敵千餘至是日撞竿不及敵因就其上以長竿升火燒樓櫓糠袋及火牛車不可向邇頃之敵稍登城有執盾者禦乃下是夜緩攻十五日大雪駕亦登城三軍鼓舞聖㫖金人犯順中外驛騷蓋朕不德之致今月十六日可避正殿開萬勝戴樓門縱民樵採聶昌至絳州絳州人殺之十六日金人填護龍河度鵝車以攻城是日于陳州門近東填壘壕池人于皮洞子內負土矢石不入駕幸南薰門雨作泥深十七日過登天樓來攻東水門聖㫖宣化門東壕內敵兵紱㭖盧襄臥疾全不措置不自請罷滋長敵計可落職與祠李擢喬師中坐視敵兵進㭖壕河中三分之二顯見守禦無方各降兩官為弛慢不職之戒十八日金人過鐵龍爪來鈎城上敵樓戰棚遣忠訓郎閣門祗候秦仔賫蠟封文字詣康王奉聖㫖訪知州郡糾合軍民共欲起義此皆祖宗涵養百年忠孝之士天地神人所當祐助檄到日康王可充兵馬大元帥陳遘充兵馬元帥宗澤王伯彥充副元帥同力合謀以濟大功李處權以再遣辭行付御史臺獄詔張孝純贈開府儀同三司張浹贈徽猷閣待制餘並贈七官選人贈承議郎與恩澤三資監司與恩澤五資十九日敵侵晨以大橋三置火其上相徑攻水門拐子城搭村四人鋸斷橋以水沃火因撞竿折其梯墜者甚衆三搭村死之二十日遣使出和要親王出盟樞密院劄子金人犯順直抵京畿虜掠居民憑陵郡邑雖有議和之請未聞三舍之期主上出宫禁之藏御士卒出戰然有難塞之欲繼生無厭之求近日于都城四面作雲梯鵝車等窺伺間隙攻打堅城多設虛寨逺置疑兵欲絶聲援樞府職當機密親履艱危雖上聖垂仁猶欲按兵而講好然大臣仗義豈能顧位以偷安念萬里之幅員率四方之豪傑乃父乃祖被聖神涵養之休惟孝惟忠實臣子願為之事宜殫大節圖報上恩恐號令之未分欲施為而不敢如檄書到日應帥府監司郡縣守二令佐悉許不拘常制起勤王之師如見起發仰所部令官併日催促前來救護京室如有起去處不拘逺近內外許鄉豪傑迤相勸率招集驍勇不限數目各自催排首領前來或有逃散去處山林自專結已成隊伍許具名申所在官司不拘軍人百姓亦許自效隨事便宜四面攻討其所殺獲隨事以聞自節鉞已下已有立格推恩願忠臣義士相與竭力以成大功時不可失劄付開德府關牒前路火急施行知開德府王棣除顯謨閣直學士二十一日遣郡王二人及曹輔馮澥出使增修東南二壁提舉官安扶罷以劉韐代之二十二日金人遣郡王回要親王并何㮚二十三日遣京畿弓手出戰敗死千餘人是日大雪太乙寨兵于東水門及陳州門東立天橋數座下瞰城中有榜募能下城焚毁者白身授團練使二十四日敵遣使來議和炮中田顯立死進五官待制陳州門火焚戰棚者三即撲滅而新之是日早敵推大梯四乘來攻字字號樓子三乘為撞竿所壞獨字字樓子撞所不及火延燒三樓子敵人皆登城舞㸃旗鼓噪然為樓子火盛不可過姚友仲仗劒擁班直守禦官軍兵救火弓弩交發敵皆墮殺傷者甚衆敵遂退是日大雪我軍放火牛燒金人洞子反延燒宣化門東敵樓二座陳州門也金人十數乘火作上城守禦人掩殺而退然攻城益急用撞竿燒其雲梯二殺敵千餘其次索撞竿竿不及敵因就其上以長竹扎草延燒樓櫓糠袋皮火牛草延引不可向邇其貯水桶皆氷合三樓頃刻而盡敵幾登城矣得牌首僅百人禦之而定其夜緩攻前此軍頭郭京者妄稱有李藥師術募無賴輩數千聚天清寺號六甲正兵初為成忠郎尋遷武翌大夫每以危急告之京頷笑而已民庶語及京者輒以手加額時何㮚募奇兵五千兵屬於京有士人上書孫傅其略以為自古未嘗有以此成功者其朝廷或聽之宜少付之兵俟其有成乃稍進任今聞衆至三萬或失利則為朝廷羞傅怒謂客曰京殆為時而生敵中瑣細一一知之幸公語傅言若與他人定坐爾沮師之罪揖而退之又有劉宗傑傅臨政之徒各募衆或稱六丁力士或稱北斗神兵或稱天關大將率效京有識者危之嘗曰非朝廷危急吾師不出至是乃登城竪旗㑹天王像指示衆曰是可令敵膽落矣衆亦莫測是夜宰執宿門上二十五日大風雪金人攻陳州門鵝車洞子雲梯矢石如雨午時遂登城守禦人棄擲兵甲下城走既而東水門之南亦破金人下城縱火殺旁居人殆盡都人自殺及棄男女財物於河井中者不可數初欲洗城先劫曾帝姬往軍前既而傳三元帥令殺者族遂止是夜南薰門陳州門東水門大火光如白晝先是四壁屯京畿保甲及軍士共七十萬每壁提舉一員同提舉二員使臣十人右僕射何㮚樞密孫傅曹輔皆在城上又旋募無從兵馬以草澤為統制如傅臨政裴淵陳德之類凡九十餘頭項其後又以丘濬感事詩有郭京楊適劉無忌盡向東南卧白雲之句立郭京為將人爭從之朝廷因命為統制識者知其必誤國也又諸統制自皆號令不受樞密節制既不齊一專務姑息人不畏威加之賞罰不明無以勤勵遂至失守如劉延慶并子光國衆咸惡之指為罪魁其日猶拜少師初郭京既為朝廷用募不復其武勇但相視面目正以為去取有武臣欲為偏禆京不許曰公雖材武但明計正月當死恐為我纍其誕妄自任類此或言援用之初試其術有異京因謂金人唾手可取與內侍輩尤尊信傾心待之是日大啓宣化門出師門去敵不百步又天已明人固以疑之先是每出師城上皆持滿待我師稍却即并力以射用此退敵京欲出兵乃令守禦人皆下無潛覘軍恐失大事獨與張叔夜坐宣化門瓮城頭上以親兵數百自衛兵才出即倡云先鋒劫寨奪馬數百匹矣都人皆喜歡傳增數千其實妄也初敵陳州門外京自內出正當其鋒我軍數百人方踰壕敵二百餘騎突之皆沒河中迹踐殆盡哀號之聲所不忍聞敵因趨門方急呼守者禦之吾衆已亂出矣京見事去即白叔夜云須自下作法因以繩引餘兵南遁已雲梯輻凑來者不絶初朝廷募有能下城得敵旗者給銀絹至是一人身帶十數其卒爭取各詣其長求賞但見黑旗旁午人方疑駭而走泊六人者登城衆遂披靡實午未間也衆既潰散城上連呼弓弩手至隨後追之終不回棄露刃填隘里巷聲言扈駕而出叔夜度不可支下城遇亂兵劈中三刀敵先焚通津門宦者黃經臣望闕再拜大慟躍入火中死守禦盡散惟田灝死之詔贈待制官其十子敵入配泉觀衆止數百人我衆望之奔潰無敢與之敵者俄頃潰兵與百姓自南至北者摩肩接迹舊城門皆閉遂從舊宋門河上穿腳門而入或渡河而過嬰兒襁褓棄死道側者籍籍慟哭之聲震天公卿大夫率攜妻孥衣敝布匿委巷小民家劉光領西兵秦元領保甲從北門斬門而遁敵登城者未下而京師驚擾四城樓櫓皆遭焚燒火熖突起急風中東南為甚初敵遣使者劉晏等四人促和朝廷館之都亭驛及是百姓趨往擒之晏等呼敵曰我來促和正為若等毋殺我衆不聽皆臠之有以是報阿里布者曰爾時南宋已無號令不可罪渠日晚上登東華門宣百姓授甲擲兵器樓下遣之時大軍既潰民無鬭志授甲者俄頃輒棄之至夜中官等並逃出宫廷無一人唯景王妃梅執禮秦檜謝克家三四人在上左右傳宣命令因詔謝克家授書往軍前出不由門縋城而下單馬一二人隨行從南薰門間關至劉家寺見二太子至二十七日有殿班指揮使蔣宣集衆數百人欲衛上冒圍出奔上猶豫即升殿挽御衣挾上上急顧宣曰汝是何人汝是何人敢爾宣置上以足頓地曰臣不顧死欲盡忠陛下陛下不用大事去矣上託故還內秦檜委曲諭之云汝等護駕而去果保全乎衆默然檜曰我今為汝告官家更將書往軍前試看如何衆唯唯於是檜復請往其衆或以兵擊窗壁暴甚因盜內庫器皿莫敢誰何賴上親出涕泣慰諭時左言亦為殿班指揮使彈壓之稍定因擢宣為防虜使以安其心又云是日早大啓宣化門郭京出兵敵來攻字字樓子皆頽毁處置未成撞竿未備敵遂登城衆潰城陷京師被圍朝廷急于命將有郭京者京師盛傳用兵六甲法可以生擒二尊其法用兵七千七百七十人嘗自試于內朝廷信之不疑錫以金繒數萬計使自募兵恩數備至人皆呼為郭相公其所召募皆市井游惰色色有之不問武藝精否但擇其元命合六甲法者有賣線兒京一見授以將命他皆類此敵兵攻圍甚急京談笑自若云擇日出師凡三日可至太平直抵隂山而止其所招軍但欲砍首級不必戰也前期至天王旗每壁三面按五方色或畫天王不知何法也又有劉無忌乃賣藥道人常以身倒植泥中乞錢亦作統制官蓋取丘濬詩有郭京楊適劉無忌皆在東南卧白雲之䜟初郭京出延頸俟捷于宣化門者已千萬人俄報云郭京前軍已得大寨懸大旗于敵壁矣又報云前軍奪敵馬千匹矣又遣使臣傳令樓子上除守樓外餘並不得上蓋郭京以六甲法能使人隱形未脫口敵兵分四翼鼓噪而進衝斷前軍一掃而空居後者悉墮護龍河吊橋以為積所壓不可拽以城門急閉敵師大怒鐵騎沿城而上止用雲梯一隻可制五十人初十餘人登壘官兵無一用命者城遂陷是日午時也京城陷統制官死者三人何慶言陳克禮死於賊姚友仲死于亂兵劉延慶并子光國奪萬勝門帶班直長入祗候西兵萬餘人而出皆護駕先鋒延慶陷金門池而卒光國攜王黼愛妾張氏以逃行十餘里敵騎追及之遂殺妾而自經是日班直斧都亭驛門入執敵使劉晏并從者三人殺之先是十一月二十八日詔差翰林學士莫儔御史髙世賞館伴斡里雅布使人劉晏于都亭驛晏曰皇子元帥遣晏來云國相元帥一軍非晚亦到元帥皇帝出城㑹盟儔等答曰伯姪之間義均骨月與二元帥相見故無害但事體不順難以家至是晚都人見大兵已傅城下但容車駕出郊二帥此來正欲彼此不失信既許二帥却馬士庶軍民遮擁不放車駕出城即失信更大晏頗以為然晏至驛便欲朝見上問左右大臣以前遣王油來不恭不欲見之孫傅何㮚請留不遣詔使人就館議事不須引見儔等奏不引使人恐難為辭亦恐劉晏不肯去况斡里雅布於本朝素號有善意今拒絶其使如尼瑪哈遣使來不審陛下還令朝見否後勢須引對即于斡里雅布非便臣等連日與劉晏語似稍識義理必非王汭狡獪悖慢之比上曰如此即令引見晏果執禮甚恭奏對婉順上悅厚其禮幣晏悉不受晏既去又數日尼瑪哈軍果到青城遣奉使知樞密院馮澥引蕃官蕭慶揚誥薩里穆爾貝勒來使慶極桀黠有口才薩里穆爾貝勒語簡而峻薩里穆爾乃女真人其酋所親信者再差莫儔髙世賞館伴次日引見上殿慶等力陳本朝失信事謂如三鎮已許了兵才退便不肯交割今雖是畫河國相元帥皇子元帥須要與皇帝會盟方敢退師上令儔等宣諭曰非三鎮不當割自是三鎮軍民不從因而遣使告大金覓三鎮之地却討三鎮稅賦增作嵗幣本非失信慶又奏云大金收得貴朝詔書言祖宗之地尺寸不可與人上宣諭曰此乃前日臣僚獻議也已行貶竄自有國書回二元帥且煩太師諸人主張和議必相信敵使退至都堂堅執撫前說云相公諸人須是與皇子就議方得穩便何㮚答曰本朝自祖宗以來車駕惟是三年一次郊天出城平居未嘗離太一步况今大兵在外都人豈容車駕出門此事實難相從皇帝自有回書便煩太師諸人委曲覆之二帥敵使退至驛受書辭去又數日蕭慶又賫尼瑪哈斡里雅布書來堅請皇帝出城會盟不然即圍城之軍決不解攻城之具决不退未攻城前若車駕出城二帥當執臣子之禮若城破後更無相見之禮若謂使人言語太過即請斬之使人不惜一死此事乃是貴朝社稷儔答曰此事恐終難允從至是遣李處權借太常少卿為報謝使兼送閣門宣贊舍人李德充副之閏十一月十四日尼瑪哈斡里雅布復遣蕭慶延扎果斡薩里穆爾同李處權等來使就差李處權作接伴使先與莫儔等相見曰奉賀這回好公事且喜得早了當國相元帥皇子元帥云皇帝不肯出莫是疑否儔答曰亦何所疑只是事體不順慶曰國相皇子來特令慶等奏知皇帝不須車駕出城只要大臣計議近上親王為質使待退兵候兩路割地了畢即送親王歸儔等即時奏知蕭慶等又言來時二元帥云陳州門濠已壞了三分之二長一里有攻城器具二百車並來推上前如依得書中所言十五日放慶等回和議便定不然二元帥云亦須顧慶等三人一面攻打若一個軍人登城更無商量遂引之至殿上即奏曰免聖駕出只要僕射何㮚出城議事㮚色變上亦不許宣諭使人曰待遣大臣馮澥曹輔前去又請上皇皇太子越王鄆王為質上宣諭曰朕為人子豈可以父為質如皇太子數嵗如何到得軍前薩里穆爾曰這事也有商量如皇太子不須出去只告親王二人出城為質上宣諭曰近請上皇出城蕭慶曰議事非僕射何㮚不可如馮澥曹輔皆衰老怯懦元帥決不信其言上宣諭曰馮澥曹輔皆忠實大臣朕所委任軍前有事但與商量慶不以為然莫儔髙世賞請對力陳敵已不敢仰煩聖駕出城其心頗回極不易得如宰相親王不可不行且如斡里雅布前次到城下要宰相陛下即遣張邦昌要親王陛下即遣康王肅王今兩軍並傅城下尼瑪哈凶悍有謀又非斡里雅布之比豈可不遣宰相及親王恐貽後日之悔蕭慶曰館伴且須催貴朝遣親王早出城若更遲回恐誤大事至上降內批侍儔等令再三說諭使人本朝宰相只一員每日處畫朝廷事務應副軍前不可暫時闕官已遣輔臣馮澥曹輔去諸事可商量莫儔髙世賞以曲說諭詞曉慶等曰須得何㮚并親王出城事便了兵便退如或不然決定攻城若城破之後不知大臣做得大臣親王做得親王麼慶等此後更不復來矣楊真誥又索干戾人儔答曰皆竄嶺海不知存亡慶遽止之曰在此間者猶不肯遣况干戻人乎授書相别乃閏十一月十八日也十九日朝廷遣知樞密院事馮澥簽書樞密院事曹輔代宰相宗室節度使仲溫事希代親王出至軍前尼但置酒待之酒三行便送馮澥等歸不交一談自此攻城益急晝夜不息二十四日劉晏再入城是夜大雪深數尺莫儔髙世賞見劉晏晏曰皇子元帥令晏急入城修書不及兵已登城如力禦得住即極力為之如力有不加即告皇帝早出來相見當悉保全宗廟社稷須急遣宰相親王出城庶免攻破晏曰城上有禦行徑全然未是便火箭燒著樓子何消倉忙若做樓不及但用大木欄塞定多用長槍等待上雲梯人㸃令刺墜可也晏見城上守得未是不可保次日引見晏奏陳斡里雅布之意上賜晏金束帶退至都堂宰相執政諸大臣猶不肯遣親王奉使儔等力爭之不從歸至驛雪大作未時候聞驛門外大擾守門兵士入報金人兵馬已登城諸軍班直皆敗走回朱雀門已閉少頃晏等被殺二十六日大雪金人盡得四壁城上火益熾百姓扶老荒擾如初敗兵委塞里巷者往往肆行剽奪下城輩乘之兵火四起遣何㮚及親王為請命使秦檜李若水司馬朴相繼納款軍前至西北壁寂無一人乃伐城外林木并斸取柩板作障反蔽城內炮架及箆巴皆回向內城外盡作墁道城內者則塹為另橋不三四日皆畢初破金人下令縱火屠城時何㮚率百姓欲巷戰其來如雲由是斂兵不敢下仍僞倡和議人心稍安駕登樓宣百姓遣宰相何㮚濟王議和午後何㮚濟王回同金使四人入內詔許髙除名勒停瓊州編管是日早龍德宫聞城破太上皇帝為衛兵擁入禁城上皇猶豫間衛兵欲殺內侍官鄭詳以下遂由金水門以入躊躇雪中移時未知所向上聞之遣帶御器械王球領殿內帶甲親從官二百人迎奉太上皇帝入居延福宫時寧德皇后早已入禁中矣又云早駕上宣德門見軍民越王同吳幵乞出和二帥令回要宰相何㮚李若水自軍前乞入城拉何㮚出軍前奉聖㫖何㮚及親王出和當晚許令講和議乃回堅欲太上皇出城相見是夜五嶽陽德觀大火詔釋王及之李處權罪及之復吏部員外處權以遣辭行付御史臺獄至是釋之又云京城十六門皆為蕃兵占守吾兵無一人在城上者當日早班直及諸處軍等奮力奔出者四萬許人京城大擾哭聲不絶而士庶近臣皆扶老攜幼藏匿于小街深巷之家婦女蓬首垢面自毁形容或入井或自縊半死半活而棄在旁者不可勝數二十七日四更上御宣德門撫諭軍民兩國以和議各令歸業黎明雪止自城初破金人雖數令不得鹵掠然擅下城執弓箭搶刀于貴家富室劫金帛䭾馬子女每數十人作隊者甚衆小人輩因緣為奸或為指蹤或髠髮皂裳效其號呼秉炬公肆虜劫是夜又火雲騎橋明達皇后孟昌齡等宅神衛營藍從宅沿燒數千間民見東南火作爭走西北悲哭不止幼稚棄于河者益多太守徐秉哲出舊城撫諭今日敢劫掠者從軍法王師及城上敵兵皆釋甲小民過城者敵人擲錢乞之或往復或十千語人曰元帥限我輩三日破城今止日半見效諸門先積金帛如山敵悉得之所棄者錢耳敵帥堅欲上出郊親議或太上皇皇太子亦可上初不肯出大臣有請行者上堅不從且指衣帶以示之曰事急有此而已既而手詔曰金人堅欲上皇出郊朕以宗廟生靈之故義當親往咨爾衆庶毋致驚擾却誤大事又云是日駕登宣德門赦守禦官吏軍民之罪皆稱萬嵗城中民趨陽德五嶽觀盜官錢天大風雪尸橫道路爭食之入更雪霽長星見焱出丈餘四更沒是夜馬草場堡真宫火又云是早朝廷差人及出榜告諭城中軍民等已和議了更無殺戮人情初安然何㮚在外與金人畫一以十二事和議如割河北嵗幣稱藩括金銀之類未定間金人須要上皇為質二十八日雪止日色甚明赤人皆言不祥又訛言下晚洗城于是大街居民逃隱窮巷惶惑不知所以為豪右被氈毬婦女以灰墨塗面百計求生是日有榜云朝廷所遣使回大金已許通和只候何㮚入城便作講和盟誓仰軍民等安心著業其潰散者各放罪不得驚擾有違約束以軍法施行或有詔文武百官秀才僧道父老等相率詣軍前謝二元帥兵不及城全活性命之恩願犒軍者聽以金帛牛酒何㮚等四壁守城兵盡放入和議已定帥遣皇弟大王十一人詣軍前謝之晚差范瓊四少尹并相官彈壓舊城外府尹三街彈壓城內民稍安堵然敵間下城焚劫州北皆黑水兵尤暴橫繞節制宅皆火太學律學一空待漏院登聞鼓院樞密院寶籙宫窗楹皆決壞二十九日天隂稍晴城中軍民或詐為金人縱火劫掠凡捕千餘人稍止百姓分其尸頃刻立盡自後日日有之晚有黃榜以當親往郊外是日百姓相率往謝二元帥以竿揭金帛者自門內抵南薰門填隘于道路皆却而不納自二十五日至是日士庶皆攜老幼渡汴履水入內城雖貴戚無不布衣塗跣者三十日黎明開朱雀門上御馬素隊三百人詣青城見二帥至南薰門南立馬移時候報敵悉隔下兵衛許百人從都人自宣德樓至南門泥雪中立候駕回敵見上皆以手加額焚香而迎是日未許相見車馬宿郊外衆聞之皆惘然夜有榜示奉御筆徐秉哲曉諭軍民各令安心勿得驚擾來日入城當與軍民共慶初是駕不欲往而太上皇欲行故出都人獻物隨駕往者不知紀極有㫖候駕回乃前敵既據新城晝不敢下遇夜或五七人至數十人潛虜掠而已然呼四百出城使交馳又令數人居都亭驛為承受方城破之初文武官蹂踐及踰城死亡者甚多官軍約十七萬潰散幾盡至是招集才二三軍前來索蔡京王黼童貫詹度陳遘李綱吳敏徐處仁張孝純等家族是日先以蔡京家慕容氏母子并京二小孫以往十二月一日上宿郊宫與二敵帥未相見遣使者議和事上將去表凡數次改是日關傳乘輿還百姓自五鼓相率守南薰門蔽路已午間南薰門忽開莫不欣躍已乃宣取酒果申後韋壽隆入城傳詔來日方歸又出黃旗云和議已定各宜知悉益惶惑不安至夜有投宿御廊者婦女小兒用褋裙盛土于馳道以雪泥未乾不曾治道故也家家焚香以禱是日敵來求劉晏等四尸以骨還之晚有一榜云奉聖㫖上和議已定止是往來數未必竊慮軍民等疑慮令曉諭告令知悉一云承大金軍前關金人雖在城四壁不令下城如有作過及乘勢作鬧之人仰一面收捉並以軍法從事又云是日微雪講和方定孫覿草表質明曹輔韋壽隆邵溥賫黃旗歸報傾城迎駕數百萬人自闕至南薰門填咽不絶至暮散歸皆以情乞詣軍前獻金帛牛酒謝過敵人不納是日皇弟康王開兵馬大元帥於相州二日日出無光有飛雪數片聞劉延慶出奔為人所戮是日候駕人稍少皆云必未回申時忽有一使臣馳馬而來云駕回都人驚喜奔至晚駕入門父老交道山呼拜于路側老幼掬土填塞雪淖不須臾御道坦然或捧香前引或衝突禁止爇項然臂以迎者不可勝計皆攔馬首而泣聲聞逺近帝亦為之掩涕入宣德門帝仰泣數行左右悽咽不得語從駕有金人數輩見上得人心如此亦皆驚嘆久之是日午時稍晴頃之微雪乃受降時也初鑾輿之出駐蹕齊宫遣宰執往來議事易表者四數其略云三里之城已失藩籬之守七世之廟幾為煨燼之餘久煩汗馬之勞輒效牽羊之請此孫覿詞也至是始定乃往青城見二帥迎于門上設香案望金國設拜以表授尼瑪哈受之相揖而入御馬行於前二帥次之遂入殿講賓主之禮相遜再三上卒就主位酒三行移時而退聞尼瑪哈語云三太子見在西京衛護靈寢無它虞金人以甲馬往還裹送遣蕃官五人送入內宿于朝堂始上亦以金銀十六擔縑帛五十牀金玉帶各二為贄而彼供給亦良厚下至從官飲食頗各豐腆於是令百官士庶詣軍前謝二元帥民間獻金帛牛酒者相接于道僧道富民借黃門諸門作功德報大金國相元帥皇子元帥全活生靈之恩大金皇帝聖壽無疆遣中書侍郎陳過庭繼往河北割地以黃河為界金要江東江北守臣子弟同往遣簽書樞密院曹輔迎接康王金人堅欲上皇出郊再三諭說方稱皇帝仁孝乃免又云上是日與尼瑪哈阿里貝相見于齊家園署相見之初尼瑪哈先遣人將齊宫上鴟尾用氈裹然後香案上望西北拜左右無不欷歔上遂與國相二太子同坐上為主國相二太子次之宰相親王並列于庭下酒三行俄頃遣人奏知皇帝日已晚城中軍民不安可早回駕遂與二敵帥送上馬初見尼瑪哈作二表皆孫覿秉筆云社稷不損宇宙再安尼瑪哈抹大金二字止欲稱皇帝又欲易宇宙二字云大金亦宇宙也朝廷皆不得已而從之和議之後二太子遣國相持書云既往不念故無可言事至于今良為驚悸康王見在河北便可遣大臣一人同使命喚回來未審聖意如何凝寒善保壽祉其書不書名三日上御祥曦殿百官始造朝敵索全城騾馬開封府奉聖㫖應在京見任除職事官留馬一匹外並赴開封府納限三日敢隱留者全家軍法告者賞錢三千貫於是自御馬而下得七千餘匹歸軍前內班直禁軍自控納之甚有愧色敵帥差官檢視諸庫取絹一千萬匹既而又索采縀如數不要紗右司員外郎司馬朴著作佐郎李若水以奉使和議皆還為侍郎若水吏部朴兵部上既入親從三百餘人皆為敵驅去使跪膝青城後久之乃赦望金國拜謝分配諸蕃寨王時雍兼領開封尹翌日詔不施行梅執禮罷領尹依舊賓客上朝太上皇帝于延福宫悉屏去從衛以何㮚從是日晴百官入內起居敵使四人從駕入城者索蔡京家屬詔遣慕容氏并蔡攸續來取李綱吳敏徐處仁王安中劉韐童師易并蔡靖滕茂實陳良嗣張孝純家屬四日開封府榜盡數于戚里豪富之家根括金帛赴納何㮚率百官父老僧道等詣軍前謝早至南薰門薄晚方有蕃官傳令國相元帥指揮日晚道路逺涉不煩出城令各齊心發願願大金皇帝萬嵗乃謝而退少頃御史臺傳㫖應在京職事官並赴尚書省聽候差使五日金人于城上密栽松柏及實排㭬木應守禦之具悉移內向遣使八人入城自此皆宿都省或朝堂不復宿都亭驛矣吏部差文武官各二十員隨金人往可河交地每州各一員中書侍郎陳過庭為交地都提舉尼雅滿有書到御前其略云往事不足深念但遣近上大臣迎康王云云無名六日將內外庫絹盡數令禁軍送之軍前自此數旬不已退回汗損者甚多有詔撫諭四方由軍前差人裹送以出詔曰大軍登城斂兵不下朕親出郊見兩元帥和議遂定宗社再安生靈獲全恩德厚甚四方恐隔絶日久未免疑惑仰諸路監司守臣速行撫諭兩日金使巡視府庫已封內藏左禦軍前器所王宗濋罷殿帥差橫行指揮使左言權領先是城破殿班作亂獨言出力遏之故有是除仍詔授防禦使矣七日敵于城上悉栽松柏及皮籬巴覆以棘芒聖㫖諸軍僞作蕃裝劫財物者限十日賫贓自首與免罪仍令五家為保八日議定金主號為崇天繼統昭德定功修文成武光聖皇帝敵使檢校內藏左藏元豐大觀等庫緘封之九日敵使索米麴各千石與軍前醴酒軍前推馬及割地使陳過庭出門又要折彥質文吕申家屬夜有使須索金銀語頗不遜十日詔遣使臣撫諭諸路復遣中書侍郎陳過庭僉書樞密院事曹輔宣諭康王議事十一日聖㫖吏部差在京朝官三十六人轉三官借寺監承赴軍前交兩路地界并取三十六州太守親同往為質詔吏部尚書王時雍同開封府尹徐秉哲分東西二廂四少尹十五卿五郎官編詣在京根括金帛出二榜其一云曉諭戚里權貴豪富之家竭其家資赴府送納如敢隱匿窖埋諸色人許陳告三分支一充賞犯人重行發配知情藏寄之家依此其一云大金既已登城斂兵不下保安社稷全活生靈恩德甚厚今來公私所有本是大金軍前之物義當竭盡以犒設大金軍兵自皇后家為頭又奉聖㫖有能率先竭財犒賞者令王時雍具名聞奏當優與官爵限三日具所有送納或敢隱匿並正軍法捕奴婢笞擊問之以王時雍兼開封府就本府治事免致官吏分擘不前差祠部員外郎惠柔民部絹納軍前分三門出敵各以官受之南薰門四百萬匹東水門鄭門各三百萬匹十二日斬行門指揮使蔣宣李福虞萬于市先是二十五日城陷是劉延慶劉光國出衆以為車駕已行矣望日大臣請登宣德門撫諭以安衆既妄傳二十七日在御樓方下踏道間蔣宣叩馬請車駕由左掖遽出以避冦既而宣等立馬祥曦殿前邀駕播遷遽甚上曰將我何之宣等云為官家奪得一線好踐路這裏不是官家住處祥曦殿門閉宣等以斧破之門外內侍梁揆等被殺者十七人上大驚復入內庫劫金寶而去至是詔宣等棄市十三日遣軍人百姓般絹赴南薰門納凡一千萬匹又遣使表欲割蒲解許之先是軍前諭意金帛不前初十日定下城故凡百應副莫敢少緩絹般去屢有換易悉要山東河北者朝廷以酒肴等遺受納蕃官無算兵士有屢般力乏惰而擲于敵人前者敵衆徐謂曰莫是國家得汝力助敵遣南京尹胡直孺入城聞聶昌卒先是十一月金人長驅駐軍懷州不行者十餘日乃遣太師王汭楊天吉持誓書來朝王汭楊天吉云兵臨大河去國城咫尺間兩國戰爭纍年生靈塗炭之久此緣小人用事起此兵端今欲休兵講和以誓書遣臣等來復兩國之歡好止求割故地以河為界上不得已從之王汭曰今陛下敦信許和乃兩朝士民之幸然未知陛下遣何人報聘上曰待擇人王汭春秋時議和還師以三鎮為約陛下遣張邦昌路允迪割地皆臨期驟進銜命而往果見中沮遂有失信之事所以至今傾國而來蓋要理會今春不割地失信公事也今陛下不輟左右親信大臣一往若如前舉必不取信金國汭等固必看陛下如何耳上命唐恪等議遂以門下侍郎耿南仲同知樞密院聶昌聘焉是月二十二日受命昌入對曰陛下委臣使事臣不敢辭但臣短見深恐許和割地之後金人失臣復來臨責若止傳國書為無益且兩河之人素徑至如太原守孤城經十年隆德破而復守人人戰死者蓋不負祖宗積德之靈陛下恢復之志而今也下太王遷邠之令用保生靈苐恐彼方之民深戀國恩不忍從敵則未必可號令也不從則臣必為金人所執不能為陛下努力則臣死不瞑目矣臣若詣軍前議和不成戎兵南渡乞以便宜分遣徽猷閣直學士參議官劉岑朝大夫幹辦官滕牧分路催勤王之師入衛亦臣區區之願上曰甚好當降指揮昌曰一降指揮必喧傳喧傳則泄漏泄漏則機事不成矣只乞降下密記淵𠂻上遂命取黃絹御書賜昌曰聶昌議和不成戎師南渡取普絳路入京兆率先請路人馬入衛王室劉岑滕牧取嵐憲路催促陜西等路勤王軍依奉使法內滕牧與除直袐閣體念宗社朕不敢忘靖康元年十一月二十二日御押付聶昌是夜昌同官屬出宜秋門宿瓊林院明日行至望京橋逢遊騎二十七至永安軍夜半過尼瑪哈中軍約明日相見尼瑪哈隨行至閣門明日盛甲兵之衛接見使人其閣門舍下立曰徽傘用榜子贊名引見國相昌曰國相者金國何官也舍人曰宰相元帥昌曰既為宰相元帥乃金國之臣昌亦南朝大臣止當以敵國臣子客禮相見豈有南朝大臣以臣禮見大金之臣乎舍人曰樞密寧不畏死昌曰主憂臣辱主辱臣死死不足畏節不可屈爭之移時時尼瑪哈既不能奪乃以客禮接見于氈帳中往返議論者終日尼瑪哈云我兵已南渡且到城下誤樞密割地回日此方旋師蓋以南朝曾失信也昌曰皇帝仁聖未嘗失信于天下頃以童貫王黼茍義忘利失信大遼致今日國家有意外之難非國家失信于大金也且國相今春歃誓結和勒兵不渡今復背約南侵非金國失信耶尼瑪哈曰不敢廢和議止候得地昌曰被命而來不敢輒意若國相兵不北還昌雖死地亦不敢割尼瑪哈大怒入後帳中約退昌昌歸館不給食者一日加甲兵圍其舍二十八日以太師楊天吉擁千兵館伴往河東太師王汭以千兵館伴耿南仲往河北二十九日昌北行不得復見尼瑪哈至閏十一月初四日至澤州昌召參議官劉岑幹辦官滕牧出臨行親得御札具說前降之語曰當與公等誓死成事是夜召金館伴太師楊天吉曰國相待昌之還方肯歸師臣子之心急于星火奈以道路遙逺莫得疾走欲分遣屬官往東路昌行西路㑹于河中不二十日之間此事畢矣庶得國相早肯班師楊天吉等曰謹諾遂分差敵使王敞郭天信以五百兵館伴劉岑滕牧往河東楊天吉親伴昌行其議遂定明早分路而行十二日昌至絳州城下城門不開郡官逃盡惟有監倉趙子清者領州事郡人聞割地大怒出兵掩殺是日昌遇禍十二日也十四日兵馬大元帥皇弟康王如大名府十五日申時禮部火延燒刑部及曉方息開封府等處鉛金銀共四千萬是日火自尚書省延及祠部吏部刑部十六日立春上遣送土牛條杖往二壁尼瑪哈不受傳語趙王不用許多禮數又遣使語二帥欲開諸門令細民樵採日給尼不可曰且令拆屋燒語類此凡遣造敵壁議事多不得見二帥或踞坐帳中使甲士執引使者趨拜廷下司馬朴使之問其族曰先祖太師丞相光帥曰賢者之後乃稍加禮金人歸胡直孺及其二子有㫖許民于艮嶽採花亭榭為薪敵薄城以來每夜日晡輒鼓鼙四發及得城復擊于城上謂之平安鼓城中牆屋皆震聞者不聊生自是間一擊之不復如往日也皇弟大元帥康王次大名府聖㫖凡虜財物不自首為獲者族誅近鄰不首准軍法軍人作過統制官不覺察除名勒停以有詐贓人作過也十八日詔瑤華宫人遷居延寧宫二十日雪移金帛于市易務受納二十一日雪毁拆艮嶽亭榭爭奪死者千餘人百物踊貴死者甚衆遣使往軍前稟金銀數是日萬嵗山屋摧壓死者四十餘人二十二日至二十三日大雪及尺餘至夜方霽街巷死者甚衆曹輔軍前回去至曹州不見康王一路金銀連營觀文殿學士提舉西京崇福宫徐處仁牒以東道總管胡尚書兵潰不知存亡令准漸監司權上件職領兵赴援兾安王室當所見起發前去會議施行二十四日開寶寺火差祠部員外郎喻汝礪毁髙俅賜第鬻其材于民尚書省榜連金人書云十二月二十三日固倫尼伊拉齊貝勒副元帥皇太子元帥謹致書于大宋皇帝近日差官入檢視府藏承庫藏劄目絹一色約有一千四百萬匹于內唯取犒賞所須一千萬匹今承來示披尋深意恐似百方取索假以為辭於理未若此者初欲破城時本擬縱兵但緣不忍以故約束今來賞勞諸軍議定合用金一百萬錠銀五百萬錠縀子依絹數不限官私早望應副見在庫絹雖見有餘惟取所須此金銀縀子亦係所須之外亦不必取昨來本府再舉之際纍承示諭當致金帛費耗驗今所諭似謬前言且兾亮悉無用浮詞謹奉書承達不宣謹白尚書省奉聖㫖令出榜曉諭今備録國書在前勘會大金軍既登城斂兵不下保全一城生靈恩德甚厚軍前金銀表段自當竭力應副內藏元豐大觀等庫及龍德寧德兩宫御前皇后閣皇太子宫并臣僚之家已根括數目外大段缺少令曉諭權貴凡戚里豪富凡有金銀表段人户各仰體認大金之恩匹兩以上盡行輸納差王時雍管東北壁徐秉哲西南壁陳求道管東壁王詔受納王及之夏承北壁李佩受納依諸家元納到封頭斤交割赴大金軍前如敢隱留及官吏乞覔并仰一面措置施行比榜出都人大恐差官分詣諸路聞潁昌府破死者大半故老之家盡虜置軍中詔禮刑部遺火人吏自開封府移理獄二十五日張徽免試為中書舍人徐秉哲以根括金銀數目浩瀚乞添差蘇昌時充司録從之金人入國子監取官書凡王安石說皆棄之二十六日開封府榜金銀匹帛限三日盡數送納如有窖藏寄收出限不納之家許諸色人并本家人力女使經府陳告以所藏之物三分之一估價充賞其人力女使著即時令逐取便邵溥應副城南蕃官博尼聞其國相主謀者髙書劉尚侍二太子主謀者劉中及棟摩國王大綱謀事諸帥預事郭藥師已罷兵柄矣其有密謀即各馳馬于空迥無人之境盤旋數刻而後反其衆不議以髙下皆環坐一室盡畫字于灰以定可否不復聞其密如此是日輸絹數匹敵賫香詣文宣王武成王祠及相國寺二十八日開封少尹榜許中下户以金銀聽入官中並無阻節范寅敷事往來催促四壁專括金銀東壁受納官王紹罷差職方王雩駕部陳芾疾速前去管勾矣敵取祕書録及所藏古器二十九日元帥康王如東平府先是辛丑壬寅年朝廷新得燕山調河東京東京西之民轉菽粟金帛器甲往燕山絡繹于道而燕山初定盜賊不可勝數剽劫行李商旅遂絶部押官往往在雄州不敢北去而燕雲兩路官吏散處中國其哨聚之民並引處內地中國之民日夜疑之而官吏亦不復以禮待遇相忿恨數至喧爭至乙巳嵗秋平陽府就糧議軍劉嗣初反殺掠居民轉至懷州城下兵馬鈐轄與兩隊將將與之戰屬沁水暴漲官軍轄判鈐及兩隊將戰死朝廷大發兵擊之嗣初遁歸雲中是嵗正月十九日也嗣初之反晉絳汾路懷衛皆被其害而澤州當郡之中其守髙世由扞禦有方獨不入境既朝廷賞功澤州不預六月末中奉大夫直祕閣霍安國知懷州安國嘗為燕山路轉運判官頗習邊事數為其僚言金人必為朝廷患此州亦不可不備乃計度增城濬濠繕治器甲安國在燕山時郭藥師嘗欲有燕山之地不煩朝廷置帥人不以為然而安國獨深然之乃具以奏坐此放罷幕府撫然以不至若此也十二月童貫自太原府回行李甚遽既渡南乃聞金人已破代州知代州李嗣本降是月九日也朝廷以宇文虛中為軍前宣諭使知懷州而回後數日聞虛中為亂兵所劫僅以身免已而上皇降詔傳位于淵聖靖康元年丙午金人二太子斡里雅布自河北入侵所過不攻城遂進逼京師三月金人河北所入兵退其游騎至衛州尼瑪哈自代州入侵所過攻城既陷代州所至石嶺關將耿守忠本燕人率衆降之金人遂至太原城下知太原府張孝純副總管王稟以勝捷兵三千人分兵為之尼瑪哈引兵出南北關陷威勝軍是嵗二月也敵至隆慶府知府張確憑城與之戰二日而城陷張確死之尼瑪哈進屯髙平縣令朝廷遣簽書樞密院路允迪使金國割三關四鎮之地二月末允迪至懷州盤桓數日金人知允迪出使必欲見允迪而後止懷州士民數千叩閣請允迪至髙平尼瑪哈退北關太原城未破也初尼瑪哈至髙平澤州通判時敦往犒之事既定朝廷以知州髙世由為直祕閣賞其能使敵不至城下也尼瑪哈既過北關于太原城下舊城而居之號曰元帥行府盡限屬縣運芻粟為久居之計朝廷以姚古為河東制置副使古至懷州三月二十四日别將陳迪擒大金所置隆德知府姚璠璠燕人自言糸出潁昌頗有善政潞人喜之二十五日又遣將入威勝軍逐金人所置知軍事古引兵至威勝軍傳聞尼瑪哈將至古一夕遁歸隆德府种師中自河北逐金人出界田土門路入河東金人以精騎邀擊于榆次縣殺師中麾下兵皆潰五月五日也朝廷以知樞密院李綱為宣撫使督諸將救太原又以資政殿學士劉韐為宣撫副使副使中大夫直袐閣范世推起鼎澧兵來河東始為參謀俄為徽猷閣待制宣撫判官李綱至懷州徽猷閣待制樞密都承㫖宣撫司參謀兼河東路幹辦公事折彥質直參謀官四人繼之提刑王以寧祠部員外郎裴廩直袐閣沈琯宣義郎郭直中主管機宜文字在懷州三員樞密院編修官鄒柄田直朝奉大夫韓唯幹辦公事主管文字官趙柟趙戩張叔夜陳湯求梁澤民張牧等數十人又以武功大夫防禦使解潛為置制使代姚古以种師中統西蕃人馬以許季烈為前統制于是解潛屯威勝軍劉韐屯遼州王以寧節制浙兵張灝為察訪使灝孝純之子也與府州折可求等皆屯汾州又范瓊率山東兵以及招到張仙劉浩等屯南北關山間皆去太原府五程約以三道兵並進會于太原城下遣郭執中軍潛引兵先出南關傅于坡上金人迎潛擊之軍大敗潛與數十騎走山間种師中亦敗走所部西畨兵間有一二回者郭執中折彥質與河東轉運使髙衛錢歸善遁至隆德府張灝引兵攻文水縣拔之進軍數十里金人出騎大敗八月七日也灝與數騎走歸于重劫汾州金人兵回遼州劉韐引騎衆取間道欲歸河北路與金人游騎相遇懷州將領王彥隨劉韐軍戰死于山間是時尼瑪哈在雲中留金將尼楚赫大王在太原城下八月五日尼瑪哈至太原至九月五日城遂陷張孝純被擒俄釋之又以為雲中府路密刺殺副總管王稟盡殺勝捷軍三千餘人九月十九日朝廷召李綱回以折彥直為宣撫判官范世雄至龍德州罷歸折彥直至懷州郭執中以宣教郎直祕閣為參謀富直宗以宣義郎祕書省正字為參議宣議郎王弗承恭郎為幹辦公事迪功郎張絳機宜走馬承授王褒往來河東屢言將帥過失召范瓊以寧歸祠俄而以寧罷范瓊赴闕鼎澧路兵三千人在澤州餘懷州朝廷盡罷李綱所遣置官屬以折彥直專主和議嘗棄太原故也又以解潛為參謀又罷之進彥質龍圖閣直學士宣撫副使彥質以郭浩為都統制許大倫副之十月八日金人陷汾州張戩死之十日以隆德平陽為兩帥以懷州𨽻於隆德以張有極為集英殿修撰隆德府安撫使以髙衛為徽猷閣待制平陽府安撫使衛米至平陽而平陽已為契丹兵所破金人進據之矣又以郝愈為河東提舉常加兩路守臣並帶內安撫使十月懷州官因見彥質曰宣撫使兵馬久在城裏困倦甚矣一兩日欲去西山下排隊少令意思舒豁次日遂與富直柔王弗張絳同行欲宿萬善鎮去州二十五日止太行山下中大夫右文殿修撰懷州安撫使霍安國差官應副彥質至山下逢李若水自大金奉使回屏人密語知敵已南向彥質大懼其夜還鎮遂挺身遁歸河陽留諸軍共二萬人在懷州續得省劄云不肯守盟約延遲造師將欲前來河北人民盡許渡河過南居舍林木皆焚燒務令虜無所得次日早懷州得彥質劄子令郭浩許大倫統押宣撫司兵馬來河陽令曹璋都統制鼎澧兵在懷州比及辰時浩大倫亦去次日敵至城外令懷州速降云今已取了晉絳太原且看太原猶自取了則懷州何勞攻也汝且與守臣說令將狀來時尼瑪哈已陷澤州知州髙世由通判吕民中降金傳譯云汝南宋上皇數年前遣人自海上與我大金結盟共滅契丹當時元約九州土地人民歸汝南宋子女玉帛歸我大金及至各自興兵汝南宋並不曾取得九州却是我大金取了燕山府為有以前盟約將士土地人民一齊交割與汝是我大有恩德于汝南宋也既無以謝我遂將營平兩州與大金而營平兩州户口多在汝南宋界裏我為民父母為見有百姓父母妻子離散情實不忍移檄去汝南宋取兩州户口汝南宋都不發遣亦無回文不肯依約我便興兵是時却是我興兵來及至汴城下汝上皇便不坐却太子為主見兵勢懼見攻破遂差使人將三關四鎮之地獻與我大金我信是實頭言語便引向行府至髙平縣見汝南宋差路樞密來我便回去更不侵掠是我又有大恩德于汝南宋也却背盟約密諭三鎮堅守不付又召天下兵援太原今日所以興師師出不可謂之無名我本得一齊都要汝南宋土地又為大金皇帝聖㫖教且以見流黃河為界汝懷州合是我大金撫定去處合便歸降我守臣霍安國遣人再三說諭尼瑪哈以為不若與大宋皇帝商量三關四鎮歸大金每嵗更添嵗幣于事宜足可評薄尼瑪哈曰也得與我三關四鎮每嵗更與嵗幣一百萬來汝且恁地差人去南宋皇帝處說且留軍在懷州澤州之間等汝回已前發去者先鋒難為末一次見苐使却喚回持指揮教不得胡亂殺人使人曰其如禪馬國王右副元帥在河北不知此意若去攻打如何處置尼瑪哈曰容易容易待教說與遂申文與霍安國令申奏朝廷十八日無回報尼瑪哈大怒曰汝南宋恁地無信行從今日以後更有文字來我也不見汝且說與主州一任汝門忠孝出戰亦得守城亦得只我是不得住手攻打也時懷州有正兵千人鼎澧兵三千餘人河內修城破淮備將領武翊郎王英投濠而死尼瑪哈引懷州官立其前先引第一行知州通判鈐轄都監部隊鼎澧路部隊將共一作行次州官一行次監官一行次縣官一行尼瑪哈使番官傳令曰汝許多人是誰不肯降霍安國云安國是宋朝守臣是安國率衆不降又問第一行諸官曰只是知州不降是汝門多不降皆說某等與知州一般皆不肯降又引令與東北望大金拜霍安國曰安國是大宋之臣不曾得趙官家文字不敢拜尼瑪哈令引盡脫去衣服用索反縛又令髙尚書說與其他人曰汝門多是小官不干汝事亦不要汝降各赦罪仍將知州霍安國奉議郎通判林淵武功大夫濟州防禦使兵馬鈐轄張彭年武經郎都監趙士詝毅武郎都監張諶修武郎都監于潛保義郎統領鼎澧路兵馬沈敦秉義郎同統領張行中及南兵部隊將五人同時被害靖康要録卷十
