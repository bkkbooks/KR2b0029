body:
  text: 靖康要録卷六六月一日程振除吏部侍郎手詔朕惟頃者諌省虛位藥石不聞肆求忠讜直諒之士以備諫諍之列朕既虛心無諱矣凡爾諫臣義當自竭體兹至懐自今朕躬闕失其悉心直論勿隠勿避必求實足以稱朕好直求助之意聖㫖道君太上皇帝妃嬪並以龍徳宫妃嬪稱呼聖㫖前降姚平仲立賞告捕指揮特不施行二日右正言崔鶠奏伏覩詔書詔諫臣直論得失以求實是此是陛下求治之切也然數十年來王公卿相皆自蔡京出其除擢居要路以待相繼而用者又充塞乎臺省要使一門生死則一門生生一故吏逐則一故吏來更持政柄互秉鈞軸厯千百年無一人立異雖萬子孫無一人害此蔡京之本謀也安得實是之言聞于陛下且如馮澥近日上章其言曰熈寧元豐之間士無異論太學之盛也此奸言也昔王安石用事除異已之人當時名臣如富弼韓琦司馬光吕公著吕誨吕大防范純仁等咸以異論斥逐布衣之士誰敢為異乎士擕䇿負笈不逺千里游于學校其意不過求仕官耳安石著三經之説用其説者入官不用其説者斥落于是天下靡然雷同不敢可否陵夷至于今大亂此無異論之大效也而尚敢為此説以熒惑人主乎又曰崇寧以來博士先生狃于黨與各自為説附王氏之學則詆毁元祐之文服元祐之學則詆誚王氏之説尤為欺罔豈有博士先生敢有為元祐之學而詆誚王氏之説乎自崇寧以來京賊用事以學校之法馭士人如軍法之馭卒伍大小相制内外相轄一有異論居其間則累及上下學官以黜免廢錮之刑待之其意以為一有異論則已之罪必暴于天下聞于人主故耳博士先生有敢詆誚王氏者乎欲乞下太學取博士講解覆視則澥之誕信見矣至如蘇軾黄庭堅之文集范鎮沈括之雜説畏其或記祖宗之事或記名臣之説于已不便故一切禁之坐以嚴刑購以重賞不得收藏則禁士之異論其法亦已密矣澥言元祐之學詆誚王氏之説其欺罔不亦甚乎欺罔之言公行則實是何從而見也然先王之求實是亦有道矣皇帝清問下民周官詢于衆庶孟子不以左右卿大夫之言為然必詢于國人則實是見矣臣乞以澥所上言章并臣之章垂于象魏掲于通衢以騐國人之論而賞罰之以戒小人欺罔君父者此陛下之福天下之幸也又奏臣近上章論諌官馮澥未蒙施行澥復遷吏部侍郎此士論之所共憂臣適當言責不得而己也觀澥之意不過欲以熈寧元豐之法為治縁澥乃熈豐人材之一也已之説行則身安已之説廢則身危非非為國家忠計此天地否泰所係國家治亂之所自分不可忽也昔在仁宗英宗時選天下敦朴敢言之士以遺子孫而王安石用事皆目為流俗之人盡逐去之乃自為新説以造士號為新美之才新美之才充塞乎朝廷而人主不聞天下之安危元祐之初相司馬光收仁宗英宗時人材用之故宣仁聖烈皇后擁少主不出簾帷而天下治問其四裔則率服矣問其盗賊則消弭矣問其軍士則豫附矣問其百姓則富樂矣當是時天下之勢安于泰山及章惇蔡卞用事斥之于瘴海炎荒之外蔡京隂蓄異圖凶謀益熾于是盡收熈豐時人材用之誘以美官餌以厚禄于是海内小人波蕩而從之萬口一詞迭相倡和為紹述之論以誆惑人主紹述一道徳而天下一于諂佞矣紹述同風俗而天下同于欺罔矣紹述理財而公私竭矣紹述造士而人材乏矣紹述開邊而四裔交侵金人犯闕矣此用熈豐人才之效也譬之治疾一醫治病而瘳一醫治病而壊此賢否不待較而明也且元符末以連年四月朔日食四月者正陽之月也古人所忌詔求直言應詔者數千人蔡京因此以除去異己者乃遣腹心之黨考定之分邪正二等同己者為正異己者為邪澥與京同者也故在正等凡異己者京皆指以為邪陷為罪戾凡數千人近者上皇下責躬之語其言以求直言奪于權臣反歸咎建議臣僚然則前日附㑹蔡京號為上書正等者皆今日之罪人也陛下嗣服之初天下觀陛下好惡是非以卜世之興衰今用蔡京正等之人豈上皇悔過之意天下之士聞之解體矣又奏臣㐲聞前諌官馮澥曾上章疏乞榜朝堂朝廷以為是施行之御史李光以為非繳駁之及光之繳駁也馮澥不敢以自直大臣不敢以為辯寘李光而不用遷馮澥而不詰政刑如此士論紛然且以澥之言為是則光可罪以光之言為是則澥可斥當斥而反遷是謂賞奸傳曰下義其罪上賞其奸上下相蒙難以濟矣馴致其道至于今大亂陛下中夜以思當食而歎未知所以善其後也而臣下不思所以排奸紏紛以寛陛下社稷之憂但襲用前日相蒙之術以嘗試陛下此罪人也它日有論蔡京紹述為是而籍沒之資産可還放逐之子孫可用者矣何以知之嘗試之説行而陛下無與昭奸則何言之不行何説之不入此非獨臣憂之天下忠臣義士所共憂也今臣區區犯奸鋒蹈禍機與陛下言之卒于不勝而自斃也亦愚矣但臣職在言責伐奸邪之謀塞禍亂之原為國家長慮却頋臣之責也且侍從者執政之階也遷澥之意不過欲次補近臣漸當揆路以行其邪説以固其黨與為萬世自安之計此賊臣蔡京之術行之至今天下破壊兹亦極矣陛下尚忍使京之餘黨再破壊耶前車未覆而不戒者有矣未有前車已覆而不戒者也伏望陛下究馮澥之建議李光之駁奏孰是孰非而大明賞罰以示四方使四方曉然知陛下政不容奸則雖隣敵不敢輕中國不然匹夫匹婦忿然有不服之心國威不復振矣取進止上召翰林學士呉幵至内東門幕次中使出御寶封侍御史李光劄子論馮澥推尊王安石之學鼓惑衆心安石置條例司専任己能斥逐名賢任用小人馴致蔡京蔡卞操繼述之説掃除祖宗法度于光劄子後御批祖宗之法子孫當守之如金石蔡京首倡紹述變亂舊章至于今日可作一詔詔曰朕以薄陋紹承丕緒惟祖宗創造區宇重休累洽以至于今其法度條章雖隨時損益凡以惠遺天下者咸根抵于仁義澤施于民淪入骨髓在于後人奉承之不敢有渝邇者蔡京懐詐廋慝妄作不靖凡舊章彛憲肆行變亂挾紹述之言為刦持之計内外搔動公私匱困比歲上皇深燭其奸親御翰墨攘剔蠧弊咸所釐正迨朕纘紹夙夜祗懼嘉與公卿大夫圖惟故實務導二帝三王之常道以協我列聖之心以為萬世之頼尚慮邪説詖行習熟見聞摇動衆心害于國體明示厥指罔有不孚聖㫖應今奏到京勤王文武官未推恩人並與轉一官及五百里外者更與轉一官昨部押文武官如㳂路不曾作過具狀保明申尚書省推恩施行准此三日監察御史胡舜陟言近日邊境備禦之計兵可練也粟可積也獨将為難得用師以将為先而得之至難不可不慮之臣觀自昔以來唐之名將雖多其大者固已功業赫奕其小者亦有名迹可稱當是時搜求甚廣故人材獨盛國家自童貫握兵以來選将必先其家奴其他皆以賄進貨賂公行其門如市至譚稹主兵悉効貫所為二十餘年將由此選能得天下之竒材乎若以今日乏材因謂天下無人不可也但搜求未廣耳伏望詔㫖令宰執侍從以至臺省寺監監司郡守將帥之臣並舉文武官才堪将帥不限人數以聞其人有已試之效即使䟽其迹未經試用即言其才能所長密縣籍其姓名朝廷擇而用之庶使名將輩出如唐之盛奉聖㫖依奏詔以知樞密院事李綱為河北河東路宣撫使時种師中初歿种師道以病告歸謀所以代師道者乃詔綱宣撫两路督将士解圍一日召對睿思殿諭所以欲遣行者綱自陳書生不知兵在危城中不得已為陛下料理兵事實非所長今使為大帥恐不勝任且悞國事死不足以塞上不許即命尚書省出勅令面受綱奏曰借使臣不量力為陛下行須擇日受勅今拜大將如呼小兒可乎上乃許别日受綱退即移疾入劄子乞致仕力陳所以不可為大帥且云此必有建議不容臣于朝者章十餘上輙批劄不允且督令受命于是諌官陳公輔等言綱不當去朝廷上皆以為大臣游説斥去之綱猶不受許翰書杜郵二字遺綱綱惶恐受命四日臣僚上言監司外臺耳目之寄選任非人毒流一路臣擇其惡聲著聞士大夫羞與為伍者言之前两浙運副王仲閎福建提刑俞向新提两浙市舶張鋭皆市井小人性姿駑下貪汙暴刻所至為害仲閎與鋭奴事朱勔贜汙狼籍無所忌憚向則奴事譚稹至于厨傳之事皆躬自監視伏乞斥責施行奉聖㫖王仲閎俞向張鋭並勒停臣僚上言去惡蟊者使無遺孽昨言者以蔡京之壻葉著其甥馮躬厚以京之故皆合罪斥而著自雜學士降待制躬厚自待制止降修撰朝典未盡士論未厭按著市井輕儇綺繒愚騃衆所不齒躬厚止是庸才别無大惡縁京而升亦合隨京而罷伏乞並行落之罷領宫祠加著以流竄之罪收躬厚以任便居住之恩外有劉僴者係蔡攸心腹之人撫背摩足無所不至奸謀詭計多自僴出亦自待制止降修撰據其罪惡亦合依著施行奉聖㫖葉著馮躬厚劉僴並落職五日臣僚上言自崇寧初蔡京輔政有辭舊章排斥異已汲引同類待以不次朝脱冗散暮翔嚴近常情鮮克自重于是枉道求合靡然成風凡所厚善不獨顯榮其身又及其子孫又及其親戚故舊隂相倚重盤根錯節牢不可破二紀之間門生故吏充牣天下然才者少不才者多省事者少生事者多貪殘苛嬈逺近告病此猶非京之本意也察其建三術置四輔疏興化之水修臨平之塔又令許敦仁奏請太上皇五日一視朝當此之時孰不為朝廷寒心幸其族子有所陳告臺臣因之論列其事太上皇雖無納汙猶令整其墳山京之僭心終不肯已又加王安石王爵欲自為階梯衆論喧騰心不自安復封韓琦以塞人言乃蔡確何執中鄭居中童貫皆因之為例封王矣本朝封王者不過國初功臣及后族耳隳國朝之法長奸雄之心京凶悖之情遇事輙發不可一一數也頼上皇聖明不為邪説所惑京知狂謀終不得逞于是結附戚里内侍交通宫禁肆所欲為以耗國財敝民力必欲坐視顛覆以快不遂之意鄧洵武范致虛等託為紹述之言以助京刦持上下而何執中余深林攄薛昂皆其死黨濟其奸謀成其羽翼使不可制太上皇毎下詔書施行善政皆為此輩壅遏是以人心日益愁怨國勢日益陵遲權門日益盛强朝廷日益孤弱趙挺之劉達張康國鄭居中劉正夫雖號與京不同然引用羣小梗閉正路亦率由一道蔡卞蔡攸乃其子弟相與為異有若仇讐考其踪跡實皆同惡相濟至王輔為相奢汰愈甚開邊黷武禍及生靈迹其所來亦本由京勢位相軋乃相攻陷遂致敵人窺伺變生一旦太上皇播越宗社阽危雖其所致非一要之造端立本舎京而誰今京降黜雖屢有指揮然罰不當罪輿論猶欝縱朝廷未欲誅于两觀之下猶當投之海外以示薄𤯝其宗族婚姻因京而至顯官者望悉改正其何執中余深鄧洵武等苐其罪惡與安石等王爵亦行寝罷施行奉聖㫖京攸永不放還如臣僚敢有引薦當正刑章仍報行言章六日聖㫖葉煥政和八年曾進繼明集言朕以嫡長建儲之意兼聞其人明爽有詞學尚居外任監當可召赴闕量才優與擢用監察御史胡舜陟言知徽州唐作求貪汚不法贓賕狼藉民不堪命聖㫖令本路提刑司取勘右正言徐秉哲行左司諌程瑀行右正言監察御史胡舜陟為殿中侍御史張澂為監察御史資政殿學士劉韐除宣撫副使解潛除制置副使代姚古徽猷閣待制折彦質除河東勾當公事與解潛治兵隆徳府七日手詔朕既詔三省樞密院奉依祖宗舊法又命學校正王安石祀典而士大夫未喻朕志熈寧元祐學術政事議者紛然朕頼上皇慈訓開紀年黨籍之禁與民更始蔡京頃唱紹述箝制上下變革之亂幾危社稷艱難至此豈可復循應今日政令朕惟遵奉上皇詔書修復祖宗故事而羣臣庶工亦當講孔孟之正道察安石舊説之不當者羽翼朕志以濟中興播告中外明聴毋忽殿中侍御史胡舜陟言陛下㧞秦元于下僚使提㸃京畿刑獄訓練保甲士夫聞之莫不慰悦葢以元學兵法三十年而深得其要領濵州破賊見于已試若集畿邑保甲使之習勒為有制之兵内衛王室外禦戎冦此誠國之大事今日之先務也保甲職事既專委元措置則今畿邑保甲提舉官自宜减罷若更存留非惟冗長無用亦恐有所妨害伏望睿㫖罷今武臣提刑以保甲屬元庶得專一究其施為奉聖㫖罷武臣提刑先是元任河北河東宣撫司勾當公事繳進所撰師律并大小八陣圖故舜陟薦之詔引見上殿即除京畿提刑復有是命制以皇弟鄆國公楃封安康郡王韓國公㨗封廣平郡王八日制鎮西軍承宣使王禀為建武軍節度使依前侍衛馬軍親軍副指揮使以守太原之功也資政殿學士簽書樞密院事路允廸提醴泉觀聖㫖禮部尚書傅墨卿知舒州聖㫖傳墨卿不可與職名前降龍圖閣直學士指揮更不施行傳墨卿初除知夀春府給事中權直學士院莫儔為吏部尚書吏部侍郎王寓為禮部尚書左諌議大夫馮澥除吏部侍郎觀文殿大學士特進知夀春府白時中提舉西京崇福宫龍圖閣直學士提知拱州陸藻落職提舉西京崇福宫司馬朴富直柔吕俅邢緯張濟召赴都堂審察十日司諌陳公輔劄子臣竊觀今日天下之勢譬猶病人之身有在四肢者有在心腹者守禦失備邊境騷然河北冦難方退河東用兵失利夏人西陲亦或侵擾病亦甚矣然猶在四肢者乃若朝廷之上人主聴言不審大臣用心不公士大夫趨向不一而其病乃在心腹焉四肢疾不治猶未甚害也心腹病不治厥身不可保矣臣冒萬死為陛下言之比者大敵直造京闕諸門不開僅月餘日宗廟社稷危如累卵然人心堅守士氣奮發卒能使畨兵引去國家復存者四肢雖病而心腹無病故也何以言之陛下即位之初求言如不及小大之臣各盡所言而陛下聴之未嘗惑也其言之善雖踈賤之人必以施行其言不當雖狂妄之甚亦不加罪故上下無不通之情朝廷無壅蔽之患今則不然忠言切直而未必信奸言傾覆而未必察真偽不明是非蜂起而陛下愈惑矣前日余應求以迎合大臣得罪不知其所言何事但見應求親為陛下㧞擢毎欲盡忠圖報若或希進以為身謀自當以佞媚之言廹合陛下何乃迎合大臣人情皆謂其不然今陛下又不出其所言明著其罪以釋天下之疑乃隂逐之中外皆謂此大臣欲蔽塞言路耳應求何足惜臣恐無敢為陛下盡言則大臣之忠邪政事之臧否人情之疾苦國勢之安危不得復聞于上矣所謂人主聴言不審者此也陛下即位之初一時大臣固有奸庸不足用者陛下灼知稍稍去之遂乃專任一二忠直之臣彼亦自知委任之專又見國家危急故各盡忠不敢懐私以相擠毁今則不然或以怨忿相攻或以巧説相毁各植私黨不先公家如李綱者其忠勇雖可持而剛愎自用不無過咎故同立不平共相誣譖陛下已疑之矣今更出使将兵宣王時吉甫所以成北伐之功者以内有張仲之孝友也今陛下若以剛為可立功名一意任之如憲宗之裴度固可責其成功但聖心已疑而大臣又無張仲之助則其事有危矣綱何足惜宗廟社稷存亡為可慮焉臣所謂大臣用心不公者此也陛下即位之初凡百政事皆以祖宗為法痛革宿蠧蠲除弊源民心熈熈猶幸及見仁宗四十二年太平之盛而士大夫皆一其所向無敢異議今則不然或欲以祖宗熈豐之法並行或欲以王氏諸儒之學兼用持两偏之説立中道之論如馮澥之徒是矣夫陛下初欲盡復祖宗猶恐有妨太上皇帝所行之事故遲遲未决今上皇已自深悟奸臣誤國盡欲革去前非臣僚乃敢尚挾私意以害公法且王安石開端蔡京紹述流弊至此幾亡天下若非祖宗恩徳及民深厚豈能復存國家今更復為異同之言此何理也臣聞向者太上皇帝初立便欲追復祖宗未逾年聞用曾布蔡京乃至中輟今日思之誠為誤矣然當時之誤天下事勢猶可支持一二十年今若復誤大非前日之比海内窮愁公私困廹國勢危蹙人情駭懼無甚于今日一有所誤立可召亂議論之臣曾不念此可為之太息哉臣所謂士大夫趨向不一者此也凡此三者誠心腹之病不可不治願陛下急治之審于聴言無以言罪人使臣下各盡其所見専于委任毋以邪害正使大臣各盡其公心破两可之見歸于祖宗使士大夫皆一其所向若是則心腹之病除矣四肢之病縱使未去姑少遲之必無大害葢未有能已心腹之疾而不能治四肢者也如其不然則内外皆病矣臣區區小官悞蒙㧞擢舉家數口坐食廪禄非不能以諛佞之言揣合聖心朋比大臣以茍一時富貴自念平昔願希古人事君之忠今在言責若不竭其愚忠少圖補報非特負陛下特達之知亦負臣平生所學矣将何顔面復在人間乎伏望少霽天威留神聴覽臣所有干犯聖聰竄殛之罪實不敢逃惟陛下處之取進止奉聖㫖左司諫陳公輔差監合州酒税務詔京畿提舉教保甲差給事中孫傳激賞官資令提舉官同秦元措置聞奏御史中丞陳過庭奏蔡京之親戚子孫悉加竄責而尚有漏網者京之壻葉著之父劭是也今為顯謨閣待制提舉宫祠唯著及父劭皆以闒茸凢才夤縁超躐内則離間京攸之父子外則沮傷天下之英俊今青天白日之下而城狐社䑕得以茍逃重磔公論不厭奉聖㫖葉劭落職依舊致仕太常少卿許景衡召試中書舎人十一日兵部尚書蒋猷閣直學士與郡龍圖閣學士知洪州郭三益知潭州十三日右司諌除秉哲言竊觀自古帝王之治其隆盛昌明未有不由于果斷其衰微危亡未有不由于牽制葢剛天徳也人君所法者天而已天能剛健故能運四時成歲功天子以剛明故能制羣動役天下成湯以勇智表正萬邦武王以執競而安天下孝元牽制文義優游不斷孝宣之業衰焉唐文宗仁而少斷甘露之事禍及忠良此有國者所當戒也陛下以聰明之資當屯否之運强敵外侮財用内竭官邪冗濫權倖縱横以一身而當無窮之弊躬行恭儉可謂堯舜之用心然雖敵國未賔財用未充賢佞未分權倖尚盛法已行而復變令已下而復反國勢未聞振興士風未聞純一其故何也得非陛下仁恩有餘而剛明未施含容太過而威斷不用耶臣伏覩陛下所立之法所行之令其初無非上合祖宗之制下契衆人之心天下指日以俟太平行未渝旬浸以變更奸宄儌倖自此繼出此臣所以重為陛下惜也陛下苦不自覺耳臣試舉一二為陛下言之二月降㫖曰蔡懋依見任執政例耿南仲賜第祖宗舊法皆無有也已降指揮更不施行天下莫不以為然近者王易簡依簽書樞密院例聶山依尚書例此豈祖宗所有耶三月十八日指揮自今後聖㫖不經由三省樞密院諸司不得便行即時申尚書省審奏葢所以防奸偽也近者後苑造作申稱始聴候申審奉聖㫖依若既已送納復何申審之有撥併御厨舊尚食局膳工膳徒並發遣歸元差處此陛下之儉徳也近降指揮有曰前發遣過人並拘攔依舊令祗應既已發遣復又拘攔臣不知其何謂也楊時等學官無徳服衆並罷别差人填闕五月九日聖㫖也至十日再降指揮楊時罷祭酒外餘學官不職或罷或否臣不知其何謂也昨降指揮戚里不得任職事官乃祖宗法也再降指揮曰祖宗戚里之家聴任或任或否臣不知其何謂也宰執留身奏事非祖宗法也陛下詔曰留一班議者尚以為非既而又詔别留宰相一班則是常留二班陛下若不再御殿百官無由瞻望清光矣所言公公言之所言私王者無私或一班或二班臣不知其何謂也臣僚恩數清給人從各依本法其依某人等例更不施行去歲之良法也並罷恩倖非泛轉官賞賜今歲之聖詔也近者釘𢃄孫端幞頭作李宗周許依果子局趙慶厨子孫和體例推恩既破去歲依例之禁又違今歲恩倖非泛之詔臣不知其何謂也應上書獻頌文理可採等得官並改為進納不得為官户此理之當然前日降指揮令本部且涖授磨勘及赴任又令東南入粟納金者得為官户臣不知其何謂也短使有勞之人裁損其官分為三等大張黄榜見者鼓舞明日收其榜至今不聞施行臣不知其何謂也凡兹數事方其明詔初頒人咸悦服今則已行復改皆失本㫖此葢懐奸之臣撼搖成憲使陛下之法令不為天下取信復蹈前日之轍因緣得逞其私招權而自專也臣又聞臣僚毎論列奸邪陛下未嘗不以其言為然其間章疏有至于再至于三四者陛下終未肯行又擊搏不已僅能去之而已其所與職名所副州郡與自請不異有罰無罰誰復畏忌范睢曰擅國之謂王能利害擅生殺之謂王陛下何憚而不加誅斥耶臣又見自五月甲申至今幾時天變昭著連隂不解冝熱反凉夏行秋令暴雨傾注大傷麵麥考之典籍無非咎徴五行志曰皇之不極是謂不建五事皆失不得其中則不能立萬事故厥罰嘗隂貌之不恭是謂不肅上慢下暴則隂氣勝故厥罰嘗雨聴之不聰是謂不謀上偏聴而下情壅隔故厥罰嘗寒今命令數更國事未定䛕説之言密進奸邪之吏未除閹官漸熾臺諌屢逐聚勇敢而反為盗賊招軍旅而强刦平民奔将不斬逃卒不罪功效未立而先加之以爵罪惡已著而不威之以刑廟堂不同心徳學校交興譏議是謂陽微而隂勝宜其灾咎之未消也臣伏願陛下清心澄慮以静而觀如權衡之設輕重自辨如水鑑之照妍醜自彰因事以覩其所向見幾而作不使其罪至于大不可解因言以察其所存辨之于早無使其滋蔓至于難圖言可行則行無惑于衆多之口罪可逐則逐無牽于異同之論罰若雷霆使聞者不及掩耳賞若日星使見者莫不革心若是則奸邪何為而不畏賢能何為而不進法令何為而不具政令何為而不修上足以弭天變下足以消兵禍矣臣狂瞽之言不識忌諱惟知死節竭誠以報陛下採擢覆幬之徳雖罹斧鉞所不悔焉取進止十五日右司諌徐秉哲奏臣竊見近降聖㫖龍圖閣學士胡直孺移知拱州龍圖閣直學士燕瑛知何陽右諌議大夫楊時除給事中識者閧然且曰陛下即位以來懲革蔡京專政之弊至今數月未得少休今日大臣用人復循覆轍大可駭也蔡京竊弄威柄二十餘年衆人所惡我必信任之衆人所擠我必擢用之専權䟦扈不問是非自作好惡以上皇之聰明為之俯從此陛下所備知也今直孺瑛時三人因臣寮論列而進用之事不異此且以直孺竭两浙與六路府庫之財賦以奉朱勔由浙漕為發運自發運知平江賜金𢃄由平江再為發運使自發運除侍郎燕瑛括二廣與南海之寶貨香藥以賂王黼及羣閹自廣漕除待制宫觀自宫觀為侍郎二人緣是浸浸以至八座其罪兇禍惡臣僚前後疏之詳矣彈擊已至六七陛下不能奪大臣之所主僅能使之補外然尚得龍圖峻秩一知數州一為宫祠恩數與自請無異論者不已二人勉强出京遲回近甸直孺留其子闕瑛留其子似之日造大臣之門毎進見附耳立談移時坐客無不羞駭既而直孺果移拱瑛果得河陽然此特為之兆耳朝夕當復為中都官也楊時年逾七十老無戒得之識日造蔡氏之門追逐其騃子弟遊從于道觀僧舎以幸薦㧞見者無不羞之因緣蔡氏除舘職進侍講遂為諫議大夫可謂峻矣今年春臺諫官集于檢院共論蔡氏之惡時摇手以止同議者曰且無及居安居安攸字也身為諫官不恤公議容奸黨惡畧無忌憚近在太學議論輕脫諸生紛拏幾致生事無徳服人遂罷祭酒言章攻擊自知可羞有辱朝列三乞外任一乞致仕大臣不憤言者攻其同門之人主之益力不容其去因而遷為給事中不獨遷之又并其曾論時者遷之他職以杜其口時自以諌議非所宜居連章乞外今再遷其職而留之是朝廷畧不以廉耻責士大夫其不思甚矣臣竊謂直孺瑛之貪汚無耻時以劣繆之人反得遷擢此正蔡京平日之所優為今日大臣尚可為之乎昔京用人臺諌敢有異論必加惡名以逐之今日大臣未敢誣臺諫而斥逐者正以事陛下之日未久尚畏陛下之剛明而然若玩習無忌測陛下之有容其不附己者當漸驅逐之矣上皇南幸正緣蔡京所誤能不撥亂反正豈可使大臣復如京之専權乎臣又聞近者大臣進用百官毎對陛下託以一才難得為辭盡将平日贓汚累迹之人姓名進擬取笑天下人才不患難得唯患用之不得其術耳昔周世宗累為劉旻所敗遂大燕将士斬敗将樊愛能等七十餘人且一日斬将七十餘人豈復有将可用世宗自斬愛能之後軍威大震果敗旻于髙平取淮南定三闗乃知㢲懦者去則勇敢者來迂謬者逐則才能者進理之所必然也陛下若以人才為難得専務姑息則人才愈委靡而不振孰為陛下任事乎惟其才則留之不才則逐之可用則任之不可用則已之如是真賢實能當自出矣猶之淘金汰沙沙盡則金出若謂金沙混雜倦于淘汰則金與沙俱為棄物此不可不察也如直孺瑛時等正如金中之沙何惜不汰之哉陛下無人言特伸威斷會臣僚前後言章施行禠奪職名投置閒散以慰士論以清流品以警權臣以尊主威實社稷無疆之休取進止讀畢上曰臺諫官為朕耳目皆由親擢卿此劄足見不阿附大臣特除卿諌議大夫勅解潛諸将士等朕以金人犯順俶擾邊陲攻圍太原累時未解肆命卿等率師救援頗聞将士遇敵血戰冒犯鋒鏑奮不須身非忠義所激安能如此朕聞之感欲不忘于中然敵勢方張未即殄滅一方之民久困荼毒重惟國家撫養将士固已有年今日國家有急非卿等盡命竭力所向無前安能使朕得寛憂顧但戰者危事今令卿等挺身冒難以致創殘毎一思之痛苦在己今降賜金一千兩金束𢃄五條戰袍三十領卿可用激賞傷中用命将士将來第功自節度使以下皆為賞典若有竒功便加開府儀同三司朕自聞進師寝食皆廢卿等其體朕懐早進勲烈身取富貴澤流子孫日竚㨗音更豈勉効十六日門下侍郎耿南仲言伏見陛下即位之始謂宫女猥多乃放六千餘人于外而執樂之人咸與或請姑留之宣諭曰樂非朕所好也又有御侍三十餘人葢皆妙麗間選為房院者陛下以曾是道君宫中舊人即與長假未賞見面既又以閒置宫中徒費廪食于是一朝出之靡有孑遺今宫人數百惟各有職掌不可去者存焉政和殿積年所藏珍寶器皿竒異玩好一花一石悉移置龍徳宫以奉道君而邃閣長廊左右舊章蕩然一空前此自景龍門至金水門如夀岳夀庵曲江之類一𢃄佳花美竹不可勝計一日降㫖伐竹為軍器其花木皆折而為薪臣竊以書稱成湯曰不邇聲色不殖貨利以今視古若合符契伏望聖慈特降睿㫖以臣所陳宣付史館奉聖㫖依御史中丞陳過庭言近日除祠部郎中陸守刑部郎官劉仿分任廣東西路提㸃刑獄朝散郎方畧任廣西運判守乃余闕妻兄仿乃劉僴族兄畧與京攸同鄉又蔡氏之族壻平日出入京攸之門交通狎眤結為死黨一旦持節廣南而京攸在韶潯二州似欲與蔡氏為地者成命播傳士類驚愕伏覩近降㫖揮京攸永不放還臣僚敢有引薦當正刑章今此差除雖無薦之實而有庇䕶之嫌如是而欲人無疑可乎乞賜放罷奉聖㫖並依奏左司諌吕好問試左諌議大夫右司諌徐秉哲試右諌議大夫李擢除左司諌李會除右司諌十八日御崇政殿疎决在京係囚聖㫖應支賜賻贈並减半侯邊事寧息日依舊十九日知達州史祖道放罷以臣僚言係蔡京童貫門下賄賂親眤之人貪婪兇暴侵虛百姓故也應安道特追徽猷閣直學士更追两官以御史臺言其身為侍從贓私狼籍生前不曾追奪官職故也二十日御寶批朕託于兆庶之上所頼以共守祖宗疆土者惟郡邑之臣比聞河東尚有弗思體國惟務便私沿檄去官先移家屬有一于此民何望焉朕念今歲之春我實無備故于逃職之吏逭其誅戮今邊計鼎新可以責其固守矣法不可施恩不可再五申三令誅将必行咨爾有官各體予意殿中侍御史胡舜陟言臣自蔡懋知大名府嘗兩論奏以為其人凶悍敢為不義乞賜罷斥不蒙施行今果失軍民之情監司具其過惡始罷府事以趙野代之夫去一蔡懋用一趙野其人才不甚相逺臣又以為朝廷之失也野之才但能工于附奸邪而規進取蔡京王黼李邦彦用事皆能諧麗得其歡心若其他可用之實了無才長方金人侵侮陛下焦勞之時大臣義當體國見危授命野輙乞致仕欲棄君而去為自全之計戴天履地何忍如是李邦彦堅守和議割棄三鎮野亦與謀實欲賣國以結金人按其罪状流竄有餘况可使守陪都乎所有大名尹指揮乞賜追寝仍乞明正典刑奪職罷郡竄之逺方以為奸佞之戒左正言程瑀奏臣聞君猶心也宰執猶之股肱臺諌猶之耳目耳司聴目司視視聴不廢運用股肱無為于中而治者此心之所以為真君也人君亦何為哉相與論治道者臺諌也相與行治道者宰執也天下之理不過是與非天下之事不過利與害臺諌曰是宰執曰非人君察焉果非也過在臺諌不在宰執若以是為非則宰執何所逃罪哉宰執曰利臺諌曰害人君察焉果害也過在宰執不在臺諌若以利為害則臺諌何所逃罪哉萬幾至繁吾之所以用者特在於審是與非辨利與害此以一應萬之要也茍不能致乎此使是非利害灼然胷次則真偽不分朱紫混淆勞神疲神於末流天下之治不可冀矣葢人非堯舜不能舉事皆善罔計其善而説人讚己是謂來諂諛而成暗昧昔諸葛當主㓜國新之際獨總朝政顧何所頼於羣下一旦發敎乃諄諄力求轉相違覆以補廢敗太宗貞觀之治庶幾成康一時輔拂亦少貶矣嘗謂執政曰朕嘗恐因喜怒妄行賞罰故願公等極諌公等亦宜受人諌不可以己之所欲惡人為之使宰執能以此待臺諌人君能以此待宰執天下之治不難圖矣故朝廷之上事無過舉則臺諌何所復言及其有言必與朝廷違異其違異也乃所以相成也惟朝廷不以異已為嫌而事求其當則天下幸甚本朝之盛無逾仁宗稽考治迹葢周成王漢文帝不足進焉宰臣則前有王曾李廸後有韓琦富弼執政則有歐陽修范仲淹之徒由今視之其人何如哉然當時諸臣深達治體朝廷之上既已務和而不務同至於臺諌有所論列不以人微而易之不以意異而詘之惟是之從而議不出已亦不難于改過從善當時議宰執以為奉行臺諌文書是不知此乃諸臣深達治道用心過人者洎王安石用事以來專以摧折臺諌為事然當時人才承累朝養育而砥礪名節之風不衰議論風生以斥逐為榮未有安石下也至蔡京用事師法安石而狠賊過之議己者置之死地臺臣引用私黨藉為鷹犬搏擊正士創置官司冗濫蠶食而諌省列位浸缺弗補惡政弊事流毒四方陛下既親見之臨御以來搜求疏逺讜直之士布在臺諌虛已聴納下詔敦諭是誠有意祖宗之治矣然以臣觀陛下葢喜受人之言未可謂之善用言葢喜納人之諌而未可謂之能從諌用言從諌云者必深思而熟計之當理則行不俟旋踵若受而不能用與不受同實無益也三代以降能用言從諌者無如漢髙祖唐太宗葢髙祖智略初無逾人奮布衣取天下未嘗畫一謀出一計唯其善用羣策非獨張良陳平為之腹心外如酈食其婁敬之徒一言合理信用不疑此所以成帝業太宗脅父殺兄以就大事其天資何如哉唯其樂聞己過有諌必聴始也孫伏伽之徒賞之而使言久之得魏鄭公之意于微辭顔色之表不待力争而强辯此所以躬平禍亂而坐致太平人主誠欲聴言納諌以二君為法可矣陛下天性元良憂勤庶事聴言納諌冝無難者頋尚有媿于二君臣知其所由矣陛下以沈晦為事而有累于明以柔遜為事而有累于斷明與斷两未見焉而大臣承蔡京餘風不能以韓琦冨弼諸人之心為心故臺諌章疏或阻格不行或稽留而不下未閲數月已有擠陷之事如余應求陳公輔者蹤跡外孤志操凛然金兵在郊京師震恐之時執章乞對忼慨論事仰陛下延問開納兵退之後擢為臺諌士大夫方慶言路得人而應求等亦感激奮勵知無不言正道少伸邪人仄目一旦論事稍涉嫌疑陛下未能洞察執政因而擠之是何異蔡京所為哉覆轍在前而蹈之亦可哀己夫任耳目以廣視聴将以運用股肱今也壅閉耳目有傷害之者矣陛下将誰與為治乎臣聞真宗時嘗詔諭諌官御史各令舉職仍令中書置籍記其言事行與不行歲終具奏葢非特稽所言當否用以知其人亦以防壅蔽之患伏望陛下特賜舉行仍内中創置臺諌章疏文籍隨所上録之聴政之暇雍容觀覧不唯有禆治道因考其事有合行而稽留未進呈者特與督責執政庶幾耳目股肱之任不至偏廢而治道可望至于明斷之説臣備員諌省賜對之初已懇懇為陛下言之伏望曲留聖意取進止二十二日宣撫司期是日啟行以事未集乞量展日御批曰遷廷不行豈非拒命乎李綱惶恐入劄子辯所以未可行者且曰陛下前以臣為專權今以臣為拒命方遣大帥解圍而以專權拒命之人為之無乃不可乎願并罷樞密院之任擇信臣委之得乞骸骨以尚書右丞知樞密院事宣撫使告勅繳納上前弗許二十三日詔朕惟金人攻圍太原五十餘日其勢危蹙惟兵與食最為急務而朝廷于此二者措置殊未有方毎有警奏不過督責諸將俾令進師既不益兵又無見糧安能使之必戰既戰安能使之必克近者屢衂其弊葢出于此朕毎一念痛心疾首寝不能安食不知味今聞金人築壘臨城控扼要害援師不可進糧道不可通勢益危逼卿等宜究心悉力廣加詢謀益兵置糧不吝爵賞以勸用命明其政刑以威不恪須管太原日近解圍若稍有悞事不惟卿等辜朕倚注之意朕于負荷之重亦豈敢委法以茍私于卿等哉翼日宰臣徐䖏仁以下待罪二十五日賜御筵餞李綱于瓊林苑二十六日宣撫李綱犒軍訖斬樂州都䕶統制熈河路軍馬焦安節于瓊林苑初安節𨽻姚古帳下在威勝軍妄傳敵兵至鼓煽軍中古退師至隆徳又勸遁去于是兩郡皆驚擾潰散而初無敵兵至是從古還闕綱召斬之開封尹聶山賜名昌初山因賜對從容論申繻對問名曰不以國不以山川以總大物而命之曰山可乎卿其具古者忠臣之名來朕将擇以命汝明日録聞以周昌强直可慕遂賜名昌殿中侍御史胡舜陟言昨降指揮内待領外局職事並依祖宗法度後又有㫖内侍領外局除熈豐窠闕依舊外餘並罷臣竊以所降聖㫖人禀以為令不可前後自相牴牾既依祖宗則熙豐窠闕當罷若依熈豐則有碍前降指揮出令不一人心所疑况祖宗不令内侍領外局為萬世法今使與外廷聯事則必因緣交結招賕市恩宫禁密㫖往往傳漏而城狐社䑕之勢陵轢士夫矣今都水将作監皆有承受官皆非祖宗之制乞賜罷廢奉聖㫖依奏二十七日臣僚上言伏見四月詔書以楊戬李彦之公田王黼朱勔之應奉童貫譚稹之軍功孟昌齡之河防皆蠧國害民罪之大者葢七人皆一體同罪之人今李彦等皆已誅籍沒家産而昌齡父子猶稽二廣之行楊戬之家尚擁萬金之産罪同罰異朝論未厭伏乞早正楊戬籍沒之典速加昌齡殛竄之刑奉聖音孟昌齡責授昭化軍節度副使江州安置孟揚責授海州團練副使池州安置孟揆責授黄州團練副使撫州安置孟持落職放罷楊戬家財令開封府拘收御史中丞陳過庭奏周世宗戰于髙平斬敗将何徽樊愛能等七十餘人軍聲大振如世宗者政事憲度雖未盡善至于用師英决誠可為後世法臣謹按河東制置使姚古雖本将家其實畏懦素無戰功所以登壇持節者唯以名馬寶貨鬻于童貫之門濫被恩賞以至于是然荷國厚恩不思報稱自太原被圍古提重兵于威勝隆徳逗留數月未賞寸進及种師中以忠勇自奮而古違期弗應遂致師中失利此古可斬之罪一也金人方圍太原未有一騎一卒敢窺南北闗自師中失利古輙退師威勝士庶叩馬懇訴願共守禦古乃夜半遁去致使威勝之民扶老擕㓜斃于道路哭泣之聲振于山谷此古可斬之罪二也古既退師其部将又妄言于衆曰國家已割太原與金人我輩可以南歸于是役夫般運糧食器甲及民蠶在箔者悉委棄而去此古可斬之罪三也興師之初有効用十五人直入隆徳縳偽守倅以獻不血刄而得一郡古乃掩其功状不以實奏致此十五人者止于賜帛士氣不揚拖戈不戰此古可斬之罪四也當偽守之在隆徳存恤其民人保䕶其婦女敵鋒敢犯立斬以狥又閉敵兵于他所不許妄出請于尼瑪哈遣還其兵自言先世乃汝潁間人深有効順之志一旦縳至軍中古若如韓信之師左車李愬之説李祐太原之圍自此可解乃貪冒功賞獻囚于朝用心不忠安能成事此古可斬之罪五也人有上賞道中見大刀巨斧凡數十輩擁騎而載婦人者云是将軍寵妾軍中婦人不可勝數人無鬪志士氣不振此古可斬之罪六也古欲退師無以發端忽有統制官焦安節厲聲而前曰敵騎廹近何為尚留于此古既不能斬安節以慰衆心輒從其言領衆宵遁實古之謀假于安節耳此古可斬之罪七也樊何一失而世宗斬之古有大罪可斬者七其可恕乎近日如統制官張師正王從道畏懼逃竄已試之軍法如此特小者耳斬一姚古則主威立斬一姚古則軍聲振斬一姚古則四裔知畏豈但能解太原一方之圍而快隆徳士庶之憤而已哉伏望特賜睿斷明正典刑姚古責授節度副使廣州安置御史中丞陳過庭言房州文學傅亮博通古書深曉時事論議忼慨縱横昨充制置司勾當官未幾以輕儇與陜西監當又改湖南逺䖏掾官當今師旅方興務收羣䇿唯才術有餘者最不可失昨有劄子五本大臣已繳進外如聞更有邊機六十餘事伏乞根尋取索稍加試用勿以輕儇故廢其良䇿伏取進止二十八日御史中丞陳過庭言殿中侍御史秦坦久患心疾難以赴闕供職乞别與差遣奉聖㫖監察御史曹輔守殿中侍御史新提舉福建茶鹽姚舜明除監察御史中書舎人安扶奏奉聖㫖蔡懋落職宫祠者臣竊覩所坐臣僚章疏若止言懋身為舊輔任當元帥方邊事未寧陛下宵旰之時而乃日事燕飲至軍民怨望形欲殺之言已合重行竄斥又况所論詆誣宣仁聖烈皇后道君太上皇帝二罪之重孰大于此按懋所著父確事迹一出私意妄加增飾自古奸臣愚弄矯誣未有敢如此之甚者葢其天性凶暴輕蔑朝廷居之不疑中外莫不憤歎陛下臨御以來雖一夫之寃有不得伸者必為昭雪而宣仁為臣下所誣負謗抑有年矣寧不為之動心乎今懋止于落職宫祠豈足以正詆誣欺罔二聖之罪哉伏乞亟行投竄奉聖㫖蔡懋降充中大夫秘書少監分司南京亳州居住二十八日聖㫖七月一日詣龍徳宫皇太子特令導駕二十九日罷諸州知通𢃄管勾押神霄玉清萬夀宫入銜左正言程瑀奏臣聞人主之涖天下有要道得其要然後無為之治可以坐致否則叢脞而股肱惰萬事隳雖復勞心焦思夜以繼日無益也要道如何吾不任事而付人以事吾不吝權而分人以權是也竊觀陛下即位以來虛中退託委任大臣未賞吝權而任事其日仄涖朝休暇視事者凡相與疇咨延納而已治天下似得其要頋功效不見于前而深憂逺慮之士懼禍至之無日者何哉其過在于任人以事而不責其成功分人以權而不觀其趨向未得馭臣下之方而已夫我任人以事分人以權彼将有或廢或舉或公或私有舉而無廢有公而無私則可茍或反是烏得置而不問哉小則賞罰大則黜陟操是以馭焉此其所以治功之要也陛下自眎今日之治與前日何如哉持茍且之術行姑息之政以節用則浮侈尚多以愛民則凋弊不息官冗而未知澄兵驕而不知制名曰斥逐奸邪而不忘庇䕶名曰愛惜名器而不慎差除凡若此者遽數之不能盡其最急者宦官反側将為變于内而不知分其權殺其勢民庶困耕将為冦于外而不知寛其力結其心未知諸臣同朝奏事留身造膝之言亦賞及此乎其可深駭者視公家之事不同越人視秦人之肥瘠者幾希臣不暇廣指他事姑以李彌大為宣撫及遣人使金國二事明之夫彌大宣撫不知出于何人除命始傳衆固以為不堪其任政府中亦有竊笑之者彌大治行政府自當日與之謀議都堂授以成筭而往彌大指都堂不見也乃僕僕日候諸臣之門乞辭而去未聞付以統戎大事乃如此耳行次大名雖有㫖改命而處置勝㨗軍失所已致生事至于一行官吏兵馬虛費錢糧不知幾何今欲獨歸罪彌大可乎王雲使燕山得金人請和語言入塞七日疾馳至京為金人約遣使人以七月上旬至也陛下命宰執求可使者義當朝受命而夕擇人俾有司為治装督趣上道兼程而往庶無後時之悔迨今半月矣乃始聞得一鄧紹宻不知復幾日乃能北去夫和議成否利害不可具論獨不念燕山之質太原之圍日與死鄰朝廷乃恬不加意動輙稽滯乎陛下觀此則宰執任天下之事分陛下之權果能背私而向公使庶事具舉相與以濟艱難乎臣稽之衆論僉以為徐䖏仁庸俗呉敏耿南仲昏懦加以唐恪之傾險此政事所以日曠敗而不振明主當自知之伏望陛下深惟社稷安危天下治亂之機盡賜斥罷别選英賢共圖大計庶幾尚可救藥昔賈誼有抱火厝之積薪之下而寝其上火未及然因謂之安由今視之火已然矣僅未及肌膚也大臣不早為之所相與持因循茍且之術陛下不加英斷咎将誰執乎臣位諌官之後凢三奏事殿中仰蒙陛下虛懐延問和顔色而受辭感激孤忠誓有以報眷遇今者一朝而請逐大臣亦幾于狂矣雖然為臣計則狂為陛下計則忠狂夫之言聖人擇焉惟陛下曠然厲興衰撥亂之志而明黜陟以濟艱危天下幸甚取進止靖康要録卷六
