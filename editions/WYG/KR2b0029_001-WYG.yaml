body:
  text: 靖康要録卷一孝慈淵聖皇帝名桓道君太上皇帝長子母曰恭恵皇后王氏以元符三年四月十三日生於坤寧殿九月賜名亶授檢校太尉山南東道節度使韓國公建中靖國元年六月遷開府儀同三司興徳軍節度使進封京兆郡王崇寧元年二月改賜名烜八月又改賜今名大觀元年十一月詔曰朕荷天眷祐景命有僕承家之慶是生多男年近㓜學未親師友因嚴以教宜及其時京兆郡王桓髙密郡王楷可於來春擇日出就外學其輔導講讀之官宜以端亮鯁直有文學政事人充選以稱朕意記室翊善可如王友例令王答拜于是以秘書監蔡崈為翊善左司員外郎沈錫為侍講國子司業汪澥為記室安徳軍觀察留後知入内内侍省楊震提舉管勾本位大觀二年正月遷司空武昌軍節度進封定王八月以國子祭酒汪澥為翊善起居郎翟汝文為侍講起居舎人俞㮚為記室俞㮚遷以起居郎石公弼代之㑹恵恭皇后崩至政和元年二月始詔太史擇日以三月己丑出就資善堂聽講讀以光禄少卿李詩為翊善辟雝司業耿南仲為侍講司門員外鄭修為記室甲寅詔宰臣執政官許就資善堂見定王桓嘉王楷王迎揖扵門升堂就坐王西面宰臣執政官東向送亦如之二年九月侍講鄭居中因奏事經筵乞講讀官至資善堂見二王許之四月鄭修卒以左司員外郎張叔夜為記室叔夜罷以符寳郎陳鍔代之三年正月改官制加太保四年二月甲戌行冠禮于文徳殿或云福寧殿先是御製冠禮降議禮局載五禮新儀之首至是始舉行焉三月辛夘詔曰若昔明王誕受厥命建立儲貳以係天下之心朕嗣無疆大厯荷天之休誕育元良是居冢嫡長子桓年逮志學冠于治朝百辟具瞻主噐之長永維宗廟之重父子之恩考循舊章正位東宫明兩作離為國大本可以來春出閣立為皇太子其建宫室設官屬與儀物制度宜令有司討論典禮前期辦具以聞邦家之慶與四海共之十一月己亥詔皇太子慶㑹上夀押百僚班又詔皇太子謁廟特許逐室行禮五年二月乙巳制曰若昔先王必建儲貳以隆萬世之統以係四海之心朕撫世承平念國大本遹追求孝垂裕後昆永惟承宗之艱莫如主器之長咨爾萬邦之有衆聽予一人之告猷皇長子太保武昌軍節度使定王孝友得於天資温良成扵日就出學外傅率履無違既冠阼階其儀可象方景命有僕介夀考之萬年而明兩作離兆本支之百世蔽自朕志格于天心孚告大廷申錫顯冊矢慎乃徳惟忠惟孝欽汝止惟㡬惟康用克相於我家以對揚于休命可立為皇太子仍令有司擇日備禮冊命丁未出閣詔改其閣為府甲寅有司備法駕儀仗列于大慶殿文武百官各服朝服立班于庭執事官入就位皇帝服通天冠絳紗袍御殿皇太子冠逺逰冠衣朱明衣執桓圭以入受冊于庭以翰林學士承㫖强淵明為禮儀使翰林學士王黼撰冊文冊文闕或云劉正夫撰審如是則禮儀使亦當用執政宣和殿學士蔡攸書冊殿中監髙伸書寳禮畢太師魯國公蔡京率百官稱賀訖又詣東宫賀皇太子如故事以戸部尚書劉炳翰林學士承㫖强淵明為賓客中書舎人蔡靖陳邦光並為詹事秘書監李詩為顯謨閣待制左庶子兼侍讀宗正少卿耿南仲為徽猷閣待制右庶子兼侍講秘書少監蘓桓改名􅁮為左諭徳太常少卿葛次仲為右諭徳國子司業曽樹殿中侍御史華崑並為舎人知入内内侍省楊震董慤提舉左右春坊事内侍容機黎景年全淵張彦卿周珣王若沖王珂管勾左右春坊事劉淵為家令皇甫僅為承受丁巳備法駕謁太廟奏免乗金輅及用鹵簿止依常儀乗馬至太廟易朝服行禮又奏乞免宫僚稱臣並從之戊午奏臣竊覩自昔東宫建司設局張官置吏往往竊有所擬無所不備考其執事實無毫末顯是慕為虚名徒費廩食書曰慎乃儉徳惟懐永圖臣立身之始敢不念茲伏望聖慈詳察應東宫官吏不必具備諸司庶局頗令兼攝至於閒徒冗卒舊例有者亦可蠲除務為儉約如此則不惟臣少安私分仍得清心省事専精問學仰副君父教育之意又奏臣昨就資善堂聽讀尋常須候邇英經筵已開方取㫖定日恭惟聖學髙妙羣臣莫及躬御經筵但欲遵承祖宗故事非待儒臣講說脩輔聖明如臣之愚正當力學不可曠日豈應擬視經筵兼臣問安視膳之外遇還府第綽有餘暇必不同往日深在禁嚴出入不敢自便今欲乞聖慈許令每日不拘早晩但稍有間隙即請學官赴㕔講讀所貴為學日益有以副聖慈撫眷之意並從之九月乙酉詔皇太子遇天寧節赴垂拱殿上夀于親王前别為一班家令劉淵罷以梁方平代之六年四月以禮部尚書白時中刑部尚書慕容彦逢為賓客吏部侍郎劉煥給事中方㑹為詹事太常少卿賈安宅為舎人内符寳郎馮楊為家令六月乙亥詔納故少傅恩平郡王朱伯材女孺人朱氏為妃令所司備禮冊命是月癸未親迎癸丑詔自今車駕行幸皇太子免起居從駕七年十月生子為嫡皇孫封秩比皇子以起居郎李彌大起居舎人趙野為舎人彌大野辭以太常少卿柯棐為右文殿修撰國子司業魏憲直龍圖閣專其事八年劉煥方㑹罷以左庶子李詩右庻子耿南仲為詹事宣和元年以秘書少監曽樹祕書監王易簡為舎人曽樹遷以國子司業程振代之至七年李詩卒以禮部侍郎王易簡為顯謨閣直學士充詹事兼侍讀上聪明仁孝好學而善文自以地偪而望崇每懐兢畏講讀之暇惟以髹器貯魚而觀之他事一不闗懐人莫能測也宣和七年十二月皇太子除開封牧二十日差内使梁邦彦黄僅押賜皇太子碾玉龍束帶一條不許辭免二十一日閣分大内娘子用小轎十餘乗入東宫府議事二十二日申時後入内内侍官黄僅傳聖㫖宣押皇太子入殿内續有快行親從官十餘人催上馬入殿至夜不出至五更太上皇帝徑出殿往龍徳宫寧徳皇后出往擷景園改充寧徳宫是日皇太子登寳位先是太上皇帝御玉華閣先召宰執及給事中呉敏等日晡内禪之議已決擢呉敏為門下侍郎草傳位詔召百官班垂拱殿下宣示詔㫖是夕命皇太子入居禁中覆以御袍皇太子俯伏感涕力辭因得疾召東宫官耿南仲視醫藥至夜半少蘓翌日又固辭及即大位御垂拱殿見宰執百官大赦天下宣和七年十二月二十三日庚申皇帝即位壬戌制曰我國家創業守成紹二百年之祚運宅中圖大奠三萬里之幅員施及𦕈躬嗣膺神器永念纉承之重懼劇春氷載惟臨馭之艱凜深朽索矧今邊陲未静師旅方興肆推曠蕩之恩用慰邇遐之望可大赦天下應常赦所不原者咸赦除之制以皇太子妃朱氏可立為皇后癸亥詔越王燕王賜入朝不趨賛拜不名詔梁方平將兵七千守濬州何灌將兵二萬守河津以探報敵騎漸廹故也丙寅詔上道君皇帝尊號曰教主道君太上皇帝道君皇后曰道君太上皇后令禮官討論典禮靖康元年正月一日丁夘皇帝御明堂青陽左个以嵗運播告天下又詔班月朔受百官朝賀退詣龍徳宫朝賀太上皇帝百官班門外宰相執政進見御札朕光膺眷佑寅奉燕詒載惟菲薄之資獲撫盈成之運宵衣罔怠旰食靡遑發政施仁懐日靖四方之志經文緯武圖永康兆民之功式紀初元是新美號庶格神靈之助遂臻華夏之和茂謹王春豈特遵魯史踰年之議遹寧國步蓋將紹周人過厯之期自宣和八年正月一日改為靖康元年布告多方咸體朕意詔曰木從繩則正后從諫則聖左右有訓朕甚慕焉内顧眇躬獲保大器未燭治道若臨深淵思聞藎言以補不逮應朝廷之闕失政事之僻違保邦御俗之方安民禦敵之䇿詢於有衆咸極敷陳惟骨鯁是求惟藥石是用毋或回隠溺於導䛕咨爾忠良竚聞正論至於逆耳而利行朕當舎己以從人雖有過差必無罪譴朕言必信衆聽無疑自今中外臣僚以至民庶並許實封直言得失在京於合屬處投進在外於所在州軍附逓以聞布告邇遐咸知至意臣僚上言一應諸軍坐倉指揮更不施行從之二日聖㫖恭奉道君玉音比以憂勤感疾禱於太清旋日康復方燕處琳館靡有萬幾之繁可以躬伸報謝今春就貞元節前擇日詣亳州太清宫燒香朕祗奉睿訓敢不欽承其令有司前期戒具供頓儲億毋或不䖍御史中丞陸徳先除職與郡徽猷閣待制何㮚除御史中丞國子祭酒謝克家起居舎人唐重並除左諌議大夫中書舎人王雲除給事中侍御史鄭滋除中書舎人國子司業孫覿除侍御史任諒知京兆府替盛章赴闕三日詔曰朕以金國渝盟藥師叛命侵軼邊鄙刦掠殆盡朕在纉承之初敢􅁯付託之重事非獲已師寔有名已戒六師躬行天討将士鋭于敵愾夢卜協于襲祥庶寕邦國之患克紹祖宗之烈應親征合行事件令有司並依真宗皇帝幸澶淵故事疾速檢舉施行聖㫖道君太上皇帝臨御天下常恐一物失所一民不被其澤朕每問安視膳親聞聖訓而臣下務為誕慢蒙蔽四方利病不即以聞比者發自睿㫖親布徳音凡擾民害物之事一切除去百姓伏讀流涕歎息自今仰官司悉意奉行敢有茍簡滅裂懐奸挾情以沮格詔㫖者並重行典憲聖㫖詔命之出以信四方倘朝令夕改人用不孚自今令三省詳議施行不得輕有改易使人心疑惑凡詔勅有不經三省者官司不許施行違者並科違制之罪聖㫖方今軍興應内外官司局所除留後苑作製造御前生活所應副道君太上皇帝外其餘一切依熙豐法合罷者並罷錢物並歸左藏庫送納三省樞密院條具以聞由是凡一百五處皆罷之聖㫖召募武學及第有材武方畧或有戰功及曽經戰陣及經邊任大小使臣及諸色膽勇敢戰之人聖㫖祖宗典訓具存綱紀脩明四方孚信朕初嗣大統當與執政大臣共遵成憲自今除授黜陟及恩數等事並須㕘酌故實進呈取㫖施行吳敏除知樞密院事唐恪除吏部尚書李棁除同知樞密院事聖㫖從官不才者並取㫖罷在外從官填闕宋㬇除徽猷閣待制添差發運使王時雍除戶部侍郎盧益除知東平府蔡脩除資政殿大學士知鎮江府聖㫖朱勔放歸田里王黼責授崇信軍節度副使永州安置李彦賜死王黼李彦並籍沒家産門下侍郎吳敏除親征行營副使許便宜行事兵部侍郎李綱顯謨閣直學士聶山除親征行營使司㕘謀官團結軍馬于殿前司太保領樞密院事蔡攸除恭謝行宫使尚書右丞宇文粹中除恭謝行宫副使廣陽郡王童貫除東京留守奏報斡里雅布兵距河濬州不守梁方平戰衂燒橋而遁何灌軍馬望風潰散敵遂渡河是夜漏二鼓道君太上皇帝出通津門東下太上皇后及皇子帝姬等相續而行侍從百官往往潜遁四日聖㫖今來團結軍兵捍禦敵馬如立到功效並當不用常制倍加酬賞兵部侍郎李綱除尚書右丞東京留守同知樞密院事李棁除副留守是時從官以邊事求見者皆非時賜對綱侍班延和殿下聞宰相執政欲奉鑾與狩㐮鄧遇知東上閣門事朱孝莊語之曰有急切公事欲與宰執廷辨公能奏取㫖乎孝莊曰宰執未退而従官求對前此無例綱曰此何時而用例耶孝莊曰諾即具奏得㫖别對因奏聞諸道路宰執欲奉陛下出狩以避敵果行之宗社危矣且太上皇帝以宗社傳陛下今捨之而去可乎上黙然太守白時中曰都城豈可以守綱曰天下城池豈復有如都城者且宗廟社稷百官萬民所在捨此何之若能率厲將士慰安民心與之固守豈有不可守之理語未既有内侍領京城所陳良弼自内殿出奏曰京城樓櫓剏脩百未及一二丈城東樊家岡一帶濠河淺狭決難保守願陛下詳議之上頋綱曰卿可同蔡懋良弼往觀朕於此俟卿遂詣新城東壁徧觀城濠回奏延和殿車駕猶未興也上顧問如何懋對亦以城濠淺狹不可守綱曰城堅且髙樓櫓誠未備也然不必樓櫓亦可守濠河惟樊家岡一帶以禁地不許開鑿誠為淺狭然以精兵强弩占據可以無虞上頋宰執曰䇿將安出宰執皆黙然綱進曰今日之計莫若整齊軍馬揚聲出戰固結民心相與堅守以待勤王之師上曰誰可將者綱曰朝廷平日以髙爵厚禄養大臣蓋將用之於有事之日今白時中李邦彦等雖書生未必知兵然藉其位號撫馭將士以抗敵鋒乃其職也時中曰李綱莫能將兵出戰綱曰陛下不以臣為庸懦倘使治兵願以死報第人微官卑不足以鎮服士卒上顧宰執曰執政有何缺趙野對曰尚書右丞缺時宇文粹中從道君東幸故也上曰李綱除右丞面賜袍帶并笏上進膳訖再召對於福寧殿去留之計未決也宰執猶以去計勸上詔綱留守以李棁副之綱力陳所以不可去者且言唐明皇聞潼闗失守即時幸蜀宗廟朝廷碎於賊手累年然後僅能復之范祖禹以為其失在於不能堅守以待勤王之師今陛下初即大位中外欣戴四方之兵不日雲集敵騎必不能久留捨此而去猶龍脱於淵車駕朝發而都城夕亂雖臣等留守何補於事宗社朝廷且將丘墟願陛下審思之上意頗回而内侍王孝錫從旁奏曰中宫國公已行陛下豈可留此上色變降榻曰卿等毋留朕將親往陜西起兵以復都城決不可留此綱固請㑹燕越二王至亦以固守為然上意稍定即取紙書可回二字用寳俾中使遣還中宫國公因顧綱曰卿留朕治兵禦㓂一以委卿不管少有疎虞綱皇恐受命與李棁同出治事是夕宿於尚書省宰執宿於内東門中宫國公之行已逺是夕未還中夜上遣中使令宰執供軍令状詰旦決行聖㫖聶山充留守司隨軍計度轉運使五日聖㫖白時中授觀文殿大學士中太一宫使是日道路紛紛復傳有南狩之事太廟神主已出寓太常寺宰相至祥曦殿則禁衛皆已擐甲乘輿服御皆已陳列六宫襆被皆將升車李綱厲聲謂禁衛曰爾等願以死守宗社乎願扈從以巡幸乎禁衛皆呼曰願以死守宗社不居此將安之綱固拉殿帥王宗濋等入見曰陛下昨夕已許臣留今復戒行何也且六軍之情已變彼有父母妻子皆在都城豈肯捨去萬一中道散歸陛下孰與為衛且敵騎已逼彼知乘輿去不逺以健馬疾追何以禦之上感悟始令輟行綱謂宰執曰上意已定敢有異議者斬因出祥曦殿傳㫖宣示禁衛皆拜伏呼萬嵗上復御宣徳門見將士宰執百官將士班樓前起居上臨欄杆乆之復降輦勞問將士令大臣撰数十語叙金人犯順欲危宗社決䇿固守各令勉勵之意俾閤門官宣讀毎讀一句將士聲諾于是固守之意始決聖㫖右丞李綱充親征行營使侍衛親軍馬軍副指揮使曹曚充親征行營副使置司於大晟府辟参謀官書寫機宜勾當公事管勾文字准備差遣統制統領准備差使百餘人選差三省吏兵户房人吏數十人賜銀絹錢一百萬貫匹兩文臣自朝請大夫以下武臣自武功大夫以下及將校官告宣帖三千餘道一切許以便宜從事聖㫖六尚局並依祖宗法七日制曰門下軌三光而遂萬物允資當軸之勲遜五品而奠四方尤賴秉鈞之大亟頒廷號登冠台符起復銀青光禄大夫少宰守中書侍郎李邦彦俊徳明謨宏才逺器學貫天人而守之以虚静之量識窮治忽而發之以忱恂之詞蚤冠掄魁旋持從槖嘉猷婉畫久翔政路之榮偉學英聲寖亞冢司之重粤自定䇿彌見竭誠日月増輝方壯朝廷之勢風塵有警遽深邊鄙之虞盡忠而人絶間言制勝而慮無遺算謝安之矯情鎮物足抗苻秦李靖之料敵臨機何憂突厥國威既振民志以寧是用序陞揆宅之官進貳納言之任文階峻陟井賦陪敦以彰體貌之嚴以示倚毗之厚惟時所望非朕敢私於戲杜如晦長於斷謀坐翊隆平之運姚元崇善於應變永扶康泰之期勉紹徽聲竚觀丕績可特授起復特進太宰兼門下侍郎制曰股肱之起元首庸聞帝舜之歌舟楫之濟巨川備載髙宗之命聿求雋望式賛鴻圗在考慎以惟精顧登庸之敢後誕揚孚號明告治廷通奉大夫守中書舎人張邦昌識敏而器宏才全而學博潔於行已保禮義亷恥之四維端以立朝茂正直剛柔之三徳粤登膴仕亟告嘉猷念天步之方艱憂民心之未定允資厭難尤賴協恭是用擢陞揆亞之崇進貳上台之重仍兼官於鳳沼俾亮采於龍墀并衍爰田申加真食庸昭異數益示殊私以朕初載論相之明為爾盛年得君之寵於戲敉寕中外矯情當慕於謝安鎮服邇遐守正宜師於裴度欽承予訓益懋乃功可特授正奉大夫少宰兼中書侍郎制曰熙朝任相當嚴進退之規明主馭臣宜厚始終之禮惟時端揆翊我初元顧謀國之未臧肆推恩而許罷特頒渙號用亶具僚特進太宰兼門下侍郎白時中性稟中和心存豈弟早通經術藹貢薛平韋之聲晩被眷知居蕭曹魏丙之地方敵騎縦横之日乃廟謀經畧之時排難戎庭懦弱訖成於無斷投閒真館保全實賴於有容賜以安車俾還私第爰念上皇之元弼載憫春宫之舊賓時示眷存聿崇體貌錫隆名於秘殿俾佚任於殊庭拓衍爰田陪敦圭賦於戲叅朱邸之佐嘗克盡於忠規追赤松之逰尚永綏于夀嘏祗膺異數益體至恩可特授觀文殿大學士中太一宫使依前特進慶國公聖㫖令從官舉文武臣僚堪充将帥并有胆勇者以聞是日金將斡里雅布軍至城下屯孳生監差駕部員外郎鄭望之借工部侍郎充大金軍前計議使康州防禦使髙世則副之自車駕御樓之後方治都城四壁守具以百步法分兵備禦每壁用正兵萬二千餘人而保甲居民廂軍之屬不與焉修樓櫓挂氊幕安砲坐設弩牀運磚石施燎炬垂櫑木備火油凡防守之具無不畢備四壁各有從官宗室武臣為提舉司諸門皆有中貴大小使臣分地以守又團結馬步軍四萬人為前後左右中軍軍八千人有統制統領將領隊將等日肄習之以前軍居東水門外䕶延豐倉倉有粟豆四十餘萬石其後勤王之師集城外者賴之以濟以後軍居東門外占樊家岡使敵騎不可近而左右中軍居城中以備緩急自五日至七日治戰守之具粗畢而敵馬至城下八日聖㫖趙野除門下侍郎王孝廸除中書侍郎蔡懋除左丞唐恪除同知樞密院事吳幵莫儔權直學士院金人攻西水門以火船數十隻順汴流相繼而下行營使司募敢死士二千人列布於城下火船至即以長鈎捍禦搭就岸投石碎之又於中流安頓义木及運蔡京家假山石疊門道間就水中斬獲百餘人自初夜防守達旦方定金人攻城北武泰軍莭度河東河北路制置使兼副統制何灌死之金使吳孝民來詔遣李棁鄭望之髙世則同詣金營九日傳報敵攻封丘酸棗門一帶甚急詔行營使李綱往督將士捍禦綱慮城上兵卒不足用即乞禁衛班直善射者千人以從上遣御藥盧端同行傳㫖如所乞兵至門敵方渡濠以雲梯攻城班直乗城射之皆應弦而倒將士無不賈勇近者以手砲檑木擊之逺者以神臂弓弦弩射之又逺者以牀子弩坐砲及之而金人有乗栰渡濠而溺者有登梯而墜者有中矢石而踣者甚衆又募壯士數百人縋城而下燒雲梯數十座斬獲酋首十餘級皆耳有金鐶是日敵攻陳橋封丘衛州等門而酸棗門尤急矢集城上如蝟毛士卒亦有中傷者皆厚賞之上遣中使勞問降御筆褒諭給内庫錢酒銀椀綵絹等以賞將士人皆歡呼自夘至未中間殺敵数千人敵知有備不可攻乃退因遣使隨李鄴請和抵城下已昏黒矣金使蕭三保努耶律忠王汭并給事中李鄴來獻玉帶玉篦刀名馬各一聖旨朝散大夫提舉江州太平觀許翰除給事中十日聖㫖大金所需犒軍等物數浩瀚朝廷雖竭力應副如供祀宗廟器皿亦不敢吝至於親王内外百官之家已行告諭盡數供助尚恐未􅀎供數忠義之民理宜體國将私家所有願助國用者限日下於戸部尚書聶山等處送納朕當與汝等共享安泰令開封府多出榜告諭聖㫖大金國重兵攻打京城欲盡行殺戮般取財物朝廷以生靈為念遣使議和只要金銀犒設人馬方肯退回朝廷將應干官司庫務現在并文武臣僚之家金銀應副外尚未敷數今來事不獲已理須權宜措置庶免吾民肝腦塗地可應在京士庶之家將現在金銀權行借用限日下於左藏庫送納如有隠漏藏匿並當籍沒家財仍許人告以所藏之物給半充賞如納數多當議量度於文武官内安排與理選限不碍正法理為官戶注授優便差遣勅門下朕以寡昧履承至尊任大而守重顧徳弗類不􅀎仰當天意屬鄰敵入犯割地尋盟遽傳多壘於四郊豈特蹙國之百里征求財賄䖍劉邊陲朕甚恧焉延問公卿側席而坐夙夜祗畏不遑康寧思弭艱虞宜從貶損自今月十一日避正殿減常膳冀上天助順萬國効忠交扶不拔之基永厎丕平之治故兹詔示想宜知悉御筆蕃衍宅諸王府所有金銀絹帛並只今交付朝廷以大金所要如違並從軍法是日斡里雅布移軍牟駝岡都城外西北隅地也岡勢隠鱗如砂磧三面阻水前枕霧澤陂即孳生監牧馬之所芻豆山積宣和中郭藥師來太上皇命打毬於此知其可立營柵故敵至徑趨其所實藥師導之北使欲得親王大臣為質皇弟康王請行詔康王及少宰張邦昌同往軍前議事蔡懋充都大提舉京城四壁守禦使従李綱所乞也上御崇政殿引使人入對出斡里雅布之書進呈道所以舉師犯中國之意大抵指陳道君之失聞上内禪願復講和乞遣大臣赴軍前議所以和者詔李棁奉使鄭望之高世則副之是日棁等至金人軍中斡里雅布南向坐棁望之北面再拜斡里雅布遣燕人王汭等傳道語言謂都城破在頃刻所以斂兵不攻者徒以上故存趙氏宗社恩莫大也今議和湏犒師之物金五百萬兩銀五千萬兩絹綵各一百萬疋馬駞騾驢之屬各以萬計尊其國主為伯父凡燕雲之人在漢者悉歸之割太原中山河間三鎮之地又以親王宰相為質乃退師出事目一紙付棁等達朝廷棁唯唯而已是日康王出使軍前十一日中書省劄子應中山太原河間府并属縣及以北州縣已於誓書中議定便令交割與金國若有州府不肯聽從仰將所賜府州令歸金國詔書指揮守臣正月十一日奉聖㫖降詔十二日差李鄴高世則充金人送伴使聖㫖令張道濟於内侍之家共取銀五百萬兩金一百萬兩仍差何㮚周懿文開封府拘收童貫蔡京等家差唐重謝克家李擢師驥於蔡京童貫何執中鄭伸髙俅王憲彭端劉宗元等家并其餘戚里應所有金銀並行直取日下於元豐庫送納若有徇情隠庇或轉為藏隠許諸色人告給半充賞隠藏之人並行軍法聖㫖開封府尹王革為政􅆭酷搆造語言可落職在外提舉華州雲臺觀日下出門本處居住王鼎落職許隨侍梁師成朋輔王黼衆議不容可責授彰化軍節度副使華州安置差使臣日下押出門本䖏交割御筆將趙元奴李師師王仲端及曽祗應倡優之家并袁陶武震史彦蔣翊郭老娘逐人家財籍沒并内侍省官道官樂官曽經入内醫官輦官幕士忠佐并應曽經特賜金銀許繫金帶人及楊球張補姜堯臣李宋寳張師寳李宗振宋暉董庠金銀並仰聶山何㮚周懿文李光只令直取臣僚上言竊見戎馬生郊侍從官義當體國乃者營私謀已圖去朝廷者十已三四班綴空然衆目駭視訪聞禮部尚書衛仲達素與趙良嗣狎昵無間今者忽稱病乞假遂攜家以行工部尚書張勤身為八座乃求淮南幹當公事而去按仲達勤皆險佞不才平日叨竊寵禄當急難之際傾摇人心倡為避兵之計理不可容奉聖㫖衛仲達張勤特除名勒停令開封府差人勾捉前來符寳郎李光除右司諌十四日聖㫖三省樞密院號令所出體統之嚴靡容僣差昔在神祖釐正官制事不以小大並中書省取㫖門下省審覆尚書省施行樞密為本兵之府朕嗣承大統惟懐永圖嘉與輔臣共遵成憲自今除中書省畫㫖門下省審覆尚書省奉行樞密専兵政外一遵元豐官制毋或侵紊十五日太上道君皇帝渡揚子江至鎮江府聖㫖應有官無官諸色人曽經賜金帶並自陳納官顯謨閣直學士聶山試戶部尚書十六日詔曰門下朕祗膺駿命嗣守慶基立愛而始於家用廣儀型之化受社而施於子載圖夾輔之勲眷賢胄之夙成攷彛章而申錫涓辰斯吉渙號其孚皇子髙州防禦使諶荘重而温良愿恭而美秀氣禀乾坤之粹岐嶷得於自然質凝金玉之英聰文敏而寖茂克謹承顔之範甫臨就傅之年兹太上皇之嫡孫寔予一人之長嗣已膺禦侮之寄未疏立社之封寵典有稽僉言來諗是用胙以隰川之樂國將於霅水之要藩貝胄朱綅總中軍之徒御𤣥衮赤舄視亞保之威儀亟陞王爵之崇申衍戸租之富以明天属以厚人倫嗚呼聖人何以加於孝乎朕則身先于垂訓天下無生而貴者爾其寵至而聿修祗服恩榮永綏夀嘏可特授檢校少保昭慶軍節度使大寧郡王十七日殿中侍御史李擢奏乞依近降指揮士庶納金銀數多者先授以官非特示民以信亦可激勸來者奉聖㫖依奏由是百姓王宜王革以下推恩有差户部尚書聶山兼領開封尹試工部侍郎鄭望之特授户部侍郎聖㫖李棁李鄴鄭望之奉使失詞妄許金人金幣並罷十八日聖㫖鈔旁定貼錢並罷依祖宗法諸路贍學户絶田産合歸提舉常平司諸州郡見納免行錢可並罷聖㫖應批降處分雖係御筆付出者並依祖宗法作聖㫖行下常切遵守聖㫖亷訪使者罷其走馬承受公事依祖宗法孟鉞上章薦范宗尹朱夢説聖㫖依奏並召赴闕是日統制官馬忠以西京募兵至遇金人於鄭州南門外乗勢擊之殺獲甚衆於是金人始懼逰騎不敢旁出自京城以南民始奠居十九日兵部尚書路允迪除資政殿學士簽書樞密院事差奉使河東二十日専領收簇大金國犒軍金銀所面承聖㫖大金國兵馬圍京城其勢甚急朝廷為宗社生靈遣使議和須藉金銀幣帛以結盟好金國要金五百萬兩銀五千萬兩今來所斂金銀上自宗廟宫禁乗輿服飾之物盡行剗刷止得金三十餘萬兩銀一千二百餘萬兩數尋津致前去大金為見其數未足復遣使臣諭意難為退軍兼恐兵衆犒賞不均必致怨怒却乗攻城男子盡殺婦人驅虜屋宇焚燒金銀錢物竭底將去今來計無所出遂将前後黄榜並行拘收别出榜文訓諭朝廷廹切之意仰自今月二十一日為頭應執政侍從官宗室外戚内侍官横行并許權繫金帶將金帶納官仍將在家所有金銀盡數赴逐庫送納外其餘士庶諸色人並仰於兩日内罄所有金銀立便送官如有藏匿寄附送納不盡之數限滿並許諸色人告論雖於法許相容隠之人亦許陳告並以所告之数三分之一充賞告及金萬兩銀十萬兩除告賞外仍與成忠郎金千兩銀一萬兩除賞外與承信郎如親鄰知情不告告而不盡並與同罪籍沒家財誣告不實以其罪罪之今來所降指揮事出急切若因金銀不足和議不成遂致家族不保雖有財寳何所用之仰士庶體認朝廷愛民憂國之意疾速前來送納俟事定日等第推恩如敢違㫖定行編配所有金銀綾絹送納州南赴左藏庫州北赴元豐庫州東都茶場州西榷貨務交受靖難軍節度使种師道承宣使姚平仲以涇原秦鳳路兵至奏李綱上奏曰勤王之師集者漸衆兵家忌分節度歸一乃克有濟願令師道平仲等聽節制上降御筆曰師道老而知兵職位已髙與卿同官替曹曚可也于是别置宣撫司都統制應西兵及四方勤王之師並𨽻宣撫使司又撥前後軍之在城外者属之而行營司所統者左右中軍而已二十二日聖㫖今後金國稱呼只以大金為稱合用國字者依自來體例施行更不得以金國為稱二十三日聖㫖借到士庶金銀令拘收籍沒王黼李彦等房廊住宅田土及户絶田産給還願請空名官告補度牒紫衣師號者聴二十五日直祕閣折彦質落致仕除直龍圖閣充宣撫司㕘謀官日下供職開封府奏本府提事使臣韓膺等状蒙差體究王黼所在契勘王黼二十四日至雍丘縣城南二十里永豐鄉輔固邨為盜所殺取到首級申二十六日宰執等裒聚金銀自乗輿服御宗廟供具六宫官府器皿皆竭又送以服御犀玉腰帶珍珠寳器珍禽香茶錦綺酒果之類并以祖宗以來寳藏珠玉等准折復率之於臣庶之家金僅及三十萬兩銀僅及八百萬兩於是王孝迪建議欲盡括在京官吏軍民金銀以收簇犒設大金軍兵所為名揭長榜於通衢立限俾悉輸之官限滿不輸者斬許奴婢及親屬諸色人告以其半賞之都城大擾限既滿得金二十餘萬兩銀四百餘萬兩而民間藏蓄為之一空二十七日勤王之師大集西兵將帥日至又聞金人擄掠城北屠戮如故而城外皇妃皇子帝姬墳墓􅑼殯發掘殆盡李綱上奏曰金人之兵張大其勢然得其實數不過六萬人又大半皆奚契丹渤海雜種其精兵不過三萬人吾勤王之師集城下者二十餘萬固已數倍之矣於是始有用兵之謀二十八日檢㑹開封尹王革言兵曹掾孫恭士曹掾張衮並擅棄官守出城逃竄奉聖旨並特追毁出身以來文字除名停勒恭送桂州衮送昭州編管令差人勾捉管押前去泗州奏承發運使盧宗元所下司牒奉道君太上皇帝聖旨應淮南兩浙州軍等處傳報發入京逓角並令截住不得放行聴候指揮又於正月十四日承恭謝行宫使司劄子奉道君聖㫖杭越兩將將兵江東路將兵及逐州不係將兵及土兵弓手等未得團結起發聴候指揮使喚先具兵帳申奏仍劄下鎮江府揚泗州照㑹如已差發過人數並截留具奏臣等看詳本州先於正月初七日准尚書省黄牒十二月二十四日三省樞密院同奉道君聖㫖除教門事外餘並不管臣等今來所承發運司并行宫使司兩次指揮係是軍期要切利害未審合與不合依禀施行奉聖㫖令依宣和七年十二月二十四日指揮户部尚書聶山除延康殿學士淮浙荆湖制置發運使祕書省校書郎余應求奏臣聞春秋之義大正始克正其始後罔不正始之不正後將若何陛下嗣位之初强敵入犯雖日事守禦未暇施為所尤當正始以示天下曽未踰月其失有七若積日累月萬㡬之微所失可勝言耶雖曰宰輔非才朝廷之過亦陛下之失也臣請陳之陛下踐阼之次日太上帝后之典冊未舉而宣制先立中宫議者謂陛下緩於父母之禮而篤於夫婦之愛若宰執有請是導諛也若出陛下意而不􅀎建明是縱欲也二者無一可此失一也太學諸生上書陳六臣之奸陛下不䏻以義斷恩即賜施行遂使羣奸隨太上東去今召之不敢來責之不即罪可不為深憂乎此二失也金人入犯長驅而南有大河之險以為守禦梁方平何灌各將兵數萬不為夾河固守之計無故退師使敵馳騎直抵城闕陛下驚憂忍垢屈已而與之和二人之罪大矣稽之軍法在所不赦何灌雖褫官自効而梁方平偃然自如畧不施行賞罰功罪如此何以使人必用命乎此三失也人主以論相為職得其人則天下治失其人則天下亂今日所以召亂至此者論相非也陛下中興尤宜慎此初罷白時中繼聞翰林草制搢紳屬望賢相而宣制之日輿論沸騰咸謂李邦彦之空踈張邦昌之庸謬在上皇時備位政府累年曽無一言規正禆補今日之事預有罪焉往事已如此又烏能輔陛下惟新之政乎若王孝廸蔡懋李棁路允迪之進用士論尤嗤鄙之搢紳士大夫豈無英傑而必用次選哉此四失也諌官之職所以輔導人主其任甚重近者至使諫官家至户到捜索金銀使之既非矣而諫官亦受而不辭市井之人指而笑之或曰彊敵在郊事出迫切然君之使臣雖艱難倉卒猶不可以廢禮此五失也梁師成時若愚皆往時奸䛕之甚者罪當誅斥近聞内侍官道觀金銀皆使二人總之又聞臣僚所上書疏尚仍昔弊送文字庫外議咸謂陛下復加信任臣固知其不然而流言藉藉小人因得以濟其奸不可不慮此六失也近日又宣皇子封郡王之制夫以陛下元子禮所宜先而艱危之時宗社未保城門閉拒中外不通未宜急者稍候數日敵退而復命之豈曰後時哉此七失也陛下頃在東宫恭儉之徳聞于天下今事之失中者天下之人皆知非陛下之過然宰輔非才不能輔導已如此而諌臣又噤黙不以聞臣竊惜之臣又閒古之聖賢不貴於無過而貴於改過不患於有失而患於不聞其失故書稱成湯之改過詩美仲山甫之補闕而子路聞過則喜聖人與之君子知過而能改小人則文過而飾非故也兹事既往言之無及誠望陛下考慎其相擇賢而命之兢兢業業日慎一日後有過舉不吝改之以成日新之徳則聖人之道優矣臣草茅一介輒觸忌諱罪當萬死惟陛下赦其狂愚而採擇之幸甚二十九日聖㫖髙衛日下催促沿路綱運發來赴闕宋㬇罷發運與在京差遣責授彰化軍節度副使梁師成至八角鎮卒三十日新除吏部侍郎王㝢奏四壁城上守禦兵卒器仗並已足備而居民烏合無用特用准備臨時搬運矢石而已且令籍定姓名緩急勾呼奉聖㫖權令放散發運司管局文字王以寧進士任申先沈毅並召赴三省審察聶山且依舊管戸部尚書并開封尹職事聖㫖訪聞隨從道君殿前宣撫司等人兵往往拖後赶隊不上因而逃亡者甚多可並與放罪依舊歸元軍収管仍與犒設御筆遣内侍李中正差往東南尋宣宇文虚中靖康要録卷一
