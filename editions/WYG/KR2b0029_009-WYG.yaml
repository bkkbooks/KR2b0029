body:
  text: 靖康要錄卷九十月一日臣僚上言竊聞臣僚論列李綱章疏甚多欲望盡數行出庶四海咸知其罪奉聖㫖並令行出臣僚上言伏見李綱除觀文殿學士知揚州按綱輕脱寡謀强執自任專主用兵之議而元無成算奇畫及陛下命以宣撫之任日兾其有功而前後敗軍覆將非一又耗用邦財不可數計綱之罪而自列矣陛下復加以寵名使守便郡此臣所未喻也又臣僚上言伏見仁祖朝韓琦以直學士經界陜西好水之戰任福劉平等皆没於陣士卒死者甚衆非不知諸將違琦節制致敗也雖善其皆合事機然猶降一官神祖朝韓絳以次輔宣撫西邊而諸將深入荒城卒伍駭擾收罹殺傷神祖非不知絳之推忠盡瘁也雖原情無他然亦罷相止以舊秩出守鄧州葢人君陟降如天夫心雖知其才能之可用忠赤之可倚茍有罪焉不可不加斥也臣竊見李綱勇於報國鋭於用兵而聴用不審數有敗衂其罪亦著矣陛下亮綱用心無他因其請罷加峻職授以便郡於此見陛下厚于記功薄于責過也然綱之所因敗軍覆將耗財疲民非特如韓琦好水之戰敗韓絳西邊之失也安得不加斥責以示懲戒乎臣愚不肖當慕范仲淹之中正仰事陛下非敢于綱敗事之後從而下石也但朝廷典刑不可不正如陛下念綱前日之勞在所記錄察綱今日之敗志在殱冦亦宜黜官降職以慰死事之心為敗事者之戒矣奉聖㫖李綱差提舉杭州洞霄宫又臣僚上言竊謂先王賞罰惟軍政為大葢以戰危事也一有所失禍毒不細故嚴為之戒謹按李綱身為大臣專制閫外而師出罔功當任其咎縱使敗衂不由節制之非則思授鉞之義尚須屈身為國受戮以申軍政豈可復寵以職名優居祠館雖陛下欲曲全體貌然公議不允况今邊徼用兵責諸將論功之日必有所懲乃克用勸伏望再加褫削以正厥罪又臣僚上言昨者金人圍守太原乆而未解知樞密院李綱出總元戎兵甲非不多也郡置屬官凡七八十員抽差人吏凡六七十名能否不辨幕府紛然軍政出于多門臨時漫無成算偏禆不知稟令士卒自相殘賊以守則不攻而潰以戰則未鬭而遁兵卒逃亡金帛散失綱既告罷其屬官或託故差出或隨逐前來各帶劵厯不廢請給所謂法度紀律一切無有以此行師欲求決勝臣未之聞也大帥自當親臨戰陣以䕶諸將決求成功綱坐懐州去軍前凡數百里緩急何以及事其幕府㕘議機宜管勾文字勾當公事等官員數猥衆又多晩進書生綱傲然畧不問其與親密朝夕不相舍者惟鄒柄與張牧而已自餘僚屬將僚惟晨夕一揖而退若有所建明須先禱柄牧為之傳導然後得見故人多怨之卒以無助而敗事況鄒柄張牧白身得官何嘗知軍旅之事綱數十萬之衆而決謀于此二人可謂疎謬之甚聞綱初欲過隆徳柄牧力爭不得往及軍勢稍沮遽督乞去將士忿怒下情不通十羊九牧無所適從太原下數日矣綱在軍中尚不得知何以望其能先事而料敵哉誤國損威莫此為甚昔者曹彬取幽州敗績大謝天下太宗念其常有功於國亦貶為士將軍其部屬至有編配者綱䝉陛下之眷奬亦厚矣宜奮不顧身思所以報今喪師辱國如是之甚罰其可已觀文峻隆宫祠優職非所宜得願賜斥奪以叶師言若張牧鄒柄贊佐誤事亦當追奪前命以明國威以肅軍政奉聖㫖李綱落職依舊宫祠鄒柄張牧並罷見任令别注授差遣又臣僚上言昔漢王恢嘗建用兵之議與韓安國論難往反至于再三漢武從其言用為將軍以擊匈奴師出無功卒從吏議臣謹按李綱首言用兵以解太原之圍凡戰守之策一切聴之不從中覆也而綱方畧乖謬節制無術出師輒敗取輕敵人太原失守天下寒心綱匿而不言近世大將誤朝辱國未有若綱之甚者其奏議有曰若棄太原乞降御筆手詔綱遷懐州弗力救援乃欲以棄地事歸之君父以逭其責懐奸如此且綱妄庸人耳平時諂事蔡京蔡攸結為死黨其為守禦司也京在城外遂以守禦之卒假京給使方君父在圍城之中正賴兵衆以為守備綱乃以資元惡大憝不忠甚矣其逆皇上於南都也與攸耳語移時蹤跡詭秘不可具言迨其還朝力欲援攸亦居政府中外洶洶莫知所為賴陛下察其奸不使入城然後人心翕然以定若綱言遂行而攸遂用其禍可勝計哉今年正月金人至畿甸旋即議和既而勤王之師四面輻輳金人恐懼求去有日矣而三鎮詔書初未與也綱自以和議既成無以為功遂與姚平仲同建刼營之策一敗塗地朝廷不得已遂與三鎮詔書興言及此可為慨然陛下隆寛廣愛薄綱之罪止于罷政而綱遂使其黨張燾馮檝方元若余應求陳公輔之徒鼓惑衆聴唱為伏闕之事幾至大變其初王孝迪斂民之金以犒敵人諫臣論列陛下重惜民財為罷之綱乃斂恩歸已出收其榜以沽小民之譽小民無知以為盡出于綱故伏闕之日聚衆萬餘觀綱處心如此豈所謂善則稱君也哉今秋金人舉兵再犯邊陲首以綱為言嗚呼綱之罪大矣尚以崇階均佚宫祠非所以示懲也伏望正綱之罪授以散秩置之逺方以為將帥失職者之戒仍以綱罪明諭天下以解愚民之惑又臣僚上言所謂大臣者以身任社稷之安危倘輕動妄作懐私誤國豈逃重譴哉伏見李綱本以凡才誤膺器使卵翼于蔡氏之門傾心死黨逮上皇將有内禪之意攸先刺探引綱為援使冒䇿立之功而綱之罪狀有不可掩者臣請為陛下數之太上皇帝心存道奥倦聴萬幾陛下以天子授天寶位臣下何預焉乃敢貪天之功以為已力此其罪一也金人之兵傅于城下逮西京兵至彼且心懼氣懾不敢肆行抄掠莫測西兵之多寡强弱兩軍相持則易于和議矣綱乃妄意一勝逮姚平仲之挫衂使金人復肆虎狼之心其罪二也王孝迪榜取民金寶京都之民為之騷動朝廷大議已定不取于民而綱自出榜文以為己功身為大臣躬至市肆以收前榜竊譽兵民使歸怨於上其罪三也兵既兵動朝廷不得已蹔行罷免為之死黨者黙諭其意力率士庶伏闕乞用李綱脅持君父幾至變亂其罪四也身領守禦不知體國假君爵祿以市私恩四壁之賞太濫幾至數千人而親戚故舊或濫轉官資或白身授官鮮有遺者其罪五也隂與吳敏黨庇蔡氏薦京入對上皇之歸也力引蔡氏俾還京國蹤跡詭祕其遺攸書則有密語不敢忘之説但不知所謂密語者何事其罪六也自謂功多排斥同列任情好惡妄作威福至陛下有唯辟作福惟辟作威之戒其罪七也身為樞輔智術疎淺不能逆詐輒以蠟書付入金國之使王結余覩使金人復加怨憤抄掠吾民而河東河北之冦未平其罪八也陛下以种師之敗没欲遣樞臣宣撫河東而綱輙拒抗君命乞納陛下所與之命以臣抗君㡬于跋扈其罪九也迨至澤孟不務持重以量兵勢惟以軍法督戰遂至解潛之兵潰散卒無尺寸之功而并門失守其罪十也古人所云是口尚乳臭者其綱之謂乎且行軍用兵徒知襲童貫之迹妄自尊大為僚佐者罕見其面獨持淺智不能用賢果致僨敗欲誅厥由咎將誰執伏望陛下早正十罪特賜竄斥又臣僚上言臣閴國之所恃者賞罰也民之所信者號令也若黜賞之法不當于羣心號令之施播告或匿厥指則非所以定國是而孚民聴也臣竊見李綱自樞密出為宣撫其任可為重矣綱天資踈薄濟以凶愎地位尊崇恥于咨訪羣置幕府皆一時趨附之憸人選用禆佐多平日敗亡之冗士圖事揆策既非所長料敵應變又其所短淹留累月縻費國用不可資計卒不能解太原之圍若不究正其罪而顯絀之則非所以定國是也然綱强辯似智敢為似勇竊主威以交羣枉違公道以市私恩故一時小人喜為稱譽每綱之敗則歸咎朝廷以賈衆怨蚩蚩之民輕信易動綱之奸詐何由盡知若不明數其罪而播告之則非所以孚庶聴也臣謹按綱之罪未易悉陳請為陛下言其大者上皇獨決大議傳位陛下蔡攸乃詭傳上皇之命請吳敏有建請之功峻加柄用以庇蔡氏之宗敏固已不勝誅矣綱于陛下龍飛之後乃始引敏以為証責奏疏自云臣與吳敏力建大策贊成内禪綱之欺天罔上抑又甚矣綱之罪一也今春敵騎至城下陛下屈已為民以講和好其使都邑之民輸金幣以助國葢非得已執政王孝迪庸暗無狀掲天榜于通衢肆為乖謬不可施行之論臺諫交章奏劾陛下即罷輸納或命以官或以官屋折還元價綱乃掠人主之美使行營司收榜都人但見李綱收榜曾不知出于陛下也故綱之罷其徒唱市井無賴千百為羣白晝縱殺幾至生事綱之罪二也陛下始降親征之詔燕越兩王上表固請從臣言官亦皆奏疏乞罷親征嚴都城守禦雖殿臣武帥亦以為言又綱言為躬述利害回鑾輿之行陛下俯順羣情豈獨綱之力哉欺愚惑衆妄自夸耀綱之罪三也迨西師四集种師道與諸將駐兵郊外敵營寖懼若綱稍加持重從師道之謀絶其抄掠徐為後圖豈有姚平仲喪敗之禍平仲之戰綱實使之輕舉妄發誤國大計猶復肆為狂誕之言凟亂朝聴綱之罪四也蔡京之棄去君父逃于洪州遣人以奏牘抵綱使之請對綱輒敢為京敷奏京亦恃綱在朝遽至國門以俟召命顯庇元惡負國恩綱之罪五也蔡攸建請上皇為渡江之計日構奸言離間兩宫逮其黨宋㬇傳導語言狂率不遜神人共憤攸既以罪被斥綱為營救綱之罪六也攸在丹陽綱自為城中通書至為諛詞云不敢渝徳又有太師鈞候甚安此中不輟通問之語時京在占雲館也其披冩腹心親密無間一至於此綱之罪七也於乞去之章妄云奉使兩宫協和上皇之于陛下陛下之奉上皇天性至愛本無繊毫之間綱安得此語哉綱之罪八也綱任為元帥偃蹇違命輒取陛下除授兵部侍郎以後誥勅繳納朝廷畧無顧憚綱之罪九也綱總行營專主用兵邇者乃復請卑辭厚幣以講和又請親降手詔棄太原於度外綱之罪十也今勍敵憑陵國威未振綱之誤朝致冦喪師辱命與夫懐奸黨惡之罪已條具于前矣伏望陛下奮乾綱之㫁擴離照之明處之散秩竄之遐方以申邦憲又臣寮上言人臣之罪莫大於貪天之功竊人之財猶謂之盜貪天之功以為己力豈不謂之盜竊觀李綱劄子稱太上皇帝厭萬幾之煩欲授聖子意有未發臣與少宰吳敏立建大策贊成内禪臣伏惟上皇以聖器授陛下蓋知天命人心有所歸屬奮然獨㫁豈假人謀此帝堯盛徳之事也當時蔡攸出入禁中刺得密㫖吳敏李綱欲使二人大用為己肘腋吳敏時權直學士院身在翰林故其意先達綱太常少卿疎外無由以進而綱遂懐此劄子朝路示士大夫人無不見之所論三事内禪乃其一也其詞引唐睿宗始立為皇帝復為皇嗣君東宫事始搢紳見者莫不駭愕罪綱失言由是言之綱豈知上皇聖意哉徒假攸言猶未敢信且首尾兩端今乃敢明言上皇之意未有所發與敏力建大䇿則是誣上皇而欺陛下非所謂貪天之功以為己力乎臣聞善則稱君過則歸已人臣之義也綱劄子曰嵗首太上皇南幸淮浙羣臣亦有勸陛下為避敵之計者又臣躬述利害回鑾輿之行為固守之計臣竊謂固守都城兵民之心也陛下因人心却南幸之議綱何與焉使綱嘗言之亦大臣獻替之常事何必髙自稱譽耶綱又有劄子曰傳檄而二鎮堅守奉使而兩宫協和臣竊謂綱之傳檄必得陛下聖㫖非假聖㫖其誰肯從綱乃自為功何也上皇北歸乃其本志陛下遣迎祗迓禮意曲備兩宫未嘗不和綱乃以為協和兩宫何也此以善自予以過歸君人臣之義當如是乎綱以是數者平居呌呼􅃷耀要譽于流俗于表奏中時發不遜語自比其功于張良劉幽求裴度李泌流俗無不以為然遂以其為國家柱石也大率綱之為人髙誕疎妄足以欺惑愚衆今春敵人頓兵城下綱領行營及京城守禦司屢聲破賊都人遭圍閉之乆莫不喜之使應援姚平仲卒無尺寸之功而國受莫大之辱流俗猶信綱以為能用兵葢其誕妄足以惑之也方敵人邀索金銀朝廷括民間以足其數時中書侍郎王孝迪獨主其事掲榜立禁民甚苦之臺諫論列朝廷遂罷括而民間未知綱乃乘馬徧歴京城自收其榜百姓歸恩于己又使妄言無行之徒馮檝陳公輔輩稱功頌徳奔走揄揚以竊流俗之譽遂率聾俗叩閽喧噪以刦持人主成其私計於是已罷而復用推原其心罪不容誅為臣之義可如是乎今宣撫河東畧無經畫肆意妄作督諸將決戰數路敗衂陛下因其斥罷遂與揚州又與宫祠流俗紛然謂有大功不宜閒廢請降睿㫖以綱之罪暴白于天下奉聖㫖李綱責授保靜軍節度副使建昌軍安置少宰唐恪等三表請御正殿復常膳所請宜允二日特進充資政殿學士提舉西京崇福宫薛昻劄子乞守本官致仕奉聖㫖薛昻許守本官職致仕臣僚上言臣聞天下之言蔡京死黨有三曰余深林攄薛昻皆引致本路同惡相濟始終附會指天誓日而不相負者也京之大奸既已暴露而正典刑余深林攄削奪追貶稍示從坐之罰而獨于昂尚使冒極品之官華峻之職偃然如故今許以特進大資致政寵其歸則何以慰天下之望奉聖㫖薛昂落職致仕又臣僚上言伏見薛昂以特進文階之極元豐未更官制以前乃僕射也國朝之制非厯宰相不除其選重矣按昻天資邪詖學術甚陋其所屬文士大夫傳以為笑崇寧初為大司程文有用史記西漢者昂輒斥落以塗學者耳目壞其心術有識之士為之扼腕元符中嘗上殿乞罷史學哲宗皇帝曰薛昂俗搢紳間至今傳誦平日好事蔡京無所不至舉家為京私諱其名昂語誤及京字即自批箠其口昔之佞人固有嘗䑛痔以媚權貴者矣未聞舉為同列私諱其名者也昂之俗佞一至于此乃以極品得謝實為僥冒伏望削其特進之階以厭公議奉聖㫖薛昂降充金紫光祿大夫致仕五日斡里雅布軍陷真定府金人遣楊天吉王汭來議事取蔡京童貫王黼吳敏李綱等九人家屬詔王時雍曹矇館之時雍議盡以三府所入細增嵗幣祖宗内府所蔵珍玩歸之二帥且河東宿師暴露日乆欲厚犒之天吉汭延領納先取犒師絹十萬疋以行吏部員外郎王及之充送伴官借給事中黄夏卿閤門宣贊舍人趙説充大金國生辰使副徽猷閣待制宣撫使㕘謀折彦質為龍圖閣直學士充河北河東路宣撫副使七日聖㫖月朔上七諸州官朝拜燒香非祖宗法並詔罷八日金人陷汾州守臣張克戩死之聖㫖昨降諸路勸誘人户獻納錢物指揮勿行詔賜奬諭王似以夏賊乘間盜邊能獲其酋長生致闕下勉責功名以副睠矚九日葉煥依舊與郡前除直秘閣宫祠指揮勿行以臣僚言其往進繼明集叙述東宫故實及增置宫僚等事出位而言徼福于後故非靜慎端良之士今既引疾請去可因而許之不宜授以中秘美職故也十日上率羣臣獻壽于龍徳宫十一日殿中侍御史胡舜陟奏涪陵人焦定嘗受易于曩氏郭先生究極象數逆知人事而洞曉諸葛亮八陣法用兵有必勝之理今居河南府樂道潛幽不求聞達自非厚禮招之恐莫能致奉聖㫖河南府差官詔赴闕十二日秘書少監洪芻除左諌議大夫侍御史范宗尹除右諫議大夫殿中侍御史胡舜陟除侍御史殿中侍御史秦檜除左司諫監察御史元當可除右司諫國子司業黎確校書郎胡唐孝並除殿中侍御史王俁宋齊愈並除監察御史左諫議大夫徐秉哲除給事中詔曰修舉政事全藉人才人才之難宜所愛惜豈記以一𤯝遂廢終身除挾奸害政罪狀明白者不任使外餘皆隨才收録勿謂曾經蔡京王黼童貫梁師成輩薦引遂皆屏逐庶使革心應以時用三省及臺諫官深體予意以示至公聖㫖一方用師數路調發軍功未及民力先困若京西運粮每名一斗至用錢四十貫陜西運糧民間陪費百餘萬緡聞之頗為駭異今嵗四方豐稔粒米狼戾今後但可就逐處增價收入不得輕議般運以稱恤民之意若船綱水運及諸州支移之類自當依舊奉使李若水劄子言臣等被命奉使山西皇子軍前管伴首詰三鎮及所欠金銀歸朝官嵗幣四事及見皇子不説頭段事大事也意謂三鎮續到國相軍前館伴無主議及見國相專理會三鎮無一言及嵗幣歸朝官至於金銀不惟不言且深以為諱或言或不言或同或異要之大槩不過此四者臣等熟計之如歸朝官徒費廩祿終不為用玩而留之惟以宿禍前既下詔遣不當復吝况金人以絹書之故堅要此輩以示本朝不復收納且絶燕人南向之念不若與之以中其情臣恐將來數少復别生事端已先説所以損傷之因彼既信而不疑矣故云據見底教過來臣等論歸朝官如此倘春既不與秋亦復然朝廷必謂既已用兵幣何得與然用兵之説歸罪將帥持禮議和遣使不絶初未嘗明與之暌也豈有不與之理臣等恐朝廷惜今嵗之幣但語之以講和之後必不虧少彼意不深校臣等論嵗幣者如此城下所許金銀臣等初不知其的數既見館侍説乃知如此之多遂痛言當初使人不量朝廷有無胡亂許了今庫藏已竭那裏得來彼亦知其無有故云若果是無時以他物準折臣等論金銀者如此三鎮祖宗之地且陵寢在中所係甚大臣等固已恭依聖訓曲致折租之説彼云既割三鎮則租賦自屬大金如何更將來折臣等復以息生靈繼盟好永无窮之利動之而其意確然終未諧契仍云已令王汭將意㫖去也不復如皇子尚有尋思之語去就決擇惟在宸斷區區所見尚恐未盡更望陛下㕘酌王雲劉岑所説揆王汭之情令侍從官以上聚議早為之圖無使長驅深入以成不支之勢則天下幸甚又劄子臣竊見朝廷自來遣使未嘗不以皇子為重國相為輕凡百禮數亦如之臣等到彼兩處備見情狀殆與傳聞不同人但見以皇子係大聖之子族屬為近昨至城下暴聲逺聞矜露其功大有跋扈之勢故特重之然國相為堂叔又為左副元帥位在上論其功亦相等而皇子輕驕頗有易與之迹國相嚴整毎多固拒之詞故皇子要歸朝官而國相不及皇子欲尋思三鎮而國相確然不許皇子索金銀甚切而國相反以為諱嘗以此異同質之于館伴則怫然曰此事一般莫是貴朝看得别其㣲意似恨吾待之有差也又密問其給使人真定寨中者曰此事只由皇子在太原寨中者曰皇子常來此間取稟雖云各䕶其所事然已見有相軋之象前此常聞皇子忌國相下太原而功出已上故有欲和之意今則國相所陷城邑增多而其規模之大事體之重則又過之伏望陛下屈已為民度時用徳均其所以待遇之禮庶使交孚不害和議大計又劄子臣等自深州入金人亂兵中轉側千餘里回至南闗凡厯府者二厯軍者二厯縣者七厯鎮寨者四並無本朝人馬但見金人别營數十官舍民廬悉皆焚毁瓶罌牖户之類無一全者惟井陘百陘壽陽榆次徐溝大谷等處僅有民存然已漢蕃雜處祗應公皁皆曰力不支脅令拜降男女老㓜陵鑠日甚一日尫殘窮谷狀若隂幽間人每見臣等知來和議口雖不言意實赴愬往往以手加額吁嗟哽塞至于流涕又於山上見有逃避之人連綿不絶聞各收集散亡士卒立寨柵以自衛持弓刀以扞敵金人屢遣人多方誘之必被勦殺可見仗節死義力拒彼人真有戀土之意惟河北河東兩路涵浸祖宗徳澤垂二百年昨因用蔡京事新政流毒民不聊生而童貫開邊燕雲有禍披民膏血以事空虚丁壯疲于調發産業蕩于誅求道路號呼血訴無所塗炭桎梏誰其救之陛下嗣位之初力行仁政獨此兩路邊事未已未沐醇醲之澤今敵騎憑陵肆行攻陷百姓何知勢必脅從而在邑之民無逡巡向敵之意處山之衆有激昂向敵之心可謂不負朝廷矣哀斯民之無生服斯民之有義愧起顔面痛在肺肝以陛下憂民之心愛民之切而主議用事之人前後誤國陷之此地可為流涕可為痛哭言而及此實觸忌諱然臣等區區忠孝之心目擊其事不忍不以上聞伏望陛下深軫聖宸薄采愚説下哀痛之詔慰民于既往思救援之計拯民於將來上答天心下慰元元之望取進止十三日臣僚上言契勘東南之民二十年間般運花石繼以應奉百端騷擾中間方臘作過後遭横逆民俗市肆尚未復舊全藉守臣中和豈弟多方巡撫一不得人不惟千里被害竊恐别致生事謹按知杭州毛友疾病之餘精神不寧恣情任氣不循理法下車之始謂杭州會府官妓豈可不滿百人抑勒隊長肆行糾率良人之婦預選者三人其失許于州即收禁于獄遂有自經而死者民間理會田地不問合與未合釐革皆取契毁抹爭既不息莫適為主緣此田地荒蕪無人耕種理㫁詞訟自説偏見冨者與貧訟則貧者得理命官與百姓辯則百姓得理元不問其是非曲直也本州發遣勤王之師友令不得支帶甲錢羣卒呌罵幾至生事近朝廷取蔡攸家財文字到州友曲為稽密報蔡氏使之蔵匿甚喧公論尋常判狀之詞叵耐勿事之語人多傳笑其他怪謬不可槩舉又言友昔治鄉郡有無善狀宜不可復用但以蔡京之死黨吳敏之親戚故敏薦而用之若不竄斥更留在任士民何辜伏乞早賜罷黜奉聖㫖毛友差提舉杭州洞霄宫以葉夢得知杭州十四日詔應進頌賜及第人勑並追奪是日聞真定府陷集從官議棄三鎮於尚書省十五日制右金吾衛上將軍提舉亳州明道宫范納為檢校少傅寧武軍節度使充河北河東路宣撫使詔曰朕通好鄰國屈已增幣無所不至凡所以保守疆土全養生靈敵未退師攻陷城邑毎聞邊報痛切朕心已令盡召天下之兵矣凡屬州郡豈可嬰城自困坐待其斃今仰河東河北諸路帥臣傳檄所部州軍各得便宜行事合縱連横相為救援見便即動無拘于律其見官吏能與鄉里豪杰率衆扞敵保守郡邑大者寵以公爵次者授以節鉞或召用於朝或世襲各宜體國奮然自拔無使鄉里墳墓坐被殘破父母妻子生致離散所祈皇天后土宗廟北顧流涕明告此言忠臣義士寧不動心故兹詔示想宜知悉仍仰宣撫使通行告諭十七日駕幸飛山營閲礟賞賚有差因登北城而還十八日臣僚上言直秘閣徐惕昔為廣西轉運使掊斂公私之物如文犀大貝異香珍貨悉獻于蔡京蔡攸一路受幣而官庫為之一空奉聖㫖徐惕落職追兩官勒停十九日檢校令中書舍人劉珏昨繳連中書舍人安扶論李綱二章引用韓琦韓絳等語奉聖㫖劉珏落職提舉亳州明道宫制曰乃者大將誤國羣議沸騰理宜譴斥書命之職當暴其罪狀明示四方茍懐二心是辜委任具官劉珏自朕初載擢寘詞掖不惟喻徳之義依違顧望首鼠不情援凶邪于琦絳之間復引仲淹而自比始言踊躍自奮有嘉報國之心卒言輕率無謀宜正誤朝之罪操兩可之説無所折衷職在論思不信若此聊從薄罪免所居官追處真祠以訟其過可依前件王雲遣使臣至真定報金人已許和不復議割三鎮止須玊輅冠冕及上尊號等事二十日太常禮官集議金主尊號以翰林學士王寓為尚書右丞副康王出使二十一日李擢為中書舍人二十三日李會為中書舍人汪藻除太常少卿侍御史胡舜陟劄子奏伏見陳遘蠟封申狀稱中山府城下敵寨造攻城具今月九日於寨立起礟竿一百餘座及用大車搬運攻具近城必須旦暮極力攻打欲望朝廷指揮宣撫司火速遣兵應援臣觀遘狀詞迫切之甚恐如真定無兵為援卒致陷沒朝廷安得恬然坐視不為慮乎真定之所以陷實由宣撫司見朝廷遣使講和按兵不動今若天下以講和之故不救中山失中山必矣臣於此懼朝廷為敵人所誤信之而不疑者講和一事也敵兵今日陷太原明日陷真定凶焰鼎熾侵尋而南居然有并吞中原之志初未嘗與我和也但時遣使邀求寶貨且詭詞為順使不為備朝廷便以和好為疑敵雖攻城不敢救援此真墮彼計中也古者兵交使在其間以和好為權宜以戰守為實務今乃朝廷以權宜而廢實務臣竊慮自河以北地土人心必兩失之豈宗社之念即降睿㫖日下令宣撫司出兵應援中山不勝痛心疾首激切之至是日雨氷木稼二十四日金人陷平陽府二十五日侍御史胡舜陟奏漢建武時西域請置都䕶送侍子光武不許唐貞觀中髙昌王將入城西域諸國悉欲遣使奉獻魏徴以為不可太宗從之皆不欲棄蠻夷弊中國也髙麗弊我國家五十餘年矣政和以來使人每嵗一至淮浙之間不勝其擾所過州縣官私船盡奪為用驅村保挽舟一縣至有數百人田桑農業盡廢州縣前期勾集保丁多致凍餓失所㳂留亭館寺觀悉陳設排新所用之物皆出于民官吏督迫急于軍期吏緣為奸民無所訴更有宦官為之提轄事過有需索州縣尤苦之鞭笞取辦于民故淮浙間皆言髙麗一過甚於遭冦朝廷所得貢獻皆玩好無用之物所費皆帑藏之寶民之膏血近日賜予尤加優典所費不貲而又有一路餽遺燕勞之用約數十萬緡髙麗人多唯欲數至臣不知朝廷蠧國害民以待此小醜果何用耶又有為害之大者彼昔臣事契丹今必事大金矣二敵能制其死命而我無如彼何故畏敵而不畏我所得賜予聞與敵分我之山川形勢兵旅衆寡財用虚實往往窺測以報敵人如此不惟有所煩費實養虎遣患豈非為害之大者乎臣近見兩浙中路髙麗人使入朝非乆到明州臣恐復如前日騷動淮浙耗蠧邦財今日聖政一新悉革弊事以撫養我赤子伏望陛下以漢光武唐太宗為法勿使入朝實國之利如使人已到明州止令本州遞表入進遣還使人大率髙麗人入朝于國于民有害但于州縣贓吏管待小人有利焉臣願睿明察此去數十年之弊政以慰天下企望之情奉聖㫖依奏二十六日左丞王寓憚逺行以夢誣証上乞免行上震怒責寓閒散安置新黜其父易簡宫祠擢馮澥知樞密院事代寓新除右丞司諌元當可為鴻臚少卿侍御史胡舜陟奏伏見陳遘蠟書其詞哀切守城真定被屠戮生靈不知其幾萬人敵據髙城愈難追逐臣等讀之流涕竊歎朝廷何忍其如此未嘗遣一兵一馬為援也李􅊬三四十狀奏陳畧不見報朝廷豈惜土地不愛人民但以與敵講和不敢動兵豈非失計甚耶臣等請為陛下言之古者列國兵交使在其間推論利害釋二國之患是以息兵而貴和今敵遣使來而我使亦往彼此按兵不動乃所謂和也然敵人用兵不已今日陷一城明日陷一邑侵尋而南有并吞席捲之志時遣一使邀求寶貨詭詞為順使不為備我使之往脅之以威不得吐一語但以敵人甘言奏聞而朝廷不察其情偽便謂和議已定宣撫司見謂講和如此亦不遣兵援救真定以至破亡陳遘所以言被受和議之使留置寨中而任意攻取無人援解彼何計之得而我何計之失也今中山城下敵朝夕必攻城矣若朝廷又以講和之故不令宣撫司應援必失中山失中山則河北諸郡不攻而自下矣失河北則京師不可都而宗廟社稷危矣陛下何得不以宗廟社稷為念乎遘又言彼既攻城殺人放火而我師援之理不為曲朝廷若任諸鎮之存亡不復顧恤州郡更無可論猶欲保全伏乞追賜指揮宣撫司火急遣兵遘之言如此可謂切矣陛下若聴大臣之論謂既講和不復應援則非為宗社之計苐恐土地人心必兩失之若大臣今日無以為援臣等以為河北之民兵也使諸郡縣傾廩庫與民共之朝廷以好爵縻之何患人不為用但在措置如何耳遘乞宣撫兵自深兾來會合馬忠兵宣撫兵擊其西祁兵擊其東中山兵兵為内應則轉禍為福易敗為功其言似為有理伏望陛下詔三省樞密院日下詳酌施行取進止二十七日聖㫖吳幵避事特降三官制曰越疆出使乃朝廷之選賢受位忘家葢人臣之盡節不勤國事宜正官刑翰林學士承㫖吳幵侍從老成文章重望朕于纂承之始屢罄忠嘉適此多難之時可辭往使念闢國百里之計感和戎五利之謀十萬横行乃信樊侯之妄五千常勝更覺臧宫之非欲罷兩國之兵宜煩一介之使而賜對便殿宣諭至情不聞力疾而請行乃願養疴而自便姑從降秩以示寛容往省前愆力圖後報可降授朝奉大夫餘如故制曰御國必始于齊家首重婦官之選尊母葢由其子貴兹為人道之常眷言邦媛之良夙被親閒之遇生我介弟時作賢王方抗節于修塗宜疏恩于慈壼詔示羣辟揚于大廷龍徳宫婉容韋氏淑慎無違溫恭有恪思女美之悦懌居自敇以箴圖致婦順之明章動克循于環珮善慶所積休祥是膺蚤毓天材乃藩帝室顧復素厚曾無驕侈之風訓誨甚勤果有終溫之氣如江夏厲賁育之勇如任城慕衛霍之功屬鄰封之講和越諸臣而請使朕敦手足之愛念逺涉以出疆肆推典策之榮庶少申于陟屺是用進位四妃之次敷教九御之間實亞軒龍有華褕翟揆徳斯稱作命維新嗚呼兄弟之助急難將見開元鶺鴒之頌后妃之念行役勿忘周南卷耳之詩其茂對于寵光以永綏于壽嘏可進位賢妃二十八日知潁昌府曾開言近緣職事與西道總管王襄措置不同又頃任中書舍人曰嘗繳襄詞頭委有妨嫌乞改移一别閒慢小郡或外任宫觀奉㫖曾開意在避事可落顯謨閣待制與宫祠聖㫖黄鍔除給事由海使金國以禮物議和二十九日侍御史胡舜陟奏臣觀春秋傳曰兵猶火也弗戢將自焚老氏亦曰以道佐人主者不以兵强天下其事好還國家自熈寧間王韶開邊之説王安石主其議遣將用兵無嵗無之瀘南交廣勤師逺伐至崇寧以來尤甚西開青唐以及丹州西南則建祺祥等州皆不毛之地非人之境而馳赤子陷鋒鏑死者不計其數生者竭其膏血凡五十餘年而又王黼童貫合謀以敗契丹百年之好約大金以墟其國是以上帝震怒禍我國家金兵侵擾莫之或禦屠戮士庶攻陷城邑長驅于中原問罪于都城親王宰臣為質敵廷磨牙肆毒搏噬不已我師之出出無不敗前後殺傷如麻如毛蹙國喪氣傷威損重此豈非所謂勿戢自焚其事好還乎陛下踐祚適于斯時宵旰焦勞未見徴效葢天怒未解人力豈能或勝哉然天與人相去雖逺其應甚邇今上解天怒當修人事以應之書曰惟先格王正厥事此先王修省以應天解上帝震怒之道也臣觀今日祖宗寛大之政冺滅而未舉王安石刻急之法為害而未除法度未得其正也士大夫之欺罔誕謾尚循習驕侈貪鄙曾不少悛風俗未得其正也事未見功賞已驟至及其敗事罰不加焉賞罰未得其正也閹官舊習猶執事權頡頑恣睢無所忌憚任用未得其正也昔之叨冒恩寵者未加請削懐才抱器者菲食州縣爵祿未得其正也昔之僥倖富貴者一毫不取火耕水耨者困于重斂賦斂未得其正也數者未正豈所謂正厥事乎伏望聖慈明詔三省凡是數者悉反之正庶幾人事修而天意得震怒一解妖氛自消坐致太平增光祖烈面奉聖㫖令三省照應施行制以道君皇帝第三十四女封恭福帝􅁎十一月一日諫議大夫徐秉哲為御史中丞諫議大夫吕好問為吏部侍郎二日聖㫖劉韐侯到闕不隔班先次上殿取㫖除在京職事官或重鎮帥臣四日大尉鎮洮軍節度使司同知樞密院种師道卒康王馮澥等奉玊輅俱發出門五日詔籍沒譚稹財産從侍御史胡舜陟之請也髙麗國王楷使賀皇帝登寶位詔差衛膚敏借太常少卿為接伴使未至以明州知鄞縣李文淵攝事管客十一月一日至定海縣計二百九十二人館于樂賓館先是樞密奉聖㫖令人使更不赴闕明州差官押送禮物至明年四月使人始離館歸國去云七日王雲自軍前單騎馳歸不數日至中外大駭果云事勢中變欲得三闗至不然直搗汴都是日康王復入門馮澥罷樞密以資政學士為太子賓客詔曰朕屈意議和無所不至雖衮冕車輅名號之類猶無所惜葢欲保守祖宗之土地而金人必欲三鎮今與之其害如何欲不與之其利如何朕當從衆而行之不敢自任今御史臺官告報百官初八日于尚書省議以聞宰執親戚不得猶豫觀望今日百官廷議係宗社安危各要見的實永乆利害若割三鎮或不割各如何保無後患割之而來不割而來各如何備禦不得鹵莽朕毋固必只從衆議是者行之八日召百官給紙札各獻和戰之䇿耿南仲吳幵欲棄地而和喻汝礪梅執禮宋齊愈秦檜何㮚曹輔陳過庭馮海孫傳李若水等欲戰初王雲回報金人堅欲要三闗朝廷大臣優游不㫁集百官議于延和殿與者居左不與者居右是日預議者百餘人與者七十餘人不與者二十餘人何㮚其首也是日不與者曰朝廷經三世得河東陵寢在焉河北天下之四肢茍去吾不知其為人人民貢賦者其末也况天下者祖宗之天下非陛下之天下石敬塘故事豈可遵乎與者曰三鎮朝廷既嘗許之今反不與是中國失信于强敵若姑且與之縱復肆擾則天下怨怒師出無名不戰而屈也與是朝廷從與之者是日何㮚罷中書侍郎又詔集百官議三鎮于延和殿各給紙札文武分列廊廡范宗尹乞予之以紓禍至伏地流涕以請已而黄門持宗尹疏以示衆曰朝廷已有定議不得論頃之宣問金人欲必得三鎮割與不割利害若何金人已與王雲約日割與不割金人之來如何守禦惟梅執禮孫傳吕好問洪芻秦檜陳國材等三十六人以謂不可割餘皆從宗尹議又李若水歸自尼瑪哈所慟哭于朝必欲朝廷從其請先是金人遣王雲約以十五日以前告割地書到不然以十五日渡河至是何㮚謂唐恪曰三鎮之地割之則傷河外之情不割則太原真定已失矣不若任之但飭守備待之恪難之八日梅執禮建議清野從之尋宣孫傳梅執禮入時議遂定乃下詔曰朕嗣有大統屬時艱難外陵憑陵元元被害於是捐棄金帛實玉不可數計以救百姓于困弊繼修和好遺賂之使項背相望凡有所求悉從其請雖衮冕車輅稱號之美猶無所愛凡以保守土地全活生靈而敵勢未已動起兵端必欲割我人民覆我宗社使我百姓父母妻子悉被驅虜財物積聚皆遭刦奪忠臣孝子自當體國念家人自為戰令下之日應河北京畿便行清野保守城邑其聚徒結衆扞冦立功自節鉞以下皆以充賞仍仰州縣預以上聞若自能斬首獲級者倍軍功凡吾赤子與其殘于敵人之手流為異域之人孰若從危即安轉禍求福興言及此流涕無從其餘諸路有忠義之人能率衆勤王或立功河北河東者並依此恩推之咨爾衆庶咸體朕意詔梅執禮為清野使已而京畿之民扶老攜㓜入保多暴露者人情大擾清野隨罷差王時雍東壁李擢南壁安扶北壁邵溥西壁並守禦使孫傳招兵使侍御史胡舜陟奏刑部侍郎宋伯友天資駑劣市井之流才能素乏寸長但工諧附近習為大理卿而内侍鄧文誥為大理㕘受傾身事文誥如奴刑獄出入惟所頥指而文誥用之為爪牙以快私忿刑多枉濫人甚寃之未幾遂得待制已而侍郎皆文誥之力也今春朝廷遣伯友往大金軍中迎取肅王伯友不肯行至煩朝㫖督責而後往近遣提舉防河但擁兵自衛略無措置其素行凋喪才无可用一至于此伏望罷黜奉聖㫖宋伯友除徽猷閣待制與郡臣僚上言竊謂付之千里俾之共理必有循良之才豈弟之政以牧養細民伯友昔任大理殺戮無辜不計其數時盛章尹京伯友為廷尉觀望内侍風㫖多殺以希恩寵怨氣充塞傷天地之和使上皇負謗于天下此與漢唐酷吏无異宜膏斧鑕以快吾民今使治郡猶狼牧羊亦何一方赤子不幸耶伏望竄之遐裔與盛章一等行奉聖㫖宋伯友降充右文殿修撰知鄭州十日新差知鼎州邢倞除停勒先是二月間斡里雅布軍既還尼瑪哈尚留隆徳府詔遣路允迪等以和議之書止尼瑪哈聞斡里雅布軍徒金帛寶貨而已無所得遣使數來求賂時勤王之師踵至大臣有輕敵意猥曰吾兵强盛如此當與敵抗衡而滅之彼既領吾肅王過河吾何不亦留其使與之相當於是館其使算卓等逾月不遣有都管趙倫者燕人獪狡懼不得歸乃詐以情告館伴邢倞曰金國有伊都金吾者領契丹精鋭甚衆貳于金人願歸大國大國可結之圖其二酋倞遂以聞朝廷大臣信之即以詔書授倫賜伊都納衣領中仍送賜倫等各帛千疋白金千兩倫至尼瑪哈所首以其書獻之尼瑪哈大怒以倫書表聞其王且具道南宋反覆之狀其主復報云入攻討事无大小委元帥府從長措置遂破太原提兵向京師朝廷以報始禍故有是命十一日聖㫖秘閣修撰知平陽府林積仁緣賊馬侵犯乞致仕可落職送吏部與小處監當十二日聖㫖罷范宗尹諌議大夫是日晩金人至河外折彦質以宣撫司領兵十二萬防河與之對壘敵發數十騎來探回報其帥曰南宋兵亦盛未可輕度或欲整兵接戰有羅索大王者曰宋兵雖多不足畏也與之戰則勝負未可知不若加以虚聲盡取戰鼓擊以達旦以觀其變衆以為然黎明王師潰賊遂長驅知襲慶府郭奉世特除為徽猷閣待制十三日臣僚上言竊以元豐年西師敗績永樂陷没神祖皇帝慨然興歎元祐中朝廷體兵息民天下晏然紹聖以後章惇輔遂議開邊至京等用事狂誤上皇大生邊隙兵馬日益凋耗公私日益匱竭又舉伐燕之役致兵連禍結今五年矣賴天祐有宋篤生聖躬為社稷之主其首惡賊臣既已竄戮如王機守鴈門和詵守瓦橋薛嗣昌帥太原詹度帥河間皆交結權臣肆為欺罔冒受功賞助成今日之患合正典刑大快公議薛嗣昌和詵雖死合行追奪詹度王機縱未顯誅市朝亦當竄之嶺表伏望表正誤國之罪以為奸臣之戒勘當和詵追授武功大夫王機已除名勒停送髙州編管奉聖㫖詹度責授海州團練副使郴州安置薛嗣昌生前官職並奪劉韐奏據都統制措置慶源府城守王淵申契勘金人十月二十三日到城下安排攻打二十四日淵差州統制官韓世忠揀選步兵三百人于西北門刼破敵寨放火燒死金兵不知數目其敵寨盡皆閙亂昬黑相殺其得功將士乞等第推賞奉聖㫖韓世忠與除正任防禦使餘軍兵各轉五員資詔福建江東西浙東路人才素號强勇欲依四道置帥體例差發運使翁彦國充經制使令召募起發軍民二萬人須管於十二月上旬到闕勤王其錢物亦許于二廣那移奉聖㫖翁彦國與復舊職依此施行是日敵勢已逼耿南仲力勸急遣王雲且以康王押衮冕車輅行尊金主為皇叔上尊號十有八字康王請南仲偕行上曰南仲老矣令其子延禧代之十四日京畿人户盡移入城孫昭逺除秘閣修撰充西道副總管十五日臣僚上言竊以去年之冬金人入冦出我不意故河外諸州堅壁不戰天下諸州或不勤王陛下皆置而不問恕其倉卒之失也今年自春夏以來皆知金人必復深入若天下諸州或不勤王以致大河都城受急則事平之後當須行法奉聖㫖依奏其勤王若敢後時當職官並以軍法從事王及之同金國通和使王汭來聞軍已至西京不復請三鎮直以盡河為言陛對不遜有奸臣輔闇主之語上下洶懼因許之且以兩府二人行唐恪既署勅何㮚大駭曰不奉三鎮之詔而從畫河之命何也㮚不肯署因請出乃以資政殿學士知杭州復留領開封府事於是御批以金人欲割地須兩府二人行令各有陳陳過庭以主憂臣辱首自請行唐恪馮澥曹輔皆依違不對耿南仲以老辭聶昌以親辭尋出御批曰過庭忠誼可嘉特免奉使差辭免入耿南仲聶昌日下出門遂㫁諸路門橋諸軍城守晩有御札云金人已渡河百官疾速上城金人兵由汜水闗渡黄河京西提刑許克許髙汜水兵卒望風而潰京師聞之上門清野龍圖閣直學士河東河北路宣撫使折彦質責授海州團練副使永州安置先是宣和中河北河東宣撫司謀取燕雲内燕雲之民置之内地曰忠勝軍曰義勝軍皆山後漢兒也實勇悍可用其河東者約十萬餘人官給錢米以贍之雖請之不許支用者亦聴之使乆之倉廩不足以饑而怒出不遜語我軍所請皆陳腐亦怨道路相逢我軍輒罵辱之曰汝蕃人也而食新我官軍也而食陳吾不如蕃人乎我將誅汝矣漢聞之懼其心益二俟釁且發至乙巳冬金人南犯朔武之境朔州守將孫翊者勇而忠出兵與之戰戰未決漢兒開門獻于金人既至武州漢兒亦為内應遂失朔武長驅至代守將李嗣本率兵拒守漢兒又擒嗣本以陷降代至忻州守賀權度勢不敵開門張樂以迓之敵人大喜下令兵不入城遂抵石嶺闗闗最險隘一夫守之萬夫莫開是時太原張孝純謀守闗人或曰冀京可也於是命景景辭以兵不足孝純命漢兒耿守忠以本部兵八千助之景復辭孝純曰第如我語景不得已而往使守忠當前慮其居後見襲也守忠至闗果啟而獻之景以軍騎奔還金人遂圍太原是時宣和七年十二月初也太原既被圍提舉保甲郭誼自城中出傳檄諸郡便為備諸郡悉築城㸃丁為守禦計初漢兒義勇軍四千人其將劉嗣初者宣撫司俾領其衆屯平陽見平陽人之垂涎頗萌攘奪之心會聞金人已圍太原而金人之餘黨且襲京師嗣初聞之密遣人間道獻平陽圖于敵人於是正月十九日偽為入城貿易者既入則殺守闗之人啟閤以内其軍其徒大噪而入大譙門府奪舍甲伏庫取器甲分隊而出士民戰慄走且呼曰奸臣置漢而納地今果隨其地徒銜宿憤殺入城中甚衆城中人悉出避之嗣初入城括金銀驅婦女凡十餘日而投金人於是金人益熾留數萬人守太原而分其半趨京師其酋自太原而南過南北闗仰而歎曰闗險如此而使我過之南朝為無人也哉至威勝軍權軍事李司闕者以軍獻之其酋忻然駐城外至隆徳府隆徳無備遂破守臣張確通判趙伯臻死之敵人留漢兒姚太師守隆徳領兵攻澤州逢朝廷講和官乃還太原遣人入城諭之曰朝廷已割太原矣亟開門孝純并副總管王稟曰朝廷使汝交割太原但奏朝廷云某等不肯堅守如初金人大怒無如之何留兵數萬守之其酋歸雲中敵衆于太原城外植鹿角木瓌其城厚數里中為小徑往來縱犬以警之是時天氣已熱敵兵各休于林樾之下而分食太原十邑其守益固大酋既歸雲中有諜者來云四月二十七日於雲中張飲而慶者三日漢兒蕃兵打毬以助焉太原雖被圍甚密而竊出告急不絶皆于衣領中為奏狀以達朝廷且令速進兵解圍告急給之其人間為敵獲逮其書至朝廷已與兵應之敵亦甚懼其告急之人能至者皆枯瘠如鬼曰太原城中煮弓弩及皮甲以食又將告竭矣朝廷命姚古為置制使領兵駐威勝軍其軍無故驚擾自威勝遁還隆徳一路皆震人民奔山澤間甚衆是時諸路救兵未有至者獨种師中以本部兵最先五月初及金人戰于平定威勝之間金人以鐵騎衝突師中死之六月初太原告急者益少人皆知困内外憂恐或聞李綱為宣撫已到懐州乃分命劉韐為副使當平定之路解潛為置制當威勝之衝折可求為都統制居太原之北張思正亦為都統制當文水之南且命張灝為陜西路都漕兼河東察訪而督其戰軍旅盛甚河東之人皆喜曰太原圍解河東安矣有張行中者有獻戰車云可當鐵騎於是造千餘兩其制兩竿雙輪前施皮籬四木運轉輕捷毎車用甲士三十五人執弓弩槍牌之屬以輔翼之結陣而行鐵騎遇之皆退遁可以當鐵騎於廣造戰車其制獨輻雙輪四小而一笓籬運之以禦戎馬之衝突又為蠻牌施釘其上戰則鋪之于地以却戎馬之犯二者皆施行然河東七月雖旦暮已涼鎧甲可御人人相視曰炎暑固不可用兵今已凉而猶未進事將奈何又見官軍之過者皆江浙閩蜀之人俯僂跛躄竟日轉徙道途之間問之汝何為者曰救太原兵也識者黙然或有知兵者私相謂曰敵數不多廣為虚數以張聲勢耳若使諸帥三路同日而入敵必不能支吾取勝必矣若㕘差不齊勝負未可知也八月初韐兵先進敵併兵禦之韐兵潰而潛兵與敵相遇于南北闗摶戰四日殺傷相當敵日增兵潛軍力不能勝而潰平定僚汾之師皆逗留不進潛韐失利潰散之兵蔽埜而還人人震恐獨思正之兵在汾州其衆十七萬號曰百萬未出戰敵曰韐潛既敗不足慮也乃驅婦女老弱守虚寨以當平陽威勝之路而併其兵以禦思正思正領出汾州執景示衆曰景不堅守石嶺闗遁還者也斬之以狥是月十五夜敵于文水張飲以賞軍諜者以告思正思正襲之斬首數百幾獲嗣本本脱去灝思正以小捷之故馳黄幟呼于中路曰汾州報捷州縣歡聲震地曰我師勝矣或持酒席相慶曰皇帝聖慈吾其見太平乎至有感泣揮涕者十六日思正出戰敵曰彼衆雖多而囂不整无能為也乃以鐵騎三千横擊我師大奔相蹂而死者數萬人坑谷皆滿思正敗卒數千奔汾灝以牙兵數百趨慈顯于是汾州威勝隆徳晉絳澤州之民扶攜老㓜渡河奔者鉅萬計諸州縣井邑一空敵乘勝急攻太原遂破實九月初三日也敵乃進攻汾州且分兵禦隰以北諸郡敵勢甚張汾州堅守以待救俄聞朝廷分河東為兩路其隆徳府即為東路經畧平陽府即為西路經畧各命守臣以援汾州之南回牛嶺十月初八日汾州失守州將張克戩死之嘗議汾州之南回牛嶺者險峻如壁可以抗扼於是乃命將以守朝廷又遣劉琬統衆駐扎平陽以扞北邊然國用乏竭倉廩不足士之守回牛嶺者日給豌豆二升或陳麥而已士笑曰軍食如此而使我戰乎敵領鋭帥以攻回牛嶺敵于山下仰望官兵曰彼若以矢石自上而下吾曹病矣為之奈何未敢前進俄而官兵自散去敵乃登焉十二月二十四日敵至平陽琬領兵遁去遂陷平陽官吏皆縋城而出爾後威勝隆徳平陽澤州皆失守矣敵騎至河陽彦質列兵于河之南敵兵據河陽望見河南官軍甚衆鳴金鼓以拒之我師潰散而歸敵遂渡河至京師矣宣贊舍人許亢除名勒停送吉陽編管許髙除名勒停送瓊州編管知絳州李元孺除名勒停送華州編管知滑州李仲詢除名勒停送同州編管許髙為京西南路提刑亢為河北路提刑各統兵數萬人防路洛口見金人即自潰故也十六日遣康王為告和使耿延禧除龍圖閣直學士與髙世即為㕘謀是日康王出門午後諸門皆塞獨留東水門并陳州門張慤除延康殿學士大名尹知鄭州宋伯友落職降三官提舉江州太平觀本處居住徽猷閣直學士張景以老病辭免南道都總管奉聖㫖許依舊致仕成忠郎郭京進狀具畫一乞置選甲正兵所聚收逃走軍兵權于天清寺屯聚詔從之陳過庭除中書侍郎何㮚除資政殿學士提舉配泉觀兼侍讀孫傳除尚書右丞簽書樞密院李回自河上遁還先是遣回以騎五千巡視黄河號巡按大河使敵陳舟欲渡守戍驚潰回挺身單騎馳還朝廷不問回力辭去位於是仍舊職宫祠十七日部集京城保甲徐秉哲除開封尹程振除刑部侍郎曾輔除御史中丞何㮚領開封尹府職事户部尚書梅執禮京畿措置清野指揮更不施行司馬朴除右司郎王庶特起復除直徽猷閣充陜西轉運使星夜前去麟府豐嵐憲保州寧化晉寧軍並𨽻陜西鄜延路帥府内晉寧軍安撫司依雄州體例施行令陜西漕臣葉景詢同河東漕臣葛兢專一副王庶係增置一員候騎言敵兵已逼近郊京師大震於是戒嚴繕治樓櫓明日知是折彦質潰卒復開三門議或謂敵乘機渡河鼓行而南有易我心不若四面十里間各屯兵二萬堅據要害以伐其謀别馳萬騎往來助之絶餉道清野以來芻槀且竭使不得進掠從諜間伺敵隙時出兵嘗其虚實令河北郡邑結營自守更走使以元帥拜康王集兵揚言搗燕山以動其心潛軍河南合四方勤王之師繞其背夾攻之敵不足亡也或謂敵兵焱鋭而我師挫衂乆矣聞深入氣溢脱不支敵坐傷國體不若擁駕臨狩徐議所向嬰孤城自守詎可乆耶猶豫未決間而敵奄至朝廷茫然不知所為制曰醲于賞以懋功所以正朝廷之治篤于親而立愛所以隆門内之恩眷惟賢貴弟方抗旌而修好肆陳力以寵行揚於大廷布以孚號皇弟大博集慶天雄軍節度使亳州牧兼平陽牧康王信厚由乎夙稟義烈出乎天資席地勢之華持之以約處譽問之媺守之以謙比宿師之在郊嘗仗節而出使克底其績最人所難方盛秋之屇時屬朔郊之多警誼能體國奮不顧身手足具懐固重勤于既往意氣自許乃不憚于一行載惟誠忱良以足用仍攜鉞之貴加以巨藩因八命之崇升之大府陪敦邑采增衍圻封嗚呼譬之勲跂竚旋歸永綏壽履可特授安國安武軍節度使信徳牧兼冀州牧依前太傅康王制十月二十八日與韋妃同出勅康王屬者鄰邦舉師邊未出警遣使議和適今之宜朕愛惜生靈視同赤子講信修睦庶幾息兵宜得賢王往將使指惟我貴弟慨然請行孝通神明忠存社稷英氣不懾奇畧有餘朕甚嘉之首出祁寒益宜自慎以寛朕手足之念故兹詔示想宜知悉聖㫖金人復搆兵侵伐漸近大河自當多設守禦之具即搭掛及差官多方預為圖備訪聞京師之相動以浮言至鼓扇造不根之語良民不得安堵往往懐疑愁歎以致惶怖類皆無賴不逞之徒意欲乘時為奸妄言事端驚擾百姓使民心不得帖然可廣行布告今朝廷見行差選兵士頻把險隘蒐擇人才厚賞委用閲練奇兵詢訪奇策金幣官爵無所愛惜恩寵命賜例增數等見行分布防城守具以固京師内外人民咸體朝廷之意各安其居無循胥動之言如敢有扇惑造言之人誑擾民庶並重于法不赦宜詳告諭各奮忠誼為國以期安靖劄付開封府大字出榜曉行兩日土塞諸門尋聞所傳皆謬諸門稍有開者十八日相國寺招敢勇兵仍給散衣甲侍御史胡舜陟奏臣觀今日敵兵侵陵國勢危蹙豈可拱手坐待武王滅紂興王起于百里漢髙驅烏合而破强秦光武單車而剪羣盜今我國家堂堂之大而又祖宗積累深仁厚澤陛下有聰明睿知恭儉勤勞之徳天下樂于推戴安可以敵勢之强便謂莫敵然湯武髙光奮于㣲弱皆得賢才為之輔佐故能成帝王之大業今陛下欲興衰撥亂中興王室所用以為大臣者皆非其人唐恪俗吏耿南仲腐儒何㮚狂生聶昌凶人李回雖差勝亦議論迂濶獨陳過庭正直孫傅忠朴亦非康濟經綸之手若南仲庸暗不曉事耳恪昌則不然才足以營私為奸辯足以文過飾非隂附内侍延恩固寵區區一心但為身謀不恤國事敵未至則偃然自安敵欲至則惟務城守所以折衝禦侮之計寂然無聞自䝉任用以來衆論不與人皆鄙之都人見今事勢迫切莫不歸咎宰執數日前皆傳唐恪耿南仲疾革宣醫聶昌臺諫攻罷則衆之情可見矣近唐恪趨朝或以石擊其燭籠萬一城門乆閉人不聊生必以誅宰執為名羣起為亂此事不可不慮也今欲以弱為强轉敗為功當以人才為先得一善將兵者則兵不患不為用得一善理財者則養不患其不足得一善守河者則敵不可得而渡得一善守城者則人不可得而亂求人才以得用豈煩陛下焦勞人人而閲之但宰執得人人才自足敵不足平矣今恪昌等所引用皆貪汙不法之小人小人之才適足滋禍大率君子小人各以類進大臣可不擇哉伏望睿慈加意擇所委任以為心腹天下幸甚十九日郭京募百姓兵萬二千人游騎扣城或曰敗兵耳連遣使臣以兵往探歸輒妄報自十三日雪作次年二月一日方晴初用兵置烽火達北邊敵初入境日數千炬自渡河不復見矣唐度落職降充光祿大夫依舊宫祠二十日知懐州霍安國除徽猷閣待制通判林淵除直徽猷閣河内縣丞范仲熊特改奉議郎除直秘閣添差懐州通判效用蘇諒補秉議郎添差懐州監押賞功也詔賜北道總管趙埜袍帶弓甲姚平仲特與叙正任刺史令州軍尋訪敦遣二十一日遣門下侍郎耿南仲使斡里雅布軍知樞密院聶昌使尼瑪哈軍即日出門許以大河為界且告和也是日午後復閉門金人已過汜水闗四壁掛甲上城四壁差提舉官東壁孫覿西壁安扶南壁李擢北壁邵溥每壁三萬人差部將小使臣等七百員孫傅都提舉王宗濋都統制劉延慶范瓊統材武人分布四壁皇弟康王次磁州二十二日張叔夜自鄧州帶獵户勤王至南薫門劄皇弟康王次相州二十三日孫傅除同知樞密院事曹輔除延康殿學士簽書樞密院事秦檜除御史中丞是日夜呼百姓登城甚急人皆震恐以金人大至也二十四日詔許搬萬嵗山石賣作礟石斡里雅布軍至城下屯劉家寺至十七日道路傳金人遊騎已渡河殿前司遣使臣馬綱作斥堠三日而返報言敵兵渡河朝廷不信再遣使臣劉詢帶步兵三百人出封丘門逺探不越宿而回云兵次陳橋投擊殺傷者百餘人他衆僅脱於是京城内外城門皆閉清野指揮方出内外驚擾軍民乘勢作過朝廷指揮城外搬入民居並就寺觀居止未幾有榜示所有清野指揮更不施行城外居民令歸業萬民歡呼而鐵騎已逼城下矣金人到城下逐日加多約二十餘萬南總管張叔夜以三萬人先到二十六日手詔曰朕以寡陋奉承大寶即位旬日金人内侵賴將士之力獲保宗社而攻戰守禦功賞未明恩賚未徧使士不用命人有怨言有司失職咎實在予今兩路重兵未退守禦之備方在所急咨爾軍士念我祖宗創業已二百年撫養汝等父母妻子恩徳至厚當國家艱難之時無懐二心無有忌志奮力致命朕已降指揮于尚書省置功賞司凡厥恩典悉加增重不限舊制務使實著功効者必賞僥倖者不容凡功狀來上朕皆親閲第其輕重不俾踰時宗社再安邦國寧謐汝等取富貴共保家族朕之此言皎如白日凡汝衆庶明聴無惑先是籍城中户一人乘城至是免之統制官范瓊於陳州門外拔城屯兵數千京畿提刑秦元集保甲三萬先請出屯自當一面朝廷不從敵兵薄城又出乞行訓練乘間出戰守禦使劉韐奏取秦元保甲自益元謀遂塞京城四壁共兵十萬人諸將募戰市井中黄旗不可勝計應募者悉庸丐寒乞之人無鬭志詔五岳觀上清宫等屯禁衛以備非常數遣使懐蠟九間行出闗召兵又約康王及河北守將合兵入援多為邏者所獲奉議郎馬伸除監察御史日下供職王元知滑州趙埜落職提舉西京崇福宫任便居住是嵗燒南薰門陳水門固子門萬勝門續又燒西水門封丘門凡十一座二十六日許景衡召赴闕李回罷簽書樞密院提舉萬壽觀曹輔賜幞頭金帶二十七日金人攻東水門范瓊出兵焚塞知廣州孫竢令乘遞馬赴闗王健差充樞密院都承㫖王燮充副承㫖二十八日城上守禦兵民殺統制辛充宗及其子駕幸京城四犒設奇兵所保甲閙殺統制官得將等二百人二十九日都人欲擊宰相唐恪何㮚為門下侍郎日下供職聖㫖三省長官名可並依元豐官制三十日唐恪乞出不允是日冬至不稱賀不作假依舊入局先是二十一日金人遣楊天吉王汭來詔吏部尚書王時雍知四方館事帶器械王球吏部員外郎王及之充引伴官敵請畫河為界朝廷不得已從之回書云早乞班師以全社稷遣聶昌耿南仲為告和使始稱聴命無違以黄河為界王及之擅改為以黄河為界聴命無違為敵張皇其意非止畫河而已至二十七日再遣楊天吉等入議復以王時雍王球管伴靖康要録卷九
