body:
  text: 靖康要録卷十一二年正月一日上朝見賀太上皇帝於延福宫文武百官僧道等詣南城賀二帥傳令謝之金帛所括數未足敵使數馳使譙責二尹于是遣何㮚見二帥商量元數今城中悉公私所有不及百一意指懇到尼瑪哈大怒訶詆之敵遣使十一人入賀聖㫖差禮部侍郎譚世勣持國書至軍前不納二日金人趨迎康王甚急差中書舍人張徴行學士院草詔書敵再三易之而遣開封尹徐秉哲言根括金銀少尹押到髙伸家女使劉梅夀等来稱髙伸兩次差人押金銀徃兄髙傑家收藏遂差人勾當勾當人劉均出頭髙伸與髙傑串執親来本府庭下縁髙傑係金吾衛大將軍髙伸係延康殿大學士日前受國厚恩不可數計今来倚恃官髙䕶勾當人不令出頭難以集事奉聖㫖髙伸髙傑輒主公庭有虧士體伸落職傑降充左衛率府率三日元帥皇弟康王次東平府六日敵退換金錢數車金人蕭慶就都堂聽講月令洪範自是御路輦置金銀出南薫門不可數計侍御史胡舜陟奏臣聞傳曰羽翮不修不致千里闑内不理無以整外此言治逺自近始也今國破主辱宗社僅存必欲振已顚之緒成再造之邦臣願陛下治自近始而近者莫若宦官昔歐陽修著論切而當皆漢唐已騐之迹誠可為後世鑒戒惟我祖宗監漢唐之所以亡而防㣲杜漸其制尤備城狐社鼠不得肆其奸自崇寜以来祖宗之制隳廢殆盡而政事號令悉出閽寺因循積靡以成今日之禍臣請為陛下言其本末始蔡京當國圖為根深不㧞之計復萌移鼎不臣之心遂結宦官倚為肘腋假以峻秩付以事權于是羣小蝟毛而奮膺節鉞之重位師傅之崇者比比皆是童貫握兵柄於外以壞軍政梁師成執國政於内以壞朝政李彦掊克以害民楊戬營繕以傷財此則内侍之渠魁者其他營求聲色剏造㳺宴更新侈靡市花木禽獸以營惑人主之心術者如王仍張見道鄧文誥之徒不可悉舉賞罰生殺出自其口所喜則致之青雲所怒則擠之䧟宑差除舉措悉由中出宰相充位奉行文書至政和宣和間其勢尤盛各立門戸公受貨賂以販鬻官爵凡駔儈小流奴𨽻庸材皆引以為公卿侍從牧守使者故政和宣和所除宰執盡出其門當時大臣與梁師成書顯稱門生畧無慙愧士夫相習成風皆以附麗内侍為榮自大臣以至州縣小吏故皆汲汲貪狥財利以為致身之資禮義亷耻蕩然不復張矣是以今日人才極乏風俗極弊生靈極弱而外侮憑陵莫之能禦職此之由也陛下中和勤儉躬行敦樸苑囿宮室聲色狗馬無所嗜好此聖性卓然自有逺小人之資雖有仇士良數十軰豈能訓導後進以容悦聖心但陛下仁恕有餘而罪或縱釋隆寛廣問而言或聽從故使􅉏御尚循故態臣何以言之盖臣嘗論李彀奏狀至詳謂彀不可提舉京城所有其詞痛切不蒙施行臣又嘗論彀於京城所拘占店宅物業沮上皇罪已之詔乞賜廢斥不蒙施行又嘗論内侍領外局非祖宗之制乞行罷廢不蒙施行又嘗論譚稹招制義軍為患河東責降昭州極為輕典乞籍沒其資産田宅不蒙施行其餘臺諌臣僚論内侍者多矣亦不聞誅一有罪者臣所謂罪或縱釋者此也方都城圍閉諸將守禦賞以勸功豈宜輕舉今日集百官宣府劉延慶轉官明日集百官宣府劉延慶轉官延慶昔有丘山之罪今無尺寸之功不知何以得此恩數但延慶善結内侍人人喜為稱譽故旬日之間兩宣府制賞及罔功人心不服將士孰不解體劉光國恃有内援凶悖尤甚毆將作監丞江徴臣與臺屬論列其言不行劉昌國閭閈鬻卦之人耳遽命以官即通朝籍参謀守禦與士大夫同列内侍所薦也乘城者或遷秩或錫帶皆内侍所好者或責官或罷職皆内侍所惡者城上今日行某事明日罷之明日又行某事皆出於内侍建明其事無益有同兒戲人莫不笑之孫傳以樞臣總領守禦毎為掣肘不得約束他人為所凌轢固可知矣臺屬有告臣者曰城上見一中貴姓羅者厲聲謂士卒曰見他官員不得唱喏亦不得起身凶焰赫然摧壓士類豈不沮忠臣義士之氣乎又有一中貴人據敵樓設卧具甚華麗豈與士卒同甘苦者乎臣於治城子時見都人喧閙欲毆此輩遂嘗内奏乞不差内侍上城面奉從臣所奏已而城上内侍旁午皆因其所請而使之徃臣所謂言或聽信者皆此也大抵小人言無忠誠不可信其間又有稍知書者假書史以文奸言此尤為害且如唐恪聶昌天下皆以為小人陛下亦用之者恪昌能傅㑹内侍使之延譽耳故陛下用之不疑臣竊意陛下邅今變亂必自悔悟不眷顧此曹矣臣近蒙聖㫖徃開封府檢察受納金銀見陛下親筆付王時雍内侍某人受納此事既付有司何煩宸翰如此當此擾攘中又聞内侍有為王知章求差遣者是以知陛下眷顧此曹未衰也都城毎有變必先毆内侍人情所惡可知矣豈宜曲加恩意使生頭角陛下身居九重日見大臣而已臺諌數對論事則陛下見士大夫至少而金璫右貂終日羣侍左右萬一用其言於差除及號令政事為害不細臣願陛下所以處今内侍宜法唐太宗不任以事惟責以守禦掃除之職仍復祖宗法官至内殿崇班即轉出凡奏乞事件並申中書樞宻院不得専逹則今日致亂之源庶可消革而再造之邦庶㡬有成矣取進止是日榜云奉御筆根括金銀以報大金全活生靈之恩切須盡力不可惜人情茍可以報金國者雖髪膚不惜只是要有者盡取即偏私勿錯認朕意乃善付徐秉哲又置厯於御史臺自宰執以下所納數目抄上七日先雨後雪天氣甚寒地氷如鏡行者不能立足先是正月一日金人同撫諭使賫詔至南京取金帛南京疑不與復遣使臣持奏入京覆審其故是日勅應天府官金銀疋帛當竭力應副一疋一兩不可存留可根括係官及官吏民庶之家盡數供納以謝恩徳由是南京與金人凡金百兩銀二萬五千兩絹一萬四千疋是日有榜敘陳何㮚見二帥欲金帛廹切之語門下退回不堪金銀得㫖令戸部長貳别行鎔銷遣司馬朴李若水徃使理㑹金銀何㮚亦繼徃又榜以士庶納到十分未及所須之一仰開封府督責送納既存性命財物何惜仰御史臺覺察催促不得稽緩是晩大雪金人焚城南備城庫八日雪凍甚人馬不可行至晩乃濟何㮚李若水等徃来議金銀數目若水㣲言曰若陛下徃見二帥必可减九日李若水兼開封府尹金人索上元燈城内寺觀應副是晩金人遣使致書欲車駕再出議和加金主徽號敵遣髙尚書者持書来髙奏云陛下不必親出姑為書或遣親王大臣以行如何上意亦不欲出郊而何㮚獨以謂必須親出上信之㮚因歸都堂自草勅曰孫傅可太子少傅謝克家可太子賔客輔太子監國来日車駕出幸金軍時㮚自謂折衝有術對敵使歌曰細雨共斜風作輕寒左右及敵使皆笑之遂出手詔云今月初十日出城見兩元帥議加徽號事故兹詔示想宜知悉仍多出文榜曉諭何㮚請太僕少傅禮部太常官集議及取太僕金玉鞍轡等云或云是日有使来要駕託以回議金銀事而上之出以議徽號為辭是日上朝太上皇帝於延福宫太上皇后偕至置酒良欵然不及次日出郊之意十日黎明車駕由南薰門出侍從以下或不及知金人兵皆成列以迓同知樞宻院孫傅戸部尚書梅執禮守内敵人来取穿珠碾玉等工差帶御器械王殊押金人所减禁衛七百三十四人入城是晚御帶王孝竭自城外来傳聖㫖出城見兩元帥議加徽號事為諸國未集議事未畢来日入城各宜知悉帝再幸敵營中外莫不寒心敵館帝於青城齋宫之西廡曲室中三間是夜衾枕不宿戎服上牀而寢是日三省樞宻院同奉聖㫖自即位以来金人交戰不已朕累下哀痛之詔諒爾等共悉朕意今金人攻圍京城已及一季應援兵尚爾稽遲使吾社稷生靈坐以待盡比者金人已登京城按甲議和欲使朕與吾民肝腦塗地金人請求靡有不從毎念屈辱之極時事至此不獲已許帝姬和親立大河為界而金人實来斂兵欲質我太上皇帝又欲使朕南遷王室見今愈弱守京城終不退歸朕上禱皇天天未之震怒下告人民人未之懷憤思祖宗積累至此而欲盡乎朕之徳薄不能以保吾民乎朕思一身朝夕不能安痛切深思實無罪戾夫何使朕與吾民于此極也咨爾河北之民與其䧟於異方各宜自憤抱孝懷忠更相推立首領多與官資監司守土帥臣與爾推議結集北道州軍自以為號保守土疆使予中國不失於敵國天下平安朕與汝等分土共享之朕言及此痛若碎首故兹詔示宜體至懷是月二十日敦武郎符彬賫至大名府北道總管司有㫖符彬與閤門宣贊舍人以行御批令王若冲邵成章衛䕶皇太子赴宣徳門議事仍日後傳令㫖衹應關禮部火急施行十一日上在青城敵減儀衛上留三百人郭仲荀統之除親王宰相執政學士院禮部太常寺官外餘令先歸以欲上彼徽號為言于是鄆王楷而下九人宰相何㮚執政馮澥曹輔翰林學士吴开莫儔直學士院孫覿禮部侍郎譚世勣太常寺少卿汪藻皆分居青城齋宫别室與上西廡相對朝夕起居而李若水司馬樸以奉使亦從若水留青城司馬樸留斡里雅布軍中上通謁二帥不見禮数迥異於前上不勝憂憤樞宻院榜正月十日御批大金只是理㑹金銀事具以實告二元帥為官軍未集来日議定必歸告諭軍民當各安靜都人知縁金帛又留聖駕争先輸納有福田院貧民納金二兩銀七十餘兩人心可知惟豪貴家不肯盡出差官吏大捜㕓里苛急人不能堪至有囚執婦女發掘房闈者内侍寺觀倡優旅邸根刷殆遍親王公主宅所有取上皇㫖悉數輸納有司景靈官内庭駕前噐具無一存者又令御史臺置籍自宰執以下具見納與未納數毎坊巷命里長鳩集仍許奴婢告以軍法從事斬數人梟首朱雀門以狥日輸金帛如市都人憂恐莫不垂泣敵撒城上皮籬巴調寺觀輸上元燈促金銀曉示甚急十二日開封尹榜仰在京士庶各懷爱君之心不問貴賤應有金銀表段之數火急盡數送納又榜奉御筆大金甚怪金帛㣲少雖再三懇告尚以京城繁廣數目豈止如此可諭權貴豪富戚里士庶凡有金帛之家體認朕意盡數供納以報大金再造之恩仰便宜從事須管日近了當十三日尚書省榜奉御筆累見大金髙尚書傳二元帥台令為金銀表縀數少且拘留在此俟見數足方可放還可依下項並仰據所有明批主歴限十五日以前送納如有吝惜隠匿却因搜檢告發覺便行軍令于是添差從官以下至郎曹二十四員再根括四壁東北壁吕好問程振李㑹熈西南壁陳知質邵􅀈安扶韋夀隆每壁復差官四員管勾東壁虞謩葉宗諤吴懋賈若思北壁郝思純張卿材胡寅趙晹西壁劉觀黄哲康執禮王朋約南壁劉嶠路廓丁彬師驥吳懋差接伴使人以楊邁代之又令御史臺管勾文武百官親王公主王時雍管僧道伎術官放出宫人開封府官戚里醫人百姓老娘諸行彭端管公吏曽經祇應倡優及兩軍祇應人小大園子曽在行幸局祇應人入内内侍省内侍楊戬賈蒙等下勾當使臣曹剛等大宗正同管宗室三衙管曽經曹遇輦官及兵級内東門司管妃嬪并龍德宫入内黄院子衛士幕士時有自軍前告首内侍藏金者數人率萬餘兩由是内侍悉令出金銀五千兩敵賞告人給其絹五十疋金三鋌又傳聖㫖今後士庶之家並不得以金銀為噐皿應新城門並不得將帶出入許人告依有私禁物法候開門遍行天下是日午間王宗沔同藩使人門且語且泣都人驚疑紛紛相傳上在齋宮不食三日矣内外震擾不知所為一行人並散歸處處蕭索可傷有樞宻院編修官胡珵裁書上二元帥其畧言優禮我寡君則康王懷恩恤惠我都城則河北慕義凡千餘言太學生余覺民裁書引楚子圍鄭克之言曰其君能下人必能信用其民退三十里而許之平欲與諸生扣敵壁彈壓官恐生變固止之是日金帛之徃肩摩轂擊於道卿監省官以下於南薫門支割敵遣大酋皇族郎君領其事郎君者金主族兄凶悍無禮日布巨挺於前凌辱官吏大理少卿尉遲紹先司直王忠臣少違其指拽坐庭下使唾其口意未惬使披其頬數十以建茗腦麝等物遺之乃免一日倨坐譙門呼官吏俯伏於道左右傳郎君指揮實不暁一語第聞明日金帛未足便敲殺官吏重足事之且受辱人人求死無所號泣於次兾感動之彼益不顧自帝䝉塵以来雨雪不止物價踊貴米斗一千三百麥斗一千驢肉斤千五百嵗前羊肉斤四千猪肉斤三千至是不復有矣小民於池中取水藻五味芼之以賣城中猫犬㡬盡㳺手凍餒死者十五六遺胔所在枕籍西京留守張有極表賀講和敵遣兵百人衛司馬温公墳十四日軍前試燈許都人登城以觀有五文昌者致書於都人責以為人臣子豈不上念君父速出金帛盡納於官歴數貴戚官吏士庶之罪詔曰二帥約赴打毬㑹候晴即歸百官不復入局日至御路候駕父老以數十萬計各炷香羅拜南薫門裏至有然臂燒頂割心者自城破諸門皆為敵守雖金帛亦於門首交納細民各分井巷自相紏率雖釵釧銖兩以上並行助國以竿揭於通衢府前填委不容置足太學生徐揆汪若海等上書乞還聖駕不報妃后親王百官下及髙資大賈胥吏之屬於閭閈井肆迎僧道繼日夜以禱諸倉出糶米凡頓官米所在並官吏給賣然終不能及衆雪後即雨敵索燈二萬碗昔時景龍門以珠子為飾及駕前禁庭寺觀民間之竒巧者悉以與之十五日留守司榜催督根括金銀樞宻院榜傳聖㫖軍中供帳御膳炭火什物不闕迎待禮數優異宰執侍從次舍温潔只縁金銀表縀數少商量未定仰疾速催促務要數多不出一兩日决定駕囘保無他事㑹王宗沔入城有喜色人心稍舒尚書吏部榜行下御史臺告報文武百官詣南薫門徃大金軍前請車駕還内小使校尉亦徃是日籍梁師成家有㫖支百官俸雪復作十六日開封府牓聖㫖髙尚書傳元帥台令根括金銀盡絶訖具狀申當遣金人入城捜檢仰此意不可悮事是榜出都人益惶惑閭巷細民各設器仗欲以死决薄晩復收其榜民心稍安金人焚新宋門裏紳衛營十七日霧氣四塞不分人面十八日霧氣未散隂靄異常至三更大風雨㡬二尺開封府榜傳到聖㫖為天隂打毬未得所以車駕未回然人揣敵情不在金帛矣或疑敵徃河北南京皆失利故挟吾君以令之莫測其故是日輦景靈宫供具納軍前退太祖皇帝殿什物回令張設如初十九日令權住納金銀開封府申根括到金十六萬兩銀二百萬兩聞二帥有喜色是日開寺觀放人祈晴早晴夜復㣲雨時開封府以城中金銀盡具數結遂申軍前上極喜但未知敵意如何又云金凡十三萬八千兩銀六百萬兩表縀一百萬疋二十日雨至暮方止有唱率作閙者斬數十人以狥中使自駕前来以隂雨打毬之㑹未成尚須少留二十一日至二十三日皆以隂雨打毬未得回軍中鼓復作二十四日隂霧蔽日申時人皆云駕回至晩無耗入夜雪作令四壁置塲買銀以鉟銷秤盤折耗比元數少五十萬兩欲足之也先是令開封尹徐秉哲需索萬端必賜手詔諭之其一曰朕睡於土榻之上凡二十餘日矣不敢辭勞凡有所須卿等且竭應副發運使向子諲奏已得宣諭詔六路平安二十五日雪數尺死者甚衆取玉册車輅冠冕及女童六百人教坊樂工數百人二十六日傳宣細民雪寒不易仰孫傳多方措置存恤是日敵使祈晴於相國寺尚書省榜右僕射何宋傳到文字稱城中百姓凍餒皇帝聞之出涕不止降到暁諭詔書朕出郊見兩元帥議事未畢隂雪連日薪糧缺乏家家窮苦痛在朕心已令减價出賣柴米庶幾少濟仍不須羣聚候駕重有暴露朕負百姓出涕何言自上再出都人日日接駕自内前直抵南薫門不知數至有然火於臂自燒其指或望門而拜者風寒雨雪不减是日大雪終日泥淖沒膝人不聊生於是就相國寺定力院保勝院興國寺置四塲柴米人三升錢六十二文都人又各率錢起祝聖回鑾祈晴道塲晝夜不絶帝在敵營中凡數日竟不見二帥欲有所須脅帝傳㫖取之敵須南郊法駕大駕之屬五輅副輅鹵簿儀仗皇后以下車輅鹵簿儀仗皇太子諸王以下至百官車輅儀仗禮噐法物禮經禮圖太樂軒架樂舞樂圖舜文二琴教坊樂器樂書樂章祭器明堂布政閏月體式八寳九鼎元圭鎮圭大器渾天儀銅人刻漏古器祕閣三館書籍監本印板古聖賢圖像明堂辟雍圖皇城宫闕圖四京圖大宋北司并天下州府職貢令應宋人文集隂陽醫卜之書諸科毉二百七十人教坊樂工四百人金玉雜役諸工如消碾染刷織繡棊畫針線木漆帽帶皮鐵之類課命人卜祝司天䑓官六尚局搭材修内司廣備廣固諸軍曹司並許以家屬行又取内人街巷弟子女童及權貴戚里家細人指名要童貫蔡京家祇應凡千餘人選端麗者府尹悉捕諸倡於教坊中以俟採擇里巷為之一空上皇所出内人雖已嫁者亦徑取以徃告報下如鵝鴨趨湯火開封尹下捉事小火不捜捉免一人至出緡或願入小火之家充其婢妾者至府則皆蓬首垢面不食作羸病状覬得免而尹徐秉哲自置釵粉冠挿鮮花衣令膏沐粉黛盛飾畢滿車送軍中父母夫妻相抱持而哭觀者莫不歔欷隕涕此皆内侍鄧珪之謀也初珪為承宣使傳宣河北為敵所得降之用事敵中教令呼索至是又請珪家屬及官吏士人内侍僧道醫卜千餘人并珍寳雜物諸色藥材皆以萬數内帑百司所有至此殆盡凡人間有用之物公私儲蓄取之畢足如奉使及河外守臣親屬盡取以徃嘗須冠子一萬餘頂他皆稱是先差兵部尚書吕好問户部侍郎邵溥専一承受軍前取索文字正月内金帛見納比元數金百之一銀并表縀十之一二留守司申狀城中所有止如此如敢隠庇同受軍法後至二月五日奉㫖昨根括金帛應副大金已具了絶事狀却有取過軍前内官藍折醫官周道隆樂官孟子書等經元帥投狀稱有金銀在本家窖藏乞取前来遂至元帥怒决要再行根括鴻臚卿康執權少卿元當可寺丞鄧肅押道釋經板校書郎劉才邵傳宿國子監主簿葉將博士熊彦詩上官何等五人押監書印板并館中圖籍送納並留營中劉韐折彦質以下數人皆取以徃二十七日軍前取内侍五十人晩退三十六人回止要被上皇任用者又索象齒三千株犀角香藥傾盡府庫所有新宋門至曹門火自旦至午金人降香赴大相國寺祈晴留守司榜今来兩國通和各敦信誓皇帝議事漸已了當旦夕車駕入城務要軍民着業安靜不得妄生事端先是太學生徐揆徃軍前説二帥請車駕還被留不遣繼衆學生列名欲詣軍前以門首阻遏不得前遂以書申留守司乞逓逹有御筆自軍前来云此事豈口舌所能下耶帝在齊宮二帥既不許見日遣蕭慶等需索城中物或排倉獻帝皆敵饌也帝未嘗視分賜羣臣夜擊柝環帝居或遣小校數人直入卧内廵覻前資政殿學士北壁守禦劉韐卒字仲偃建州崇安人元祐末第進士至崇寧間累從辟陕西經畧司轉運司屬官後從童貫為陕西提舉平貨司事專餉海外除直秘閣領轉運使事復行解鹽除祕閣修撰為制置使六路大舉劉法戰歿命韐權鄜延帥出竒兵以觧震武之圍後宻䟽請與戎和邉事遂息以徽猷閣待制提舉嵩山崇福宫宣和元年也繼除越州牧賊方臘起陷餘杭韐守禦有備賊不敢近以功拜還古殿直學四年詔入覲至國門有㫖徑詣河北河東宣撫司充參謀官頗嘗論列燕薊不可得狀請二人大即班師既而郭藥師以涿州来附朝廷促進兵韐執前議朝廷知其意異至眞定金人以燕歸於我韐乞宫祠詔赴闕㑹郭藥師入朝韐奏其反覆乞賜第厚廪以留之不報除顯謨閣直學士知建州改福州除延康殿學士言者論其過闕日私見執政臺省落職宫祠未㡬復職知荆南府改建州河北盗起以為眞定帥單騎入城招賊首奏以官餘縱歸田里一路遂平金人入侵抵城下知其有備留兵其旁長驅内向既而引兵圍城韐以强弩射之敵知其不可脅遂退敵之来也諸郡皆上門多至百餘日民坐困韐獨縱民樵汲啓開如平時父老感恩為置生祠靖康元年四月拜資政殿學士敵圍太原朝廷悉關陕兵付姚古种帥中徃援兩軍敗績上急於觧太原之圍拜韐為河北路制置使復拜宣撫副使韐至遼州招集种帥中潰兵得數千人調募河北僅得四萬人約解潜折可求俱進㑹潜未出關為敵所報諸屯皆潰而韐一軍獨全有詔令歸援河朔師至信徳而真定已陷拜為宣撫使命移軍洺州繼召入覲對便殿時敵已渡河矣除提舉京城四壁守禦又除都大提舉敵攻東壁以死守之旋報罷宰相以韐嘗極言不可輕戰降㫖謂韐沮國摇民落職降五官宫祠未㡬復命専領北壁守禦二十五日城䧟衆遁韐奔赴禁中以衛乗輿敵既偽和且索韐出敵雅知眞定之政時敵樞宻院使韓政年髙尼雅滿欲以韐代之韐辭曰偷生以事二姓有死不為也遂館於樞宻院屢欲用之終不肯受敵亦未之廹也上再出郊正月二十六日敵因遣韓政謂曰帝不復歸矣議立異姓欲以君為政代許以家屬行君宜受命尚何望乎韐偽謝覬少須之是夕自書家信於片紙曰金人不以予為有罪而以予為可用夫貞女不事二夫忠臣不事兩君况主憂臣辱主辱臣死以順為正者此妾婦之道也予所以有死也付指揮使陳灌劉玠使乗間入城歸報諸子因閤戸以衣絛自經而死敵帥大怒尸之於途曰是不從大國之命者乆之事稍緩灌等竊其尸瘞之蔬圃因逃入城中敵騎既去子子羽同灌等出城棺斂時㡬百日顔色如生觀者異焉卒年六十一今天子即位詔曰劉韐能死節不為敵用追復舊官職贈特進大學士二十八日樞宻院劄子送開封府禁止居民不得爐頭打造鉄噐竊恐引惹生事軍前来選取蔡京王黼童貫家姫四十七人又取皇后冠御馬装具二十九日般出鄭太宅上皇所賜錢五十萬貫買金銀都城自閉後官糶米凡二十八場猪肉一斤二貫五百驢肉二千二百而人肉一斤八百五十詔差董􅒯權司業監起書籍又差兵士八千人運軍前所取諸物候般發盡絶車駕還内又来取内臣露臺倡諸局待詔手藝染織戸人等三十日般擎天禮儀仗大晟府等物盡赴軍前二月一日金人来取應修内司并東西八作司文思院後苑作工匠唱探營人教坊樂工取三十六州守臣家屬譚世勣同金人入城觀九鼎皇太子令添置糶米埸濟民自駕出郊以後百物涌貴饑餓困乏剽掠死人割尸以啖二日壞司天臺渾儀輸軍前又圖明堂九鼎觀之不取止索三館文籍圖書國子監書板金人来取絲綿凡數萬人送之軍前前遣徃軍前官如席奎陳㬇滕茂寔輩皆来取家屬去聞已有用事者又取太清樓書皆黄帖牙籖載以太平車凡月餘皆遣監官交納於敵寨三日金人来取樂工醫人稍有名者皆不得脱邵溥同金人入城觀合臺星象取州縣職員數是日樂工醫官等家屬出城敵取囊篋視之有金帛未輸者大怒復大索是日御街盡建迎聖道塲四日金人有文字来以士民輙至城下問行期軍前出賣收捕毎名金萬兩令開封府出榜暁諭般藏經道經等書板五日聞軍前已擊毬車駕有還期都人大悦因教坊人員孟子書周禮義内侍藍忻醫官周道隆等於軍前陳狀稱毎人各有窖埋金銀乞差人捜取二帥大怒即遣濟雅郎君来責云少尹稱已盡數發絶因何尚有藏匿遂差人賫鋤入城斸取内侍鄧珪及教坊諸工所窖金銀於是開封府復行根括立告者之賞三分之一三日陳首京城大恐至未時傳言駕囘接者不知㡬數萬皆不能行至晩云来日入城六日百司官吏部人盡徃南薫門接駕至未時敵人掘斷南薫門路自上出郊日遣御帶王孝竭入京撫諭都人逐日候駕雖風霜雨雪不憚是日孝竭不至人心大恐頃之有榜傳皇太子令㫖以皇帝出郊未回太上皇来日徃軍前懇告元帥乞駕早還至晩金人遣内翰吴开莫儔持廢帝偽書入城孫傳等數人讀之號絶欲死其文曰元帥府迄以宋主降表申奏今奉囘降聖㫖劄子先皇帝有大造於宋而宋人悖德故去年有問罪之舉乃因嗣子遣使軍前哀鳴祈請遂許自新既而不改前愆變盟渝速是致再討猶敢抗師洎官兵力擊京師摧破方申大罪之禮况追尋載書有違斯約子孫不紹社稷傾覆父子所盟其實如一今既伏罪宜從誓約宋之舊封頗亦廣袤既為我有理宜混一然所舉止在弔民本非貪土宜别擇賢人立為屏藩以王兹土其汴京人民許隨主遷居者右所降聖㫖在前今請前宋宰執文武百官洎京僚一面共請上皇并以下后妃兒女及諸親王公主之屬出京仍匀集在京僧道耆舊軍人百姓遵依聖㫖共議薦舉堪為人主者一人不限名位髙卑所貴道德隆茂有大勲業者舊表為衆所推服聞於治民者雖乏衆善有一於此亦合薦舉當依所奉聖㫖偹禮册命趙氏宗人不預此議宋之百司並戴新君其國侯得姓命隨册建號所都之地臨時共議天㑹五年二月右金吾衛大將軍右都監押右監軍押皇子右副元帥固倫尼伊拉齊貝勒左副元帥押安班貝勒都元帥在闕又帶到皇帝御筆今月六日子元帥府拜受大金皇帝詔書以屢變盟誓别立異姓仍依宣㫖専俟上皇以下后妃諸王公主以次闔族出京俾令團聚自惟失信固當如此猶許舊地别立賢人其於萬姓為幸非細今因元帥府差人賫文字入議附此誠意幸為暁悉請上皇以下出京諸事並從元帥指揮方是長計是夜三更孫傳遣皇城司官王汝弼入延福宫奏請上皇帝次日出城先是初五日之擊毬也自上青城齋宫乗馬至打毬㑹二帥令悉屏從衛止以何㮚馮澥曹輔郭仲荀從分庭設兩位上東面西鄉尼瑪哈西面東鄉執禮甚恭毎上語則起身側聴答畢復坐而斡里雅布綉衣打毬馳擊於階下酒七行畢上離席白欲入城尼者頗不懌既退斡里雅布送至行在殊有眷眷之意馬上忽番語莫能暁番人再譯似謂天命有歸者衆皆憫然上尤憂怛然見其禮數勤腆不以為意也遂復以歸意懇之乃云相國来日尚欲相見已而果有使来道相國語問所以歸之意答以安撫百姓及催促應赴軍前别無他意衆謂歸期决矣咸有喜色初赴宴也上聞羣臣不與悵然不怡何㮚聞馬上有天命之語始憂甚問吴开等曰䇿將安出至初六日拂旦使来召上趨駕扈從官猶整服而進謂果得還也才出門忽有撤黄屋者衆方驚愕洎至野外則已望北方設一香案隨駕官各於百歩外排立上獨前下馬望香案兩拜跪受金人讀詔訖再拜數人擁上馬乗而去繼宣詔引宰執從官跪聽衆皆叩頭哀請竟不從毎宰執一人監以二金兵侍從一人監以二燕兵各分散置諸寨中既夜乃以前詔書付呉开莫儔而入七日黎明孫傳遣王汝弼内侍李石周詣請太上皇帝出城者再少頃太上皇后亦至延福宫相率以行但未言軍前廢立已時太上皇帝太上皇后鄆王以下三千餘人諸王妃公主都尉等盡乘車由南薰門出至午燕王越王出百姓稍知其事于内前擁留開封尹問其故不答捕為首者一人斬之乃出初上皇遲疑未欲出徐秉哲以兵衛出南薰門已而出榜曰皇帝出郊日久未回太上皇親出懇告二帥仰各知悉初于敵中得偽書即集從官以下議于秘書省百官僧道耆老軍民中大夫同知樞密院事孫傳等狀今月六日亥時准元帥府公文一道備到大金皇帝聖㫖指揮傳等聞命震越義當即死然世被本朝徳澤至深至厚嗣君親政未及期年恭儉憂勤無所不至遽蒙廢絶實非臣子所敢聞知輒復忍死須臾冐陳悲痛激切之詞仰干台聴伏望垂天地再造之恩畢終始保全之賜傳等誓當捐軀碎首圖報萬分謹具畫一下項一太上皇以下不敢有違令㫖見今起發赴軍前同伸懇告之誠乞垂憐憫一嗣君自即位以来日修政德並無虧失惟是失信一事上累譴呵盖縁親政之初偶為謀臣所誤繼已重行竄責檢㑹上皇時昨違大遼信誓並保童貫李良嗣王黼等委起事端並行處斬了當以此顯見嗣君悔悟前失非有他心伏望台慈特賜矜察一嗣君自在東宫即有德譽著聞中外比既即位臣民歸仰今感戴保全恩德已厚若蒙終恵未加廢絶尚可以嵗修臣事之儀如抛降金銀表縀之數雖日下不能敷足將来下外路取索分嵗貢納實為大金永乆無窮之利若一旦廢棄遂同匹夫縱有報恩之心何由自効一伏詳来㫖令别選賢人以王兹土許汴京人民隨主遷居具見慈仁存恤備至不惟臣民愛戴罔有二心兼中外異姓實未有堪充選舉者若倉卒册立四方必不服從由此兵連禍結卒無休息之期恐非所以上副元帥愛惜生靈之本意一今日之事生之殺之予之奪之全在元帥雖大金皇帝詔書有廢立之意然將在軍君命有所不受則閫外之事元帥自可專行如前項所陳事理明白更望台慈特霽威怒終始保全一汴京城内兩經根括取索公私所有已為罄竭顯見將来難以立國乞候班師之後退守偏方以備藩屏如蒙大恩特許嗣君已廢復立所有稱呼號位一聽指揮右件如前謹具申呈皇子元帥國相元帥伏望特加矜憫早賜允從伏候台令天㑹五年二月日第二狀又傳等伏覩詔書宜擇賢人立為藩屏許令士庶共議以此見皇帝恩被生靈之意聖徳甚厚然傳等竊見國主自在東宫恭儉著聞若欲選擇賢人必無出其右者兼本國自太祖皇帝以来累世並無失徳惟太上皇聽信奸臣及國王年㓜新立為大臣所悮以至違盟失信上干國典敢望國相元帥皇子元帥察傳等前狀許其自新降號稱藩復主社稷容其遷避以責後効再念趙氏祖宗德澤在人未冺或未允從前懇亦望特賜哀閔許於國主子弟中擇一賢者立之或不欲立上皇諸子則乞於神宗皇帝二子中選擇建立使長得北面永為藩屏非惟不滅趙氏之祚亦使一國生靈蒙被恩徳永有依歸傳等不勝激切懇禱之至是夜人情震恐不可言廵警逹旦不敢寐已而得敵帥批云樞宻等甚忠義於大金皇帝詔書有違自後日集百官衆庶赴南薫門號哭以告二帥恬然不恤宫嬪戚里及民間街里中捜下金帛不許帶徃南薫門交割衣服多者無人般運徃徃棄之悉為敵得壞合䑓天輪輸軍前取綾錦文繡文思染院官吏造明堂諸工鑄九鼎人吏以徃軍前再根括驢馬是日兵部侍郎李若水卒初上之再出郊也意頗難之若水不知敵人之詐力勸上行保其無他洎出城留數日無還意若水見尼瑪哈詰之尼瑪哈曰所以留汝君者金銀未如數耳金銀朝足車駕暮還矣若水信之請手詔督金銀甚急以為未足則入城自趣之出見尼瑪哈曰城中金銀無遺矣尼瑪哈曰審無遺能以狀甘軍令之誅乎若水急於上歸遂以狀如約已而周道隆孟子書等請其家所窖金為行齎敵遣人取之而信尼瑪哈呼若水出其金示之曰汝言金盡此何物耶若水憤帝見廢知其必死即嫚罵尼瑪哈無信而貪敵怒驅出青城擊殺之别録在後八日孫傳等第三狀言准元帥府再遣翰林學士承㫖吳开前来指揮選立賢人事傳等竊以本國日前將相多是上皇時用事悞國之人自嗣君即位以来所任宰相亦繼以罷將帥率皆敗亡之餘其他臣僚碌碌無聞此元帥府之所備知豈敢蔽賢不以上聞若舉於草澤之間亦非聞望素著人心必不歸向孰肯推戴兼趙氏德澤在人至深至厚若别立他姓則城中立生變亂非所以稱皇帝及元帥愛惜生靈之意若是元帥府特選立趙氏一人不惟恩徳有歸城中以及外方即便安帖或天命改卜厯數有歸即非本國臣民所敢預議乞自元帥府推擇賢人永為藩屏傳等不勝痛切隕越惶懼之至元帥府劄子據樞宻等狀申已備悉竊謂朝廷所以滅宋者豈徒然哉以不守信誓不聽告命為罪之極也非天命改卜豈有陸梁如此之甚也皇上猶以寛度釋其罪負别立賢人而已真可謂伐罪弔民之大義矣今聖諭叮嚀而輙言及趙氏雖不忘舊其違命之罪亦已深矣此後不冝更復若此又狀申前日將相多是罪罷敗亡之餘其他臣僚類皆碌碌無聞若舉於草澤之間孰肯推戴者夫運數既有其衰亦必有繼興者若言敗亡之世必無可繼則三王之後迄至於今安有君臣之道人倫之叙何不詳道理之深也再請恭依已降聖㫖早舉堪為人主者一人當依已去劄子施行如或必欲元帥府推擇縁檢㑹在軍皆係北地漢兒若舉北人則與混一無異實違所奉聖意若欲推擇南人其見在軍前南宫亦樞宻等之所共知也未審果有可舉者否若果有則請其姓名見示亦與依應惟不許何㮚李若水預此議如或在京内外具難自舉仍諸官各敘名銜連署速具百官依元帥府所舉推戴狀申是日百官聚令㕔事既而入内至三更方出都人莫知其詳但益恐懼皆置兵刃自衛是日燕王越王近上宗室曹張兩公主鴻臚少卿康執權元當可光禄少卿范寅㲄少府少監蘇餘慶軍噐少監徐天民將作少監馮時出赴軍前是日御街毁拆道塲大金元帥榜東西朶樓别立賢人以王兹土都人慟哭九日孫傳等復集議再三為懇告之書付吳开莫儔以出然廹於威勢亦不敢堅執也傳等第四狀准元帥府劄云云右傳等竊詳國本趙氏祖宗徳澤深厚在人日乆累於前狀瀝懇控告今来渝盟失信既止是上皇與前主其子及支屬並不干與尚兾恩造再賜詳擇庶得中外帖然不至生事若不從懇請必欲選擇異姓自中及外委無其人兼實難於自舉伏乞元帥府選擇敢不一聽台令又第五狀傳等與百官具狀申大金元帥府外尚有不盡之意不敢自隠今更忍死泣血上干台聽伏以前主皇帝違犯盟約既已屈服屈服而舍之存亡繼絶惟在元帥不然則有監國皇太子自前主恭命出郊以来撫鎮軍民上下帖然或許就立以從人望若不容傳等伸臣子之情則望賜矜念趙氏祖宗並無失徳内外親賢皆可以擇主若必令擇異姓天下之人必不服從四方英雄必至雲擾生靈塗炭卒未得安傳自知此言罪在不赦然念有宋自祖宗以来徳澤在人於今九世雖匹夫匹婦未忍忘之又况傳世食君禄方主辱臣死之時上為祖宗下為生靈茍有可言敢不避死伏惟台慈特賜矜察是日留守司榜率百官耆老於十日午時畢集南薫門同共懇告請車駕還十日孫傳率百官父老畢集南薫門號哭數刻具懇云云今在南薫門拜泣竢命不勝哀懇痛切之至元帥府劄子吳承㫖賫到文武百官樞宻等狀二道備已洞悉右契勘朝廷所以㓕者盖趙氏罪深也况㫖丁寜務在恤民今来堅執迷惑累有所請復立趙氏甚不應理若謂廢舊立新難復聽從趙氏太祖孰與推戴自立尚可况遵依聖詔擇賢共立孰謂不可兼早有文字惟貴道德不限名位髙卑本欲利民今諸僧道軍民耆老既乞行府選擇行府於在京官僚未諳可否但想在京自下為首勾管者必是可舉所以行府欲立本官請在京文武百寮軍民僧道耆老照㑹此意若所指在京為首官員可以共立早具本官名銜狀申如亦未可即依已去文字須得共薦一人限今月十一日狀申趙氏支屬即不得過今日與發遣出城如或此時不見薦舉及不發遣必當别有悔吝毋得有違又牒以善利門下人員輙受文狀嚴加懲戒訖慮京人猶以投狀為辭别敢推注令諸在京孫傳等依吳承㫖莫學士等責去文字日限施行是日百官軍民於南薫門泣告乞存立趙氏不得逹至午後復吳开入門曰此事不可也开哭衆愈哭是日第六狀某等已累具狀乞元帥府推慈軫恤趙氏存全社稷許國嗣主歸國降號稱藩永事大國或立監國嗣子以從人望或選立趙氏近屬使本國生靈有主中外安帖以全大國弔民之義某等今在南薫門拜泣俟命既而开儔等云尼瑪哈大怒明日二事不了便舉兵入孫傳語衆曰上䝉塵托孤子傳豈忍自脱分付與人請從皇太子徃死生以之衆偉其言是日取皇后皇太子甚急先是太上皇出孫傳懇告且留皇后皇太子以主國事至是復来取开儔㑹百官侍從宿於禁中乞致仕者四十餘人十一日午後皇后太子出門車凡五兩百官軍民奔隨號泣拜於州橋之南攀轅號慟徃徃隕絶於地至南薫門太學諸生擁拜車前哭聲震天車中有一人大哭擗踊於上其他徃徃皆氣塞泪盡無能哭者時薄暮將近門猶聞車中呼云百姓救我百姓救我敵守在門下者廹行不得已出初大金詔至留寺同勾集侍從宻問又令並不令人知懼因而生變但日率軍民迎駕哭於南薫門下者數十萬人至是已發兩宫不免揚示及遣范瓊等説諭皆飲恨垂泣莫知所言孫傳隨太子至南薫門欲出范瓊以死拒之范瓊先以危言讋衛士然後益兵擁皇太子都人憤疾宗室近屬收取幾盡徐秉哲嘗諭捉事輩曰失一人則罪在秉哲矣於是復召百官㑹議相視乆之計無所出衆曰今日當勉強應命不然一城生靈屠戮于趙氏何益既無善䇿不若舉在軍前者一人張邦昌舊在宰相姑舉之以塞命想二帥必有所屬議遂促开儔復以議状徃云准元師府牒限十一日須得共薦一人者契勘自古受命之主必上膺圖籙下有勲徳在民或擁戴近臣或英豪特起有大材畧因而霸有天下方為人所樂推今来本國臣寮如孫傳等召自外方被用日淺率皆駑下迷悞趙氏以至亡國人皆懷怨方且俯伏謹俟大誅若付之土地俾備藩屏必為百姓忿疾立至變亂上負選用之意今来元帥之令備到詔㫖嚴切舉國皇皇非敢違拒實以在内官寮委無其人伏望元帥台慈體念乞於軍前選命張邦昌以治國事如軍前别有道徳隆茂為天命之所歸者乞賜選擇則本國臣民敢不推戴其日早於宣徳樓曉示録白金人文字從官往往致仕莫能供具乃取班簿見在京官員名銜以報是日孫傳張叔夜不簽書唐恪書訖仰藥而死十二日取六部人吏並孫傳張叔夜出軍前吴开莫儔自軍前入城議事百官父老復號泣懇祈於南薫門晚开傳以軍前文字来指揮請疾早勾集官吏軍民若並舉張邦昌者帥便連署各於本銜親書其名皆後名下押字仍於年月紙縫用在上官印限不過此月十三日申上便與册立入京如别有異見别具狀申只不許引惹趙氏若别舉賢人者亦許不阻敢有逗留不赴議所者當按軍令是夜三鼓御史臺告報百官不限大小使臣致仕在京宫觀僧道耆老軍班限十三日絶早並赴宣德門集議狀申伏奉元帥府依軍法十三日百官集議狀申伏奉元帥府台令應在京内官員各於本員親書其名者伏念孫傳等累具丹誠乞立趙氏伏奉嚴令終未允從重念二聖既䝉大恩許令圓聚滿城生靈皆可全活孫傳等痛切惶懼不敢稽違今用元狀連粘在前各謹書名銜繳納伏望更賜詳酌是日以申狀曉示凡金人詔及孫傳等狀皆垂於宣徳門外是日皆赴秘書省士庶赴東朶樓軍民赴大晟府僧道赴西朶樓集議推戴張邦昌事内樞宻孫傳張叔夜中丞秦檜堅願盡心趙氏不肯事張邦昌皆為軍前并其家屬取去以吏部尚書梅執禮行留守事初百官集秘書省莫知議何事凌晨有賣朝報者并所在各有大榜掲於通衢云金人許推擇趙氏賢者其實奸偽之徒假此以紿百官使畢集也縁是百官各趨赴既集即秘書省門外環以兵乃令速薦舉張邦昌間有預知其議不赴議所者孫傳又令范瓊以薦舉邦昌事説諭軍民等於内前而軍民耆老僧道四顧無言不過唯唯而退獨太學諸生對以集等所見殆不其然瓊恐軍民視效乃髙聲折對者曰當今為忠不可盡可為孝遂令諸生歸國學辭以當詣學前相見時孫傳張叔夜已出獨時雍主其事晩百官饑但見出白紙數十幅令書職位姓名而退秘其狀詞不以示衆薄暮开儔繳狀以出金人悉取索宗室近屬出軍前取學官十人明經學生三十人十四日金人来取内侍司天臺僧道秀才少府監官吏及冠子帽子裁縫染作木工鐡工銀作隂陽伎術影戱傀儡小唱等并其家屬什物自此直至二十日方絶悲哀之狀不可言是日髙尚書請王時雍議事於善利門夜三鼓开儔賫到軍前牒己申册立張邦昌為皇帝訖謀取册寳及一行册命禮數又有指揮再要金銀采縀數足乃止聞善利門議盖為此也上有親批為軍前取物皆即供去金人来取鄭紳家屬司業董逌勸諭願徃北方為師者給馬一匹錢二十萬即曰投狀者滿三十人吏部侍郎李若水初名李若冰始金人至京師朝廷割太原中山河間三鎮以和二月賊衆北歸尼瑪哈慮河東之師襲其後留攻太原是夏求出使者大臣以若水應詔入對上竒之遂扺河東與尼瑪哈力言講和之利敵許之因遣王汭與偕来是時太原失守敵騎已南十一月尼瑪哈至營於青城齋宫斡里雅布營於劉家寺兩軍并力長圍遂合上數遣若水出使見尼瑪哈且求成敵偽許之及城陷若水縋城出見敵稍以爽約責之敵既斂兵不下上出幸敵寨若水扈蹕既還堅定和議以若水為吏部侍郎及駕再幸軍前復從行敵督所括馬及金帛婦女伎藝益急回鑾稍稽中外危恐二月六日果行廢立是時若水侍上側極力爭之且責之曰爾許我和屢矣天子為生靈屈至尊親来計議既以詭詐苛留又輙敢悖逆如此何也若水知意已定因抱上大慟且罵曰爾曹狗彘之不若也逺陋之人敢廢中國聖明天子乎吾當以死爭之茍不從吾言則神人共怒爾亦安能長乆俱為萬段矣敵人大怒因使之拽去以馬箠鞭其口面流血反縳之置空舍中三日不與食若水罵不絶口已而遣其貴臣髙慶裔来以好語喻曰公忠孝人也大金將寵用公不患不富貴何不少屈徒死何益也若水曰爾曹豈知臣子有忠義之節乎我大宋忠臣也聖主被辱恨不手殺汝輩以謝吾君而乃以富貴誘我我有死而已因極罵之敵知不可回也遂斃之棄於道周有憐之者因宻瘞之其給使親見本末因逃歸城中具言之且知所瘞之所四月十二日敵騎去其父與諸弟出城得其尸已六浹旬而不壊如生焉五月今上登極於南京遂贈觀文殿學士官其子若弟凡七人知樞宻院事太子少傅留守孫傳字伯野上即位傳累遷刑部尚書擢同知樞宻院事靖康元年冬金人兩軍㑹城下樞宻聶昌出使敵中以傳遷知院事方敵之攻也傳親當矢口閲日未嘗少休城既不守上將幸敵寨命傳居守十一月二十七日夜上以御寳付之傳用縑為囊繫之肘間親加撫循迨上歸城中帖然明年正月上再出又申前命且使兼太子太傅以保䕶東宫乘輿果不歸傳屢上書極陳利病鐫諭二帥請大駕還不報二月六日金臣吳开莫儔自敵中携廢立檄書来中外震駭傅大慟乆之曰吾惟知吾君仁聖可帝中國茍立異姓吾當死之又數請再立上明日敵大闢南薫門鐡騎極望闖門而陳且索太皇帝后諸王妃公主傳獨留中宫太子不遣宻謀欲以黄金五千兩使人匿太子於民間别以狀類太子貌并宦者二人擊殺之並死囚數人以其有首同死児并宦者尸送敵中告以宦者竊太子欲投軍前都人爭之擊殺宦者誤傷太子因以兵討斬其為亂者茍尚不已欲以一死當之自初七日至十二日無肯當之者傳撫膺大慟曰不謂中國無一男子吾太子太傅義當與太子同死生今主辱臣死之時敵人雖不索吾當從太子行求見二帥以義責之以祈萬一然後就死時方在皇城司伺同太子出其子因来省傳叱之曰使若勿来而竟来耶吾分死國矣雖汝曹百軰来吾心不可移也叱使速去勿亂人意其子亦曰大人以身狥國某何言哉願大人力保太子遂以留守事付吏部尚書王時雍有頃皇后太子出南薫門求出見二人守門其人曰軍中唯欲得皇后太子留守何為出耶傳曰主上出辱太子復出我宋之大臣且太子傅也上既不回當以死從太子幸為速白元帥其人許為禀之是夜留門下不動黎明敵人開門以尼瑪哈命召之出自是後死生不可得而知也簽書樞宻院事張叔夜靖康元年冬守鄧州時金人再舉陷太原眞定始詔天下帥守各以兵入赴國難十一月敵至近畿諸道之師未有至者叔夜首以官軍及民兵萬六千人至都城列營於戴樓門外金人稍以兵薄城叔夜屢擊敗之上為親幸南城登譙樓慰諭且除為簽書樞宻院自城上以毬文金帶賜之敵大集乃移師入門京師失守上再出郊敵使吴开莫儔連日入趣立異王王時雍以下㑹議秘書皆請立張邦昌叔夜獨抗䟽力言不宜廢趙氏有告以恐貽金人怒者叔夜不聽既而敵人索赴軍前遂留不遣太學生徐揆者上再出郊被留不歸城中震擾計無所出揆具書極陳以為元帥欲計之善莫若親宋則大金獲無窮之利茍吾君不歸中原自此必亂則豪傑必出豪傑既出豈大金之利哉委曲千餘言祈必歸吾君而後已䄂書至南薫門守門人逹於尼雅滿翌日敵使人召揆出遂留之十五日王時雍集百官作推戴表軍器少監王紹草之是日御史中丞秦檜乞立趙氏敵怒追詣軍前開封府榜益催金銀人不聊生悲戚愁歎皆欲自盡又集從官議各分定貴戚家復行根括如鄭紳張衮内侍之類皆平生貪黷之人前日不無藏匿者既到敵廷遂自言所有敵人復索至於再三敵取宗室宫内人僧道各四百人在京粟麥數萬牛騾車仗千乘先是敵取宗室雖踈逺者不免其間亦有藏匿但龍徳寕徳蕃衍六宫為之一空聞已有指揮初六日在城外官並隨舊君城内官並事新主开儔又傳到金國書請在京官員應有司事務依舊管勾并面奉元帥台令軍前所須並令在京官員早與應副不得託疾在假十六日戸部郎官李知㡬在南薫門交納銀帛見敵中劉常侍云兵已不下城但立新君後限三日逼遷都居民盡出意在捜取積聚蕩毁城池而去其説初甚峻今方有商議矣都人惶恐遂少解又催寳册狀及儀物諸人家屬甚急是日戸部散軍衣軍前大怒以為擅支報以有司年例乃止上有批字取應用物末云且煩應副仍書名押字見者掩泣又上皇来取大小塊玉并後宮才人去十七日取何㮚髙俅并隨上出在軍前人家屬令内中庫藏金帛悉送軍前已取宗正玉牒又要二卿并粳米二百石供上皇已下御膳差官抄劄龍徳寕徳宫金約二十餘萬兩鄭紳家銀五千八百兩二帝既出兵民潜入宫禁及龍德宫盗物而上皇之服御滿市十八日元隨肅王張太宰路樞宻三節官吏入門傳聞康王領兵在鄆州分屯聞徳以和議不進軍前以前日擅支軍衣盡取府庫絹四百餘萬又要車牛千兩開封府又榜催促金銀三日交納盡絶如更遲延致軍前勘問必定捜掘與鄰保一行軍法取景陽鐘并簴宫嬪并皇族盡出郊十九日軍使来令王徐二尹梅戸書王戸侍等跪聴令云李若水初言銀可滿三百萬錠何為不遂坊巷今等第均科三日不足留守以下依法施行諸人大恐二十日有張邦昌使臣入門云去年十二月二十日自燕山府南来今年正月十五日到軍前燕山府至京更無居人皆金人寨京城外悉金人寨圍之御筆賜徐秉哲朕之宗廟二百年矣為閹宦奸臣敗壊朕父子兄弟枝葉致無所歸仰徐秉哲多出文榜曉諭軍民善事新主指揮左藏庫支錢一千貫買針線𤓰虀来并取衣物皁角敵使人徑入内廷捜取珍寳噐皿等自五代祖宗以来所畜并收江南浙蜀所有上皇二十餘年所積珠玉一旦取去牛車擔負襁屬不絶國人嗟忿不忍正視招聘太學秀才六經各五人以為北方師資國子監給錢三百千狂率之士應者紛然取孫傳耿南仲延禧家屬敵使督金帛者旁午四壁以從官臺官各一人提舉催促府中差官巡門提轄四壁又添官十員指置收買仍令諸倉以米豆换易軍前所須雖至太常祭器亦般取去二十一日益催金帛并取牛車及打角匠留守王時雍寄㑹侍從職事官皇城司議遷都初立四議荆南維掦襄陽金陵李知幾乃再叩劉常侍以逼遷之意云此事初實惡今既立主聽從其便議遷乃好意無可疑者翌日聞議遷回説已定金陵二十二日軍前指揮集議勸進趙良翰自軍前来云路允廸初至金人前賀語以立新主事且以太宰目之兾其樂從路叩頭祈請不已二帥大怒遽命監留追其人從等回二十三日申時白虹二自東北向西南貫日或云四更初白氣如虹自南至北貫穿須㬰西南至東北天明而隠金人焚封丘陳橋等門令拜表請張邦昌三日内再納金七萬五千八百餘兩銀一百一十四萬五千餘兩表縀四萬八千四百疋又遣使督提舉官以金帛遲延堅欲勒赴軍前嘗曰京城總七百萬除髙力下戸寜不出金銀一鋌耶明日敵使来勒留守大尹提舉官供狀銀五日納足元數戸部支米十萬石置場博易至是市中倉米石不下二十千麫一升五百騾肉斤三千菠菜斤六百他物稱是棄赤子於地無數餓莩所在如積自帝蒙塵以来京城無君四十餘日無監國三省者半月家家毁器皿屋室充薪日辦糠籺及敝衣恐隨主遷徙或謂當如真定太原限日出門盖敵初破眞定放人出逺縱兵殺之敵人般運器物自陽武九十里黄河内入北青州徑趨大金二帥姫侍各數百皆秀曼光麗紫幘青袍金束帶為飾他將亦不下千百人壁玉珍寳山積求取無厭内侍權貴向鬻爵納賂者盡歸於敵矣是日元帥康王次濟州二十四日皇帝令王宗沔持詔賜大戸云某之宗廟公等所悮勉事新主勿思舊君内中小庫金銀盡般来以為渡河之費敵使来督金銀李知幾見劉常侍云昨縁根括不盡三軍決欲入城前三日隂晦乃止議此事而國相太子確然不允事止還晴亦城中之禍然無以為慰恐須作一場惡公事當且應副之也二十五日大風埃不可行敵使趙少監軍指揮請八人提舉官赴南薰門受約束人皆重其行相謂曰吾儕倘出門必留營不返矣或曰受朝廷文字催促纔三日今三日而所納之數比前一月反倍之復何罪可留正猶豫間敵又遣蕭將軍促之不得已遂行既至門監軍濟稚郎君者路坐呵責不容辯戸部尚書梅執禮戸部侍郎陳知質刑部侍郎程震給事中安扶皆擊死仍斬之棄其尸於門不令其家以金銀贖侍御史胡舜陟殿中侍御史姚舜明王候各杖百幾死乃下令曰根括官已正典刑金錢或尚未足當縱兵自索既而宦者復語二帥曰試許士庶以金銀换米麥當有出者已而果然遂督廹益急城中驚駭不知所為留守司差官百員分定街巷不問貧富徧加根檢下至貧民一分一錢之㣲亦取前兩府尚書大尹各金二十兩銀五百兩表縀三十疋下至寄居致仕選人校尉各以差輒輸納科配官絡繹㕓市既定數目日下輸納稍有違限發遣家屬赴軍前至此人不聊生矣敵人令稱科配不得用根括二字内臣恨取去王枝等怨所遣官吏既至敵壁乃紿言城中金帛取未及一二分官吏隠蔽不肯用心敵必欲元數督責日急戸部置場收買金每兩三十千銀二千七百又以象玉珠犀腦麝沈檀之屬准折金帛之數二十六日開封府申軍前乞取四尸許之二十七日都人盡赴開封府認納金銀分四壁受納府并不給又盡要城中草是日百官復㑹議二十八日保康門裏火㳂燒延寜宫頃刻而盡時元祐皇后居宫中急就天漢橋南遇仙店門垂簾幕以避移居觀音院回私第是夜白氣貫斗大風寒二十九日敵偽傳皇子立以張邦昌監國蕭慶知樞宻院孫傳太宰吴开左丞莫儔右丞都人大悦敵遣使人普净寺取朱勔家書盡取油衣庫什物發太醫局并生藥玳瑁等送軍前三十日放内侍三人入城敵使趙少監郭藥師来以珍寳賂之大悦提舉官既被害復以四人少尹主其事懇以犀象珠玉充折是日开儔来報張邦昌且先入城以觀人情仍令开儔語城内人萬一有踈虞即一城為墟更不他釋矣於是治尚書令㕔及西府以待之靖康要録卷十一
