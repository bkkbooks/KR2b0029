body:
  text: 靖康要録卷八八月一日聖㫖陳瓘子正彚可與一九品官二日聖㫖葉著令洪州居住臣僚上言蔡京凶熖方熾之時有支派僅屬之人平時庸賤况于下伍為民役者亦飾以衣冠而爵祿之既而授職遷秩為州縣親民官者不可勝數今有南劍州通判蔡倬者昔居鄉為木匠今南劍人以通判博士呼之蓋其取侮多矣貪汚猥瑣市井有所不為所巡歷處括責誅求無物不嗜乞即體究施行仍詔諭諸路監司凡州縣吏有係蔡京族屬奏官不通世務務與為好者並具名奏放罷以清仕列奉聖㫖蔡倬特勒停餘依奏三日詔同樞密院事种師道前去巡邊交割宣撫司執事召李綱赴闕沿路巡視防守之具徽猷閣待制折彥質宣撫司參謀官臣僚上言祖宗以來天下禁兵皆使之習攻守戰陳之法挽强擊刺之利至于它技未嘗習也用心專而藝能精近年以來上之帥臣監司下之守倅將副多違法徇私使禁卒習竒巧藝能之事或以組繡而執役或以機織而致工或為首飾玩好之事或為塗繪文縷之事皆公然占破坐免教習名遍卒伍而行列不知身為戰士而攻守不預至有因緣請託升遷階級或在衆人之上遂使轅門武力之士困于差役之勞末作庇身之人復享安閒之利所以兵陳教習之法日廢工匠伎巧之事日多兵政弊至于此不可不改欲乞除廂兵合用匠外如有尚襲故態輒敢占破禁兵為末作者嚴行禁止奉聖㫖依奏五日司封員外郎許亢宗除起居舍人太宰徐處仁等言天文見異既驗實于保章政路非人宜自拘于司敗薦布囊封之懇未行䇿免之誅尸祿為羞置躬何所伏念臣偶緣人乏叨預政機雖有戇愚慕蕭生之憂國略無事業如伊尹之格天致星氣之飛流勞宸衷之警戒靜言塞變敢復逃刑爰藉藁以自陳終叩閽而莫聽雖一人退託引過失以自歸然四海沸騰謂燮調之安在伏望皇帝陛下稽格王之訓採輿論之公原天異之來臻皆具臣之所致博求賢佐共修五事以承天毋蹈虛文徒使百官之備物批答應天消變係政之修與其引咎以屢陳孰若和衷而圖治所請宜不允七日臣僚上言竊見陛下自即位以來求直言讜論崇奬臺諌優容聽納期以辨正邪明國事不使憸人並進以亂忠良誠中興大業汲汲願治之真主也然巧言似正大佞似真懷奸飾僞之人陽為正直而隂回邪僻以害陛下之初政者臣不敢以私恩而廢公議也謹按朝奉郎李光􅍾邪枉之心為諂諛之行趨走蔡攸之門傾心死黨附麗權貴左談右說欲保全蔡氏父子方京之未敗也則鉗口而不言及京之貶西都也知天下之共憤鬱而未伸昌言曰須置京于湖南上下夫以京之過惡夫人怨怒雖誅于兩觀之下未足以快天下之望而光欲鼓惑人聽厄塞公議是欲以杜論奏之源其不自量也甚矣厥後亦已窺陛下之意伺臺諌之評方始共論蔡攸尚肆面謾以為大臣黨蔽蔡氏蓋不知黨蔽之者實光也自充符寶兩擢而任侍御陛下于光則厚矣光不思盡忠報陛下于萬一而止知歸恩于私第陛下稟堯舜之聰明顧此憸佞輩久已灼見其用心姑務涵容以俟悛革彼豈知天心之至仁哉乃覆出為惡尚欲與蔡氏為地公肆狂言動搖國是挾奸罔上誠如聖語聖恩寬大猶欲畀之民社彼民何罪焉公論沸騰罰不當罪伏望早賜竄逐使天下曉然知懷奸之人有不得幸免者奉聖㫖李光送吏部與逺小監當臣寮上言臣聞奸臣假爵祿以示私恩佞人懷私恩而忘公議唯知植黨莫知報君唯知徇情莫知體國崇觀以來此風尤熾末流之弊幾危宗社陛下戢奸懲惡壞羣散黨欲納邪佞于正直之域變讒諛以忠義之風虛佇求言傾心聽納可謂至矣而顧私恩損公義者尚爾也謹按新除屯田員外郎程瑀以瑣瑣之才陛下亟擢臺省造膝之間聖意優容眷顧可謂厚矣不思盡忠以圖報稱而交朋之私是重君臣之義乃薄究觀􅍾藴灼見朋附此而不懲何以示戒乎伏望睿斷竄之逺服奉聖㫖程瑀送吏部與逺小監當日下出門侍御史胡舜陟奏伏見中書舍人朝說之奏乞皇太子講孝經讀論語間日讀爾雅而廢孟子且曰國家設科以孟子配六經視古之黜百家而傳明孔氏六經者異矣又曰以孟子配乎孔子而學者發言折中于孟子而略乎論語固可歎矣臣竊謂孔氏之後深知聖人之道者孟軻氏而止耳漢之大儒無過于揚雄雄之言曰諸子者以其知異于孔子也孟子異乎不異又曰孟子知言之要知德之奧非茍知之亦允蹈之唐之大儒無過于韓愈而愈尤推尊孟子以為道者堯傳之舜舜傳禹湯文武周公孔子孔子傳之孟軻軻之死不得其傳焉又曰孟氏醇乎醇功不在禹下又曰求觀聖人之道者必自孟子始本朝大儒無過于歐陽修蘇洵與其子軾修曰孔子之後惟孟軻最知道洵曰孟子之道語約而意深不為巉刻斬絶之言而其鋒不可犯軾曰自孔子沒諸子各以其所聞著書而皆不得其源流故其言無有統要若孟子可謂深于詩而長于春秋矣又曰晚而讀孟子而後觀乎百家小說而不亂至神宗皇帝聖學高明尤好其書故以之設科取士夫以揚雄韓愈歐陽修蘇洵蘇軾千餘年間所謂大儒者數人而已皆以孟子之道同于孔子稱曰孔孟說之何人乃敢非之說之本州縣俗吏初無學術豈知孟子若以孟子為非胡不數其戾六經者何事異孔子者何說既不知此巧以為百家而斥之此特見今日不盡用王安石之學而安石常自比于孟子宗尚其書遂使孟子亦得罪焉其趨時過當議論不公如此不惟欺罔聖聰使皇太子不聞七篇之義以開發智慮臣恐此說一傳惑天下學者使後進相習成風妄出臆見詆經誚史無所不至害教甚矣願陛下詔東宫官依舊例先讀論語次讀孟子說之知識乖陋豈宜輔導春宫亦乞睿㫖罷太子詹事奉聖㫖東宫依舊讀孟子九日聖㫖星文見異適當暑月止御便殿今後常朝可避殿如故事以稱畏天戒之意詔以星變遍問從官具民間疾苦以聞降詔寬恤施行十一日臣寮上言臣竊見祖宗開基以不殺治天下以省事無犬吠之虞幾二百年雖三代盛時何以異也自崇寧以來羣小用事變亂祖宗之法故天道逆于上地理悖于下人倫廢于中害及草木禍及昆蟲欲望天下平治不亦難乎蔡京敗法度壞人才于內而毒流四海繼之者則有王黼使天下無可行之法無可用之人童貫隳兵政困將士于外而害邊鄙繼之者則有談稹致使天下無可戰之卒朱冲構禍于平江子勔繼之而又甚焉浙東浙西無不罹其酷楊戬造釁于西城李彥繼之而又甚焉京西京東罔不被其虐是以內則盜賊數起外則敵兵深入豈無自而然哉賴太上皇聖明悔禍自咎害民之事降詔遂罷去凶邪傳位陛下今事雖已往然陛下為民父母獨不追憫之乎蔡京童貫臣僚論擊章數十上其罪狀言之詳矣而朱勔李彥罪惡尚未得其詳焉臣實知之不可不論朱勔以凶悍之才資剽刻之性隂與蔡京結為死黨其在兩浙也托御前生活為名恣為不法交通宫禁無復忌憚初置局于平江騷擾州縣慘虐良民民不聊生無所赴訴于是方賊因之而起衆十數萬以朝廷之靈經時然後撲滅其所殺傷不可勝紀兩浙為之一空勔于此時已當梟首以謝百姓朝廷不惟不加誅戮而任用之意愈甚于前天下聞之莫不扼腕勔之進奉也强奪民物高估其值悉從官給徑以入已而民户未嘗得也拘占諸路糧鈔以載花石之類官舟即不能足又取商賈之舟以繼焉一舟所載不過松一株或竹兩竿糧食腳乘之費數百倍于松竹矣然所支者朝廷之錢也所以奪于民者用朝廷之勢也所以般運者朝廷之力也是皆出于朝廷民力而獨曰勔進奉豈不悖哉朝廷不考其實徒善其進奉之物賞其進奉之名于是建節賜第賜女樂子孫皆得顯官利則歸勔怨歸朝廷凡今之所謂進奉者率皆如此甚可歎也凡民間一花一竹無不遭勔騷動而所費百端至于破産亡軀故浙中人户以名花異果珍禽竒獸為不祥之物有則急除之民心蓋亦可見勔又隂􅍾國柄進退士大夫有識之士為朝廷寒心而無恥貪冒之徒竟出其門至為侍從者多矣李邦彥天資狠愎輕蔑朝廷密交王黼相為表裏其在京東西也以西城所為名恣行凶暴凡民間美田使之投牒陳告皆指為民荒竟有無故而被譴斥者亦不可數應民間花木一經黃紙封記之後或誤致損壞則便以大不恭之罪加之是何小人奸吏皆取富貴逸樂而善人良民獨被困苦可不為大哀乎此義夫節士所以太息流涕為朝廷痛惜之也嘗謂勔彥暴殄天物害虐生靈聖人在上必殺無赦其因之至美官者陷民之坑阱伐國之斧斤由勔彥而被發遣者實可憐憫今彥既已死不得顯戮衆論不快臣愚欲望陛下將勔彥明正典刑其京西劉寄任輝彥董開李士渙王滸等各加逺竄有先身亡者自可追奪京東毛孝立王隨侯祥汪惇吕岯錢棫等未經貶竄者伏望依此施行其陳告天荒之人及乞括濼地白身投授承節郎劉文等悉行編配庶幾少謝天下其因忤勔彥彼罪者許自陳訴如潁昌府鈐轄范寥不應副李彥取竹遂以寥將蘇軾詩文墨跡模勒上石為十惡大不恭奏朝廷必特勒停顯屬無辜亦乞改正如此則寬濫之獄得以昭雪亦足以感召和氣消弭灾慝臣之區區言此者不惟欲陛下正勔等之罪慰無辜之民欲陛下知玩好之害不啻虺蜴可為將來之戒然陛下躬行節儉視民如傷菲飲食惡衣服惟恐一物失所決無此等之患蓋防微杜漸因事陳諌乃臣之職也惟聖主裁擇又臣寮上言臣聞豺狼當道安問狐狸古人忠憤之言也今塗路之人皆能道臣等論朱勔之黨而不及盛章舍豺狼而問孤狸者也按章納交于朱勔父子之間視國財如糞土惟恐勔家大小之不富也殺吳民于戲笑惟恐勔家奴僕之不悅也章之自富于攘竊而自厲于威勢者又未易勝言也况章近在長安明有飛揚跋扈之迹而刑誅不及臣愚今質之輿論謂先正章豺狼之罪而後加李士渙王滸等狐狸之誅又其屬有曽訴許圭劉願王崇吳子竒王子獻宋憲等當與滸輩同科亦不可赦㑹勘盛章見别作施行外奉聖㫖劉竒任輝彥吕岯毛孝立李士渙王隨汪惇錢棫宋憲王子獻各特更追兩官曽訴許圭劉願吳子竒並令吏部與逺小監當聖㫖應緣獻納錢物補官并貼納錢物改換新告不作進納之人並合作官户及理選限申明行下侍御史胡舜陟奏訪聞六月四日蔡京與其子攸至江陵府十四日猶未行知府李偃奉事愈謹一日而三見之公庫供饋絡繹不絶須索追呼騷動細民江陵有鹽商數十人怨京屢變法陷沒其財詬罵于道而偃差兵捕商一郡為之鼎沸又差禁卒數百人護京攸家屬復與買宅為久居之計夫京攸得罪于天下陛下赫然威斷竄之南荒而偃乃奉待之如此但知有蔡京不知有朝廷若不置偃重憲示之好惡臣恐嶺南守臣效偃所為供張將迎使之遷延不進則朝廷之威令沮矣况偃駔儈下流素以高資結京攸而竊法從奉聖㫖李偃落顯謨閣直學士提舉亳州明道宫十四日右司員外郎陸長民放罷以臣僚言押綱使臣徐燾納濕米麥送臺體究而長民折簡于司農少卿黃願為之受納願黜知楚州而長民放罷十九日聖㫖陸尚既已罷其格內嵗貢品物萬數極多尚為民害非祖宗舊法可並罷朱載上贈徽猷閣待制聖㫖楊時學行醇固諌諍有聲請開除職纍月懇辭宜從其志以勵亷退可特改除待制仍舊宫祠河東察訪使張灝申都統制折可求等與金人合戰潰散兩陳人馬那回還汾州團結奉聖㫖折可求降兩官差遣依舊張思正等令李綱體度凡降奪官資依舊軍前使喚責以後效聖㫖應邊功推恩不得時刻有滯聖㫖出戰士卒家屬可行下諸處常加優恤不令失所聖㫖著作佐郎劉岑借太常少卿充計議使差奉使大金國閣門宣贊舍人馬識逺副之宗澤借宗正少卿奉使斡喇布軍前李若水借祕書少監奉使尼瑪哈軍前副使並令選差限七日起發李若氷改名若水劉岑日下先次出試院並請緩師故也二十一日徽猷閣待制王雲借禮部尚書充大金國和議國信使馬識逺充副使劉岑改差充大金軍前和議使周望依舊充正國信使前差李處權指揮勿行所有計議使副並改作和議聖㫖陳瓘因言蔡京被罪歿于貶所可追贈諌議大夫二十三日王雲除刑部尚書日下供職詹度罷中山府路安撫使二十四日太宰徐處仁少宰吳敏論事不協紛爭上前聖㫖吳敏觀文殿學士醴泉觀使中書侍郎唐恪除少宰制曰周室任賢詩雅美甫申之維翰漢朝論相史官稱丙魏之有聲皆垂希世之名用起中興之治朕念疆場未靖輔佐罔功爰得真才付以機柄係生靈之休戚寄社稷之安危咨爾在廷聽豫明告正奉大夫守中書侍郎唐恪器識閎達德履端良學足以知治亂之原力足以任股肱之託召從外服智略輻輳于朕前敡歷政途風采想聞于天下渾渾忠義之氣憲憲文武之姿為時顯人宜膺大用肆升庸于右揆仍兼秩于東臺申衍爰田陪敦真賦於戲艱難多事莫甚此時謀慮盈庭當求善䇿念民力之已困恐國勢之易搖修政事以固本根謹關防以消外侮毋殫財而益賦毋瀆武以貪功顧後患之可虞惟前車之是戒豫違汝弼汝言豫從毋怠厥初庶永終譽可特授少宰兼中書侍郎制曰圖治有要所寶惟賢在人臣充位無聞則朝廷焉用彼相眷豫上宰久預政機謀猷罔著于事功體貌務全于終始誕敷明命播告多方正議大夫太宰兼門下侍郎徐處仁器質敦龎才能敏劭早年治郡素高黃霸之風晚嵗裕民竊陋桑羊之政比疇雅望進列冡司允藉老成庶殫忠懇矧國步艱難之日乃廟堂叶贊之時不知黽勉以赴功相與逡巡而圖寵乏可否之相濟唯同異之是聞冦患未寧念寸隂之可惜機㑹一失恐駟馬之難追道路流言士夫興歎覽封章之引咎見公論之騰喧俾解鈞衡進升祕殿即祠宫之優逸昭命數之隆崇併衍爰田陪敦真賦嗚呼任舊人以共政朕豈有意于遐遺詢黃髮則罔愆汝尚無忘于入告往祗豫訓其體眷懷可依前正議大夫充觀文殿大學士中太乙宫使制曰朕嗣承丕緒統御萬方當論相之初賴股肱之允協至臨事之際乃矛盾之是聞念久居于廟堂宜曲全于體貌我有明命揚于大廷通議大夫少宰兼中書侍郎吳敏性識靜深器資閎達高文足以華國鯁論足以濟時頃上皇臨朝遍歷從臣之選逮眇躬踐阼首登揆路之崇藉爾孤忠輔豫大業方冦攘之未靖顧宗祏之可虞有厝火積薪之危有垂髮九淵之懼爾乃玩嵗而愒日莫能知排難而解紛持首鼠之兩端乏鉛刀之一割寖稽使命潜失事機致公議之騰喧亟剡章而瀝懇宜解鼎司之重任就升祕殿之隆名均逸真祠併昭異數嗚呼閔勞以事尚素節之可觀益勵乃忠想嘉猷之未替往祗休寵勿怠壯圖可特授觀文殿學士醴泉觀使依前通議大夫尚書右丞何㮚除中書侍郎禮部尚書陳過庭除尚書右丞開封府尹聶昌除同知樞密院事御史中丞李回除簽書樞密院事諫議大夫吕好問除御史中丞侍御史曹輔除諫議大夫御史中丞李回殿中侍御史秦檜監察御史范宗尹陳述等奏臣等早求上殿見太宰徐處仁少宰吳敏為不和事雖迫于公議實出愚忠然語言冒昧上干天威義不敢安于本職謹各居家待罪以俟竄謫奉聖㫖放罪令供職孫覿除侍御史程振除開封府尹並日下供職二十六日臣寮上言臣等歷考自古中興之君商髙宗則得傅說周宣王則得仲山甫漢宣帝則得丙魏主相協心相與圖治故能伐鬼方攘夷狄單于慕義稽首稱藩載之經史不可誣也至若唐肅宗復兩京迎明皇非不大有功也而裴冕苗晉卿之徒相業庸謬肅宗之治因以不振稽古之士于此惜之伏惟陛下勤儉之德本于生知緝熙之學期于日益蓋與商高宗周宣王一無以異漢唐以下皆不足數然自即位以來于今三時邊陲未寧黎元騷動興滯補弊之效未有可觀者殆以宰相非其人乎謹按太宰徐處仁初以蔡京薦進自縣令不三年備位政府搢紳駭其速化而不聞其有善譽也自金人退師陛下採其治郡之能擢位首相蓋將與圖回天下之務取生民愁嘆之弊而盡革之而器局凡陋不得大體智識滯暗不通時變則不能宅百揆熙庶績以副具瞻之望太宰之職可冒居乎謹按少宰吳敏初以蔡京欲聨親議遂以辟雍私試高第入仕因與京結為死黨仕上皇朝搢紳目之位在劉昺林攄之右上皇內禪睿智先定父子授受夫復何疑而敏因蔡攸刺得密㫖乃貪天之功以為已有叨處二府竊據相位使其效力自贖猶或可容而以佞濟奸以私植黨凡其施設悉效蔡京意在專權固寵處仁之暗猶能識之二人因以不和而天下之事遂致不決每出一令行一政命一官除一吏不恤宗社之安危生民之利病惟務已言之勝遷延淹時者有之朝令夕改者有之遂使天下之人自春涉秋日望朝廷之惠澤而殊未有以慰其心也方今北敵方張重兵壓境河東之役師老糧匱為天下憂日甚一日而和議之使未遣擾民之事益繁怨囂並興上天見異榖未及穫飛蝗蔽空而處仁與敏傲然自肆略不引避意在歸過人主殊失愛君之義矧以小忿交爭黼座之前大臣之體得如是乎臣等採之輿言稽之舊典處仁與敏誤國負恩罪在不赦陛下仰念祖宗創業艱難之重上皇罪已傳位之心下恤四海蒼生翹首惠澤之久亟罷二奸别加圖任庶幾中興之業不愧于商周天下幸甚奉聖㫖徐處仁知東平府吳敏知揚州並免謝辭疾速發赴新任刑部尚書王雲使斡喇布軍侍衛親軍馬軍都指揮使曹朦副之許三鎮稅賦之數二十九日新知東平府徐處仁言衰老無堪乞致仕或宫觀奉聖㫖差提舉西京崇福宫陜西轉運司奏體究到知京兆府盛章修城壁大暑役民為法不公等事奉聖㫖盛章責授單州團練副使萬州安置聖㫖民力久困常宜撫恤應措置使不得騷擾民户使被實惠是月福州將兵作過殺知州栁庭俊就招安遣赴塞上勒至其將副劉政姚成等不能彈壓兵衆以致作亂至南劍州能捕擒首惡之人奉聖㫖將官許以功贖過其餘軍兵並特放罪劉班胡安國並除中書舍人日下供職九月一日臣僚上言伏見蔡京王黼當國除授出其私意輕用爵祿以示私恩此弊不可不革乃者張志胡松年以利物巧事王黼而竊法從當時中傷善良傾擠同列人皆畏之高伯振與黼有舊使為司諌三年俯首噤默自同寒蟬乃無一言及于政事間有論奏如太學類濟私試程文而已士大夫至今鄙笑不已李璆則蔡京之死黨輕儇無行專事口語在其黨中號能軒輊事機是宜竄斥終身不齒者也今皆復修撰中外惑之王賓乃余深上客諛佞無能略與深同嘗為侍御史無所建明其才可知矣奈何除太宰少卿凡是數者不當人心物議沸騰奉聖㫖張志胡松年高伯振李璆並與復直龍圖閣前除修撰指揮更不施行王賓與郡三日臣僚上言竊聞昨者出師河東大將种師中全軍陷沒兵威挫衄太原之圍至今未解上貽睿聖宵旰之憂益壯敵國憑陵之勢忠義之士憤悶切齒曽不知本兵之地實有以致之也師中老成持重號為名將練達敵情洞曉軍律擁百萬之衆出援孤城所當料敵制勝臨機應變以圖萬全之利必不輕舉妄發以僥幸速戰之功也同樞密院事許翰懦弱寡謀而好談兵輒以逗撓不進移文督責令出師以贖過師中素剛不受迫促翰從中制之所不能堪忘其萬死以決一戰卒至敗績陛下雖已恤其盡忠然師中含恨地下而翰之罪曽未暴白臣實痛之使翰百輩在朝何所云補而失一師中所係甚重謹按翰終始蔡京之門指天誓日結為死黨陛下踐阼之初叨除御史中丞未嘗以一言及京攸之惡而與僚屬議論即委曲開論以一身庇之又欲使其僚亦不復言聞者莫不憤疾首薦蔡氏族壻陳求道為臺屬求道以告訐得罪雖陛下灼見其奸不復用黜士論尤為不平躐遷樞府艱難多事之時移病謁告纍月不出今者尚以延康祕職邃殿近藩且翰在言路則黨惡庇奸以欺君在樞府則妄作生事以誤國迹其罪狀夫豈勝誅伏望睿斷重賜竄斥以為懷奸罔上之戒少贖師中將士九泉之寃奉聖㫖許翰落職宫祠五日聖㫖即位以來振淹起廢庶銷朋黨以厚風俗朝說之許景衡擢為侍從兼職東宫數嘗向論皆出親選今乃視大臣升斥以為去就懷奸徇私殊失事君之義可並落職與官祠免謝辭臣僚上言臣聞李唐諸帝其聰明英武無若太宗者及太子承乾廢以三子一弟未知所立其心亡聊取佩刀自向賴長孫無忌抱持以免乞立晉王大事方決雖其平時英略如此一為多愛所牽不知自處乃知自疑似之間能斷以大義無纎芥胸次者誠天下之難能也伏覩道君太上皇帝去冬鋭然以大位內禪于陛下不謀宫闈不聞閹宦不詢郡君使神器永有依歸其賢于唐太宗逺矣蔡攸出入密侍聞上皇倦勤之意甚久奸人多慮用心不臧不肯宣露者將有所待一旦上皇除陛下為開封牧攸知事勢已定又自度父子稔惡多時內憚陛下剛明遂授其語于吳敏俾之建白攸又贊除敏為門下侍郎其慮患深矣敏不自揆乃攘為己功羣小交口稱道為有定䇿之勳兹實駭聞內禪出上皇之意雖百吳敏何能為哉敏既貪天功以為己力猶為觀文殿學士知揚州揚州當江淮之衝素號繁劇而觀文冠于袐殿可輕以授之哉伏望明其罪惡以正刑章為後世臣子之戒奉聖㫖吳敏提舉亳州明道宫臣僚上言臣聞國之威柄惟賞與罰賞罰者是非之所以分而政事之所以立也若為善者不賞有罪者不罰則是非倒置無所懲勸矣伏見前宰臣吳敏因上皇有內禪之意遂乞傳位于陛下曽未纍日致輔弼自惟平生恐不能協副衆望乃招致賢能張大聲勢當是時也人皆稱之及敵兵既退浸生驕侈挾贊助之功偃蹇無所忌憚邊防之急不復措意將帥之任不復關懷器甲遲緩而不預為之備糧食稽遲而不早為之所般運失時蠧害為甚凡此數者皆當今之先務雖究心悉力猶懼不能濟事而敏乃恬然視之如平時可不為之寒心哉以至兀祐舊臣則抑遏而不加牽復蔡氏大惡則蔽覆而不正典刑使陛下之仁恩不能以下布而臣僚之章疏亦阻而不行焉不問邪正同于己者喜之不問愚知異于己者惡之于是士大夫失望民庶解體則今日之罷已為晚也敏雖罷相猶為觀文知揚州又德蔡攸所授之語惟思報蔡氏之恩略不顧君臣大義雖交章攻京攸之罪而敏橫身障蔽斥逐臺諌招引同門以為其助迫不得已凡三四貶竄僅罷置京攸于湖外而已陛下灼知其奸乾剛之斷投京海外竄攸嶺表分布子孫各置逺方京不及過嶺而卒于內地大不慰天下之心無有不歸咎于敏者方金人犯順李邦彥欲議和敏則以和為是雖三鎮之重遽欲棄與徐處仁欲議戰敏則以戰為然雖种師中逐敵出界不以為功王雲倍程北歸求尺書以議退兵敏遂阻其議及解潜折可求敗衄遂復請遣使以議和其失機會一至于此太原之圍幾年未解河北之兵既去復來敏方且檄河北諸將聲言襲燕其謬謀誤國莫不如此言官所擊稍涉蔡氏之黨則匿而不行進用之人稍有蔡氏之舊則力為挽引惟效京攸專權跋扈不知先國家之急又數與等輩交相矛盾懷奸積惡柔佞隂狠未見其比投之遐裔尚恐未塞人望觀文隆名宫祠優職豈宜畀之奉聖㫖吳敏落職仍報行言章直徽猷閣兩浙轉運副使程昌弼落職送吏部與合入差遣以臣僚言昌弼初由小使臣諂事魏伯鄒夤緣交結王黼李邦彥朱汝賢蔡京冒濫官爵故也六日聖㫖濟王府贊讀朝貫之宗子博士岑議份前知方城縣鮮于可金州刑曹于參朝奉郎吕好問新判西京國子監王震皆一時之秀可召赴都堂審察訖引對並與升擢七日聖㫖曽誠方元若江端本李彌遜邢倞並與郡免謝辭吉州防禦使真定府路兵馬都鈐轄劉􅀈卒八月間金人以三鎮不可得復兩道興師入冦斡喇布之師十四日入塞輒以衆攻廣信軍保州不克遂越中山兩攻真定帥臣觀察使李邈措畫乖謬至九月六日兵遂登城邈不能死為敵所辱而囚之時􅀈為都鈐轄以身率衆晝夜摶戰城上先是敵攻北壁􅀈力拒之至是敵僞移攻東城邈復趣􅀈往應之力攻兩日一夕潜移攻具還薄北城城中不知也黎明敵忽鼓衆憑堞而上城遂陷􅀈猶率衆巷戰麾下稍稍亡去􅀈顧其弟曰我大將也其可受戮乎因䇿馬挺刃潰圍欲出而諸門皆為敵守遂之孫氏園山亭中解絛絶脰而死九日臣僚上言蔡京恃吳敏之蔽滯留道途至長沙而卒識與不識無不罪敏之阻格言章不早投竄致京身死內地抵掌而歎者紛然蔡攸之罪不減乃父敏乃置之雷州雷雖在廣南其地濱海絶無烟瘴風土不異于中州此吳敏之私意也今若不置之海外無以正凶人之罪而快衆人之心無若使京之早斃再失天下之望奉聖㫖移萬安軍臣僚上言近嘗論列吳敏掩蔽上皇內禪之德當投荒裔以為不忠之戒陛下尚存體貌止令落職宫祠罪大責輕未協物論陛下自即大位屏去宫嬪不邇聲色近以星文謫見減膳避殿以消天變憂勤恭儉前古未聞敏身為宰輔自當仰體陛下至誠惻怛之意夙夜在公思所以報因邇者重造金器數百千置婢妾二三人以共娛樂自謂宰相事業如斯而已木石肺腸略無憂國之心是可忍也孰不可忍也以故內外細大之事一切不復經意同列詢訪但笑而不答伏望逺賜投竄雖未足償誤國之大過亦使之知罪不可幸而免也奉聖㫖吳敏責授崇信軍節度副使涪州安置工部員外郎李士觀奏乞為故相張商英詔太常賜諡命詞臣撰碑奉聖㫖依奏碑額朕當親書侍御史胡舜陟奏臣觀漢唐以來御戎之䇿有五曰和親曰守備曰征伐曰撫定曰羈縻皆因時而為之和親守備則施于敵人强盛之時漢高祖文帝是也撫定羈縻則于其衰弱之際漢宣帝光武是也至于征伐或施于强或施于弱必先之以中國富盛兵甲精鋭我有萬全之勢彼有可乘之隙然後可舉漢武帝唐太宗是也今我國家承巨奸誤國內侍持權之後海內虛耗帑藏空竭軍旅不振士不為用而金兵乘時肆其暴殄長驅乎中原圍守乎巨鎮而我動天下之兵斂四海之財不能少挫其鋒則所謂强盛之時也彼强我弱攻伐不可妄用而朝廷急欲解并門之圍不度彼己王師輕動于是种師中敗于榆次解潜敗于南關折可求敗于汾州劉仲元敗于大安驛自犯不韙自取挫衄以漢高祖之神武而又有謀臣猛將不世之才破秦項猶振槁甘受冒頓之困不敢與之較乃知敵人强盛制之當自有術不專以兵也所謂講和守禦二䇿誠今日之先務朝廷已遣三使往議和好可謂善矣更務自守並用二䇿善之善也伏觀今日命將出師悉援太原如救焚拯溺其勢可謂急矣介胄之士孰不欲踴躍而前搢紳之士孰不欲抗議督戰然兵家善教見可而進知難而止不敢必也茍不可進必之進猶羝羊觸藩何利之有徒失將士徒喪軍氣非惟不足以救太原適足以自取敝之道兵浸單寡則有不測之禍不可不慮臣願陛下以漢高祖為法與之講和漢文帝為法自為守備詔宣撫司勿督諸將決戰且據要害堅壁固守以養卒之鋭氣使彼有可乘之隙我有萬全之計相時而動以竒取勝天下幸甚昔突厥方盛唐太宗不得已而事之未幾擒頡利于北闕下敵人盛衰無常姑含垢忍恥以俟之未為晚也臣自聞河東失利朝夕深思竊謂計無出此者狂夫之言聖人擇焉伏望陛下斷而行之面奉聖㫖令劄付諸將二十日臣僚上言謹按王安中自尚書左丞建節知燕山府委任之意重矣借令無材可辦邊事至于敵勢强弱與沿邊實狀逐項奏聞使朝廷灼見利害審定取舍早為備禦之䇿而安中畏避童貫專務蔽欺終不端言其事數奏祥瑞誣罔諂諛以固寵祿養成邊患一旦敵騎長驅燕薊覆沒深入畿甸社稷幾危推原本因其罪與蔡攸等耳今臣僚論列以謂行法未盡乞斥諸逺方以為誤國者之戒雖以散官復居漢東近地恐公論未以為允奉聖㫖王安中移臨江軍安置十一日詔曰朕以嫡長受冊建儲十有餘年上皇畀付之意既已大定宣和七年十二月二十日忽條睿㫖建朕開封牧乃用太宗故事卿大夫知將內禪矣及二十一日宣制而百司庶府以至都人亦莫不知是時蔡攸領樞密院自知罪惡貫盈他日不免乃引給事中吳敏于宣制日入至玉華閣禁中深密之地非外廷臣所得至處又二十二日二十三日引敏連入蓋攸方經營江浙之行欲留腹心之人置在京師候伺動靜中外相應其事詭祕難使衆知引敏深密之地與謀耳攸既東行言章擊蔡氏者日至而敏傾身障之詭計百出終以敗露及蔡氏子孫皆逺貶而京子絛至荆南託進士黃大本附書寄敏為開封府緝捕得之其書責敏曰僕父兄于閣下可謂有德矣閣下自布衣登要途立功名始終于父兄交契不言自應知之閣下縱自謂我不出蔡氏我不為蔡氏其可得乎由絛書觀之敏之為蔡氏腹心明矣且朕以太子受禪何待人言若以謂嘗言則入玉華閣之時乃在降㫖建牧之次日何也攸乃詐傳命令以敏有建言之功擢為門下侍郎其奸僞締構乃敢如此是以上皇在龍德宫每見管勾官待制談世績李熙靖必曰內禪之事出我至誠不由人言言必滅族誰敢言者以此知敏未嘗建言但攸引入與為他謀上皇獨斷而為此冠軼古初矣吳敏乃以為己功可乎若敏輔相有力猶可贖罪况深險而好自專弛慢而不及事致今日邊事尚熾兵民未得休息投諸遐裔亦輕典耳故兹詔示可付史館仍布告天下十三日臣僚上言自蔡京當國欲快己私恐人擬議遂乞降御筆手詔出于法令之外不復經由朝廷欲乞自靖康元年以前凡所降御筆手詔令編修敕令所將祖宗及見行條貫參考刪修成書然後頒行目下且用元豐嘉祐編敕以俟新書之成奉聖㫖依奏制以定國軍承宣使王宗濋為奉國軍節度使充殿前副都指揮使臣僚上言比者金人愈肆侵侮并門之圍未解河朔之冦深入而我師數有敗衄退走之恥者士弗用命而氣不振也士氣不振則孰肯效死又安能助國哉倘朝廷于行法之際有以大慰人望而快其平昔憤怨之心則士之氣振矣且河東邊郡失守以至于今其勢亦可憂前後敗軍覆將所殺戮者不知幾何人孰不以欣代之失始于談稹招刺義勝軍致令耿守忠輩開門延敵陷沒要害之地遂至于此也河朔自收復諸郡人皆知必有今日之患向者長驅屠戮之禍城下要盟之辱不忍復道孰不知燕山之變蓋緣王安中身為安撫措置乖方既隂知其有變而嗜利固寵不以告朝廷乃夤緣黨與私求自便以歸致使郭藥師背叛降敵為之鄉導遂至于此也此非特士大夫知之閭巷之人皆知之凡嘗遭兵革之患者無不切齒憤恨思得此二人者而甘心焉今陛下倘將二人重加誅責則天下必曰聖上哀念我赤子之無辜而就死地故求首禍之人以正典刑則孰不鼓舞歡欣而相告哉如此則何患士氣之不振而不用命者乎奉聖㫖王安中移象州談稹移韶州安置十四日中書舍人劉珏言中書省送到詞頭以朝說之許景衡視大臣升斥以為去就懷奸徇私殊失事君之義並落職與宫祠者右臣契勘朝說之許景衡近者乞斥臣與之同省親見其事須至具實奏聞契勘前少宰吳敏係八月二十六日宣㫖罷相其朝說之九月初一日行徐處仁知東平府吳敏知揚州詞頭却作平詞致䝉門下省退回其朝說之于初二日改作責詞行出說之為見自來舍人行詞致有退換即為失職心懷慚懼求補外郡其許景衡為與尚書右丞陳過庭係妻之內兄昨來過庭任中丞日景衡除右正言過庭乞避親蒙許回避遷景衡為太常少卿今來過庭任右丞係三省執政官所以景衡乞行回避其事理又與朝說之稍異但二人劄子適然同日進入所以有可疑之迹上致陛下不得不以為懷奸徇私也臣竊以朝說之既見朝廷降下言章却作平詞致令退換此為可罪然求出非為吳敏也至于許景衡避親劄子求供閒慢差遣語言太繁蓋緣前來避親自正言超擢太常少卿今許景衡不識大體但知恐有求進之譏而不知有大臣升絀未可求去之嫌所以懇乞閒慢差遣乞非為吳敏也臣聞臣之事君如子事父茍有見聞不可以不上奏臣緣與之同者親見本末各有所因即非懷奸是致行詞未得更望裁酌明正朝說之行詞失當之罪許景衡不係本省却乞回避之過各隨犯以行黜責即可命詞所有詞頭臣未敢具草候敕㫖奉聖㫖依所奏命詞行下十八日聖㫖天井關賜名雄定關十九日監察御史張徴奏至南雄州將童貫已行刑了畢其首級黑漆木匣盛貯及用水銀生油養浸固護齎管前來未審何處交納奉聖㫖付密院交割檢坐前後臣僚言章并張徴所奏令開封府大字于市曹要閙處出榜曉示標首詔李綱罷宣撫使以觀文殿學士知揚州二十一日詔孫傳以玉輅押赴大金傳至中路而回開封尹程振言竊惟漢高帝舉秦如鴻毛取楚如拾遺威加海內遂成漢業而與丐奴議和親之約光武破王尋王邑于昆陽誅王郎銅馬于河北得復漢室號稱中興而卑辭厚幣以禮丐奴之使夫以高帝光武而不得志于丐奴豈知力不足以勝之耶蓋以愛養元元為心而不肯以所重要所輕也恭惟陛下玉立春宫恭儉聞于四海正位九五惠澤加乎生民是宜高拱無為以享太平然承久安之後致邊備廢弛軍政怠玩鋭兵猛將盡于燕雲之役故金人一舉逼都城踐河朔并門封豕長蛇日肆其毒竭天下之力以禦之連年動衆未聞得其要領以震驚氈裘之心舒發華夏之憤豈陛下神武不足以制之耶是猶三年之病而一旦治以藥石補以粱肉雖厚加調養僮僕扶持而未可責其大步疾趨勢使然也故臣願陛下結以誠信而沮其謀遺金帛而饜其欲外務謀和而內嚴守備數年之後國富民足將選士勵車攻馬良然後徐議大舉以刷吾恥未為晚也惟陛下實圖之臣不勝大願監察御史張徴除起居舍人康執權除國子祭酒尹焞補和靖處士二十三日臣僚上言契勘金人游騎侵犯河北都城備禦決可無虞理當更强外援如今春勤王之師無所統一沿路作過來不及期若俟臨時遣使決難倚辦萬一道路沮擁朝廷號令不以時達州縣緩急私自為計各相顧望亦無任其責者天下之勢治平則宜重內遭變則宜重外重外者宜假之以權令將佐士卒官吏財用足以應辦今擇人分總四道各付以一面令事得專決財得通用吏得罷置兵得誅賞倉猝之際合從以衛王室連橫以禦敵兵不煩朝廷警急措畫可以指揮以為救援此今日之急計也擇之既精待之宜厚委之既專賞之宜寵彼若不捐軀以報君父則不忠不孝之罪天亦得以滅之豈敢復有顧望哉謹條具如右一以三京并鄧州為四帥各帶都總管北京帥總北道河北東路京東東路西京帥總西道京西北路陜西京兆秦鳳環慶路南京帥總東道京東西路淮南東西路鄧州帥總河南道京西南路荆湖北路仍各置副一員出則留守事平日依舊一四帥分總四道止為警急帥所部勒止差撥兵馬移運錢糧令所部州軍各聽節制相為應援其餘事並依舊法一四帥舊係帥府處自依舊舊非帥府處幕府官屬依帥府差辟隨府置罷一合用兵馬並令所部州召募訓練以備差發仍于所差處不限文武選有謀略忠勇官統制合用錢糧並令所部州縣不限高卑選通曉財用官以逺及近迸儧移運别項摏管充差發兵馬之用取進止奉聖㫖依奏臣僚上言竊見臣僚集議乞于拱州潁昌府開德府鄭州各置都副總管內副總管用武臣緣上件委任所責非輕惟人才實可濟今日急難者用之不必如平時問其元初薦引及日前瑕疵以為窒駁如此庶幾可以得人若使集侍從臺諫同一處薦舉又恐人數不多難于推擇臣愚欲乞令六曹尚書侍郎開封府同集一處翰林學士兩省待制同集一處臺官在本臺各薦文臣可充都總管四人內有議論不同許别為一狀薦舉以充其數外武臣副總管四員乞令三衙都指揮使樞密院承㫖同集一處公共薦舉若此選擇必可得人不誤他日朝廷倚仗奉聖㫖依奏並限一日中書舍人劉珏准中書省送到詞頭一道中書舍人安扶繳到詹度差知荆南府令赴都堂稟知事訖發新任者按度人品凡下醜迹穢行嘗挂吏議共言柔邪無恥夤緣仕進向者童貫收復故地度率先附㑹建議之人故首除知燕山府高官峻職皆自此得之伏望重行竄責所有詞頭未敢具草奉聖㫖詹度為保守中山實有勤勞以功贖過令以次舍人行下者臣聞燕山之役毒流天下上則背違盟好失祖宗之信下則差科轉輸困天下之民外則致敵人侵侮然其事之作有倡之于前者有成之于後者有終始皆與其謀者若和詵薛嗣昌輩倡之于前也若沈積中談稹輩成之于後也至于終始皆主其事則童貫趙良嗣詹度是也今童貫趙良嗣和詵談稹沈積中薛嗣昌相繼斥逐度獨未責天下雖以為疑而尚有以為說者以度方守中山也今度以奸謀得脫中山雖貶斥嶺表彼乃欣然而乃授以使藩使之釋重寄而得安處召之稟議使得騁巧計以障物論此臣之所未喻也度之罪惡安扶己言之蓋其所陳猶有未盡者臣聞攻伐耶律氏之謀自度等啓之而朝廷猶豫未決宣和四年間度以書趣童貫云今不取必為金人所先伐燕之舉于是決矣是燕山之役實度趣而成之也北界賊張雁八談大措等殺蔚州守大金追捕至邊度招而納之金人借此興兵是金兵之作度實召之也去嵗之秋蔡靖以金人㸃集纍有奏陳度時守中山獨言不應有此是致上皇以其鎮靜特賜奬諭因此更不為備是金兵之作度不獨召之又實縱之而誤朝廷不為備也臣又訪聞去冬金人指名以索者四人其三則童貫張覺談稹其一則度也論度窺寵迎合以啓燕山之役其罪不在沈積中薛嗣昌之下論度招納叛亡以致金國之師其罪不在王安中談稹之下蓋直與童貫趙良嗣相上下今乃不特免禍而又過有褒擢此物議所以藉藉也度之穢迹醜行不可道于君父之前蓋今河北之人欲食其肉三尺童子與夫走卒賤𨽻皆羞言之薦紳士夫言及度者莫不扼腕憤悶然久不致敗露者以能廣行賄賂凡有位者多為所汙故力護其短以迄今日臣聞去冬金人鋭于長驅未嘗力攻中山今春之還為种師中襲其後故即引去度嘗妄奏功為臣僚所論按見誕謾矣豈可以為有功哉如謂其善守則宜付之中山不當易也謂其有謀則宜急使之守邊不必召之稟議也今太原失守中山被圍陛下焦勞形于玉色夜則忘寢食則忘味人皆歸罪于度意謂朝廷將行誅斥而付以荆南召之稟議臣恐天下聞之忠義者解體誕謾者復作為患非小小也伏乞陛下察安扶所奏及臣所論明正典刑竄之嶺表以謝河東河北人民之怒以釋薦紳士夫之憤以慰四海九州之心天下幸甚二十七日少宰唐恪等以星變潜消表請復御膳詔不允詔曰朕知天下之大以承宗廟之統夙興夜寐嘉與二三大夫同知此義宏濟艱難乃者權臣擅朝竊弄國柄幸時變故誘脅衆心深險自專乃敢貪天之力凶愎不遜遂成震主之威締交合謀呼吸羣動指天畫地睥睨兩宫交通私書申責舊約詭祕莫測包藏禍心公議沸騰奸狀親顯尚存大體稍屈常刑而事未革心同惡相濟興訛造訕怙終弗悛或譸張為幻起胥動之言或羣黨相維阻已行之令或顧懷舊恩以撓邦憲或僥幸多福以明去就倡導邪說謗讟紛然朕虛心以視研究其實申飭屢下益致喧呶有臣若斯為國之醜咨爾有衆明聽朕言毋訛爾心毋載爾僞克常其德以叶厥中朕則汝嘉亦有無窮之聞茍懷異悖德自如變亂是非規動朝聽國有常憲必罰無赦聖㫖詹度差提舉南京鴻慶宫聖㫖差北道都總管趙野副顔岐東道都總管胡直孺副朱然非西道都總管王襄副張果南道都總管張叔夜副高公純喬師中落職致仕差充京城南壁㸃檢器械閣門宣贊舍人張亢奉使尼瑪哈軍前劉衍奉使皇子郎君前并押賜禮物聖㫖河北河東路罷制置察訪司靖康要録卷八
