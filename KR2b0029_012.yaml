body:
  text: 靖康要録卷十二三月一日御史臺報百官詣南薰門迎張太宰以申時入城百官班迎對拜於道城外以鐵騎裹送及門而返交割與范瓊不管别有疏虞即入憩于幕次與從官語移時入居尚書省令㕔敵令從官卿監郎官十員晝夜宿直續增作十五員管掌事務并使臣十五員祇應三衙亦同宿守是日敵令勸進集議于尚書省傳曰邦昌卧病不食四日謂王時雍等曰諸公怕死乃掇送與邦昌雖督責而歸焉可免禍二日差給事中韋夀隆中書舍人李熙靖左諫議大夫洪芻兵部尚書吕好問工部侍郎何昌言軍器監王紹吏部員外郎王及之禮部員外郎董逈戶部員外郎李促工部員外郎李士觀刑部員外郎吕勤倉部員外郎魯慥光祿少卿黃唐傅著作郎顔博文並充事務官敵有文字來限三日立張邦昌不然下城盡行焚戮都人震恐有自殺者尚書勸進邦昌不從是夜大雨至晚方止三日敵使來趣勸進取推戴狀告報官員僧道百姓軍人耆老等盡赴令㕔立班推戴邦昌衆人泣勸再三方從留守司遂以推戴狀申軍前言京城日久無主伏望早賜備禮施行敵遣开儔傳㫖仰初七日行冊命之禮王時雍以軍前劄子所須金銀並要依元拋數目等第均科遂復分下百二十三坊每坊金四十四萬五千兩銀二百八十一萬四千一百五十兩表段八萬四千三百一十六匹出榜曉示諭下戶金不减百銀不减十表段亦百餘細民但發笑不復憂曰金人以立主事恐民不服先以此脅之耳已而果然四日或傳邦昌欲以刀繩自裁或曰相公城外不死今欲以塗炭一城耶乃止五日曹少監傳令請均科官相見於朱雀門以所約數少戒諭之械不納人戶數百人于開封府六日東上閣門榜告報文選人武臣承信郎以上并致仕尋醫侍養官于受冊日須管數盡要到如有違必重作施行禮部御史臺太常寺與閣門議定到冊命典禮儀注赴文德殿立班是日早有內親事官殿班數百人不忍屈節異姓先殺妻孥焚所居謀起義于金水門外統制宣贊舍人吳華為之首范瓊詐與之同謀悉令棄兵乃從後襲殺百餘人捕華并其子皆棄市又生擒十餘人斬之即以狀申軍前新城內人不知忽傳舊城門皆閉皆謂金人來屠城號哭之聲大震或云華陰結忠義二十萬謀入軍前奪駕布置甚備又有宗室中大夫子昉武臣髙士謨亦聚兵數成而敗至是與華合會是日散員營火百姓乘勢劫其私財頗衆衛士拒之因亂相殺左言范瓊因此殺華首後録斬吳華功以范瓊為正在觀察使殿帥左遷兩官云又云靖康元年正月女真犯闕華以所部解圍八月敵陷太原府朝廷遣華使女真軍中持國書見尼瑪哈廷揖不拜計議邊事責其貪利敗約氣徑語直敵帥愧服為追回攻威勝軍等處軍馬授書以歸十月召赴闕得對上問割地與不割地利害華對以北人有吞箭之誓入冦必矣乞措置邊備起陜西兵馬為京城援不復議和遂差華使陜西勾兵閏十一月二日出城敵騎已至會南道軍馬至遂同總管張叔夜入城上巡幸南壁華面奏乞量差兵馬奪路赴陕西叔夜固留華充統制官華纍乞出城外下寨使敵騎不敢近城且通東南路又密奏乞選日諸門并出兵分布期會為正兵為宰制為衝突為尾襲為應援可一戰而勝上以衆言先入竟不出兵敵攻宣化門填道渡濠華竊往相視自南壁守禦官開安上門所堰濠水三尺及盡泄蔡河閘水夜浸之不從及填道將合始省前議水已氷矣二十五日敵登城華率使臣親兵赴南薰門東策應手射殺執黑旗者十許人部曲皆散去華獨死拒於安上門東使敵不能西二年正月上再出青城華建言駕出必墮其計宰相何㮚不聽又請于樞密孫傅張叔夜欲因事至軍前計議叔夜問計安出華著論者三一車駕還內二敵人歸國三華死遂留華劄子繳奏言華有兩朝萬一可安之策願至軍前口陳不報二月八日上皇妃后諸王宫嬪盡出城九日華入內白留守孫傳言上皇已出乞力留皇后皇太子明日引見皇太子華頓言二帝出郊駕必未回願殿下堅避以固國本孫傅曰何辭以拒之華曰有內臣貌類太子敵或邀請則抱以登車出朱雀門密諷百姓邀留不可則墮之車下以死告奉尸以往仍以賑救飢乏為名詔忠義之士結為隊伍太子微服居中潰圍南去十一日太子竟出華乃于啓聖院置局名賑濟所募士就食一日之間至者萬計華陰以軍法部勒時今上為兵馬大元帥懷蠟彈由間道告急於濟州及約在外將相擁近城內外相應夾攻敵寨圖還二帝久之復遷居同文館其後附者益衆使臣郊用數千人勇士數萬多兩河驍悍之士既而孫傅張叔夜皆赴軍前敵人立張邦昌之議益急華議欲誅范瓊等數十人乃分兵約日突出十八門列為二壘與劉家寺及青城敵寨相對又遣蠟彈期以三月八日內外合軍部勒既定須期以發三月六日有班直甲士數百人排闥至華曰邦昌以七日受冊請起事華以衆不可奪華披甲上馬時已黎明北行至金水河四面皆范瓊左言兵瓊遣人紿華入帳下議事遂害之使臣數隊百餘人并戮河上華就死顔色不變極口詆罵其忠義之言凜然可畏華字義夫國初功臣吳廷祚七世孫性姿忠勇天文地理人事兵機無不通死之日知與不知皆為泣下七日早文武百官僧道軍民等會于尚書省令㕔已時造報軍前奉冊寶入門邦昌涕泣上馬西府門佯為昏憒欲仆立馬少蘇復號痛午時導引至宣德門闕下馬入幕次復慟有金人魯太師以下五十餘人持御衣紅繖來設于次外邦昌出次步至御街褥位望金國拜舞跪受冊寶冊文略曰咨爾張邦昌冝即皇帝位國號大楚都金陵邦昌御紅繖還次訖金人揖邦昌上馬出門百官等導引如儀邦昌步入自宣德門由大慶殿至文德殿前進輦却弗御步升殿于御床西側别置一椅坐受軍員等賀訖文武合班邦昌乃起立遣閣門傳指揮云勿拜時雍等復奏傳指揮云本為生靈非敢竊位又傳指揮勿拜又云如不蒙聽從即當歸避時雍率百官遽拜張急回身面東拱手以立是日風霾日色薄而有暈并初一日邦昌初入門時亦大風或云初上皇之未出門也金人㸃兵洗城穴城四壁每壁為五洞門以通鐵騎取東宫亦然會如期而出乃止是日以王時雍權知樞密院兼權領尚書省吳开權知樞密院事莫儔權簽書樞密院事吕好問權門下侍郎徐秉哲權中書侍郎李回權尚書右丞馮澥仍舊左丞周懿文自卿除大尹王及之為都水使者邵溥自侍郎升尚書大抵往來議事者开儔也逼逐上皇以下者時雍秉哲也脅懼都人者范瓊也遂皆擢用未幾時雍等皆落權為真正並繡韀張蓋獨好問出入仍舊頗形憂愧八日以胡思權戶部侍郎葉宗諤權司農少卿胡直孺權户部尚書前諫議大夫范宗尹仍舊職前吏部侍郎謝克家前兵部侍郎盧襄前中書舍人李擢並落致仕仍舊職李熙靖詹度並權直學士院是日天漢橋火焚百餘家金人放汴水人少安至晚又人語喧沸衆大恐頃之都驛火二更方息九日大風遣邵溥使南寨李會北寨報以欲詣軍致謝二帥至門先以狀申回傳會云皇帝不須出門好治人民俟要相見自往請也使來取金銀及在京鐵比緣朝廷多事百官有司皆失其職守自今出入局各遵常法御史臺覺察以聞十日軍前盡取宗室而四廂乃移文令坊巷五家為保勿得藏匿都人以為恨權戶部尚書胡直孺恐以軍前怪問遂免舟北般蓮花甲箭等是日風雨至夜大作城中什物並般出京北善利門朱宗權刑部侍郎陳師尹權太府少卿王及之權都水使者陳求道别與差遣葉份權左司郎官李健權右司郎官十二日敵遣使徑入景靈宫取陳設神御等服物田純亮曹易李公衍何作鮮于可朱褒等乞致仕從之工部侍郎何昌言乞改名善言從之是日手詔向迫大國之威俾救斯民于兵火而諸公橫見推逼不容自裁忍死以理國事豈其心哉出令之初有司乃以聖㫖行下載循昧陋殊震危衷夫聖孔子不居則豫豈敢自今與三省樞密院官議定處分及內外官司面陳得旨事稱面㫖內降及批出文字稱中旨遣官傳諭所司稱宣㫖洪惟非常之變適遭㑹于斯時尚冀有永之圖迄敉寧于區夏庶爾多士共識此懷令邵溥同郎官四員専一管勾南薰門交納物色軍前遣吳开莫儔還十三日戶部侍郎押伴敵使入門宴以馬并綵段豫之敵取宗廟等什物去十四日金人入內藏庫指揮應官員磨勘轉官注受差遣并合舉叙牽復之類令吏部刑部依條限行遣邦昌有書至軍前曰冒膺縟禮願展謝悰雖厯冒於忱辭終未親於台表退增感悚豈易敷陳載惟草創之初實軫阽危之慮民志未定顧未有以得其心事緒實繁念將何以濟於治前朝昨奉台令取索金銀表段以充犒軍伏念自入城已來詢究民間虛實頗聞罄竭悉以傾輸嗣位之初朝夕祇畏戒諭官吏罔敢不虞仰荷大恩敢不思愧雖割膚體豈足報稱然念斯民困弊已甚當圍城窘急之久有比室餓殍之多欲撫養即無資澤以厚其生欲賑給即乏米糧以續其命而催科正急刎縊相尋若閲日稍淹則所存無幾非仁何以守位非民何以守邦坐觀轉壑之憂不啻履氷之懼與其局天蹐地莫救于黎元曷若歸命竭誠仰干于鴻造伏念察其懇迫賜以矜容特寬冒昧之誠誕布蠲除之惠幸被始終之德遂全億兆之生不報十五日邦昌往青城見二帥致謝既至迎接殿下相揖以升致賓主之禮酒三行面議七事如不毁趙氏陵廟减金帛數存留樓櫓俟江寧府修繕畢日遷都之類敵人皆許之又請馮澥曹輔路允迪吳开莫儔孫覿談世績汪藻康執權元當可沈晦黃夏卿鄧肅太學六局官祕書省官郭仲荀等皆從邦昌之請也惟僕射何㮚樞密孫傅簽書張叔夜中丞秦檜侍郎司馬朴等或以言語或以廢立事不遣回令舉家北遷先敵須六經秀才各五人至是願回學者聽猶有八人不歸皆平日士流不檢者甘心歸之禮畢午後回十六日邦昌下令自今不御殿下朝百官引對羣臣於延康殿小軒言必呼名飲食居處不用天子禮十七日三省樞密院同奉面㫖嗣位之初理宜廣推恩霈今四方道路未通赦者未能宣布緣京城圍閉日久下項事可先次施行如常赦所不原者並與赦放諸文武官遷秩封叙舉人推恩責降人遷叙之類是日先放在京如登極恩數敵來督金銀尤急王廷秀乞致仕十八日頒發曉示金大朝辭十九二十日金大朝辭差邵溥押伴邦昌軍前陳乞下項事一乞姓趙一乞免金銀一乞限三年遷都一乞五日班師一乞以主為號去楚帝一乞借金銀犒設軍前賫到御批祖宗創業幾二百年矣宗廟社稷一旦傾危父子親族不能相保痛哉痛哉皆因諸公相誤煩內藏假載一萬貫收買下項物早望出京應副幸甚幸甚休思舊主善事新君去期有日相見無緣春暄付尚書時雍金人以前日懇請之故金銀十分减九二十一日聞軍前差敏珠爾貝勒為河北路統軍屯于濬州和哩貝勒為河東路統軍屯于河陽令諸軍有不服處並令斬首開報即領兵撫定二十二日差邵溥兼提督京城所措置等條具聞奏陳求道依舊都使水者二十三日左丞馮澥簽書曹輔太常少卿汪藻禮部侍郎談世績中書舍人孫覿及徐天民蘇餘慶郭仲荀沈晦黃夏卿等入門二使隨入賫到元帥府書云自今所取金銀帛皆是犒軍兵之所急用雖不能足數亦且期大半今楚國再造本國未安慮因徵括之急重困其民亦議權止令出榜曉諭二十四日面㫖以大金將退師令范瓊以依舊充京城內都巡檢使鄭建雄王燮依舊充西壁都巡檢司又各差一員張道辛承宗李景良陳思恭為巡檢劉衍張撝馬千張元發為同巡檢見管人兵每壁均定合推人令范瓊申請二十五日有書至軍前欲乘大軍未退修城池以備冦二十六日軍前開報已諾修城之請令金人二十八日下城且詢工役自備或欲軍前為修是日選郎官為四方密諭使從事郎胡杞令合入官差權司農丞考功虞謨乞致仕周珣黃中美致仕宣㫖應文武備被㫖差權職事並令尚書省出劄子請給恩數依正官法非被㫖兼舊職者並罷轉官給告如舊制二十七日邦昌率百官詣南薰門五嶽觀內望軍前遙辭太上皇帝靖康皇帝邦昌慟哭百官軍民皆哭其間有號絶不能起者是日太上皇帝及宗屬隨二太子軍由滑州路去是日聞南京兵至咸平軍前使來問欲盡殺為復要招安可將赦書來張急差申彥臣以宣贊舍人賫手書往大略告東道總管以不得已及重兵離散且當退守之意二十八日邦昌詣軍前辭金人漸下城令户部侍郎提舉修繕是日交割外城敵既不能下南京乃自寧陵而上盡為置官屬安撫士民至是悉驅而北舍屋焚盡東至栁子西至西京南至漢上北至河朔皆被其毒墳塜無大小啓掘略遍郡縣為之一空京城被圍半年斗米二千餘羊肉斤七千猪肉四千他物稱是細民雖賴官賣柴米自給然餓殍不可勝數人多苦腳氣被疾者不旬浹即死病目者即瞽蔬菜絶少敵人據城擷菜與市人貿易雖價髙而易得至是椿槐採亦盡餘枯枝爾邦昌聞翁彥國領兵至以手書與之封皮云付翁彥國其中乃邦昌上端朝中丞亦云不得已及他日保家屬之語敵使蕭慶來議以陜西沿邊城寨畫界與西夏懇辭再三竟不獲命是日有書至軍前以孫傅張叔夜秦檜請存趙氏留置軍中既知徇義于前朝必能盡心于今日宜蒙寬宥使獲旋歸書乃邦昌親筆敵不報遣路允迪宋彥通張徴等回二十九日邦昌往青城别二帥金兵下城盡絶我兵分四壁屯守張出郊拜二帥見昨日之書大怒謂取三人者豈欲復講前日事耶于是面語再三且云今日縱兵非無名然亦駐兵不逺當觀釁而動張懼不能對申彥臣還云金人以鐵騎三千送至咸平以南七十里不見我師而還陳戬權軍器少監四月一日陰晦靖康皇帝及從臣隨尼雅滿軍由鄭州路去是日金人去絶勤王師王淵首至城下內外盡驚已而續至者絡繹邦昌方下手書賞賚時翁彥國駐兵太康邦昌常遣陳戬賫手詔書止其來戬彥國甥壻也彥國囚之并其從者敵連數夜焚寨烈焰蔽天聞金人留檄書數百道付邦昌傳諭四方其略有云十三人鼓舞登城百萬師號呼請命陳冲權太僕陳求道權太僕少卿簽書樞密院曹輔乞宫祠不允路允迪轉五官除觀文殿學士神佑觀使請給恩數依前見執政條例二日詹度以孫覿自軍前回乞罷權直學士院指揮孫覿日下供職禮部侍郎談世績兼權直學士院省書省牒禮部三省同奉手書海內承平垂二百載生民樂業豈復知兵乃者奸臣輕搆邊難金兵大舉奄及都畿城守不堅二帝遷北中原之大逾月無君豫適以還歸橫見推逼既自殘而弗獲乃忍死以救民言念生靈係心宸極道路阻音郵之達吏民無詔令之承想其憔悴之憂同此危亡之急倘不深求于民瘼豈能安濟于時艱宜示撫循用舒陻厄庶亟臻于寧謐以終究于逺圖可依下項應手書到日昧爽以前罪無輕重常赦所不原者並特釋放赦內官吏並與推恩勤王之師令管押歸元來去處除放租賦招免盜賊等事宜令禮部遍牒施行赦並與覃恩同但易赦字為手書而已此書四日方下作是日行是日敵人行絶其行遽甚以見四方勤王者大集故也營中遺物甚多朝廷差戶部拘收象牙一笏至及二百擔他不急之物稱是祕閣圖書狼籍泥中金帛尤多踐之如糞壤書史以來安祿山陷長安以後破京師者未有如今日之甚二百年府庫蓄積一旦掃地當日差使臣撫諭四方邦昌遣使見今上又遣議范訥錢蓋趙野范致虛翁彥國劉光世議事以黎確使趙野黎趙甥也陳戬使彥國戬翁之甥壻也汪湘使劉光世湘劉門生也其它類此李健乞使翁彥國為彥國所拘又遣使臣去為朱勝非所拘城南餘敵當晚行絶小民稍稍出城樵採范納軍屯雍邱王淵為前鋒是晚方遣三十騎至城下即遣人賫絹三十匹就門外勞之仍呼三騎以入諭納以不得已之意令速來議復辟事是日兵馬大元帥康王名構檄郡邑曰見危致命者忠臣之心視死如歸者烈士之勇凡在率土世沐湛恩今陳瀝血之辭庶獲捐軀之效邇者上皇禪位下詔責躬事出忱誠人皆惻隱恭惟皇帝遵養潜邸十有五年克儉克勤博通經史天下延頸莫不歸心及受禪之初金人大入許割三鎮乃肯退師皇帝念祖宗之故疆乃陵寢之重地請許賦租之入以為嵗幣之常乃日渝盟實惟求釁再操戈而指闕遂鼓衆而乘墉至于屈已稱臣露章引咎初斂兵不下詭曰通和既邀駕去臨乃輒留往今者二聖太子諸王近臣皆在敵營恐將北去考之自昔未有或言臣子之心痛憤徹骨某昨奉睿㫖充兵馬大元帥唱義率衆影從響答數百萬衆奮怒而前內揆人心可知天意逼逐仇敵今兹已行而强抑臣寮俾僣位號天怒人怨曷能安處除已遣大兵糾合諸羣把隘險阻焚絶河梁或迎擊于前或追躡于後期于掃清千里迎還兩宫外帥臣監司郡守縣令共統驍鋭之衆使堅忠義之心各撫柔良之民母忘歸向之舊凡關津之出入謹于防奸或文書之往來審于辨詐以報皇朝之涵飬以底天下之治安報德賞功非言可究三辰在上實聞斯言檄書到日曉示軍民各仰知悉上件檄書下淮南江浙荆湖二廣等路帥臣監司並付發運判官向子諲下京西川陜諸路帥臣監司者並付宣總司趙野范訥三日右司諫齊愈吏部陳磷司􅈴劉定司門胡寅禮部吳懋並乞致仕不允令疾速供職差殿中侍御史黎確右文殿修撰宋彥通往南京勾當公事日下出門是日聞淮寧府教場內築壇歃血為誓徽猷閣直學士京西北路安撫使何志同徽猷閣直學士知淮寧府趙子嵩徽猷閣直學士江淮荆浙制置發運使翁彥國都水使者榮薿等敢告衆士金人再犯宫闕侵侮暴虐人神共憤聖天子屈己議和猶未退師曠日持久包藏禍心宗社危辱王命隔絶天下臣子各奮忠勇誓不與敵俱生今諸道之師大集于近輔凡我同盟毋徇私母懷異母觀釁戮力合謀共安王室以效臣節三軍之士視死如歸千萬人惟一心進則厚賞榮于家邦退則重刑殺及妻子有渝此盟神明殛之皇天后土太祖太宗實鑒斯言是日彥國撰文髙聲讀示四日集百官赴文德議尊孟后宣示手書曰余世受宋恩身相前帝每欲舍生而取義惟期尊主以芘民豈圖禍變之非常以至君臣之易位既重罹于羅網實難逭于刀鋸外逼大國兵火之威內極黎元塗炭之命顧難施于面目徒自悼于夙宵杵臼之存趙孤惟初心之有在契丹之立晉祖考殊迹以甚明載惟本朝開創之圖首議西宫尊崇之禮號同母后國繫周朝兹為臣子之至恭以示邦家之大任肆稽成憲爰舉徽章恭惟哲宗元祐皇后徽柔懿恭聰明睿知天作之合早嫓美于泰陵王假有家夙母儀于方夏端著紫庭之範具彰彤管之聲雖嘗即瑶華崇道之居亦既奉欽聖還宫之詔久棲神于靖館積系望于綿區今二帝已遷三川方震匪仰伸于欽奉則曷賴于儀刑是用端誠于心涓日云吉祇伏私庭之次恭陳舊國之儀揭丕號以正名開别宫而移御幅員時大庶臻康濟之期京邑既安更介洪長之祉宜上尊號曰宋太后御延福宫令有司擇日奉冊其應于典禮合行事件令禮部疾速施行當日差謝克家往山東迎大元帥五日自私第迎孟皇后入延福宫又差蔣師愈蔡琳程巽等賫咨目于康王其詞曰邦昌伏自拜違已而北去所遭禍難不可備詳仰惟王慈必蒙矜憫昨日燕山九月餘日金師再舉之後杳不聞耗至去冬臘月二十還闕以今年正月十五日到城外方知國變之酷主上蒙塵於郊凡使回一行盡留不遣二月七日又聞宣金帥之令遂遷二帝皇太子及太上皇后以下后妃嬪御諸王公帝姬并宗室近屬皆出六宫遂空既而又欲洗城焚燒宗廟社稷百萬生靈分為魚肉俄然俾推異姓方免屠城廟社景靈宫乃不燒燬尋奉少帝御筆付孫傅等令依元帥指揮方為長計無拘舊分妄為禍福速招連纍于時公卿大夫號慟于軍前以救君父而邦昌對二太子哀號躃踊以身投地絶而復蘇敵人執命終莫能回度非口舌可爭則以首觸柱求死不能又緣甲士防虞晝夜監守雖引繩揮刃赴井蹈河皆不可得豈謂城中之人相與逃死乃嫁大禍臨于一身變出不圖死安足惜忽劉彥宗賫城中文字與吳开莫儔俱至邦昌則訶責彥宗又對衆罵城中文武百官為自免之計逼人以首惡之名皆受國恩一旦如此曾不如蛇雀尚知報恩我若有兵定與大金相抗不共戴天彥宗等語塞而退邦昌遂不復飲食凡六七日垂死而百官陳述禍福謂事已至此雖臣民盡死莫能回二帝之遷惟有從權且與承當此事即存宗廟保社稷景靈像設皆得無虞而一城文武百官億萬生靈皆得性命可為後圖豈非忠孝之大也若堅持一節以就死地而壞了後事纍及二帝豈得為忠臣乎邦昌身為宰輔世荷大恩國亡而不能死復何面目以見士民然念興復之計有在于從權以濟大事故遂忍死于此欲追二帝之遇而報之於殿下也兹幸敵騎已還道路可通故差邢儀曹之壻蔣師愈本府內知蔡琳承事郎程巽賫此以明本心今則社稷不毁廟主如故祖宗神御皆幸保全伏惟殿下盛德在躬四海係望願寬悲痛以幸臣民續次别差謝克家等間道賫玉寶紐詣行府當别貢陳朱夏方暄更乞倍保玉重邦昌無任瞻望激切之至四月五日邦昌惶恐咨目上復康國大王殿下書至王詢師愈等所以遣來之因師愈曰邦昌先差兩畨使臣李興潘燾等未回間有元帥府探兵入京城邏者得之邦昌問來厯乃知康王在濟州故遣師愈等來何慤曹大周丁彬並權吏部郎官季陵胡寅並權戶部郎官侯懋權都官李士觀兼權都水使者六日指揮自今月初六日不坐迎陽門于內東門聚三省密院議事何志同等選鋒楊端等三十三人至賞勞甚優七日令寺觀建乾龍節道場至十三日罷元祐太后是日受冊稱賀有宗室叔尚者自號四太尉稱皇叔祖稱踰城至是聚數萬衆在南青城下寨因欲入城閽者拒之己而許入叔尚至都堂叱王時雍輩曰當速歸政太后不然從兵與汝輩周旋大元帥康王咨目答邦昌其詞曰上太宰相公閣下天降大禍不使某前期殞滅而使聞君親之流離見宗族之蕩覆肝心摧裂涕泪不禁窮天下之楚毒不足為喻欲便引繩揮刃而二聖之鑾輿未復四方兵馬方集將士忠憤責以大義欲飲泣忍死力圖奉迎今河北河東忠義之兵數踰百萬預使邀迎率皆響應早夜以覬聞人音而矍然念與相公去嵗同處敵營從容浹日自謂知心故比來之事聞流言而不信士夫將佐亦皆云爾今奉教備陳始終有伊尹之志達周公之權然後知所期之不謬天或有悔禍可冀二聖之復聽諭遣謝克家之意讀之愕眙失措其何敢承願皆緘藏內府責在守者候鑾輿歸而上之九廟之不毁下之生靈之獲全相公之功已不愧于伊周矣某方率士卒圖援父兄願相公協忠盡力奉迎二聖復還中都克終伊周之志某身膏敵手受賜而死矣氣令漸熱伏惟鈞侯動止康裕方寸方亂修謝不能多及某咨目上太宰相公閣下遣使臣成忠郎黃永錫詣邦昌投下且令觀變是日邦昌又遣其甥吳何及國舅韋淵同賫咨目邦昌稱臣其大約曰封內府庫以待大王孔子曰子在回何敢死邦昌所不死者以君王之在外也王喜晚召吳何飲以酒賜金甚寵何向時與王奉使在斡里雅布軍前至是王叙舊不忘也胡唐老王侯並依所乞與郡八日邦昌遣謝克家來歸玉璽一紐其篆文曰大宋受命之寶元帥府寮耿南仲汪伯彥黃潛善耿延禧董耘髙世則等引克家捧寶以前跪以進王王謙拒久之慟哭不受已而跪受命伯彥司之大母遣其姪孟忠厚賫書來勸進其詞曰吾自處道宫垂三十載乃者都城失守二帝北遷撫事悲摧實無生意忽承朝㫖俾正號名退惟閒廢之人當此危亡之際冒居寵數誠亦何心瀝懇再三莫之聽許乃以此月五日入延福宫而百官建吉請權聽政顧早衰多病且久去宫闈豈復能堪朝廷大事言念趙氏舉宗之盡去人心思宋之日深不屬此身誰當此責是用夙宵黽勉期濟艱難然神器久虛必須真主今中外近屬惟王一人矧忠勇英明四方屬望入繼大統非王而誰已遣馮澥李回告王傳序之意王其速驅輿衛入處宸宫上以安九廟之靈下以弭四方之變吾嬰兹重負既付託得人當便辭機務之煩以就安閒之適今遣姪權衛尉少卿孟忠厚親承動靜并道吾意夏初微暑更慎保護四月八日大母致書元帥大王奉議郎監察御史馬伸狀見金人劫二帝北行且逼立太宰相公使主國事相公所以忍死就尊位者自信敵退必能復辟也忠臣義士不即就死城中之人不即生變者亦以相公必立趙氏也今敵去多日吾君之子已知所在獄訟謳歌又皆歸往相公尚處禁中不反初服未就臣列道路傳言以謂相公外挾强敵之威使人游說康王且令南遁然後據有中原為久假不歸之計伸知相公必無是心但為敵人未逺因循未能盡改雖然如此亦大不便蓋人心未孚一旦喧鬨雖有忠臣之志相公必不能自明滿城生靈反遭塗炭孤負相公初心矣伏望相公速改正易服歸省庶事禀取太后命令而後行仍速迎奉康王歸京日下關門撫勞四方勤王之師以示無間應內外赦書施行恩惠收人心等事權行拘收候立趙氏了日然後施行庶幾中外釋疑轉禍為福伊周再生無以復加如伸言為不然即先次就戮伸有死而已必不敢輔相公為宋朝叛臣也謹具申太宰相公伏候鈞㫖申時奉鈞㫖一切改正九日追收僞赦不行邦昌召侍從官議事晚降手書曰請隆祐皇后垂簾决政邦昌行太宰事中外大悅追回諸路赦文並初四日立宋太后手書不用遣馮澥李回為奉迎使副十日邦昌避位王時雍吕好問徐秉哲李回吳开莫儔等奏乞要還舊職奉太后聖㫖依舊且兼權領職事韋夀隆乞罷給事中以徽猷閣待制宫祠周懿文乞還大理卿奉聖㫖依舊且權開封尹將作少監蘇餘慶兵部郎官唐恕太常丞唐元衡乞致仕不允十一日太后御內東門小殿垂簾聽政邦昌以太宰退處內東門資善堂百官詣祥曦殿起居太后畢邦昌服紫袍犀帶魚袋獨班行歸兩府幕次十二日監察御史姚舜明齊之禮太常博士華初平乞致仕不允十三日王琮言昨任左司員外郎權暫吏部侍郎今三省密院官見帶舊職兼合取指揮奉聖㫖與右文殿修撰知鄧州劉參除直祕閣知鄭州奉迎使尚書左丞馮澥副使權尚書右丞李回至自京師以隆祐皇后詔書來曰吾以薄德罹此多艱雖救時敢愛于髮膚而昧道若臨于淵谷顧邦基之有賴繄神器之有歸比遣使軺往馳書牘惟上天之眷命實四海之傾心諒惟撥亂之姿已定興王之業方長贏之屆序宜祉福之具膺竚來御于法宫以誕揚于丕號羣情攸屬遐想增懷故兹書示想宜知悉十四日元帥檄初至京師都人感泣已而副元帥宗澤東南道總管趙子嵩皆揭榜以安人心侍御史胡舜陟乞外任差遣不允監察御史姚舜明知衢州王俁知江州胡唐老知無為軍十五日太后告天下手書曰比以敵國興師都城失守祲纏宫闕既二帝之蒙塵誣及宗祊謂三靈之改卜恐中原之無統姑令舊弼以君臨扶九廟之傾危免一城之慘酷乃以衰癃之質起于閒廢之中迎至宫闈進加位號舉欽聖已還之典成靖康欲復之心永言數運之屯坐視家邦之覆撫躬獨在流涕何從緬惟藝祖之開基實自嵩穹之眷命歷年二百人不知兵傳序九君世無失德雖舉族有北轅之釁而敷天同左袒之心乃眷賢王越居近服已徇羣臣之請俾膺神器之歸由康邸之舊藩嗣我朝之大統漢家之厄十世宜光武之中興獻公之子九人惟重耳之尚在兹唯天意夫豈人謀尚期中外之協心同定安危之至計庶臻小愒用底丕平因敷告于多方其深明于吾意康王劄子比金人邀請二聖北去當府已星夜措置邀迎外勘契金人先于三月初七日抑逼宰臣張邦昌僣稱僞號今來邦昌已歸寶退避所有自三月八日以後稱中㫖面㫖事並不得施行差到官不許放上如有闕官師開具狀申以憑差官填闕施行兼自今後凡有公事並須申禀當府與决如有奸僞冒可疑文字並不得施行繳連供申十九日兵部郎官唐恕差知復州二十日元帥康王榜當府先為京城失守伏聞車駕幸敵寨慮墮奸謀預令河北河東州軍及忠義民兵結集准備後聞金人邀請二聖北去臣子之心痛徹骨髓便欲自戕念二聖未還又不敢死除已嚴督兩路州軍并結集到兵馬許以封王建節盡令邀迎車駕務得萬全已皆響應數近百萬當府見星夜督責外訪聞都城一體忠義自二聖出郊日夕迎望以至燃頂煉臂精誠激切久遭敵困百貸匱竭念此憂憫寢食不遑契勘東南入京舟船多在淮楚敵馬雖退州軍皆未肯放行當府自四月初已纍行下令將應客旅米穀舟船等催促放行入京并官調亦已催促進發務濟都城缺乏仰安業守待無或流散曉示各令知悉侍御史胡舜陟奏伏見宗澤文字稱康王未忍歸朝疑謁宗廟竊恐謙虛退託未忍遽當大寶此去濟不逺乞遣京城父老僧道往濟迎請并遣百官前去勸進以見推戴迫切之誠庶幾車駕早至闕下奉聖㫖依奏二十一日起發濟州宿新興店二十二日康王次單州二十三日康王次虞城縣張邦昌劄子伏見謝克家自元帥府回恭聞車駕自濟州由金鄉軍徑至南京即藝祖受命之邦嗣王朝無疆之厯天人合應以啓中興凡在臣民不任抃蹈所有合排辦輿輦仗衛冠冕服御禁衛儀物之屬百官有司各以其職並合發赴南京以候冊立禮畢遂開朝廷以出號令臣猥以駑下承乏宰司當躬率百司赴行在所欲于今月二十五日起發前去庶伸翊戴之誠以請權宜之罪其一行事務並已行下所屬排辦欲乞差中書舍人李擢太常少卿汪藻充勾當公事伏取進止奉聖㫖依奏是日有司令開封府少尹父老僧道舉人等詣行在奉表勸進二十四日康王次應天府康王榜近者金師深入奄及郊畿京師失守二帝播遷欲立異姓覆我宗社賴大臣因時權宜濟此艱危因是以存九廟保全生靈實社稷之大計乃心可嘉深慮百官將士并諸色人尚懷疑慮曉諭各令知悉二十五日在京應奉官司分一半官吏至南京接駕是日張邦昌王時雍等帥官吏出門二十七日司門員外郎宋彥通除右文殿修撰二十八日司農卿胡恩乞罷權户部侍郎奉聖㫖依胡交修除集英殿修撰知湖州五月一日今上即位靖康要録卷十二
