body:
  text: 靖康要錄卷五五月一日駕幸龍德官監察御史余應求劄子臣竊觀今日之事有不足慮者三有未可喜者三有可為深憂者二獻言者皆曰近者金人跳犯畿甸長驅深入邉陲無守禦之固全師重弊將帥無邀擊之竒封疆之臣閉關而自保朝廷之上多疑而縱冦講和之好已暌用師之機屡失三鎮之地既不與親王之質猶未還萬一出疆後必為患又將何以待之此邉備未嚴為可慮者臣聞古之良將若李牧之守雁門魏尚之守雲中皆以謹守封疆訓練士卒明烽火逺斥堠匈奴畏之不敢近邊塞陛下選將帥以守邊治險阻以固圉積粟治兵實之塞下則邊備何患乎不嚴近年以來費用無節内帑之積久虛太倉之粟不給茶鹽之利日損賦税之法日壊公私空竭閭里蕭然若求之于民則民力已敝若取之於官則嵗入有限又將何以給之此百姓久困而財用日急為可慮者臣聞古之能臣若蕭何轉漕關中給食不乏劉晏操其贏餘以佐軍興故能成漢業振唐室陛下罷不急之務减無名之費躬節用裕民之德去蠧國傷財之政用計數之臣治運之法財用何患乎不足軍政之壊久矣自童貫啓邊事二十年間西北之兵逃亡散失不可勝數東南之兵游手末作不習武藝一旦號名至者無幾驅之行陣未戰先遁後有緩急豈可復用此兵革未弭而士馬不强為可慮者臣聞古之名將若韓信驅市人而下井陘項羽以江東兵而破強秦豈必西兵與素習但將之得其術則無不可用者朝廷下募兵之令高買馬之直明賞罰以収人心嚴軍政以厲士氣付之良將何往不克則士馬何患乎不強責之將帥之臣足矣臣所謂不足慮者此也獻言者又曰陛下以節儉之德躬自菲薄服御或至澣衣膳羞不嘗異味去雕麗焚竒巧减製造罷貢獻其儉至矣雖大禹菲食文王卑服何以過此誠可喜者臣聞古之人君徒能節儉而無德以將之則上或至於廢禮下或至於甚隘故魏君儉嗇詩人有褊心之刺漢元恭勤節儉而優游不斷卒壊宣帝之業今陛下天性節儉臣願將之以德陛下自臨御以来未明而求衣日昃猶視朝夜分而覽章奏休假而御便殿焦心勞思忘寢與食其勤至矣雖大禹克勤於邦文王不遑暇食何以過此誠可喜者臣聞古之人君徒自勤勞而無道以揆之則大或至於叢脞小或至於伺察故漢宣帝厲精政事而失之於雜霸明帝勤心不怠而失之於慧察今陛下躬行勤勞臣願揆之以道陛下鑒言路壅塞之弊虛懐納諫屈已求言開不諱之路杜羣枉之門親擇耳目之官博通幽隐之情其聽言亦至矣雖舜之好問禹拜昌言何以過此誠可喜者臣聞古之人君徒能聽言而無㫁以行之則雖有聽言之名而無用言之實故漢文帝知賈生之才惑於絳灌而不能用成帝知王章之直弗忍於王鳳而不能用今陛下聽言已廣臣願行之以㫁夫不能將之以德則儉不中禮其弊也固不能揆之以道則勞而無功其弊也煩不能行之以斷則依違不决其弊也惑臣所謂未可喜者此也夫人君之所以治天下者有要道焉正心誠意公聽並觀息慮以應萬變虛心以照庶事用宰相以董百官用百官以治萬民優游無擾垂拱仰成此要道也予奪自我廢置自我生殺自我威福自我大柄不假於人勢利不移於下此至權也二者既得則羣下不敢為私邪四方不敢為欺蔽可以不勞而成無為而治矣今陛下有欲治之意而未知致治之具知王道之要而未知大權之尊有好言之誠而無用言之實有兼聽之博而無獨斷之果方且專事謙遜深自晦匿委政大臣無所専决遇事則可否不斷聽言則善惡無擇去邪未能無疑賞善未能必用或主於先入之言或牽於大臣之私知己行之非不能决知國事之是未克行執政専權率意自私不慎差除罔卹公議或非才而聚遷或有罪而見庇或衆所謂可為而不為長此不已日浸月滋臣恐威權日替聰明欺蔽奸偽得行言路壅塞忠直者以孤特寡助而見斥敢言者以沮毁擯陷而被譴小人得以害君子讒謗得以誣忠良陛下孤立於上臺諫備位於下徃日之弊未除今日之患又甚矣可為深憂者此也夫人君之所以維持天下者綱紀法度也所以厲世磨鈍者慶賞刑威也綱紀不立則國日削法度不更則弊滋甚爵賞妄施則為善者不勸刑罰不中則為惡者不畏四者之失則萬事廢弛好惡不明四方解體天下失望此誠治亂之原安危之機也今朝廷樂因循之易而重於變更務姑息之愛而憚於裁抑以循常守故為中和以避怨養恩為得計綱紀弛而不振法度壞而不修進賢黜奸未當於人心發號施令未孚於天下冗濫不抑而奸邪未盡退聴名器不慎而僥倖未盡革心禮教不立亷耻尚寡誕謾未悛風俗尤薄臣恐國勢日以削弱政事日以紊亂内之不治奚暇治外邇之不能奚暇柔逺何以革前日之弊何以致中興之業哉可為深憂者此也陛下以堯舜禹湯之資鋭意圖治而二三大臣不能同寅協恭輔成聖德紀綱國體使聖主獨焦勞於巖廊之上而四方萬里無所觀瞻於下是執事者之過也伏願陛下益留聖心思日孜孜念其所當慮而終之以無慮思其未可喜而終之以可喜慎其所深憂而終之於無憂使人主之勢日隆朝廷之政日新威權尊而下莫敢欺紀綱立而人莫敢犯可以使小人不斥而自退可以使彊敵不戰而自服矣惟陛下留神省察奉聖㫖余應求特賜章服二日手詔朕嗣承丕緒夙夜兢惕思所以撫綏四海惠養元元以為無窮之計而冦戎弗靖未能偃兵故將起天下之師以振國威然而興師十萬日費千金方今積弊之後朕雖痛自刻勵罔敢汰侈罷斥浮冗粗給經費其于師旅之用誠未有以贍之也昔漢帝募民入粟塞下而師賴以濟今朕上為祖宗社稷之重將以定中興之業下為億兆蒼生之衆將以圖休息之期此忠臣義士協濟艱難之秋也應天下士民上户有能推其財穀贏餘以佐軍興者仰州縣聽其自願不得抑勒不以多寡别項儲蓄専以充募兵養士之費具數申樞宻院各以名聞朕將等第推恩以為忠義之勸故兹詔示想宜知悉聖㫖將來調發諸路防秋人兵仰安撫諸司各辦半年錢糧變轉輕貨管押隨軍聖㫖王易簡係東宫讀官見係資政殿大學士提舉龍徳宫其請給人從恩數並依簽書樞宻院條例施行顔岐賜進士出身除中書舎人户部尚書參謝行宫轉運使燕瑛乞在外宫觀奉聖㫖依奏差提舉南京鴻慶宫三日聖㫖所招敢勇皆非驍勇之士其間正兵多逃竄以應募僥倖大失軍政往往作盗賊嘯聚可速行措置其正兵弓箭手許投換法亦宜改正一遵祖宗舊制右諫議大夫楊時言伏見蔡京用事二十餘年蠧國害民幾危社稷人所切齒而論其罪者曾莫知其所本也葢京以紹述神宗為名實挾王安石以圖其利故推尊安石加以王爵配享孔子廟廷而京之所為自謂得安石之意使人毋得而議其小有異者則以不忠不孝之名目而痛加竄黜人皆結舌莫敢為言而京得以肆意矣然則致今日之禍者實安石有以啓之也臣謹按安石挟管商之術飾六義以文奸言變亂祖宗法度當時司馬光已言其為害之甚當見於數十年之後今日之事若合符契其著為邪説以塗學者耳目敗壊其心術者不可縷數姑即其為今日之害尤甚者一二以明之則其為邪説可見矣昔神宗皇帝嘗稱美漢文惜百金以罷露臺曰朕為天下守財耳此慎乃儉徳惟懐永圖正宜將順安石乃言陛下能以堯舜之道治天下雖竭天下以自奉不為過守財之言非正理曾不知夫茅茨土階未嘗竭天下以自奉其稱禹曰克儉於家則竭天下以自奉者必非堯舜之道其後王􅀈朱勔借其説以應奉花石之事竭天下之力號為享上實安石竭天下自奉之説有以倡之也有釋鳬鷖守成之詩於末章則以為以道守成者役使羣動泰而不為驕宰制萬物費而不為侈孰弊弊然以愛物為事夫鳬鷖之五章特曰鳬鷖在亶公尸來止熏熏㫖酒欣欣燔炙芬芬公尸燕飲無有後艱自古釋之者未有泰而不為驕費而不為侈之説也安石獨倡為此説以啓人主之侈心其後蔡京輩輕貨妄用専以侈靡為事葢祖此説耳則安石邪説之害豈不甚哉臣伏望睿㫖斷王安石學術之謬追奪王爵詔中外毁去配享之像使邪説淫辭不為學者之惑實天下萬世之幸奉聖㫖王安石合依鄭康成等例從祀孔子廟廷令禮部改正施行盛章先次落職蔡鞗為係駙馬都尉特免逺竄蔡行移洪州安置脩潭州修衡州絛郡州居住攸永州安置其子各令隨侍前去吏部侍郎鄧雍乞宫觀聖㫖除龍圖閣學士提舉鴻慶宫徽猷閣直學士任熈明轉一官致仕聖㫖學官馮檝雷觀並與外任宫觀差遣四日駕幸寧徳宫制檢校少𫝊應道軍節度朱孝孫授右金吾衛上將軍節度使錢景臻劉宗元各換左金吾衛上將軍劉敷劉敏錢忱張楙王舜臣並換授右金吾衞上將軍五日臣僚上言頃者奸臣用事子弟親戚本無才學夤縁冒寵超躐顯位其甚者已賜罷黜有幸免者若蔡京之甥徽猷閣待制馮躬厚壻顯謨閣直學士葉著孫胥校書即郭南仲王黼弟前右文殿修撰王聿壻直龍圖閣葛五經王安中之子直龍圖閣辟疆辟先壻三門輦運趙竒妻之妹夫直祕閣霍知白朱勔之壻朝散大夫周審言迪功郎馬震蔡攸妻弟軍器少監宋晸孟昌齡孫開封府儀曹孟鉞或冒從官貼職之榮或膺任使宫祠之職未蒙斥免士論怫欝伏望禠罷送吏部又言昨者蔡攸以弄臣孽子竊用威柄優以爵祿隂結死黨一時嗜利好進如馮温舒劉僴吴鏜徐時彦潘杲程俱宋晸之徒極力傾附為之腹心朝夕造門謀議秘宻根株牽連互相推引侫䛕子弟交結僮僕但知有蔡氏不知有朝廷搢紳切齒側目無敢言者故假隨上皇行宫南去此曹遁走從之者大半則其黨背國忘君有素可知矣今杲俱已廢停而温舒未蒙誅責僴猶列侍從鏜竊食宫祠時彦尚待堂除晸尤汙穢無行尚為監貳未賜斥逐非所以戒貪侫也吏部供到馮温舒已勒停吴鏜己降一官落職潘杲程俱已並追五官勒停王聿管勾崇福宫周審言已落職送吏部宋晸見將作少監奉聖㫖葉著降充顯謨閣待制馮躬厚劉僴降充秘閣修撰葛立經王辟疆王辟光霍知白並落職内霍知白趙竒宋晸孟鉞並放罷郭南仲馬震徐時彦依放罷人例施行臣僚上言祖宗時惟諸王宫各置教授比年已來而后妃帝姫宅亦有之坐糜廩祿以蠧邦用乞詔有司凢教授非祖宗舊法所置者悉行减罷奉聖㫖依聖㫖朱勔家補授使臣等計一百五十餘員多係本家親戚及奴僕勾當人園子等除請筆直取到他處人吏不以有無官資令歸元來去處外其冗占使臣等逐一勾收告敕付身具補授因依繳申尚書省御史中丞陳過庭奏臣聞太學賢士之關禮義之所自出今也學官相詬於上諸生相毆於下甚者諸生奮袂而競前祭酒奉頭而竄避敗壊風教一何甚耶且朝廷大臣進退出處理之常也學正馮檝楊言以為是博士雷觀痛詆以為非喧争紏訐甚於街童巷婦之相詈辱者除本臺見行體究外不識學徒何所取法乎五經之訓義禮淵㣲後人所見不同或是或否諸家所不能免也是者必指為正論否者必指為邪説此乃近世一偏之辭非萬世之通論自蔡京擅政専尚王氏之學凡蘇氏之學悉以為邪説而禁之近罷此禁通用蘇氏之學各取所長而去所短也祭酒楊時矯枉太過復論王氏為邪説此又非也致使諸生集衆直造祭酒位次欲見而詆之時若不自引避必致生事又有時中齋生姓葉者黨王氏之學止善齋生姓沈者黨蘇氏之學至相毆擊其人稍衆庠序事體固當如是耶臣伏望聖慈裁酌如祭酒楊時偏見曲説徳不足以服衆學正馮檝博士雷觀輕浮争競大失生儒之體欲乞指揮並行斥責又諸生鼓倡集衆為首之人及兩齋相毆擊者亦乞下所隷根究姓名重行屏斥庶㡬朋黨不立争訟不生而使學者樂道向方不陷於刑辟豈勝幸甚奉聖㫖御史臺差官體究既而詔並與外任監當監察御史余應求奏伏覩四月二十五日勅開封尹王時雍奏奉御寳批御前留住使喚西兵數内蔡宗等三人開封府禁勘並不曾刦盜其捉事使臣范振亂捉平人可依理施行又言上件人係屬京畿河北河東制置使司盧功裔承宣下當直又言今來止因被盜人暮夜錯認賊人頭面以致范振渉疑收捉又言近年官司類以御前二字刦持上下今陛下以天下為一家六軍之衆當齊以一法不可更分御前使喚之人以失其餘軍士之心兼自來權貴之家及諸局分多占蔽手下人盜博縱恣稍加䋲治反遭屈辱懲革此風誠在今日又言待罪天府不能戢盜以此罪臣孰曰不宜奉聖㫖放罪臣嘗以時雍柔侫取容阿諛順㫖不謂其遇事乃能條析詳眀抗直不撓如此此葢陛下盛德兼容能受讜直故往時柔佞阿諛之徒亦知革心激昻自奮知無不言以副陛下求言之意主聖臣直此可為陛下賀者然臣詳觀時雍所奏非特自請待罪而已其言捉事使人因被盜人錯認渉疑收捉則是范振非亂捉平人無罪可施行也其言近年官司類以御前二字刦持上下及不可更分御前使喚之人又權貴諸局占蔽手下人則是近年宦官用事凌轢百司其弊皆若此也范振宜在釋放此事宜在懲革今所降詔㫖但赦時雍所待之罪而已至若范振則見取勘具案所陳之弊未有指揮禁戢臣誠未喻然臣又有深可疑者夫以當直軍人犯公事而乞降御寳以被盜人錯認而云亂捉平人以宦者當直兵士而稱御前使喚此皆可深疑者也奏請之臣以㣲末私事輙敢誣罔聖眀其罪固不可容誅而陛下又為之作御前使喚之名特降御寳行下則其失又甚矣陛下往者下詔有曰不信任中人言猶在耳今乃遽信其言為之委曲批降如此謂之不信乎陛下即位之初内侍言恐懼畏避不敢輙干以私天下之人謂之聖眀曾未數月遽復為此深可駭愕事有甚㣲而所係甚大不得不治其萌芽至已著而言之則用力雖多不可救矣若果行此時雍第知雖有真盜贓証不眀不敢復補而不知宦者之權自此浸盛御前之名日以増重而以私事求請御寳者何所不至也陛下之失已無所及自今若此等類一切杜絶敢以私事干請御寳者重寘於法然後正盧功裔誣罔奏請之大罪眀范振渉疑收捉之無辜其時雍所陳懲革之風嚴加禁約庻㡬抑宦者尊主威絶習近請謁欺弊之原伸百司屈辱刦持之弊不勝幸甚取進止監察御史余應求奏臣伏覩刑部關報百姓管和軍人李進並為撰造語言騰播惑衆各决脊杖二十管和廣南編管李進配沙門島臣竊謂此二人所造語言惑衆之事必渉重害可以欺惑民庻若不重行責罰無以懲後雖陛下仁恵寛厚亦必威之以刑也續又見報乃得二人之語因言守城未得功賞管和云隨上皇走底健兒却轉兩三資保䕶國家宗廟社稷却休李進又云李樞宻奏下司禦人請受却被徐相公諫了知他争了多少以臣觀之此皆愚民無知之常談豈足惑衆别毋奸惡不須窮劾若欲薄治杖之足矣今以重罪編配海島使兩家之人分散流徙此乃下死罪一等之刑施於無知愚民誠為太過陛下仁愛百姓豈忍為此臣又聞往者八廂察事之人隂取民間語言官司公事言之於上却作訪聞行下有司根治謂之貌過其情偽虛實皆未可知既下有司官吏承望風㫖無不附㑹煅煉証成其罪能自辯眀者百無一二中外患之此於聖眀之朝所宜懲革者也今管和李進之事必是八廂察事貌過若果有此語亦不足重罪也况又有詐偽不可知者乎或者二人意望功賞為此語言計察事之人言之庻㡬僥倖或者察事之人與此二人有仇自為此言以中傷之或者又有奸人離間宰職故為宰臣樞府紛争之語以疑陛下之意此皆不可知者也為陛下計莫若置而不問今既加以重刑不可追改至若編配之罪尚冀陛下寛之後有似此亦乞聖眀更加詳慎取進止六日聖㫖余應求言事迎合大臣可與外内河北知州差遣范宗尹填見闕日下供職余應求日下出門御史中丞陳過庭奏新除右正言許景衡乃臣同堂妺夫早晚供職於䑓諌事相闗連同在言路實有妨嫌欲乞罷免中丞職事奉聖㫖許景衡除太常少卿殿中侍御史徐秉哲行右正言邵溥徐户部侍郎七日聖㫖自崇觀以來創置局務如禮器制造道史聖濟内經校正瑞應進奉白身協律提舉眀堂所類皆是京攸父子竊權泛濫推賞去處可依臣僚上言裁抑與楊戬王黼濫賞指揮一例施行務從酌中以安人情仍通報日下施行祕書少監安扶召試中書舎人新除户部侍郎張慤依舊河北都轉運使監察御史胡舜陟奏臣竊謂大臣之事君其去有三諌不行言不聽膏澤不下於民一宜去也讒言得以間君子妄譽得以進無功而禮貌衰焉二宜去也支體廢憊心志凋喪嬰疹飲藥不任國事三宜去也非是三者其去無義若曰議事不合而去則是欲其同不欲其和也無所可否之謂同可否相濟之謂和同如琴瑟専一不可聽也和如五味相和可以食矣胡不去其欲人同已之心而務可否之相濟可則行否則止無所適莫是謂至公何必以異同而决去就哉若曰君有所詰責而去人非堯舜其誰無過君有過臣且諫之臣有過君弗得問㡬於臣强凢過之大者固不可為過之小者閤門待罪足矣安用輕去陛下尊禮大臣曲盡體貌虛懐聽納言無不從讒佞不敢肆其間異意無所幸其失有君如此難遇之時也又况强敵為患邉鄙未寧河東累月之圍正圖應援河北防秋之具尤在講求聖躬焦勞於上黎元仰望於下大臣曾不恤此惟以議論不合而去以小過見責而去體國之義當如是乎今日有大臣挈家離府第者眀日又有大臣挈家出國門者上煩睿慈曲折調和王人絡繹奔走道路士庻觀之抵掌太息外國聞之往往見笑使其去之有義其去何傷但不當於義理而徒為紛紛故有駭於視聽伏望陛下責以大義使各安職務罄公心協濟事業取進止胡舜陟又奏竊觀陛下逺鑒漢唐近法祖宗痛抑宦官之權而有罪者斥之此實祖宗之福然猶有小人尚蒙任使李彀是也按彀暴悍慘酷猶於虎狼冒於貨賄恣為不法與童貫譚稹梁方平輩世號為十惡昔置東莊北宅窮奢極侈令翟祐之等盜官栰巨材以營堂室厮役兵匠計工數萬又磨河堤取水為池又盜官玉令陳宗妙等造帶及器物强買人户劉宗愿屋産而低償其值於軍器所前後盜用官錢不計其數其甚則竊弄權柄自作威福上皇御筆放逐使臣史義彀輙追還以一時私怨勒停翟通責降晁敏中等人皆側目恐遭毒螫上皇以其罪大嘗盡禠其官盡没其别業陛下棄咎錄用是為隆恩宜其改行仰副委任訪聞提舉京城肆行殘鷙給予不時而廣固廣備指揮逃者過半招填者不至濠寨官不勝其苦有致仕者董役使臣皆以其家私工充之未嘗督役而虛竊廩祿以城兵私用日不减百人其妄作如此必至誤事復聞彀屢獻花果及獻錢於禁中多為釣具以奉游幸此皆前日内侍應奉之具今日復啓其端原其用心尤為可惡唐仇士良教中人事主之術曰天子不可令閒暇暇必觀書見儒臣則又納諫智慮深逺减玩好省游幸吾屬恩且薄而權輕矣為諸君計莫若殖財貨盛鷹馬日以毬獵聲色蠱其心極侈靡使悦不知息則必斥經術闇外事萬幾在我恩澤權力欲焉往哉彀欲以士良之術熒惑陛下竊恩寵而據權勢殊不知陛下素儉寡慾得於天縱紛華盛麗不入聖心雖有士良之巧計不能惑也彀之用心如此罪莫大焉今雖罷睿思殿職事而其子尚在内與之傳導語言時乞宣喚萬一使之親近為害可勝言哉此奸人之雄國之巨賊伏望睿斷特行竄斥與貫稹等同科天下幸甚胡舜陟又言伏見朝廷訪聞蔡攸見在鄭州不即上道令本路提刑司催促起發隨侍臣竊謂朝受命夕引道人臣之義也冬温夏凉昏定晨省人子之孝也攸負罪至重公議不容陛下姑寘之輕典恩徳隆厚固宜奉命省愆不遑啓處而乃驕蹇自肆遲留近郡至煩特㫖差官督迫而後行則是慢上違令失人臣之義也攸平昔不孝視父如仇惡言醜詆無所不至今見其父以罪投竄往往快之故始乞隨侍者姑欲自逭罪戾終不肯往者乃不孝之真情如是則絶三綱廢五常禽獸之不若也頃金人犯闕日望四方勤王之師以濟緩急上皇南幸亦未嘗一日忘陛下必欲師旅来䕶京城攸為宫謝行宫使司輙降劄子忘稱聖㫖杭越江東將兵逐州土兵弓手並未得團結起發聽候指揮使喚又令鎮江府及泗州有已發遣經過人並截留原攸此計必幸京師不守留東南之兵以自衛用心如此不忠莫大焉攸為臣則不忠為子則不孝得罪於名教無所容於天地之間豈典型之可貸乎伏乞徙攸嶺表逺惡之所以為亂臣賊子之戒取進止五月八日聖㫖惠柔民王賓李良祐張有極石悈鄧紹蜜孫黙王愈並發來赴闕户部尚書聶山試開封尹恩數依尚書臣僚上言臣聞善除惡者如去草之絶根不善除惡者如養虎之遺患其為禍為福非不皎然易見自昔人國之失而莫救者依違牽制坐視不忍决也臣謹按蔡攸大罪有七其小者擢髪莫數不復道也以樞宻之臣為俳優鄙賤之事淫言媟語巧發應機怪服異装安排獻笑出入禁闥沉酣燕游處男女合避之嫌犯君臣至嚴之分閫閾不限堂階陵替攸之罪一也盜柄鬻恩援引死黨父子兄弟自相戈矛伐異黨同門分楚越及京謫衡州有㫖令攸隨侍自當聞命就道乃頓迹滎陽積日不發既不順於其君復不孝於其父攸之罪二也朋比中官握臂交膝既昵私恩互輸誠款一推一挽呼吸相助攸之罪三也幽燕之役開釁啟戎以方爭為恢復以正擾為撫定以溈平澶營要害控扼之地捐之金人蜂蠆在懐虎兕出檻猶且公肆誕謾以為百世偉績酬功之際超取上資國公帝師一舉而委之偃蹇傲睨居之不疑攸之罪四也敵既渝約詭謀日彰藥師負恩逆迹又著帥臣將校章疏迭來自去年秋抄中朝士大夫已窺竊私語知禍必至而攸帷幄謀臣邉機在手縱使不敏造形亦悟而乃蔽藏覆匿不告於朝惴惴然惟恐前日罔功冒賞奸迹呈露至使金人長驅藥師助叛畿邑為之驛騷兩路罹其荼毒聖主宵旰生民瘡痍伊誰致之攸之罪五也攸知有必至之禍不告於朝不謀於君上乃自汲汲為妻孥念其家所蓄器皿金銀首飾之類先自銷鎔為輕装計及敵將至卷室而東襁褓之子茍所愛者悉擕以往猶偃然肆語曰得㫖扈上皇駕縱使當時懇告得命亦合留家屬京城與國均憂臣頃在外州見潤州人来云六夫人某日出某寺觀燒香六夫人與詔使待制詔使修撰某日過江回去葢攸之妻與子也回之日實二月二十四日在上皇回鑾渡江之後其避危圖安反覆熟慮直至於是夫為君為宗社為萬姓謀其忽如彼為妻為子為婢妾計其審如此人臣不忠復有甚於此乎攸之罪六也上皇既傳位陛下則陛下神眀主矣凢戴天覆地而為人者孰不稽首曰吾君也况身為輔臣乎况前日職在樞機實本兵柄曰戰曰守此實司之可須臾離乎今外州兵馬都監小邑巡尉冦至而逃比之他官罪固加等若廟謀兵機所寄先衆而遁當如何哉攸之罪七也攸罪有七天下共知其前四罪縱付寛典在祖宗時亦合投荒其後三罪則匿冦祕禍殘我生民芘身謀家忘我宗社蔑君臣之義擲本兵之柄自古人臣有此三惡其可復容於覆幬間乎若不早行誅殛其如祖宗何其如天下後世何昔唐五王不誅武三思陷唐室以再亂曾不知桃上之蟲角翼復生潜飛深宫大肆吞噬可不戒哉攸之奸狡詭祕公卿大臣有堕計中而不悟者臣度其不一二年必有為之游説始許及門旋遂造室厠足有地奸計即行鈎引支黨同惡相濟蕭墻之禍起於意外是時雖自愴悔噬臍何及欲望陛下大眀典刑以絶後患如散官各置湖外誠不足以塞天下之紛紛奉聖㫖移潯州安置聖㫖開封府官屬並係王革所辟及所委用革以虐民罷斥而官屬尚存未協民心可並罷别與差遣令聶山别行踏逐以聞九日制曰朕躬承慈訓嗣守丕基渉道未深為日尚寡屬兵戎之侵軼徧河山而驛騷賴宗廟社稷之靈掃欃槍而盡矣繄將帥士民之力保金湯以屹然三關底寧萬姓胥悦惟舜嗣位厯試諸艱而天付予庻其在此有慙否徳乃纉武功爰念黎元遭焚刦之憂師旅竭轉輸之苦丁壯勇於扞禦老弱疲於給軍田野蕭條既失耕桑之候體骸撑拒或罹鋒鏑之災痛在朕心罪非爾衆宜敷慶澤用釋艱虞應河北路州軍限徳音到日云云死罪减等餘無輕重並放嗚呼信順獲助於天人克平禍亂赦宥取法於雷雨期共恩休咨爾一方體予至意密祕書省正字張燾奏臣乃知樞宻院李綱之妻弟乞依唐源乾曜為侍中故事子弟補外明詔在位許自臣始奉聖㫖不允十日聖㫖胡寅上殿奏對審詳所陳可采與改合人官仍與在京差遣左諫議大夫馮澥言臣聞太學者道義之所由出風化之源賢士之關也博士講眀訓迪於上子弟切磋琢磨於下委委蛇蛇人無異論此誠太學之盛也國家自崇觀以来行貢試之法而鄉舉里選徒蹈虛文自是士失所守而太學教養之法一切不振士不自重務為輕浮博士先生狃於黨與各自為説無復至當煽以成風附王氏之學則醜詆元祐之文附元祐之學則譏誚王氏之説流風至此頽敝莫回茲今日之大患也比者朝廷罷元祐學術之禁不專王氏之學陛下固欲中立不倚立經之㫖惟其説通者取之其謬者舎之不主於一此固甚盛之舉也臣訪聞太學校試去取於其上者或主一偏之説守經肄業於其下者或執一偏之見上下嘵嘵甚非陛下開設學校教養多士之意臣又聞臣僚上言乞罷安石配享而謂安石之説為邪説朝廷從言者請罷安石配享而列於從祀此固公議所在其誰以為不然若言者以安石之説為邪説則過矣安石之釋經固不能無失也夫孟子所謂息邪説者謂楊朱墨翟之言若以安石之説便同楊墨之言為邪説則復當禁之此所以起學者之謗而致為紛紛也士之擔簦負笈趨於天子之學以就教養者非特欲以進取爵祿為心亦顧其所養所學與操守者何如耳今科舉在邇為士者若引用王氏之説有司懐私便為邪説而黜落之則其利害所係甚重臣固不得不論也臣願陛下眀詔有司訓勅中外凢學校科舉考校去取不得専主元祐之學亦不得専主王氏之學或傳註或已説惟其説之當理而已倘有司輙敢以私好惡去取者乞重賜斥責庻使天下學者曉然無惑而庠序多士得以安其心矣奉聖㫖依奏御史中丞陳過庭言吏部比他曹最為繁劇郎官方元若又兼權舎人致使天官職事廢弛尤甚奉聖㫖方元若罷權守禦使司擅補進武副尉二人御批付三省有惟辟作福惟辟作威大臣専權浸不可長之語李綱惶懼待罪綱退居定力院章十餘上輙批答不允遣使押入綱不得請即徑趨通津門欲東下上遣中使宣狎挽舟入城絡繹於道既歸府復鏁府門留之監察御史唐恕闕可差河南運判齊之禮監察御史余應求奏准尚書省劄子以臣言事迎合大臣與外内河北知州郡續准勅差權發遣衞州尋具狀奏聞以罰未當罪乞黜責奉聖㫖所乞不行疾速赴新任者臣固當仰體寛恩即日就道力自黽勉以圖報効臣愚區區尚有所言冒昧自陳惟陛下裁擇伏念臣一介寒士宦中都十年未嘗萌意進取爰自今春敵騎犯闕圍閉月餘朝廷之上講和用師之機兩無所决中外洶洶臣以忠憤所激忘其狂妄乞對便殿面陳講和用師之䇿三鎮不可割之利害不謂狂言偶合聖意特加開納後十餘日金人既退遽有風憲之除臣自揣於政府大臣無纎毫夤縁之助必是陛下誤以前日之言為臣可用首加親擢及受職以職事對面奉聖語云卿昨以校書郎論事嘉其忠直出自親擢非為大臣薦引則臣之遭遇陛下可謂特達矣在職踰兩月凢九覲清光每蒙戒飭以耳目之司不得觀望假以詞氣導之使言則陛下之責臣不為不至矣臣每思惟遇聖王當可言之時如此雖愚夫庸人亦欲自竭忠直以効拳拳况如臣親被識擢之尤深者乎若顧望而言揣合時事以求售而希進取則是臣之罪也是以奮不顧身知無不言雖詞切清躬牴牾大臣有所不避章𢾗十上言皆可復今月五日以急速事乞對陳國家之大計抑奸偽之已萌語雖激切而陛下無怒色及復詳欵至於移時最後一章以養親乞出懇請再三而陛下堅不許則陛下之能聽言亦不愧於古之聖帝明王矣臣退而自喜田野愚儒蒙被知遇一至於此雖王魏之遇唐太宗不足道也甫更一日而忠佞不同謂臣迎合大臣斥之外服付以近郡臣夙夜思度聖恩雖厚而於臣之罪實為未稱夫迎合之語固非臣之所敢辯若陛下親自用之親自棄之臣復何憾或者左右大臣於臣有不快巧發微中以投合陛下之意使陛下一旦逐言事之臣而臣受迎合之罪此臣所以懐疑懼之心欲止而終未能也若當日所陳誤䝉聽納如此則未可謂之迎合若聖意以為迎合則在所當謫近地知州郡非謫言者之故事陛下新政罰惡賞善當明功罪以厲搢紳今臣有罪而不責非所以戒狂妄也欲望特賜黜責以正罪罰奉聖㫖余應求懐奸觀望不可與河北郡可送吏部差逺小監當右武大夫知東上閣門事王雲奉使斡喇布軍中迎請肅王金人拒之殺吏卒十九人奪馬十二匹已而納之以為誤幹喇布元約肅王至河而還至是倍約堅留王候交割三鎮而遣然王卒不能歸五月六日以使人賈霆冉企有同來十一日臣僚上言徽猷閣待制蔡佃性資凶險加之貪暴素無所長本縁京攸族屬躐遷華要其奸佞皆出蔡氏諸子之右所至流毒無不被害昨知常州慿恃權勢贓汙狼籍賊害無辜毗陵之人欲食其肉乞賜重行貶逐以慰公議奉聖㫖蔡佃落職宫祠筠州居住尚書省劄子新授職方員外郎秦檜今具錄到副本如後正月七日金人至城下初八日進狀太學正秦檜今具奏稟邊機事一金國興師乘鋭深入河朔諸郡堅壁固守彼進有大河之隔退慮諸城躡其後師老糧匱情見力屈然猶桀驁不遜重有要請伏望聖意㫁以大義與其所當與不宜示怯以自蹙削且如燕山一路是金國取諸契丹與之無害至於嵗幣須令彼能制契丹餘種不為邉害方許以祖宗與契丹之數竊聞仁宗與契丹結盟増添嵗幣亦是與之論夏國事伏乞檢㑹參酌施行一金國逺情巨測今日遣使求和又復渡兵隨至恐是設計以緩王師守禦之備伏望一面遣兵備守河仍急擊渡河兵使不得聨續以進又城上守備須早教閲不至臨事驚擾庻為穏便一金國遣使所求甚大此亦人情之常葢既興師深入不肯示怯空歸如聞朝廷前日與之議四鎮事百僚不得預聞審如所議坐失富強之地敵人貪心無厭得地而勢益強復不能保其不再犯邉今若與之議燕山及嵗幣當須集百官入議狀擇其當者載之盟書示信坦然無疑盖與所當與經久不渝一旦為茍且之計或多或少皆是失當終亦不能守伏望聖意速賜集議施行一金國使乞令止在外館使謀議不可許令入門仍不可引至殿階萬一開門致賊衝突或使人致殿階間有懐兵竊發之變其為患豈可支吾或云縋以入城以臣度之似又非禮伏望聖意詳酌施行又奏復奉聖㫖差充張邦昌下勾當公事臣昨於十二月二十四日陛下登寳位乞奉使大金意欲以陛下即政之事伐大金始謀破李鄴等割棄三鎮之説朝廷多事不果遣使至正月七日金人遣使至城下又於初八日進狀伏乞止割燕山一路並議定嵗幣今來張邦昌下勾當公事専為交割河北地界與臣前所進狀自相矛盾失臣本心於大金犯邉未有和議之時自乞奉使顯非避事今來和議已定而臣所行與所言不同非人臣事君之節伏望聖慈改差奉使棄三鎮人前去交割地界庻於事無窒碍如後有重難差使臣不敢辭又奏伏奉聖㫖除臣職方員外郎止為充張邦昌勾當公事因有此除竊惟主憂臣辱今天下有急非人臣貪進之時况割地界非得已之事縱使事畢亦不當受賜伏望追還誤恩奉聖㫖報行十二日手詔朕托位兆庻之上永念民惟邦本思所以憫恤安定之㑹有金人之難久未暇遑乃者减乘輿服御放宫女罷苑囿焚玩好務以率先天下减冗官澄濫賞汰貪吏為民除害又詔西通觧鹽以便商賈北復糧鈔以實邊鄙東興轉般以通漕運修舉法度惟恐不及方詔减上供收買之額蠲有司煩苛之令輕刑薄賦務安元元而田里之間愁痛未蘇倘不蠲革何以靖民今詢酌庻言疎剔衆弊舉其綱目以授四方朕賴天地宗社之靈與民休息慎守此志庻㡬太平詔到監司郡縣其悉力奉行應民所有疾苦不在此詔者許推類聞奏播告天下使知朕意一常賦之外横加糴買均糴貽糴結糴括糴其名甚衆惟以官告度牒之類等第科配已詔三省自靖康元年正月以来抛給諸路糴本並用寔錢仰今後州縣並須置塲不得復行科配監司互察違者許人越訢一税租加耗自有定法比年所在漕司抛椿者為明耗州縣暗樁者為暗耗亷吏以助經費貪吏以入公庫初則稍加數分後遂増過一倍今後並仰依省耗受納外如有増加升合别厫盛貯别厯收附之類受納官吏等並坐贓論知通監司故縱與同罪不覺察减三等一户口逃移合蠲租税吏避責罰相為蒙蔽或取於隣田謂之交渉户或取於交業之家謂之得産户或取於管税人謂之催税保長一户既逃害及隣保輾轉增加逃亾相繼應諸路逃田並令提刑司委逐縣知令根括在靖康元年正月以前者並令開落舊額租税不理為官吏殿最限一季許元逃户投狀歸業並與免舊來公私欠負限滿别召人承佃已上並與免起租税三科仍令提刑司専覺察奉行違慢官吏按劾以聞一州縣差保正副及保長其地分中如有租税逃移船栰抛失茶鹽透漏盗賊經由率皆任責又縁官吏乞取騷擾使令鞭撻甚衆是致人户被差望風逃避或互相論訴久不能定仰今後所在差役並須選定實業人差充不得容縱虛指以生弊倖應保正副合覺察私鑄令五家為保自此逐坊放城郭差坊正副承受文引追呼百端陪填錢物無所赴訴或析居逃移以避差役可應大觀元年以後所置坊正副等指揮更不施行一和預買絹本以利民比年以來或量支雜物或但給虛劵其害甚多今仰轉運司預取一路合依之數分下州縣通融常平司錢隔季籌辦其轉運司不以見錢而以他物不以正月而以他月給散者並以違制論一州縣市户非聖節不許借賃自有定制近來貪利以和雇和賃為名須索無厭或經隔年嵗不為給還又容縱公吏典賣使用以致民户供應不前窮困失業仰諸路提轉覺察除借依法㫁罪外其借借市户以和雇和賃為名者依借借法雇賃人舡車馬准此一土木之役傷財害民比來監司守令營造料率或取木植或差人夫或役禁旅或供上位或入私家又有分科寺觀認造亭榭之類百端騷擾仰應諸司並州縣除經殘破地分及諸路修建城璧樓櫓外餘並罷修造三年應日前科下修造物色並免納敢有因縁結絶未罷及尚有科催者並計所攴所催坐贓論應被受朝㫖修造准此一坑冶之興使民逐末有姦民因相仇恨遂假告發以懐良田至於科立重額不能輸納或至潜買金銀以為坑冶所出之物理宜蠲革應諸路坑冶仰常平司體究如實苖礦㣲細或舊有今無並從蠲减應買撲金塲並罷如出産浩瀚即相度差官監取施行一職田本以養亷理須有田然後催科訪聞諸路租存田亡者甚衆督責富民嵗代輸納深可矜憫仰提刑司隔州差官根括如無實田再差官覆視特與開落租額其有開落去䖏委提刑司將一州職田等第重均為額所委官根括不實如係知通監司職田者坐贓論餘官减一等一州縣賦入有常轉運司以上供平科為名盡將本州所入拘占致本州闕用或將軍兵月糧取於民户仰轉運司除諸州依格上供数外轉運司移用錢物不得侵逼本州有額上供所餘三分之一違者徒二年一諸州公庫約束周備近縁起發金銀深慮官吏因縁率歛以償所闕重困民刀可將錂道金銀更不起發其賞醋息錢特依舊法收入公庫仍令提刑司覺察嵗終具有無抑配科率聞奏一州縣官監酒務内有昨縁差官經制増添價錢重困民力可應縁經制司所添酒錢並罷一倉庫出納收頭子錢皆有定法東南九路昨縁盧宗原申請𢾗外増收重困民力可應宗原申請所添頭子錢並罷一京東科納免夫向縁人户就燕山借兊郭藥師錢物訪聞州縣尚行理索深可傷痛並與除放一京西昨縁張徽言王璹剏起新税已令御史䑓取索蠲减令來夏科在近可令本路將元増𢾗以十分為率先次减放四分餘候御史臺定到蠲减分數施行聖㫖開封府差使臣前去追取蔡京蔡攸所寄宋㬇船金銀二百擔入京王師與金人戰於榆次縣制置副使种師中死之初斡里雅布師還扺中山河間兩鎮兵民以死固守不肯下肅王張邦昌及割地使等躬至城下説諭即以矢石及之而退㳂邊諸郡亦然种師中因此進兵逼金人金人出境尼瑪哈之師至太原城下太原亦堅壁固守尼瑪哈屯兵圍之悉破諸縣為鎻城法因太原使内外不相通雖姚古進師復隆徳府威勝軍扼南北關累出兵有勝負而不能解太原之圍於是詔師中率兵由井陘道與姚古相犄角應援太原師中兵次平定軍復夀陽榆次諸縣時尼瑪哈以暑渡井陘會西山之師於雲中所留兵皆分就畜牧覘者以為兵散將歸告於朝廷本大臣信之從中督戰無虛日使者項背相望詔書以逗撓切責師中師中讀詔歎曰逗撓兵家大戮也吾結髪兵間今老矣而逗撓乎慨然赴敵而死其餘將士退保平定軍師道駐滑州以老病乞罷十三日上御紫宸殿以太上皇帝回鑾受百官賀是日雨大作改用六月一日又雨竟於雨中行禮左諌議大夫馮澥奏臣聞天下有公論有中道公論者天下之所同而中道則萬世而不易熈寕元豐及元祐以來人無公論治失中道不偏於此則偏於彼天下弊於變更士夫困於遷謫五六十年之間是非相攻禍福相軋紛争擾攘至於前日大亂而後已陛下龍興以英資睿㫁誅鋤奸凶剗除蠧弊曠然大變與天下更始宜於此時明大公至正之道於天下合天下之公論垂萬世而不易而臣竊聽近日朝廷議論觀士大夫之趨向駸駸復偏於元祐鼔唱應和漸不可解則義理又將不得其中而政治又將不得其平矣臣聞治貴邉中法則隨時祖宗之法至於今百有餘年盖有可行者亦有不可行者今但擇其可行者行之不可行者去之則已矣何必祖宗之是而熈豐之非哉傳注之説千有餘年其於聖經不為無補然要之公論豈有淺漏未盡之䖏王安石以名世之學發眀要妙著為新經鏤板太學頒之天下學者翕然宗仰然要之公論亦有穿鑿太過之弊今但令學者擇其善而從之其不善者而改之則已矣何必傳注之是而新經之非哉祖宗之治逺矣臣不及見熈寕元豐間内外平安公私充實法令備具賦役均平朝廷無倖位州縣無横歛邉圉畏威盗賊不作使今日之治得如其時有何不可是時學校英秀如林治經習史皆有本原程文具在可以按考使今日學者得如其時亦有何不可自崇寕以來蔡京持權二十餘年紛更變亂靡有寜止自熈豐之法掃地無遺故其大壊至於如是之極仁宗皇帝陛下之髙祖也神宗皇帝陛下之祖也子孫之心寧有厚薄王安石司馬光皆天下之大賢其優劣等差自有公論臣願陛下無作好惡不蔽偏黨允執厥中以照臨臣下則是非自明紛争自息矣伏望睿慈與兩府大臣少加詳議如有可采乞明榜朝堂頒示太學以安士心以絶衆疑則臣死生幸甚茍為不然臣甘受邪言之誅早正典刑以示天下亦死生幸甚取進止三省同奉聖㫖出榜朝堂十四日臣僚上言外任官職田權借一年從之十五日禮部尚書傅墨卿等言春秋釋奠乞依元豊儀令排辦從之十六日聖㫖御膳今開供進早晩百餘件方今民力困敝府庫殚竭朕不身先何以率天下今後早晚供進六十件只今行下十七日詔昨以違御筆論者並改作違制論從開封尹聶山之請也御史中丞陳過庭言自祖宗以來本臺僚屬非有出身未嘗除授下至檢法官著於定令亦莫不然昨奉聖㫖唐恕落職致仕除監察御史臣聞恕除不曽致仕外實有行業士類推許倘使分領六察固優為之然以䕃補入仕有違祖宗條例恐此端一開自是袴𥜗之子攀援進取者足相躡於憲府矣欲乞改除唐恕一等差遣奉聖㫖唐恕與除郎官十八日遣王雲曹矇使斡喇布軍十九日監察御史胡舜陟上言乞權罷詳議司從之二十一日檢㑹五月十六日聖㫖髙俅率領軍兵敗壊紀律累有言章可與追降子孫倖冒亦與降等授官以戒後來者吏部供到髙俅已身亡按史髙俅於十四日死前係檢校太保奉國軍節度開封儀同三司簡國公闕尭卿見係岳陽軍承宣使尭輔安國軍承宣使堯唐柱州觀察使十八日奉聖㫖高俅追檢校太保開府儀同三司堯卿堯輔並與右武大夫堯康與武功大夫並遙郡刺史餘官並奪諸孫特免臣僚上言謹按高俅初由胥吏遭遇夤縁幸㑹致位使相檢校三公不思竭力圖報乃敢自恃昵幸無所忌憚身總軍政而侵奪軍營以廣私第多占禁軍以充力役凢所占募多是技藝工匠既供私役復借權倖軍人能出錢貼助軍匠者與免教閱凢私家修造磚瓦泥土之類盡出軍營諸軍請給既不以時而俅率歛又多無以存活徃徃别營他業雖禁軍亦皆僦力取直以為衣食全廢教閱曽不顧恤夫出錢者既私令免教無錢者又營生廢教所以前日緩急之際又不知兵無一可用朝廷不免屈已求和實俅恃寵營私所致貪財誤國之奸不减蔡攸偶有司失刑遂免逺竄得終牖下今來止追前官不惟不足以厭公論亦無以誡後來奉聖㫖髙俅更追節度簡國公二十四日制資政殿學士知太原府張孝純為檢校少保武當軍節度使依前河東經畧安撫以守禦之功也二十五日監察御史胡舜陟言竊聞神宗皇帝即位之初用宫邸直省官郭昭選等為閤門祗候司馬光言此祖宗所以蓄養賢才以待任使之地班序差遣事事不同在文臣為館職豈可使厮役為之則知閤門之職祖宗所重宣導賛喝不過三五人熈寧間通事舍人十三員閤門祗候二十三員看班祗候六員當時議者猶以為多今舍人一百八員祗候七十六員看班四員内免供職者一百三員冗濫之弊莫此為甚葢由宦侍恩倖賣以求財朱勔父子所賣尤多富商家子徃徃得之真宗時諸王夫人因聖節乞親屬補閤門帝曰此職非可以恩澤授並不許夫以恩澤授猶不可而宦侍恩倖賣以求財可乎伏望特詔裁省以杜倖冒奉聖㫖閤門别立員額二十七日聖㫖應天下州府軍監有習武藝知兵書人並仰通知不限數保明解發赴闕朕將親䇿於廷量才擢用其或籌䇿深逺藝能絶倫當不次陞擢在京武學生仰禮部擇日考試具等第聞奏不係在學人亦許經禮部投狀収試䇿義弓馬優異者並與推恩注授差遣其太中大夫及侍從官至路分都監以上奏舉武舉人自依條法施行靖康要錄卷五
