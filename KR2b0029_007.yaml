body:
  text: 靖康要録卷七七月初一日詔罷諸路仁濟亭制順福帝姬進封順德帝姬殿中侍御史胡舜陟奏臣觀敵情狙詐多方見誤去秋盛傳劉彥宗之亡彼方且㸃集人馬今春敵騎出境又傳烏竒邁之亡而斡喇布歸傳位矣彼方且休兵于燕山今又傳尼瑪哈亡矣又曰畏熱而歸又曰歸救雲中然晉陽城下兵勢愈强軍壘愈多我師之出出無不敗則尼瑪哈果歸乎果亡乎金人誤我使不設備故其祕計每每如此臣竊怪敵出詭道無窮欲置我于陷阱而我誤彼了無一術閒有臣下所獻計畫如行間諜如設水匱如招叛亡如搗空虛如攻其必救如分其兵勢三省密院謄報于下大書文移有同法令省臺寺監處處有之安知其無奸細賄達于彼凡有措畫動輒知之彼必思所以應之之道我能制勝乎臣願陛下密諭將帥嚴飭武備勿為所誤更詔三省密院凡有事屬兵機勿得降出奉聖㫖今後係兵機事不得頒行四日知威勝軍詹丕逺先次勒停根尋送所司根勘以臣僚言金人犯界即擅離任逃遁致司録李植率衆遽降故也五日御史中丞陳過庭奏竊惟國朝于觀文殿置大學士以為宰輔均逸之寵自非進退有禮而以功名自全者未嘗輕授謹按前宰相白時中李邦彥或孱懦不才或浮薄無行冒居宰輔士論鄙之昨者金人擾攘之際惶駭無謀幾致敗事稽其罪戾宜汙鼎鑊陛下務全終始罷相之日倒以大觀文授之固宜牢辭職名力請黜責以見恐懼之意今皆不然時中乃具劄子云方權臣恃勢事之機要者百不聞一夫身為宰輔其阿諛朋比不恤國事如此身罷相歸東至楚州艤舟于城外時方臘竊據浙西淮南諸郡閉門守備一旦驚擾匍匐扣城卑詞哀懇而後得入市井之人羣聚而侮詈之曰作宰相時開口發一忠言以告于朝豈有今日之事即其懷奸誤政不亷無恥一至于是今乃以特進大觀文領真祠優遊大第歌童舞女朝夕燕飲不念陛下憂勤于上為大臣者忍如是乎伏望裭其職名鐫其官秩特加逺竄及其子日章壻公彥待制修撰並乞削奪施行又奏前屢論到白時中尸素無恥李邦彥悖慢不遜及余深朋附阿諛不恤國事等罪未䝉施行時中與王黼梁師成朱勔私相交結邦彥與蔡攸為表裏余深又蔡京之死黨也此皆國家之蠧社稷之賊久稽典憲未足以明政刑之威快士庶之憤所有大觀文職名並乞追奪伏望早賜施行七日詔曰朕即位以來廣闢言路臺章交至多及濫賞因欲澄革以除蠧弊然嵗月既久干涉者衆真僞混淆難以究治且纍經赦宥瑕垢盡滌若復求索瘢疵首尾豈不相戾况今邊方驛騷兵革未息朕欲用楚子之言安民和衆以修武德豈不美哉前此濫賞十餘項事可更不問故兹詔示其諭朕懷聖㫖訪聞京攸中路徘徊不去貶所州縣尚自觀望將迎不絶仰開封府差得力捉事使臣管押貶所交割訖奏日下施行九日宋㬇責授單州團練副使永州安置以左正言程瑀言其構造語言悖理傷義詿誤盛朝所害不鮮故也右正言程瑀奏伏觀朝廷見遣使至燕山府斡喇布所蓋緣王雲自燕山還傳道斡喇布之意以謂尼瑪哈得所與余覩蠟書堅言中國不可信欲敗和約望朝廷遣使解釋此事臣訪聞使者朝夕出門而朝廷所授意㫖及賜斡喇布書皆未嘗解釋蠟書之有無臣度朝廷所以略而不言者慮失余覩之約耳夫我書即既為尼瑪哈所得余覩未嘗遣使于我亦何約之有又况余覩起事有無蓋未可知藉使其有焉勝負又未可知也而金人圍重鎮留貴質屯兵界上日謀南犯事至急矣我乃不先與要約使解圍歸質休兵息民各保土宇而持兩端以生疑二臣竊所未喻朝廷審知斡喇布之言不可信而塞上兵馬足以扞禦可必其不能南犯則不復遣使可也既遣使矣乃不因之成言焉用此紛紛為且尼瑪哈非固欲與我戰斡喇布非固欲與我和而二人異議者蓋出于爭功戰則功歸于尼瑪哈和則功歸于斡喇布非能獨主和議也必有以破尼瑪哈之說而請決于其君然後和議可成今我姑從其計與定和議纍有余覩者與之爭戰金人勝焉我無損也余覩遂勝而與我接壤徐尋舊好蓋未晚也臣觀金人屯師于兹半載陛下早朝而晏罷者為邊陲未寧也大臣孜孜殫竭智慮亦豈嘗不在邊備哉將不素養兵不素練金粟不素蓄器甲不素備凡二十年之毁棄廢壞者乃欲圖回于半載而坐抗封豕長蛇可謂難矣然有言及金人盛强者不以為怯懦則以為恐動朝廷是獨何哉敵勢之盛衰强弱蓋自有時中國之所以御邊塞要在觀其時之如何太宗之窮誅武帝之深討隨其時而善用其勢者也文景之和親高祖之降禮順其時而不失其稱者也有如言武帝之舉于文景之世則妄言高祖之禮于太宗之時則謬朝廷觀時度勢遣約和議既得其稱卑辭厚禮名貨重幣務協其情亦云可矣顧懷余覩之事未肯明言蠟書之非臣恐猜疑不解和好無成使人徒往厚禮虛辱而兵革未有休期邊鄙或不抗拒藉曰未遽渡河則河朔重遭暴殄可不念哉時既秋矣和議成否在此一舉使所係在于書詞伏望陛下察誠僞之情度安危之計審成敗之理仰思保固宗社俯念全活生靈詔宰執熟議竄易書辭以授使者庶幾和議可成萬一敵人詭詐得我書詞反覆交構余覩則彼僣而我無憾皇天后土實鑒臨之不得已而交兵可也陛下不以臣言為妄儻賜施行實臣至幸如以為怯懦以為恐動朝廷則甘從誅殛要之聽在陛下而區區所見不敢不盡言也取進止十日左正言程瑀奏伏覩臣寮近有章疏屢論列蔡京罪惡甫竄嶺南而韶州乃佳地使京自擇不過如此比日雖有不放還指揮然京旦暮之人耳不早逐之海外誠無以答天心而塞人望按京隂賊著于心造飾奸宄脅制朝廷迷國罔上不可悉數至于誣謗上皇罪應誅僇者臣請為陛下言之神宗彌㽜之際宣仁贊決末命大臣共聞初無異論京乃自詡常帶劊子入內欲斬王圭以禁制宣仁不暇他議哲宗之立已實有功使宣仁銜恨于重泉而神宗與子之意不暴白于天下然則謀一身之利而謗前朝誣母后若此其誰謂人臣而敢為之上皇性本慈愛志慕功名京獲柄用假紹述以濟奸謀逐臺諫以塞言路外則締交黨與內則隂連宦官相與倡為豐明盛大之說以開奢麗夸侈之端大變舊章妄作新事無非蠧國而害民不但欺君而罔下壞轉般之法僅足都內給支而淮泗之儲峙空變茶鹽之制盡供御前使用而轉輸之經費竭天變動于上而不憂人言喧于下而不恤以至委軍政于童貫使之專恣于外賞罰不公饑寒不恤將士怨嗟卒致構患外國幾覆宗社竊據重位擅弄威福二十餘年海內側目其歸乃在于困民力蠧邦財壞軍政使上皇負謗于天下實有問鼎之心顧天下怨嫉者衆未敢發耳罪惡彰彰死有餘責此天所不容地所不載臣僚論列不可勝數而二三大臣懷京卵翼之私爭為庇護是不忍負京之私恩也不亦異哉夫鈇鉞不用而刀鋸日敝君子謂之國政陵夷者言刑戮日加于微賤而不行于大臣也陛下修祖宗之盛德臣非敢以殺大臣啓陛下姑願投之海表以示法必行于大臣而已釋宣仁之恨為人孫之事也分上皇之謗為人子之事也陛下一舉而為人子孫之心無憾何憚而不為乎若欲行法于奸邪而牽制于宰執臣竊以為過矣取進止武信軍承宣使太原府路馬步軍副部總管王稟卒太原失守初是宣和七年秋金人非時遣使來名之告慶實覘我虛實也復紹言于上皇請遣童貫速至河東且授以雲中之地信之不疑貫乃出宣府時尼瑪哈使薩里雅布來迎貫見天平軍言詞不遜貫猶欲厚以金帛啖之謂雲中可得也因遣辛興宗偕往見尼瑪哈興宗至敵帳尼瑪哈厚為之禮以好詞遣回時敵騎已集入冦有日矣而貫不之悟興宗歸未浹日而尼瑪哈董師已及塞上驚報至貫以歸調天下兵拒敵為辭棄軍夜開太原門而出日馳數百里還京師是嵗十二月十六也㽜稟為太原副帥因總宣撫司之兵㽜屯者是月尼瑪哈入代州欣州守臣嶺石關戍將皆開門迎降敵遂長驅圍太原時二太子已陷全燕之地矣十九日上皇以郊祀禮畢恭謝上清儲祥宫兩邊上章告急且乞師樞密蔡攸匿不進呈是日蔡靖郭藥師張孝純各遣官星夜奔告皆至京師攸貫知不可掩乃奏之上皇大震不終禮亟還禁中遣中人梁方平以兵守河橋又遣何灌將兵屯滑州以為之援貫攸等與密議遂傳位淵聖且為出避之計攸恐身去朝廷禍將不測遂用吳敏自給事中為中書侍郎即托庇其家且謂敏有定䇿之功二十三日遂行內禪之禮太上退居龍德二太子既破信德府遣郭藥師以輕騎先據河橋敗梁方平于大伾灌力不支亦退走兵遂濟河明年正月五日貫攸挾上皇妃后鄆王楷等東走淮浙九日敵騎至國門之北閲月議和乃歸而尼瑪哈以太原未下河東徑兵必乘其後因㽜攻太原稟總守禦以死拒敵城中食盡至煮弓弩馬甲取筋皮充糧雖尼瑪哈盡鋭攻之自十二月至七月不能陷也久之力盡人疲力不能支諸道援兵如姚古折可求劉光世种師中劉韐張灝解潜等軍四面俱至賊分兵摧之皆不得前是月九日城遂不守帥臣檢校少保張孝純不能死為賊所擒稟獨與戲下決戰突圍而出敵騎追之力戰不解部曲盡亡稟遂負太原廟中太宗御容赴汾水而死乃遣使致書于金人云大宋皇帝致書大金國元帥比因專使嘗以布書具載悃誠想加通亮但以三鎮之民懷土顧戀以死堅守雖令不從致宿師引曰已久惟兵民各為其主困于暴露深可憫傷是用欲以三鎮稅租納充嵗幣既不失通和之議抑亦為久逺之圖諒惟仁恩必能矜察已遣使大金皇帝及皇子郎君今再命單車復陳本末願加聰亮有少禮物具于别幅秋暑尚煩更希保護又書云大宋皇帝致書大金皇子比嘗布問具致悃誠近因使介之施尤詳敦好之意但以三鎮之民懷土顧戀雖令不從必致宿師引日之久重惟兵民各為其主困于暴露深可憫傷是用願以三鎮稅租納充嵗幣方昭大信諒不受于間言將究逺圖豈自生于細故成長利于兩國在仁人之立談想惟英聰必能體亮已遣使大金皇帝及大金國相元帥今再命單車復陳本末願加聰察有少禮物具如别幅秋暑尚煩更希保護左正言程瑀奏纍上章奏論列蔡京宜竄海外未蒙施行按京事迹罪在可誅鑄鼎刋名位居九五臨平增山托名祝聖私第引河潜通宮掖果實授受公瀆妃嬪閨門汚穢醜不可言其他蠧困害民誕妄不道不可勝數正名定罪死有餘責而二三大臣但懷私恩不畏公議寧屈國憲不負賊臣置之曲江名為嶺表實與內地無異伏望威斷早賜施行其子孫如攸罪惡盈溢别具論奏請正典刑鞗尚帝姬隳廢法制亦合離判不當尚聨禁戚其餘並乞褫奪官爵無使尚廩給縣官實天下幸甚奉聖㫖蔡京移儋州下開封府差人管押前去程瑀又奏謹按蔡攸豺狼種類固不可以人理責至其挾媚道以奸權操譎計以固寵竊弄威福招納賄賂蠧國害民欺君罔上略同厥父至于位師傅之尊躬俳優之賤侮慢君父汙衊宫庭則厥父或未至是蓋死有餘責矣而燕山之役以嵗賂易空城金兵之來閣家南逝名為扈從上皇實背叛也上皇南歸非獨思念陛下本于天性其深見達識正應如此攸蓋弄臣上皇豈復與之論議乃敢肆為誣罔謂勸上皇南歸使其私黨援為已功欲以蔽覆舊惡罪惡彰著海內憤疾望投之海島不使汙我海內實快天下之望奉聖㫖蔡攸移雷州刑部貟外郎楊達度支貟外郎吕濟别與差遣以臣僚言達乃徐鑄之壻交結朱勔夤緣進身濟素無士檢憑恃權惡恣為贓汚故也給事中楊時徽猷閣直學士差提舉西京崇福宫詔曰朕獲承宗廟托士民之上嗣位未久敵兵侵疆乃至郊甸逮今三時邊鄙未寧調發轉餉勤吾四方惟德不類無以仰當天下日夜祗懼每御便坐希臨正衙凡所以自奉者務從貶損至于常膳百品十減其七放遣宫女凡六千餘人未嘗輒奏音樂備置臺諌通言路公車上疏乙夜觀覽庶幾少自警戒而日者彗出東方考之前載是為大異畏天之威弗敢寧處念將循舉故事而率皆已行深懼虛文不能應譴告之實熟思再四意朕之不明元元之愁痛無聊者衆是用求民之疾苦者悉行條具除苛解嬈兾以感召和氣以格休應焉更賴中外大小之臣體朕至意同寅協恭以圖康乂十二日左正言程瑀奏臣聞豫奪廢置人主馭人臣之柄也古之人􅋵此以役羣衆喜怒不存于胸中體公任理唯其當之為貴有豫有置不傷于人有廢有奪不傷于義故下之人知上之非我私也得者無所懷德而失者亦不敢以為怨猶春夏之施生秋冬之肅殺各因其時任其化造物者既自無心物亦何常懷德與怨哉茍欲有豫而無奪有置而無廢是猶欲有春夏而無秋冬也其果可行乎然則前日所豫今日奪之前日所置今日廢之亦顧于理何如耳不審其理之當奪當廢而戚戚焉懼人以為怨亦過計矣臣竊惟比年以來上則權臣內則宦官外則恩幸竊弄權柄輕視官爵言功第賞補授泛濫不可勝紀陛下即位臣下交章論列四月十五日及五月七月所得聖㫖既許褫奪裁抑允當衆心士夫鼓舞以謂官曹自此清名器自此重廩祿自此節僥幸之徒自此退聽依流平進之人自此而免于淹滯矣天下之幸也事務吏曹文移取索未果上聞五月九日復降聖㫖深念僥幸茍得不足深責可使自新以示寬大特開願致仕與依進納正官之路其官品已高或元初破賞不致僥冒者具名取㫖其實有軍功戰功及吏職年老補授人更不禠奪內有有才力之人可量才任使先次施行聖㫖可謂深厚亦足以杜衆多之口矣諸臣不惟天下公議云何顧懷私植黨隂為曲說阻撓成命欲入粟納金人並理限選依官户法則欺陛下以為實為公私之利恐陛下以失信于人欲今凡叨冒濫之人注授磨勘赴任各從其私有司未稽考則以有司見行一例阻節為言夫有㫖使之裁抑矣則合注授者未得注授合磨勘者未得磨勘合赴任者未得赴任何疑之有顧阻節歸過有司畫㫖並且令依條注授磨勘赴任夫茍且之事豈初政所宜有乃公然著之命令此何理哉猶以為未快也復飾小說以惑宸聽而七月七日之詔下矣詔書流傳臣等尋繹詔㫖以為可痛憤者三可深惜者二敢為陛下言之夫嵗月既久干涉雖衆三銓茍未廢簡牘且存可覆視也何至真僞雜而不可究治乎羣臣乃以難究治欺陛下此可痛憤者一也赦宥之行除罪惡耳今以往昔濫授爵賞欲加釐正未嘗求瑕垢而加刑罰也羣臣乃以經赦而求瘢首尾相戾欺陛下此可痛憤者二也冒居高爵濫叨重賞之人民之所疾衆之所惡也禠奪裁抑果行彼將鼓舞之矣乃今啓陛下以姑息僣濫之流指為安民和衆之德白黑正不相侔矣臣度陳啓之際是必恐動陛下以為民不安衆不和勢當置而不問此可痛憤者三也僣濫之徒僥幸得志胚胎于崇寧熾盛于政和大橫于宣和皆朋附權臣宦官恩幸而已其茍賤趨事比于奴𨽻者所不問舍是賂賕交結誅求應副皆剝削吾民膏血者也乃使之享高爵居民上以治民其奉法循理之吏不問堂除吏部差注為所攘奪謗嗟盈路今幸裁抑民吏少快望矣未幾反之此可深惜一也上皇禪詔更張庶事殆盡獨未及此豈以為不當澄汰哉蓋以此遺陛下使陛下一舉而空之聳天下耳目者也陛下即位臣僚再三言之陛下亦幸再三聽之宰執亦再三奉聖㫖矣今宰執不以退有後言為非不以反汗為嫌用意巧密持說堅牢以欺陛下恐陛下偶未察其情遂為之降詔命前所畫㫖悉反焉臣所慮者不惟僥幸之流復得志慮天下之人竊議初政之失此可深惜者二也昔管仲奪伯氏駢邑三百飯蔬食無怨言諸葛亮廢廖立李平及亮卒立涕泣而平致死夫何故奪之廢之得其當也今羣臣不惟其當與否區區以避怨為事使陛下不得專廢置豫奪之柄臣竊未喻伏望察臣所言斷以無疑收還詔命俾有司尊稟五月九日聖㫖施行內有願致仕及依進納正官法兩項緣轉官則有多少職名則有高下有元係選人而改官有元係白身而受命輕重不侔恐難限以兩色欲望更為三省詳議抑臣嘗觀唐室斜封之濫啓罷之者姚崇宋璟也後崔涖薛昭素以為言而太平公主主其說于內復詔量才叙用而姚宋尋亦斥逐使姚宋在位叙用之詔恐未遂用也昨者裁抑指揮皆宰執聚議取㫖矣今復更焉得無異于狐埋之而狐搰之乎前後異詞是非混雜坐致政令不一上纍國體伏願留神裁察取進止十三日聖㫖蔡京蔡攸童貫王黼孟昌齡朱勔李彥楊戬前以恃勢强買人户田産屋業致令失所今來如有陳狀論訴之人照驗文契如委是詣實並與給還却拘元直入官宣撫司統制官黃迪應援太原于文水縣潰散之後逃避不出至今奉聖㫖立賞錢三千貫召人告捉御史中丞陳過庭言臣聞漢田千秋以一言寤意旬月取宰相丐奴單于曰漢置丞相非賢也一妄男子上書得之矣蓋宰相非其人取笑四方見輕戎狄如是而責其撫百姓鎮四方亦難矣臣謹按少宰吳敏不才而喜為奸無識而好任數又其天資險佞籧篨戚施面若畏人退而害物自童幼時為蔡京父子養于門下側媚狎昵日益親附方鄭居中作相與京構隙京乃峻擢敏輩列于侍從分布親黨四面刺探當時被其中傷者不可勝計奸迹既彰久被棄斥前年攸及子絛覆出為惡首加薦引敏知京絛將敗而攸及李邦彥齊驅並進于是又背京而從攸夷考其行豈宜置諸廟堂以汙宰輔之任伏自上皇禪位陛下登極之初授受揖遜若唐堯虞舜初無間言乃貪天之功以為己力每于章疏喋喋自明此敏之罪一也陛下仁孝通于神明形于四海天下之所共知敏輒具劄子欲令百官在上皇前則言陛下孝陛下前則言上皇慈播傳中外人心疑惑此敏之罪二也臣僚纍上章疏擊蔡京父子余深李邦彥等敏極力營護類多阻抑不行或行之不盡使陛下刑政賞罰不均此敏之罪三也頃時方賊作過敏居真州遽挈其家遁于亳社州人因此驚駭不安其居昨者金人將至又首入劄子乞令其父般家東下執政從官紛然相效使京師之衆扇搖惶惑此敏之罪四也左司郎官吳巖夫婚姻之家顯有親嫌引列宰屬倚為腹心而不顧公論此敏之罪五也敏妻兄曽開初除知東平葉夢得除知潁昌敏以東平不及潁昌于是令開與夢得兩易其任曽楙曽班曽几皆其妻黨故剖符大藩或持節善地不惜爵位以私其親此敏之罪六也昔與宇文虛中同除中書舍人潤色誥命賴虛中為多及臺臣列論虛中惡同王蕃而又極力營救不為施行其罪七也敏頃嘗薦燕瑛為廣南漕臣交通情好蓋非一端胡直孺為發運使時敏寄居真州干求請謁靡所不至瑛與直孺皆以交結匪人荐致彈劾雖不得已而罷去特以龍圖直學士典領要藩其罪八也居真州不能擇交而與贓汙罪人石悈宴飲游從近乃召悈赴闕士論大喧其罪九也太學官吳若上書痛詆其罪初則怒而逐之日下押出國門是時金兵初退城外剽掠未息知若無宿地實幸其為亂兵所殺耳既又復其舊職果出于誠心乎太學生陳東上書痛詆其罪初則欲加以重辟既又命之以官作威作福喜怒自己其罪十也他惡未暇悉數敏亦自知其才不足以當大任中懷慙怍不敢舉頭仰面以見士民衆皆侮笑之不敢入尚書省判狀治事自當軸以來不得已而過省者才十數日而已方今國家多事外則敵國交侵內則綱紀廢壞雖賢而智者猶恐不勝其職况如敏者他日誤國萬萬無疑古人云屋大而柱小可為寒心正敏之謂也臣愚伏望陛下念祖宗基構之重搜採羣䇿共致中興如敏之奸懦速宜擯斥若遲疑不決則國勢委靡中外解體不可支持矣臣不勝感切之至取進止十六日御史中丞陳過庭言伏見前月二十七日壬戍夜今月初四日戊辰夜以來彗星見于天之東北夫以陛下恭儉憂勤仁民愛物施于四海不宜致此變異故凡明于天文者皆曰此金人不利之象稽之天理驗之人事金兵殘暴殺傷太甚或有是理雖然天道幽逺天象著明倘以幽逺之說而昧著明之戒似非古先哲王正厥事以應天變之義又况敵兵未弭寇盜未平主威未振國勢未强權綱未舉紀律未嚴是非未明賞罰未當罪人已得未加明刑寬詔已頒而未䝉實惠倉庫未盈私室未富貴近之列未皆正人州縣之間未皆亷吏命令數下而數易差除屢報而屢移朝有姑息之政吏多冗濫之員如是則星象垂戒其可忽乎伏望特降明詔切自警畏內修德外修政進君子退小人獎亷潔蠲苛嬈修兵甲選車徒備邊陲儲糧食恤民隱去冗吏除弊源如此之類次第施行庶幾變災為祥轉禍為福矣願陛下加察焉取進止十八日連南夫韓駒復徽猷閣待制遣差依舊張忞胡松年高伯振李璆復右文殿修撰依舊宫祠二十一日聖㫖蔡絛責授昭信軍節度副使潭州安置蔡絛等並勒停其蔡京以下并子孫二十三人遇有大赦不許量移布告中外二十二日給事中詹文除徽猷閣待制管勾龍德宫謨閣待制管勾龍德宫談世績除給事中王資深葛仲勝並復徽猷閣待制依舊宫祠以赦叙復也二十三日右正言崔鶠除直龍圖閣差管勾西京崇福宫以疾病屢乞休致故有是命二十六日臣僚上言近降指揮蔡京以下子孫二十三人盡皆勒停遇有大赦不許量移聞者孰不欣快然責同罪異有未協公議者如京之子絛攸之子行是也京方專權跋扈蠧國害政絛實助之去年春力勸京復出任事乘京之病力援羣邪結為死黨私己好惡進退百官宰相白時中李邦彥坐視而不敢喘息天下莫不駭之蔡行挾乃父之勢竊弄權柄納賄通賂薦引衆汙稍居要路購冡墓無用之器視金錢若糞土然强買園産專恣奢僣帷薄不修醜聲流傳究絛行之過惡尤在不赦今絛韶州居住行洪州安置皆在內地未當人心伏乞竄之嶺外奉聖㫖絛移白州行移栁州庶有分别只今行下聖㫖京東轉運使王子獻前知淄州毛孝立東平府通判吕岯前京西運使任輝彥前提舉常平李端願劉寄並令吏部直注逺小處監當以臣僚言此六人皆事李彥竭兩路膏血以奉之假借事權勢力氣熖足以制百姓死生之命故也臣僚上言謹按徽猷閣待制知越州李邴朋附王黼最為親狎能軒輊事機萋菲善類當時士大夫多為中傷黼之誤國邴謀居多嘗語人曰要見宰相須是立地說兩時辰語言其巧佞無恥以至于此故自選人徑除校書郎改秩才數月一再遷遽躋從槖又權直翰苑其榮至矣黼已就殛而腹心爪牙素與共亂者尚以延閣近聨領帥名府士論沸然伏望明正典刑奉聖㫖李邴落職翟汝支乞外補可依所奏除顯謨閣學士加越州太宰徐處仁劄子臣伏覩街市印賣文字有太學正吳若所上書言臣嘗以十事留蔡京覽之不勝駭愕頃至陳述本末以祈聰察臣于崇寧間與鄭居中劉正夫等同在從班是時蔡京獨持國政至大觀元年䝉道君皇帝擢為尚書右丞日與蔡京爭論政事京意不悅時道君待臣厚且通明堂大禮京雖怒臣未有以見逐也才兩月餘臣丁母憂去位既而居中正夫亦以他事與京有隙而臣孤立無助遂獨兩遭斥逐流落外方凡二十年陛下即位之初首䝉收召擢為上宰夙夜罄竭孤忠未嘗敢以一言自明向日之事者蓋以方京盛時生殺在手中而臣敢忤其意于是為難今京事敗勢去罪惡暴著略正典刑矣雖日言其過人誰不能是以不復自明至于暴其奸狀自有臺諌亦悉心奉行若乃京所立害民之政日夜敷陳以次更革此陛下所明知不意吳學正者以十事留京相誣也且以嵗月考之蔡京于道君朝斥者五崇寧間京罷左僕射臣時為御史未嘗有章疏乞留京也大觀三年京初致仕臣持服在南京大觀四年京出杭州臣服關赴長安宣和二年京再致仕臣以疾病任宫祠宣和七年京三致仕臣以管鑰守北京皆無上章留京之理借使有之則當時與京為敵之人豈不暴臣之章以治臣之罪哉不知吳學正所謂以十事留京者果何時而所謂十事者果何事耶且上章留京人臣之大惡也假如脫已失計而為之固難隱諱自應默默羞愧甘為名教之罪人若實無其事而謗言出于意外使四方傳播以為口實臣又安得不自辨明是以冒瀆天聽乞特賜聰察以息囂謗則臣死生幸甚抑臣久有所懷亦乞因此略為陛下陳之昔蔡京用事之初惡元祐臣僚之不右已也首為黨論以禁錮之既而京與鄭居中王黼相繼當國各立說以相傾凡二十餘年搢紳士大夫除托附童貫梁師成李彥朱勔及諸近習道士之外未有不經此三人除用者既各有所因以進其身則凡議論之間各黨其所厚善而以衆寡為勝負故其一罷士大夫連坐而去者數十百人及其復用則又源源而來既恩歸私第豈復有盡忠朝廷者哉更勝迭負一進一退者亦二十餘年矣私黨既成公論不伸致朝政不綱金兵內侮流弊之極萃于今日所幸黨魁既去則其各所引用之人自當革心易意勿懷私恩勿讎私忿實效赤心盡忠朝廷以為陛下之用伏冀陛下開公正之路塞私邪之門實用人才無有適莫刑賞所加視其功罪而無容心于其間使朋黨之論消于未形則朝廷有安靜之理天下有太平之期是亦搢紳之福也唐李宗閔李德裕立黨以相傾軋搢紳之禍四十年不能解文宗歎曰去河北賊易去此朋黨難後李訓用事素忌宗閔德裕之寵乃因楊虞卿獄指為黨人嘗所惡者悉陷黨中遷貶無闕日班列幾空中外震畏文宗為下詔開諭羣情稍安此不慎其始之過也仁宗朝賈昌朝陳執中惡杜衍韓琦范仲淹歐陽修等亦指以為黨而相與為勝負者二十餘年至嘉祐中韓琦為相罔念舊怨凡所進用之人不分彼此惟才是用故朋黨之議不治自消願陛下以仁宗為法以唐文宗為戒慎之于始以福天下書曰無偏無黨王道蕩蕩惟陛下留神幸甚所有吳學正書隨劄子進乞下有司詰問言之所從苟有其實不敢逃罪若吳學正造為此言以相侵誣亦乞略加究辨以警觀望附㑹妄言希進之人若鬻書者託其姓名妄行印造則亦乞治其罪臣衰老憔悴在北京日三乞致仕忽蒙陛下不次擢用亦欲少效涓塵以酬造化不意今者吳學正欲以大惡為臣之罪伏望陛下篤終始之眷許臣解罷機務守本官致仕以全晚節又貼黃臣政和末久病不痊䝉道君皇帝召為醴泉觀使以便醫藥疾病既愈因言外方軍民久困若不早加安撫必有盜賊流亡意外之患遂建格民之議究軍民利害蔡京大怒侍御史張僕承宣風指上疏論列于是罷局臣亦出知揚州是時臣居京師不及半年今朝士大夫皆知其詳由此觀之則臣之蹤跡粗亦可恕伏望聖明洞察許臣罷免全其晚節不勝幸甚奉㫖所乞不允令吳若分析申尚書省二十七日詳定司敕令所狀契勘本所詳定官三員近承宣和六年十二月內指揮侍從官罷兼局例該罷去見缺官總領竊緣祖宗法敕局多是宰執提舉今照得天聖敕提舉官吕夷簡夏竦慶厯敕提舉官賈昌朝吳育嘉祐敕提舉官韓琦曽公亮熙寧敕王安石元符敕章惇安燾紹聖常平免役敕章惇乞賜施行奉聖㫖詳定官差户部尚書梅執禮户部侍郎邵傳大理卿周懿文臣僚上言竊觀自陛下臨御以來臺臣諫臣以至學士大夫奏疏上書皆乞誅童貫以謝天下陛下聖德涵容久未賜可臣竊以謂祖宗垂憲于治安無事之時殺大臣焉當在所禁在後世有臣亂天下危宗社而不殺之非祖宗之志也况貫閹腐刑餘在祖宗時止堪掃除之役豈真所謂大臣也哉貫握兵柄幾三十年大奸大惡不可縷數臣獨論其可殺而不可赦者壞太祖皇帝之兵制敗真宗仁宗皇帝之信誓啓萬餘里之邊釁殘百年之興國敵國欲歸却其表而不受敵人潜遁指其蹤而使擒契丹舊痛入骨假手大金俾之報怨旁結西夏共為敵仇敵騎欲入貫猶趣往太原經紀雲中敵破欣代即舍太原以歸具舟楫載所親兵及兵之家屬佩陜西河北河東宣撫使印浮汴渡江淮西北貫于是時何有陛下陛下奈何卒赦之惟陛下思敵人侵辱之變實生于貫致上皇前日之播越軫陛下父子之情肅邸今日之拘縻傷陛下兄弟之愛念太祖太宗百戰以得之天下一童貫實危之此而不殺臣恐太祖太宗含怒于上天未已也臣願陛下奮乾剛發睿斷即貫之貶所檻至京師陳百官召六師誅于觀闕之下醢其軀以賜戰士函其首以遺大金戰士受醢必踴躍以增氣大金發函必悚惕而畏威契丹之怨稍平大金之師自退矣茍或不然則垂盡老奴將死牖下受侮四方貽譏萬世無以慰祖宗之神靈則大金之兵恐未殄也又上言臣按童貫以奴𨽻之資荷不世之遇夤緣恩寵包藏禍心近者臣寮論其罪惡備載章疏以其飬兵于家儲甲于庫有潜謀不軌之兆陛下寬宥姑投海裔今者竊聞有司檢校器用復有交椅以青龍首金銀絲背為飾者士論傳駭以為貫之不軌蹤跡暴白無甚于此伏望斷自淵衷正其典刑天下幸甚奉聖㫖童貫罪在首薦朱勔起花石引趙良嗣滅契丹修延福宫等朕在東宮屢為搖動䇿立之時有異語不俟䇿命擅去東南差留守不受命東京解圍聞而惡之家中有龍飾之物私養死士等罪不容誅誅訖亦可告諭中外仍差監察御史張澄將帶開封府公人前去追童貫隨所至州軍行刑訖函首赴闕當議賫送宣撫司軍前一行人漏泄者依軍法其子孫已降指揮送吉陽軍編管見隨貫子孫仰張澄交割與所在州軍選差官員多差兵役管押前去臣寮上言童貫政和中納燕人趙良嗣以為謀主始建平燕之議經營十年中國空虛招納叛亡充斥州縣卒致生靈塗炭奉聖㫖趙良嗣可令廣副李升之隨所至州軍行刑訖函首赴闕當議賫送宣撫司軍前令開封府差得力使臣一員賫令來處分將帶行刑公人赴李升之處使喚并取首級回漏泄者依軍法其子孫已降指揮送萬安軍編管二十八日聖㫖自即位之初未有論列蔡氏者李擢首先論列今李光謂召擢不當顯與蔡氏為地送吏部與小郡蔡甸胄移送梅州居住殿中侍御史胡舜陟言竊觀陸贄作奉天制書武人悍夫聞之無不感動流涕封敷作詔慰邊將傷痍者語切而理勝有補于時今國家多事兵革方興宜得語言侍從之臣如贄輩高文大筆誕揚德意伏見朝廷賜顔岐出身使為中書舍人岐之名迹初不聞于人及賜出身居詞掖人已疑駭今為書命動輒乖繆士夫傳笑以為口實播告四方有纍初政蓋岐之為文初不知句法之律古今所承用者但肆意妄言不中繩約多或冗長少或不足褒或過實貶或失真固不足以潤色皇猷鼓舞天下其有害于理者臣請言之除朝說之中書舍人曰知世掌美又潤色于絲綸此用杜甫詩欲知世掌絲綸美之句乃曰知世掌美成何等語耶除孫傳侍讀制曰朕念元子出就外傅從學之始左右前後羽翼既多宜得知孔氏正道者以長率之此東宫官詞也傳已罷東宫官矣館讀而為此語豈非昏謬之甚乎郡守承流宣化也懷州霍安國再任乃曰宣流河內張良運籌帷幄之中決勝千里之外除錢伯言知真定乃曰增重運籌之勝至于可怪之語若除程瑀正言曰送麗使金士望任體許景衡兼太子諭德曰心靜身安李旦屯田員外郎曰稍遷應宿之郎增耀起上之部王雲出守曰昔自瑣闈之拜肅持金國之書其詞不典如此奈何處以代言之任當今能文者甚多何必用岐汙辱訓誥伏望罷岐職事所有賜出身指揮乞不施行奉聖㫖顔岐罷中書舍人臣僚上言自蔡京當國所引以為輔者皆其締交死黨同為欺君悮國之奸無復毫髮忠利社稷之意如林攄者佞愎奸回志在寵利平居言論風㫖惟京是從于是盡壞祖宗法度而人心內離强鄰外侮矣雖京跋扈不臣意在斫喪王室而羽翼唱和同惡相濟論攄罪奸不在京下伏望聖斷念祖宗二百年艱難之業壞于此輩之手其林攄贈恩典數乞行追奪以詔列位奉聖㫖林攄追貶為節度副使二十九日左正言程瑀除屯田郎官臣僚上言伏見少傅鎮西軍節度使提舉京西崇福宫余深乞守本官致仕奉聖㫖依所乞守本官職致仕臣聞何以罰之足以垂戒于萬世雖堯舜之聖不敢不罰也舊相去位十年忽以老疾自願罷少傅納節鉞守本官致仕在它人之小有罪者陛下憐而恕之勿罰可矣如深之致位宰輔皆由欺君罔父黨蔡京而得之陛下安可不罰以垂將來臣子之戒乎且有張懷素者以邪道蠱惑妄言禍福蔡京吕惠卿師事尤謹出入閨門晝夜無間至汙其婦女而不可訶也京前後尊崇懷素詩東甚多浙中多勒碑流傳其後有告懷素謀不軌者京亟命宗升往漕于浙毁碑以滅跡比升至浙碑未及毁而惠卿先以墨本六十篇持以脅京冀免其罪蓋同惡相持情狀譎怪有如此者時深為御史中丞與開封府林攄皆京死黨也京以懷素事付之獄中供通事有干京者深攄二人力為掩覆又疑言及京者必焚棄之中朝士庶皆能道也京既幸免報其盡力深攄驟遷俱至執政深作宰執前後八年京之奸謀詭計無不干預始終朋附無如深攄此天下公論謂蔡京得力之多者深為第一攄為第二夫敢隱蔽大臣交通不軌之罪而顯受其報人臣欺罔之大無過此矣若不因事以正典刑則亂臣賊子何以為懼今學士之優職特進之崇階其可尚使叨據為歸老之榮也奉㫖余深落觀文殿大學士致仕吏部尚書莫儔奏乞將吏部四選條例編纂成冊鏤板出賣以杜奸吏奉聖㫖依奏靖康要録卷七
