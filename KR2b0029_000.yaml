body:
  text: 靖康要錄編年類提要臣等謹案靖康要録十二卷不著撰人名氏陳振孫書錄解題曰靖康要録五卷不知作者記欽宗在儲時及靖康一年之事按日編次凡政事制度及詔誥之類皆詳載焉其與金國和戰諸事編載尤詳云云是振孫之時已莫知出誰手矣今觀其書記事具有月日載文具有首尾决非草野之士不覩國史日厯者所能作書末一條稱髙宗為今上又所載秦檜事詞意左袒足徴為紹興時人之筆也其臣僚奏貶李綱事綱以忠直之資不主割地議和觸忤時宰是時耿南仲以欽宗舊學為相與綱不合擠之出師又減放兵馬令諸将不受節制幸其敗以快私心貶綱之奏極其醜詆葢皆時宰之意而託為百寮同疏以示公論耳宋人雜史傳于今日者如熊克中興小紀李心傳建炎以來繫年要録之類大抵於南宋為詳其詳于北宋者惟李燾續資治通鑑長編而已然世所行長編率多佚缺今以永樂大典所載補之亦僅及哲宗而止徽宗之事遂以無徵徐夢莘三朝北盟㑹編起政和迄建炎雖較他書為詳悉而所錄事跡章疏惟以有涉金人者為主餘則畧焉此書雖叙事少畧載文太繁而一時朝政具有端委多有史所不詳者即以補李燾長編亦無不可也乾隆四十六年九月恭校上總纂官臣紀昀臣陸錫熊臣孫士毅總校官臣陸費墀
  hash: sha256:00d85ae5e657cee0ef854008f32284991b0a5114e7f1e13d13fb27f021a6eb53
